// ===== WEBSOCKET MANAGER =====
const WsManager = {
  ws: null,
  url: null,
  token: null,
  authed: false,
  reconnectTimer: null,
  heartbeatTimer: null,
  reconnectDelay: 1000,   // еҲқе§ӢйҮҚиҝһе»¶иҝҹ1з§’
  maxReconnectDelay: 30000,
  listeners: {},          // { eventType: Set<callback> }
  onlineUsers: new Set(),

  // иҝһжҺҘ
  connect(token) {
    if (this.ws && (this.ws.readyState === 0 || this.ws.readyState === 1)) return;
    this.token = token;
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    this.url = `${proto}//${location.host}/ws`;
    try {
      this.ws = new WebSocket(this.url);
    } catch (e) { console.error('WS connect error:', e); return; }

    this.ws.onopen = () => {
      console.log('рҹ”Ң WS connected');
      this.reconnectDelay = 1000; // йҮҚзҪ®йҮҚиҝһе»¶иҝҹ
      // еҸ‘йҖҒи®ӨиҜҒ
      this._send({ type: 'auth', token: 'Bearer ' + this.token });
      // еҗҜеҠЁеҝғи·і
      this._startHeartbeat();
    };

    this.ws.onmessage = (e) => {
      let msg;
      try { msg = JSON.parse(e.data); } catch (err) { return; }
      this._handleMessage(msg);
    };

    this.ws.onclose = (e) => {
      console.log('рҹ”Ң WS closed:', e.code);
      this.authed = false;
      this._stopHeartbeat();
      // иҮӘеҠЁйҮҚиҝһ(йқһдё»еҠЁе…ій—ӯ)
      if (this.token && e.code !== 4000) {
        this._scheduleReconnect();
      }
    };

    this.ws.onerror = () => {}; // oncloseдјҡи§ҰеҸ‘йҮҚиҝһ
  },

  // ж–ӯејҖ(дё»еҠЁ)
  disconnect() {
    this.token = null;
    this.authed = false;
    this.onlineUsers.clear();
    this._stopHeartbeat();
    clearTimeout(this.reconnectTimer);
    if (this.ws) {
      this.ws.close(4000, 'logout'); // 4000=дё»еҠЁе…ій—ӯпјҢдёҚйҮҚиҝһ
      this.ws = null;
    }
  },

  // еҸ‘йҖҒж¶ҲжҒҜ
  send(data) {
    this._send(data);
  },

  // зӣ‘еҗ¬дәӢд»¶
  on(type, cb) {
    if (!this.listeners[type]) this.listeners[type] = new Set();
    this.listeners[type].add(cb);
    return () => this.listeners[type]?.delete(cb); // иҝ”еӣһеҸ–ж¶ҲеҮҪж•°
  },

  // жҳҜеҗҰеңЁзәҝ
  isOnline(userId) {
    return this.onlineUsers.has(userId);
  },

  // жҳҜеҗҰе·ІиҝһжҺҘдё”и®ӨиҜҒ
  get connected() {
    return this.authed && this.ws?.readyState === 1;
  },

  // === еҶ…йғЁж–№жі• ===

  _send(data) {
    if (this.ws?.readyState === 1) {
      this.ws.send(JSON.stringify(data));
    }
  },

  _handleMessage(msg) {
    switch (msg.type) {
      case 'auth_ok':
        this.authed = true;
        this.onlineUsers = new Set(msg.online || []);
        console.log('рҹ”Ң WS authed, online:', this.onlineUsers.size);
        break;
      case 'auth_fail':
        console.warn('WS auth fail:', msg.error);
        this.disconnect();
        break;
      case 'online':
        if (msg.online) this.onlineUsers.add(msg.userId);
        else this.onlineUsers.delete(msg.userId);
        break;
      case 'pong':
        break;
    }
    // и§ҰеҸ‘жүҖжңүиҜҘзұ»еһӢзҡ„зӣ‘еҗ¬еҷЁ
    this._emit(msg.type, msg);
  },

  _emit(type, data) {
    const cbs = this.listeners[type];
    if (cbs) cbs.forEach(cb => { try { cb(data); } catch (e) { console.error('WS listener error:', e); } });
    // д№ҹи§ҰеҸ‘йҖҡй…Қз¬Ұзӣ‘еҗ¬
    const allCbs = this.listeners['*'];
    if (allCbs) allCbs.forEach(cb => { try { cb(data); } catch (e) {} });
  },

  _startHeartbeat() {
    this._stopHeartbeat();
    this.heartbeatTimer = setInterval(() => {
      this._send({ type: 'ping' });
    }, 25000); // 25з§’pingдёҖж¬Ў(жңҚеҠЎеҷЁ30з§’и¶…ж—¶)
  },

  _stopHeartbeat() {
    if (this.heartbeatTimer) { clearInterval(this.heartbeatTimer); this.heartbeatTimer = null; }
  },

  _scheduleReconnect() {
    clearTimeout(this.reconnectTimer);
    console.log(`рҹ”Ң WS reconnecting in ${this.reconnectDelay/1000}s...`);
    this.reconnectTimer = setTimeout(() => {
      this.connect(this.token);
    }, this.reconnectDelay);
    // жҢҮж•°йҖҖйҒҝпјҢжңҖеӨ§30з§’
    this.reconnectDelay = Math.min(this.reconnectDelay * 2, this.maxReconnectDelay);
  },
};
window.WsManager = WsManager; // е…ЁеұҖеҸҜи®ҝй—®

// ===== CHAT DATA LAYER =====
const ChatStore={
  _key:'yuanhe_conversations',
  load(){try{return JSON.parse(localStorage.getItem(this._key)||'[]')}catch(e){return[]}},
  save(convs){try{localStorage.setItem(this._key,JSON.stringify(convs))}catch(e){}},
  getAll(){return this.load()},
  getById(id){return this.load().find(c=>c.id===id)||null},
  // Create new conversation (if not exists for this user)
  create(user,profile){
    const convs=this.load();
    const existing=convs.find(c=>c.user.id===user.id);
    if(existing)return existing;
    const conv={
      id:'conv_'+user.id+'_'+Date.now(),
      user:{id:user.id,name:user.name,age:user.age,gender:user.gender,sign:user.sign,bio:user.bio,tags:user.tags||[],score:user.score,year:user.year,month:user.month,day:user.day,hour:user.hour,isBot:user.isBot||false,chatStyle:user.chatStyle||''},
      messages:[],
      unread:0,
      lastMessage:'',
      lastTime:new Date().toISOString(),
      createdAt:new Date().toISOString(),
    };
    convs.unshift(conv);
    this.save(convs);
    return conv;
  },
  // Add message to conversation
  addMessage(convId,msg){
    const convs=this.load();
    const conv=convs.find(c=>c.id===convId);
    if(!conv)return null;
    const message={id:'msg_'+Date.now()+'_'+Math.random().toString(36).substr(2,4),role:msg.role,text:msg.text,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),ts:Date.now()};
    if(msg.image)message.image=msg.image;
    conv.messages.push(message);
    conv.lastMessage=msg.image?'[еӣҫзүҮ]':msg.text.substring(0,50);
    conv.lastTime=new Date().toISOString();
    if(msg.role==='ai')conv.unread=(conv.unread||0)+1;
    this.save(convs);
    return message;
  },
  // Recall a message (within 2 minutes)
  recallMessage(convId,msgId){
    const convs=this.load();
    const conv=convs.find(c=>c.id===convId);
    if(!conv)return;
    const msg=conv.messages.find(m=>m.id===msgId);
    if(msg){msg.recalled=true;msg.text='';delete msg.image;conv.lastMessage='ж¶ҲжҒҜе·Іж’Өеӣһ';this.save(convs)}
  },
  // Mark conversation as read
  markRead(convId){
    const convs=this.load();
    const conv=convs.find(c=>c.id===convId);
    if(conv){conv.unread=0;this.save(convs)}
  },
  // Get total unread count
  totalUnread(){return this.load().reduce((sum,c)=>sum+(c.unread||0),0)},
};

function ScoreRing({score,size=60,stroke=4}){
  const r=(size-stroke)/2,c=2*Math.PI*r;
  const color=score>=90?'#FF6B6B':score>=80?'#FFB347':score>=70?'#4ECDC4':'#9CA3AF';
  const label=score>=90?'еӨ©дҪңд№ӢеҗҲ':score>=80?'иүҜзјҳдҪіеҒ¶':score>=70?'жңүзјҳжңүд»Ҫ':'йңҖиҰҒзЈЁеҗҲ';
  return(<div style={{position:'relative',width:size,height:size,display:'inline-flex',alignItems:'center',justifyContent:'center'}}>
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={c} strokeDashoffset={c*(1-score/100)} strokeLinecap="round" style={{transition:'stroke-dashoffset 1s ease'}}/></svg>
    <div style={{position:'absolute',textAlign:'center'}}><div style={{fontSize:size*0.28,fontWeight:700,color:'#fff'}}>{score}</div><div style={{fontSize:size*0.12,color:'rgba(255,255,255,0.7)'}}>{label}</div></div>
  </div>);
}

// Haptic feedback (vibration API)
function haptic(type='light'){
  if(!navigator.vibrate)return;
  if(type==='light')navigator.vibrate(10);
  else if(type==='medium')navigator.vibrate(20);
  else if(type==='heavy')navigator.vibrate([30,10,30]);
  else if(type==='success')navigator.vibrate([10,30,10]);
}
// Pull-to-refresh hook
function usePullRefresh(onRefresh){
  const [pulling,setPulling]=useState(false);
  const [pullDist,setPullDist]=useState(0);
  const startY=useRef(0);const scrollRef=useRef(null);
  const onTouchStart=(e)=>{if(scrollRef.current?.scrollTop<=0)startY.current=e.touches[0].clientY};
  const onTouchMove=(e)=>{if(startY.current===0)return;const dy=e.touches[0].clientY-startY.current;if(dy>0&&scrollRef.current?.scrollTop<=0){setPullDist(Math.min(dy*0.4,60));if(dy>80)setPulling(true)}};
  const onTouchEnd=()=>{if(pulling&&onRefresh){onRefresh();haptic('medium')}setPullDist(0);setPulling(false);startY.current=0};
  const pullIndicator=pullDist>5?React.createElement('div',{style:{textAlign:'center',padding:`${Math.min(pullDist,50)}px 0 8px`,transition:pulling?'none':'padding .3s',fontSize:12,color:T.textThi}},pulling?'рҹ”„ жқҫжүӢеҲ·ж–°':'вҶ“ дёӢжӢүеҲ·ж–°'):null;
  return{scrollRef,onTouchStart,onTouchMove,onTouchEnd,pullIndicator};
}

          {pages.map((_,i)=><div key={i} style={{width:i===step?24:8,height:8,borderRadius:4,background:i===step?'#fff':'rgba(255,255,255,0.3)',transition:'all .3s'}}/>)}
        </div>
        {/* Button */}
        <button onClick={()=>{if(isLast)onDone();else setStep(s=>s+1)}} style={{width:'100%',height:52,borderRadius:26,border:'none',fontSize:16,fontWeight:700,cursor:'pointer',background:'rgba(255,255,255,0.95)',color:p.bg.includes('8B5CF6')?'#7C3AED':p.bg.includes('EC4899')?'#DB2777':'#D97706',boxShadow:'0 4px 20px rgba(0,0,0,0.15)',transition:'all .3s'}}>
          {isLast?'ејҖе§ӢжҺўзҙўе‘Ҫиҝҗ вҶ’':'дёӢдёҖжӯҘ'}
        </button>
      </div>
    </div>
  );
}

function WheelPicker({items,value,onChange,label}){
  const ref=useRef(null);const itemH=40;const visibleCount=5;
  const idx=items.findIndex(i=>String(i.v)===String(value));
  useEffect(()=>{if(ref.current&&idx>=0)ref.current.scrollTop=idx*itemH},[]);
  const onScroll=()=>{if(!ref.current)return;const i=Math.round(ref.current.scrollTop/itemH);if(i>=0&&i<items.length&&String(items[i].v)!==String(value))onChange(String(items[i].v))};
  return(<div style={{flex:1,position:'relative',height:itemH*visibleCount}}>
    {label&&<div style={{position:'absolute',top:-20,left:0,right:0,textAlign:'center',fontSize:11,color:T.textThi}}>{label}</div>}
    <div style={{position:'absolute',top:itemH*2,left:0,right:0,height:itemH,borderRadius:10,background:`${T.accent2}08`,border:`1px solid ${T.accent2}20`,zIndex:0}}/>
    <div style={{position:'absolute',top:0,left:0,right:0,height:itemH*2,background:`linear-gradient(to bottom,${T.card},${T.card}00)`,zIndex:1,pointerEvents:'none'}}/>
    <div style={{position:'absolute',bottom:0,left:0,right:0,height:itemH*2,background:`linear-gradient(to top,${T.card},${T.card}00)`,zIndex:1,pointerEvents:'none'}}/>
    <div ref={ref} onScroll={onScroll} style={{height:'100%',overflow:'auto',scrollSnapType:'y mandatory',WebkitOverflowScrolling:'touch',position:'relative',zIndex:0}}>
      <div style={{height:itemH*2}}/>
      {items.map(it=>{const sel=String(it.v)===String(value);return(
        <div key={it.v} style={{height:itemH,display:'flex',alignItems:'center',justifyContent:'center',scrollSnapAlign:'start',fontSize:sel?18:14,fontWeight:sel?700:400,color:sel?T.text:T.textThi,transition:'all .15s'}}>{it.l}</div>
      )})}
      <div style={{height:itemH*2}}/>
    </div>
  </div>);
}

// ===== LOGIN SCREEN (жүӢжңәеҸ·+йӘҢиҜҒз Ғ) =====
function LoginScreen({onLogin}){
  const [phone,setPhone]=useState('');
  const [code,setCode]=useState('');
  const [step,setStep]=useState('phone'); // 'phone' | 'code'
  const [sending,setSending]=useState(false);
  const [verifying,setVerifying]=useState(false);
  const [err,setErr]=useState('');
  const [countdown,setCountdown]=useState(0);
  const codeRef=useRef(null);

  // еҖ’и®Ўж—¶
  useEffect(()=>{if(countdown<=0)return;const t=setTimeout(()=>setCountdown(countdown-1),1000);return()=>clearTimeout(t)},[countdown]);

  const sendCode=async()=>{
    setErr('');setSending(true);
    try{
      const r=await apiPost('/api/auth/send-code',{phone});
      if(r.error){setErr(r.error);setSending(false);return}
      setStep('code');setCountdown(60);setSending(false);
      setTimeout(()=>codeRef.current?.focus(),300);
    }catch(e){setErr('зҪ‘з»ңй”ҷиҜҜпјҢиҜ·йҮҚиҜ•');setSending(false)}
  };

  const verify=async()=>{
    setErr('');setVerifying(true);
    try{
      const r=await apiPost('/api/auth/verify',{phone,code});
      if(r.error){setErr(r.error);setVerifying(false);return}
      // дҝқеӯҳtoken
      localStorage.setItem('yuanhe_token',r.token);
      onLogin({token:r.token,isNew:r.isNew,user:r.user});
    }catch(e){setErr('зҪ‘з»ңй”ҷиҜҜпјҢиҜ·йҮҚиҜ•');setVerifying(false)}
  };

  const phoneValid=/^1[3-9]\d{9}$/.test(phone);

  return(<div style={{height:'100%',overflow:'auto',background:T.bg}}>
    <div style={{padding:'80px 24px 40px',maxWidth:360,margin:'0 auto'}}>
      {/* Logo */}
      <div className="anim-in" style={{textAlign:'center',marginBottom:48}}>
        <div style={{fontSize:48,marginBottom:12}}>рҹ”®</div>
        <div className="serif" style={{fontSize:28,fontWeight:700,color:T.text}}>зјҳеҗҲ</div>
        <div style={{fontSize:13,color:T.textSec,marginTop:8}}>е‘ҪзҗҶеҘ‘еҗҲ В· зјҳеҲҶеӨ©жҲҗ</div>
      </div>

      {step==='phone'&&<div className="anim-in">
        <div style={{fontSize:15,fontWeight:600,color:T.text,marginBottom:16}}>жүӢжңәеҸ·зҷ»еҪ•</div>
        <div style={{position:'relative',marginBottom:16}}>
          <span style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',fontSize:14,color:T.textSec}}>+86</span>
          <input
            type="tel" maxLength={11} value={phone}
            onChange={e=>setPhone(e.target.value.replace(/\D/g,''))}
            placeholder="иҜ·иҫ“е…ҘжүӢжңәеҸ·"
            style={{width:'100%',padding:'14px 14px 14px 52px',borderRadius:14,border:`1.5px solid ${T.border}`,background:T.card,fontSize:15,color:T.text,outline:'none'}}
          />
        </div>
        {err&&<div style={{fontSize:12,color:'#EF4444',marginBottom:12}}>{err}</div>}
        <button onClick={sendCode} disabled={!phoneValid||sending}
          style={{width:'100%',padding:'15px',borderRadius:14,border:'none',background:phoneValid?`linear-gradient(135deg,${T.accent2},${T.accent2}CC)`:T.border,color:phoneValid?'#fff':T.textThi,fontSize:15,fontWeight:600,cursor:phoneValid?'pointer':'default'}}>
          {sending?'еҸ‘йҖҒдёӯвҖҰ':'иҺ·еҸ–йӘҢиҜҒз Ғ'}
        </button>
        <div style={{fontSize:11,color:T.textThi,textAlign:'center',marginTop:20,lineHeight:1.6}}>
          зҷ»еҪ•еҚіиЎЁзӨәеҗҢж„ҸгҖҠз”ЁжҲ·еҚҸи®®гҖӢе’ҢгҖҠйҡҗз§Ғж”ҝзӯ–гҖӢ
        </div>
      </div>}

      {step==='code'&&<div className="anim-in">
        <button onClick={()=>{setStep('phone');setCode('');setErr('')}} style={{background:'none',border:'none',fontSize:13,color:T.textSec,cursor:'pointer',marginBottom:16}}>вҶҗ иҝ”еӣһдҝ®ж”№</button>
        <div style={{fontSize:15,fontWeight:600,color:T.text,marginBottom:6}}>иҫ“е…ҘйӘҢиҜҒз Ғ</div>
        <div style={{fontSize:13,color:T.textSec,marginBottom:20}}>е·ІеҸ‘йҖҒеҲ° {phone.replace(/(\d{3})\d{4}(\d{4})/,'$1****$2')}</div>
        {/* 6-digit code input */}
        <div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:20}}>
          {[0,1,2,3,4,5].map(i=>(
            <div key={i} style={{width:44,height:52,borderRadius:12,border:`2px solid ${code.length===i?T.accent2:code[i]?T.accent2+'60':T.border}`,background:T.card,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:700,color:T.text,transition:'border .2s'}}>
              {code[i]||''}
            </div>
          ))}
        </div>
        <input ref={codeRef} type="tel" maxLength={6} value={code} autoFocus
          onChange={e=>{const v=e.target.value.replace(/\D/g,'');setCode(v);if(v.length===6){setErr('');setTimeout(()=>verify(),200)}}}
          onKeyDown={e=>{if(e.key==='Enter'&&code.length===6)verify()}}
          style={{position:'fixed',top:-100,opacity:0}}
        />
        {/* Tap anywhere on code area to focus hidden input */}
        <div onClick={()=>codeRef.current?.focus()} style={{position:'absolute',top:0,left:0,right:0,bottom:'40%',zIndex:1}}/>
        {err&&<div style={{fontSize:12,color:'#EF4444',marginBottom:12,textAlign:'center'}}>{err}</div>}
        <button onClick={verify} disabled={code.length!==6||verifying}
          style={{width:'100%',padding:'15px',borderRadius:14,border:'none',background:code.length===6?`linear-gradient(135deg,${T.accent2},${T.accent2}CC)`:T.border,color:code.length===6?'#fff':T.textThi,fontSize:15,fontWeight:600,cursor:code.length===6?'pointer':'default'}}>
          {verifying?'йӘҢиҜҒдёӯвҖҰ':'зҷ»еҪ•'}
        </button>
        <div style={{textAlign:'center',marginTop:16}}>
          <button onClick={()=>{if(countdown<=0)sendCode()}} disabled={countdown>0}
            style={{background:'none',border:'none',fontSize:13,color:countdown>0?T.textThi:T.accent2,cursor:countdown>0?'default':'pointer'}}>
            {countdown>0?`йҮҚж–°еҸ‘йҖҒ(${countdown}s)`:'йҮҚж–°еҸ‘йҖҒйӘҢиҜҒз Ғ'}
          </button>
        </div>
      </div>}
    </div>
  </div>);
}

// ===== SWIPE CARD (prototype style: white card + photo/info split) =====
function SwipeCard({user,onSwipe,isTop,onDetail}){
  const [dx,setDx]=useState(0);const [dragging,setDragging]=useState(false);const startX=useRef(0);
  const onS=x=>{startX.current=x;setDragging(true)};
  const onM=x=>{if(dragging)setDx(x-startX.current)};
  const onE=()=>{if(Math.abs(dx)>80)onSwipe(dx>0?'right':'left');else if(Math.abs(dx)<5&&onDetail)onDetail();setDx(0);setDragging(false)};
  const rot=dx*0.05,opa=Math.min(Math.abs(dx)/100,1);
  const grad=GRADS[user.id%GRADS.length];
  const isOnline=user.isBot?((user.id*7+new Date().getHours())%3!==0):true;
  const typeTag=user.matchResult?.gradeDesc?user.matchResult.gradeDesc.substring(0,4):(user.score>=80?'еӨ©дҪңд№ӢеҗҲ':user.score>=65?'жңүзјҳжңүд»Ҫ':'жҪңеҠӣд№Ӣзјҳ');
  return(
    <div onMouseDown={e=>onS(e.clientX)} onMouseMove={e=>onM(e.clientX)} onMouseUp={onE} onMouseLeave={()=>dragging&&onE()}
      onTouchStart={e=>onS(e.touches[0].clientX)} onTouchMove={e=>onM(e.touches[0].clientX)} onTouchEnd={onE}
      style={{position:'absolute',inset:0,borderRadius:20,overflow:'hidden',cursor:'grab',userSelect:'none',
        transform:`translateX(${dx}px) rotate(${rot}deg) scale(${isTop?1:0.96})`,

// ===== BOT RATIO CONFIG (жёҗиҝӣйҖҖеҮә) =====
// Simulates real user count вҖ” in production this comes from backend
function getBotConfig(){
  const realUserCount=USERS.length; // 12 real users currently
  // Ratio rules: fewer real users вҶ’ more bots
  let botRatio,label;
  if(realUserCount<100){botRatio=0.8;label='еҶ·еҗҜеҠЁ(80%жңәеҷЁдәә)'}
  else if(realUserCount<1000){botRatio=0.5;label='жҲҗй•ҝжңҹ(50%жңәеҷЁдәә)'}
  else if(realUserCount<5000){botRatio=0.2;label='жҙ»и·ғжңҹ(20%жңәеҷЁдәә)'}
  else{botRatio=0;label='жҲҗзҶҹжңҹ(жңәеҷЁдәәе·Іе…ій—ӯ)'}
  return{realUserCount,botRatio,label};
}

    ж°ҙ:{theme:'жҷәж…§В·жөҒеҠЁ',color:'#3B82F6',bg:'#EFF6FF',keywords:['зҒөж„ҹ','зӣҙи§ү','йҖӮеә”','еҸҳйҖҡ'],relation:['з”Ёеҝғж„ҹеҸ—еҜ№ж–№зҡ„жғ…з»Ә','йҖӮеҗҲжөӘжј«зҡ„е°ҸжғҠе–ң','дҝқжҢҒзҘһз§ҳж„ҹ'],action:['еҶҷж—Ҙи®°и®°еҪ•зҒөж„ҹ','еҗ¬дёҖеј ж–°дё“иҫ‘','жіЎжҫЎжҲ–ж•ЈжӯҘж”ҫз©ә']},

    const jd=Math.floor(367*y-Math.floor(7*(y+Math.floor((m+9)/12))/4)+Math.floor(275*m/9)+d+1721013.5);

            const info=getDayInfo(dateObj);
            const today=isToday(d);const selected=isSel(d);
            return <button key={i} onClick={()=>setSelDate(dateObj)} style={{padding:'6px 0',borderRadius:10,border:'none',cursor:'pointer',textAlign:'center',

              {d}

        const weekMsgs=allConvs.reduce((s,c)=>{const msgs=(c.messages||[]).filter(m=>m.role==='user'&&m.ts&&m.ts>=weekStart.getTime());return s+msgs.length},0);
        const bestMatch=allConvs.length>0?[...allConvs].sort((a,b)=>(b.user.score||0)-(a.user.score||0))[0]:null;
        if(weekHistory.length===0&&weekMoods.length===0&&allConvs.length===0)return null;
        return<div style={{background:`${T.accent2}06`,borderRadius:14,padding:14,border:`1px solid ${T.accent2}20`,marginBottom:12}}>

            <span style={{fontSize:14}}>рҹ”®</span>

        </div>;

      <button onClick={()=>setShowShare(true)} style={{width:'100%',padding:'12px',borderRadius:14,border:`1px solid ${T.border}`,background:T.card,fontSize:13,color:T.textSec,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>рҹ“Ө еҲҶдә«д»Ҡж—ҘиҝҗеҠҝ</button>

}

  const getFilteredBots=(pref)=>{
    const allBots=[...USERS,...BOTS];
    const filtered=pref==='all'?allBots:allBots.filter(u=>u.gender===pref);
    return filtered.sort(()=>Math.random()-0.5);
  };
  const [cards,setCards]=useState(()=>getFilteredBots(genderPref));
  const [matchUser,setMatchUser]=useState(null);
  const [detailUser,setDetailUser]=useState(null);
  const [swiped,setSwiped]=useState(0);
  const [lastSwiped,setLastSwiped]=useState(null);
  const [showWheel,setShowWheel]=useState(false);

  // иҪ¬зӣҳиҮӘеҠЁеј№еҮә: жҜҸеӨ©жңүеү©дҪҷж¬Ўж•°ж—¶пјҢйҰ–ж¬Ўиҝӣе…ҘйҰ–йЎөеј№еҮәдёҖж¬Ў
  useEffect(()=>{
    if(window._yuanheWheelShown)return; // жң¬ж¬Ўsessionе·Іеј№иҝҮ
    const wheelKey='yuanhe_wheel_'+new Date().toDateString();
    const used=parseInt(localStorage.getItem(wheelKey)||'0');
    if(used<2){
      window._yuanheWheelShown=true;
      const timer=setTimeout(()=>setShowWheel(true),1500);
      return()=>clearTimeout(timer);
    }
  },[]);

  const [guideHidden,setGuideHidden]=useState(()=>!!localStorage.getItem('yuanhe_swipe_guided'));
  const showGuide=!guideHidden&&swiped===0;

  // еҠ иҪҪеҖҷйҖү: зңҹе®һз”ЁжҲ·(API) + Bot, и®Ўз®—еҢ№й…ҚеҲҶж•°
  const loadCandidates=async(pref)=>{
    let bots=getFilteredBots(pref);
    let realUsers=[];
    // е°қиҜ•д»ҺжңҚеҠЎеҷЁиҺ·еҸ–зңҹе®һз”ЁжҲ·
    if(localStorage.getItem('yuanhe_token')){
      try{const r=await apiGet('/api/candidates?gender='+(pref||'')+'&limit=20');if(Array.isArray(r))realUsers=r}catch(e){}
    }
    const allCands=[...realUsers,...bots];
    // жү№йҮҸи®Ўз®—еҢ№й…ҚеҲҶж•°
    try{
      const results=await apiPost('/api/batch-match',{profile,candidates:allCands});
      if(results?.length>0){
        setCards(results.map(r=>({...r,score:r.matchResult?.score||r.score})).sort(()=>Math.random()-0.5));
        return;
      }
    }catch(e){}
    setCards(allCands.sort(()=>Math.random()-0.5));
  };

  const switchPref=(p)=>{setGenderPref(p);localStorage.setItem('yuanhe_gender_pref',p);setSwiped(0);setLastSwiped(null);loadCandidates(p)};
  useEffect(()=>{loadCandidates(genderPref)},[]);
  const swipe=(dir)=>{
    haptic('light');const top=cards[cards.length-1];if(!top)return;
    setLastSwiped(top);setCards(c=>c.slice(0,-1));setSwiped(s=>s+1);
    if(!localStorage.getItem('yuanhe_swipe_guided'))localStorage.setItem('yuanhe_swipe_guided','1');
    // и®°еҪ•ж»‘еҠЁеҲ°жңҚеҠЎеҷЁ(зңҹе®һз”ЁжҲ·)
    if(top.realUserId&&localStorage.getItem('yuanhe_token')){
      apiPost('/api/swipe',{targetId:top.realUserId,direction:dir}).then(r=>{
        if(r?.matched){haptic('success');setTimeout(()=>setMatchUser(top),300)}
        else if(dir==='right'){window.yuanheToast?.('е·Іе–ңж¬ў рҹ’• зӯүеҫ…еҜ№ж–№еӣһеә”')}
      }).catch(()=>{});
    }
    // BotеҢ№й…Қ: дҝқжҢҒеҺҹжңүйҖ»иҫ‘
    if((top.isBot||!top.realUserId)&&dir==='right'&&top.score>=65){haptic('success');setTimeout(()=>setMatchUser(top),300)}
  };
  const undoSwipe=()=>{if(!lastSwiped)return;setCards(c=>[...c,lastSwiped]);setLastSwiped(null);setSwiped(s=>Math.max(0,s-1))};
  // дә”иЎҢ energy data from profile
  const wxLabels=['йҮ‘','жңЁ','ж°ҙ','зҒ«','еңҹ'];
  const wxColors=['#F59E0B','#22C55E','#3B82F6','#EF4444','#D97706'];
  const wxSeed=(profile.year*7+profile.month*13+profile.day*3+new Date().getDate()*11);
  const wxValues=wxLabels.map((_,i)=>15+((wxSeed*(i+1)*17)%40)); // 15-55 range
  const wxTotal=wxValues.reduce((a,b)=>a+b,0);
  const dominantIdx=wxValues.indexOf(Math.max(...wxValues));
  const dominantWx=wxLabels[dominantIdx];

  return(<div style={{height:'100%',overflow:'hidden',display:'flex',flexDirection:'column',paddingBottom:80}}>
    {/* Header matching prototype: дә”иЎҢиҪ®зӣҳ + title + action buttons */}
    <div style={{padding:'10px 16px 6px',flexShrink:0,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        {/* дә”иЎҢ Energy Ring вҖ” clickable to open wheel */}
        <div onClick={()=>setShowWheel(true)} style={{position:'relative',width:48,height:48,cursor:'pointer'}}>
          <svg width={48} height={48} viewBox="0 0 48 48">
            {(()=>{
              let startAngle=-90;
              return wxValues.map((val,i)=>{
                const angle=(val/wxTotal)*360;
                const endAngle=startAngle+angle;
                const r=19,cx=24,cy=24;
                const startRad=startAngle*Math.PI/180;
                const endRad=endAngle*Math.PI/180;
                const x1=cx+r*Math.cos(startRad),y1=cy+r*Math.sin(startRad);
                const x2=cx+r*Math.cos(endRad),y2=cy+r*Math.sin(endRad);
                const large=angle>180?1:0;
                const d=`M${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2}`;
                startAngle=endAngle;
                return React.createElement('path',{key:i,d:d,fill:'none',stroke:wxColors[i],strokeWidth:i===dominantIdx?6:4,strokeLinecap:'round',opacity:i===dominantIdx?1:0.35});
              });
            })()}
          </svg>
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:wxColors[dominantIdx]}}>{dominantWx}</div>
        </div>
        <div>
          <div style={{fontSize:17,fontWeight:800,color:T.text,letterSpacing:1}}>зјҳеҗҲ</div>
          <div style={{fontSize:10,color:T.textThi}}>д»Ҡж—Ҙ{dominantWx}иұЎиғҪйҮҸжҙ»и·ғ</div>
        </div>
      </div>
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        {/* Gender preference filter */}
        <div style={{display:'flex',borderRadius:10,border:`1px solid ${T.border}`,overflow:'hidden',background:T.card}}>
          {[{v:'female',l:'еҘіз”ҹ'},{v:'male',l:'з”·з”ҹ'},{v:'all',l:'е…ЁйғЁ'}].map(o=>
            <button key={o.v} onClick={()=>{if(genderPref!==o.v)switchPref(o.v)}} style={{padding:'5px 10px',border:'none',fontSize:10,fontWeight:genderPref===o.v?600:400,cursor:'pointer',background:genderPref===o.v?`${T.accent2}15`:'transparent',color:genderPref===o.v?T.accent2:T.textThi}}>{o.l}</button>
          )}
        </div>
      </div>
    </div>
    {/* Card area */}
    <div key={genderPref} style={{position:'relative',flex:1,margin:'0 14px',minHeight:100,marginBottom:4}}>
      {cards.length===0?(<div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:T.textThi}}>
        <div style={{fontSize:48,marginBottom:16}}>рҹҺӢ</div><div style={{fontSize:16,fontWeight:500,color:T.text}}>д»Ҡж—ҘзјҳеҲҶе·ІзңӢе®Ң</div><div style={{fontSize:13,marginTop:8}}>жҳҺеӨ©дјҡжңүж–°зҡ„жңүзјҳдәәеҮәзҺ°</div>
        <button onClick={()=>goTo(S.AI)} style={{marginTop:20,padding:'12px 24px',borderRadius:12,border:'none',background:T.accent2,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>е…ҲеҺ»AIеҚ еҚң</button>
      </div>)
      :cards.slice(-2).map((u,i,arr)=><SwipeCard key={u.id} user={u} onSwipe={swipe} isTop={i===arr.length-1} onDetail={()=>setDetailUser(u)}/>)}
      {/* First-time swipe guide */}
      {showGuide&&cards.length>0&&<div onClick={()=>{localStorage.setItem('yuanhe_swipe_guided','1');setGuideHidden(true)}} style={{position:'absolute',inset:0,borderRadius:20,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:5,cursor:'pointer'}}>
        <div style={{textAlign:'center',color:'#fff'}}>
          <div style={{display:'flex',justifyContent:'center',gap:40,marginBottom:16}}>
            <div><div style={{fontSize:28}}>рҹ‘Ҳ</div><div style={{fontSize:12,marginTop:4}}>е·Ұж»‘ж— зјҳ</div></div>
            <div><div style={{fontSize:28}}>рҹ‘Ҷ</div><div style={{fontSize:12,marginTop:4}}>зӮ№еҮ»иҜҰжғ…</div></div>
            <div><div style={{fontSize:28}}>рҹ‘ү</div><div style={{fontSize:12,marginTop:4}}>еҸіж»‘жңүзјҳ</div></div>
          </div>
          <div style={{fontSize:11,opacity:.7}}>зӮ№еҮ»д»»ж„ҸдҪҚзҪ®е…ій—ӯ</div>
        </div>
      </div>}
    </div>
    {/* Action buttons вҖ” below card */}
    {cards.length>0&&<div style={{display:'flex',justifyContent:'center',gap:24,alignItems:'center',padding:'6px 0 2px',flexShrink:0}}>
      {lastSwiped&&<button onClick={undoSwipe} style={{width:36,height:36,borderRadius:18,border:`1.5px solid ${T.success}40`,background:`${T.success}08`,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:T.success}}>вҶ©</button>}
      <button onClick={()=>swipe('left')} style={{width:50,height:50,borderRadius:25,border:`2px solid ${T.border}`,background:T.card,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:T.shadow}}><Icons.x s={22} c={T.textThi}/></button>
      <button onClick={()=>swipe('right')} style={{width:50,height:50,borderRadius:25,border:'none',background:T.primary,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 3px 12px ${T.primary}40`}}><Icons.heart s={22} c="#fff" fill="#fff"/></button>
    </div>}
    {matchUser&&<MatchPopup user={matchUser} onChat={()=>{
      const c=addConv(matchUser);autoGreet(c);setOpenConvId(c.id);setLastSwiped(null);setMatchUser(null);goTo(S.MSGS);
    }} onClose={()=>{
      addConv(matchUser);autoGreet(ChatStore.getAll().find(c=>c.user.id===matchUser.id));setLastSwiped(null);setMatchUser(null);
      window.yuanheToast?.(`е·Іе’Ң${matchUser.name}еҢ№й…ҚжҲҗеҠҹпјҢеҸҜеңЁж¶ҲжҒҜйЎөжүҫеҲ° TA рҹ’¬`);
    }}/>}
    {detailUser&&<CardDetailModal user={detailUser} profile={profile} onClose={()=>setDetailUser(null)} goTo={goTo} addConv={addConv} autoGreet={autoGreet}/>}
    {/* Fortune Wheel вҖ” fullscreen */}
    {showWheel&&<div style={{position:'fixed',inset:0,zIndex:250,background:'#0F0F1A',display:'flex',flexDirection:'column',overflow:'auto'}}>
      <div style={{padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
        <div style={{fontSize:16,fontWeight:700,color:'#E9D5FF'}}>рҹҺЎ е‘ҪиҝҗиҪ¬зӣҳ</div>
        <button onClick={()=>setShowWheel(false)} style={{width:32,height:32,borderRadius:16,border:'none',background:'rgba(255,255,255,0.1)',color:'#C4B5FD',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>вң•</button>
      </div>
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 12px'}}>
        <div style={{width:'100%',maxWidth:360}}>
          <FortuneWheel profile={profile} goTo={(s,m)=>{setShowWheel(false);goTo(s,m)}} addConv={addConv} setOpenConvId={setOpenConvId} autoGreet={autoGreet} onClose={()=>setShowWheel(false)}/>
        </div>
      </div>
    </div>}
  </div>);
}

// ===== WUXING RADAR (SVGдә”иЎҢйӣ·иҫҫеӣҫ) =====
function WuxingRadar({data,size=140}){
  if(!data)return null;
  const pad=24; // padding for labels
  const vw=size+pad*2;
  const cx=vw/2,cy=vw/2,r=size*0.34;
  const labels=['жңЁ','зҒ«','еңҹ','йҮ‘','ж°ҙ'];
  const dotColors=['#86EFAC','#FCA5A5','#FCD34D','#E2E8F0','#93C5FD']; // softer dots on purple
  const labelColors=['#D1FAE5','#FEE2E2','#FEF3C7','#F1F5F9','#DBEAFE']; // light label colors
  const vals=labels.map(l=>data[l]||0);
  const max=Math.max(...vals,1);
  const pts=labels.map((_,i)=>{
    const a=Math.PI*2*i/5-Math.PI/2;
    const v=(vals[i]/max)*r;
    return[cx+v*Math.cos(a),cy+v*Math.sin(a)];
  });
  const poly=pts.map(p=>p.join(',')).join(' ');
  const gridLevels=[0.25,0.5,0.75,1];
  return(
    <svg width={size} height={size} viewBox={`0 0 ${vw} ${vw}`}>
      {/* Grid */}
      {gridLevels.map(gl=>(
        <polygon key={gl} points={labels.map((_,i)=>{const a=Math.PI*2*i/5-Math.PI/2;return`${cx+r*gl*Math.cos(a)},${cy+r*gl*Math.sin(a)}`}).join(' ')}
          fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth={0.5}/>
      ))}
      {/* Axes */}
      {labels.map((_,i)=>{const a=Math.PI*2*i/5-Math.PI/2;return<line key={i} x1={cx} y1={cy} x2={cx+r*Math.cos(a)} y2={cy+r*Math.sin(a)} stroke="rgba(255,255,255,0.08)" strokeWidth={0.5}/>})}
      {/* Data polygon */}
      <polygon points={poly} fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.7)" strokeWidth={1.5}/>
      {/* Data points */}
      {pts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r={3} fill={dotColors[i]} stroke="rgba(255,255,255,0.6)" strokeWidth={1}/>)}
      {/* Labels */}
      {labels.map((l,i)=>{const a=Math.PI*2*i/5-Math.PI/2;const lx=cx+(r+14)*Math.cos(a);const ly=cy+(r+14)*Math.sin(a);return<text key={l} x={lx} y={ly} fill={labelColors[i]} fontSize={11} fontWeight={700} textAnchor="middle" dominantBaseline="central">{l}</text>})}
    </svg>
  );
}

              <div key={j} style={{display:'flex',alignItems:'flex-start',gap:8}}>
                <div style={{width:6,height:6,borderRadius:3,background:c.color,flexShrink:0,marginTop:6}}/>
                <div style={{fontSize:13,color:T.textSec,lineHeight:1.5}}>{t}</div>
              </div>
            ))}
          </div>

        </div>
      </div>;
    })()}
  </>);
}

// ===== REPORT CARD =====
function ReportCard({title, icon, color, content, index, md, isLong}) {
  const [expanded, setExpanded] = useState(!isLong); // long cards start collapsed
  const trimmed = content.replace(/^\s*\n+/, '').trim();
  const displayContent = expanded ? trimmed : trimmed.substring(0, 280) + 'вҖҰ';
  return (
    <div className="anim-in" style={{background:T.card, borderRadius:16, overflow:'hidden', boxShadow:T.shadow, marginBottom:10}}>
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'14px 16px',borderBottom:`1px solid ${T.border}`,position:'relative'}}>
        <div style={{position:'absolute',left:0,top:0,bottom:0,width:4,background:color,borderRadius:'0 4px 4px 0'}}/>
        <div style={{width:36,height:36,borderRadius:10,background:`${color}12`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>{icon}</div>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:600,color:T.text}}>{title.replace(/^[дёҖдәҢдёүеӣӣдә”е…ӯдёғе…«д№қеҚҒ]+гҖҒ\s*/,'')}</div>
        </div>
        {isLong&&<button onClick={()=>setExpanded(!expanded)} style={{background:'none',border:'none',fontSize:18,color:T.textThi,cursor:'pointer',transform:expanded?'rotate(180deg)':'none',transition:'transform .2s'}}>в–ҫ</button>}
      </div>
      {expanded&&<div style={{padding:'12px 16px',fontSize:13.5,lineHeight:1.75,color:T.textSec}}>
        <div className="markdown" dangerouslySetInnerHTML={md(displayContent)}/>
      </div>}
      {isLong&&!expanded&&<div style={{padding:'10px 16px'}}>
        <button onClick={()=>setExpanded(true)} style={{width:'100%',padding:'8px',borderRadius:8,border:`1px solid ${color}30`,background:`${color}08`,color:color,fontSize:12,fontWeight:500,cursor:'pointer'}}>еұ•ејҖжҹҘзңӢ в–ҫ</button>
      </div>}
    </div>
  );
}

// Tarot Modal
function TarotModal({spread,setSpread,cards,setCards,pool,onDone,onClose}){
  const sz={single:1,threeCard:3,relationship:4};
  const need=sz[spread]||3;
  const [flipping,setFlipping]=useState(null); // index being flipped
  const pickCard=(cid,i)=>{
    if(cards.includes(cid)){setCards(c=>c.filter(x=>x!==cid));return}
    if(cards.length>=need)return;
    setFlipping(i);
    setTimeout(()=>{setCards(c=>[...c,cid]);setFlipping(null)},300);
  };
  return(
    <div style={{position:'fixed',inset:0,zIndex:300,background:'linear-gradient(180deg,#1E1146,#2D1B69)',display:'flex',flexDirection:'column',overflow:'auto'}}>
      <div style={{width:'100%',maxWidth:480,margin:'0 auto',flex:1,overflow:'auto',padding:'20px 16px 28px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div style={{fontSize:17,fontWeight:700,color:'#E9D5FF'}}>рҹҺҙ йҖүжӢ©дҪ зҡ„еЎ”зҪ—зүҢ</div>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:16,border:'none',background:'rgba(255,255,255,0.1)',color:'#C4B5FD',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>вң•</button>
        </div>
        {/* Spread type */}
        <div style={{display:'flex',gap:6,marginBottom:14}}>
          {[{k:'single',l:'рҹғҸ еҚ•еј ',n:1},{k:'threeCard',l:'рҹҺҙ дёүеј ',n:3},{k:'relationship',l:'рҹ’• еӣӣеј ',n:4}].map(s=>(
            <button key={s.k} onClick={()=>{setSpread(s.k);setCards([])}} style={{flex:1,padding:'8px 4px',borderRadius:10,fontSize:11,fontWeight:600,border:spread===s.k?'2px solid #FBBF24':'1px solid rgba(196,181,253,0.2)',cursor:'pointer',background:spread===s.k?'rgba(251,191,36,0.15)':'transparent',color:spread===s.k?'#FBBF24':'#C4B5FD',textAlign:'center'}}>{s.l}</button>
          ))}
        </div>
        {/* Selected cards display */}
        {cards.length>0&&<div style={{display:'flex',justifyContent:'center',gap:8,marginBottom:14}}>
          {cards.map((cid,i)=><div key={cid} className="anim-in" style={{width:44,height:62,borderRadius:8,background:'linear-gradient(135deg,#FBBF24,#F59E0B)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 12px rgba(251,191,36,0.3)',transform:`rotate(${(i-Math.floor(cards.length/2))*5}deg)`}}>
            <div style={{fontSize:10,fontWeight:700,color:'#fff'}}>з¬¬{i+1}еј </div>
          </div>)}
        </div>}
        {/* Progress */}
        <div style={{textAlign:'center',marginBottom:10}}>
          <span style={{fontSize:12,fontWeight:600,color:'#C4B5FD'}}>е·ІйҖү {cards.length} / {need} еј </span>
          {cards.length>=need&&<span style={{marginLeft:8,fontSize:11,color:'#FBBF24'}}>вңҰ йҖүеҘҪдәҶ</span>}
        </div>
        {/* Cards grid */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
          {pool.slice(0,12).map((cid,i)=>{
            const picked=cards.includes(cid);const full=cards.length>=need;const isFlip=flipping===i;
            return <button key={i} onClick={()=>pickCard(cid,i)} style={{
              aspectRatio:'2/3',borderRadius:10,cursor:picked||!full?'pointer':'default',
              border:picked?'2px solid #FBBF24':'1px solid rgba(196,181,253,0.15)',
              background:picked?'linear-gradient(135deg,#FBBF24,#F59E0B)':'linear-gradient(160deg,#4C1D95,#6D28D9)',
              display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:'#fff',
              transition:'all .3s',transform:isFlip?'rotateY(90deg) scale(0.9)':picked?'translateY(-4px) scale(1.03)':'scale(1)',
              boxShadow:picked?'0 6px 16px rgba(251,191,36,0.3)':'0 2px 8px rgba(0,0,0,0.3)',opacity:!picked&&full?0.25:1,
            }}>
              {picked?<><div style={{fontSize:10,opacity:.9,fontWeight:700}}>з¬¬{cards.indexOf(cid)+1}еј </div><div style={{fontSize:20,marginTop:2}}>вңҰ</div></>:<><div style={{fontSize:22,opacity:.3}}>вң§</div><div style={{fontSize:9,opacity:.3,marginTop:2}}>зҝ»зүҢ</div></>}
            </button>;
          })}
        </div>
        {/* Actions */}
        <div style={{display:'flex',gap:8,marginTop:16}}>
          <button onClick={()=>{setCards([]);onDone(true)}} style={{flex:1,padding:'12px',borderRadius:14,border:'1px solid rgba(196,181,253,0.2)',background:'transparent',fontSize:13,fontWeight:600,color:'#C4B5FD',cursor:'pointer'}}>рҹҺҙ йҡҸжңәжҠҪеҸ–</button>
          <button onClick={()=>onDone(true)} disabled={cards.length===0} style={{flex:1,padding:'12px',borderRadius:14,border:'none',background:cards.length>0?'linear-gradient(135deg,#FBBF24,#F59E0B)':'rgba(255,255,255,0.05)',fontSize:13,fontWeight:700,color:cards.length>0?'#fff':'rgba(196,181,253,0.3)',cursor:cards.length>0?'pointer':'default'}}>{cards.length>=need?'вңҰ зЎ®и®Ө'+need+'еј зүҢ':'з»§з»ӯйҖүзүҢ'}</button>
        </div>
      </div>
    </div>
  );
}

// Hour Correction Assistant Modal
function HourAssistantModal({profile,onResult,onClose}){
  const [step,setStep]=useState(0);
  const [answers,setAnswers]=useState({});
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const questions=[
    {key:'rank',title:'в‘  дҪ еңЁе…„ејҹе§җеҰ№дёӯжҺ’иЎҢпјҹ',opts:[{v:'oldest',l:'рҹ‘Ҷ иҖҒеӨ§/й•ҝеӯҗй•ҝеҘі'},{v:'middle',l:'вңҢпёҸ дёӯй—ҙ'},{v:'youngest',l:'рҹ‘Ү жңҖе°Ҹ'},{v:'only',l:'рҹҷӢ зӢ¬з”ҹ'}]},
    {key:'personality',title:'в‘Ў дҪ зҡ„жҖ§ж јжӣҙеҒҸеҗ‘пјҹ',opts:[{v:'extrovert',l:'рҹ”Ҙ еӨ–еҗ‘дё»еҠЁ',d:'зҲұзӨҫдәӨпјҢиЎЁиҫҫж¬Іејә'},{v:'introvert',l:'рҹҢҠ еҶ…ж•ӣжІүзЁі',d:'зӢ¬еӨ„е……з”өпјҢж·ұжҖқзҶҹиҷ‘'},{v:'ambivert',l:'вҡ–пёҸ зңӢжғ…еҶө',d:'жңүж—¶еӨ–еҗ‘жңүж—¶е®үйқҷ'}]},
    {key:'turning',title:'в‘ў дҪ з¬¬дёҖж¬ЎйҮҚеӨ§дәәз”ҹиҪ¬жҠҳзәҰеңЁпјҹ',sub:'еҰӮпјҡеҚҮеӯҰ/е·ҘдҪң/жҒӢзҲұ/жҗ¬е®¶зӯүйҮҚиҰҒеҸҳеҢ–',opts:[{v:'10-18',l:'10-18еІҒ',d:'йқ’е°‘е№ҙж—¶жңҹ'},{v:'19-25',l:'19-25еІҒ',d:'еӨ§еӯҰ/еҲқе…ҘзӨҫдјҡ'},{v:'26-33',l:'26-33еІҒ',d:'иҖҢз«ӢеүҚеҗҺ'},{v:'34+',l:'34еІҒд»ҘеҗҺ',d:'дёӯе№ҙд»ҘеҗҺ'}]},
    {key:'bodyType',title:'в‘Ј дҪ зҡ„дҪ“еһӢжҖ»дҪ“еҒҸеҗ‘пјҹ',opts:[{v:'slim',l:'рҹҰҙ еҒҸзҳҰ',d:'дёҚе®№жҳ“иғ–'},{v:'medium',l:'вҡ–пёҸ еҢҖз§°',d:'жӯЈеёёдҪ“еһӢ'},{v:'strong',l:'рҹ’Ә еҒҸеЈ®',d:'е®№жҳ“й•ҝиӮү/еЈ®е®һ'}]},
    {key:'energy',title:'в‘Ө дҪ йҖҡеёёе“ӘдёӘж—¶ж®өжңҖжңүзІҫеҠӣпјҹ',opts:[{v:'earlyMorning',l:'рҹҢ… жё…жҷЁ5-8зӮ№'},{v:'morning',l:'вҳҖпёҸ дёҠеҚҲ9-12зӮ№'},{v:'afternoon',l:'рҹҢҮ дёӢеҚҲ14-18зӮ№'},{v:'lateNight',l:'рҹҢҷ ж·ұеӨң22зӮ№еҗҺ'}]},
  ];
  const pick=(key,val)=>{
    const a={...answers,[key]:val};setAnswers(a);
    if(step<questions.length-1)setTimeout(()=>setStep(step+1),300);
    else doCorrect(a);
  };
  const doCorrect=async(a)=>{
    setLoading(true);
    try{
      const r=await apiPost('/api/hour-correct',{year:profile.year,month:profile.month,day:profile.day,gender:profile.gender,answers:a});
      setResult(r);
    }catch(e){setResult({error:e.message})}
    setLoading(false);
  };
  const q=questions[step];
  const progress=result?100:Math.round((step/questions.length)*100);
  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:300,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:T.card,borderRadius:'24px 24px 0 0',width:'100%',maxWidth:480,maxHeight:'90vh',overflow:'auto',padding:'20px 16px 30px',animation:'slideUp .3s ease'}}>
        {/* Header */}
        <div onClick={e=>e.stopPropagation()} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{fontSize:18,fontWeight:700,color:'#D97706'}}>рҹ”® AIж—¶иҫ°ж ЎжӯЈеҠ©жүӢ</div>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:16,border:'none',background:T.bg,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>вң•</button>
        </div>
        {/* Progress */}
        <div style={{height:4,background:'#FEF3C7',borderRadius:2,marginBottom:16,overflow:'hidden'}}>
          <div style={{height:'100%',background:'linear-gradient(90deg,#D97706,#F59E0B)',borderRadius:2,width:progress+'%',transition:'width .4s ease'}}/>
        </div>

        {!result&&!loading&&<>
          {/* Question */}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:16,fontWeight:700,color:T.text,marginBottom:4}}>{q.title}</div>
            {q.sub&&<div style={{fontSize:12,color:T.textSec}}>{q.sub}</div>}
          </div>
          {/* Options */}
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {q.opts.map(o=>{
              const selected=answers[q.key]===o.v;
              return <button key={o.v} onClick={()=>pick(q.key,o.v)} style={{padding:'14px 16px',borderRadius:14,border:selected?'2px solid #D97706':`1.5px solid ${T.border}`,background:selected?(T.isDark?'#D9770615':'#FFF8EB'):T.card,cursor:'pointer',textAlign:'left',transition:'all .2s',transform:selected?'scale(1.02)':'none'}}>
                <div style={{fontSize:14,fontWeight:600,color:selected?'#D97706':T.text}}>{o.l}</div>
                {o.d&&<div style={{fontSize:11,color:T.textSec,marginTop:2}}>{o.d}</div>}
              </button>;
            })}
          </div>
          {/* Back */}
          {step>0&&<button onClick={()=>setStep(step-1)} style={{marginTop:12,background:'none',border:'none',fontSize:13,color:T.textSec,cursor:'pointer'}}>вҶҗ дёҠдёҖйўҳ</button>}
          {/* Steps indicator */}
          <div style={{display:'flex',justifyContent:'center',gap:6,marginTop:16}}>
            {questions.map((_,i)=><div key={i} style={{width:i===step?20:8,height:8,borderRadius:4,background:i<step?'#D97706':i===step?'#F59E0B':T.border,transition:'all .3s'}}/>)}
          </div>
        </>}

        {/* Loading */}
        {loading&&<div style={{textAlign:'center',padding:'40px 20px'}}>
          <div style={{width:60,height:60,margin:'0 auto 16px',position:'relative'}}>
            <div style={{position:'absolute',inset:0,borderRadius:'50%',border:'3px solid #FEF3C7'}}/>

        {result&&result.error&&<div style={{textAlign:'center',padding:'30px 20px'}}>

}

function AIScreen({profile,initialMode,onUpdateProfile}){
  const [mode,setMode]=useState(initialMode||'bazi');

    const [showTarotModal,setShowTarotModal]=useState(false);

  const [modeStates,setModeStates]=useState(()=>{

    const saved={};

      Object.keys(s).forEach(k=>{
        // Handle both old format (direct result) and new format ({result,chatHistory})
        const val=s[k];
        if(val&&val.result){saved[k]={q:'',result:val.result,loading:false,elapsed:0,error:null,loadMsg:'',chatHistory:val.chatHistory||[]};}
        else if(val&&(val.response||val.engineData)){saved[k]={q:'',result:val,loading:false,elapsed:0,error:null,loadMsg:'',chatHistory:[]};}
      });
    }catch(e){}
    return saved;
  });
  const getMS=(m)=>modeStates[m]||{q:'',result:null,loading:false,elapsed:0,error:null,loadMsg:'',chatHistory:[]};
  const setMS=(m,patch)=>setModeStates(prev=>{const cur=prev[m]||{q:'',result:null,loading:false,elapsed:0,error:null,loadMsg:'',chatHistory:[]};return{...prev,[m]:{...cur,...patch}}});

  // зӣ‘еҗ¬ж•°жҚ®еҲ йҷӨдәӢд»¶пјҢйҮҚзҪ®жҠҘе‘ҠзҠ¶жҖҒ
  useEffect(()=>{
    const handler=(e)=>{if(e.detail?.key==='yuanhe_mode_results'){setModeStates({})}};
    window.addEventListener('yuanhe-data-deleted',handler);
    // д№ҹе®ҡжңҹжЈҖжҹҘ(е…ңеә•)
    const check=setInterval(()=>{if(!localStorage.getItem('yuanhe_mode_results')&&Object.keys(modeStates).length>0)setModeStates({})},2000);
    return()=>{window.removeEventListener('yuanhe-data-deleted',handler);clearInterval(check)};
  },[modeStates]);

  // Active loading mode (for toast)
  const loadingMode=Object.keys(modeStates).find(k=>modeStates[k]?.loading);
  const loadingModeInfo=loadingMode?MODES.find(m=>m.id===loadingMode):null;

  // жЁЎејҸеҲҮжҚўй”Ғ: AIи®Ўз®—дёӯзҰҒжӯўеҲҮжҚўпјҢи¶…ж—¶иҮӘеҠЁи§Јй”Ғ
  const trySetMode=(newMode)=>{
    if(loadingMode){
      const info=MODES.find(m=>m.id===loadingMode);
      window.yuanheToast?.(`${info?.n||''}жӯЈеңЁеҲҶжһҗдёӯпјҢиҜ·зЁҚеҖҷвҖҰ`);
      return;
    }
    setMode(newMode);
  };

  // и¶…ж—¶иҮӘеҠЁи§Јй”Ғ(3еҲҶй’ҹ)

    if(!loadingMode)return;

  const ms=getMS(mode);

  const elColorMap={жңЁ:'#16A34A',зҒ«:'#EF4444',еңҹ:'#D97706',йҮ‘:'#B8860B',ж°ҙ:'#2563EB'};

  // Pair input

  // Tarot

  const tarotPool=useState(()=>{const a=[];for(let i=0;i<78;i++)a.push(i);return a.sort(()=>Math.random()-0.5)})[0];
  // Meihua
  const [mhNum1,setMhNum1]=useState('');
  const [mhNum2,setMhNum2]=useState('');

  // Timer for loading
  const timers=useRef({});
  const startTimer=(m)=>{
    let i=0;
    setMS(m,{elapsed:0,loadMsg:LOAD_MSGS[0]});

      i++;
      setMS(m,{elapsed:i,loadMsg:LOAD_MSGS[Math.min(Math.floor(i/15),LOAD_MSGS.length-1)]});

  const stopTimer=(m)=>{if(timers.current[m]){clearInterval(timers.current[m]);delete timers.current[m]}};
  useEffect(()=>()=>{Object.values(timers.current).forEach(clearInterval)},[]);

  // Save results to localStorage whenever they change
  useEffect(()=>{
    const toSave={};
    Object.entries(modeStates).forEach(([k,v])=>{if(v.result){
      const r={...v.result};delete r._streaming; // never persist streaming flag
      toSave[k]={result:r,chatHistory:v.chatHistory||[]};
    }});
    try{localStorage.setItem('yuanhe_mode_results',JSON.stringify(toSave))}catch(e){}
  },[modeStates]);

  const divine=async(divineMode,engineOnly,questionOverride)=>{
    const m=divineMode||mode;
    // Validate: bazi/astrology/vedic/pair modes need complete birth data
    const needsBirth=['bazi','astrology','vedic','hehun','synastry','hepan'].includes(m);
    if(needsBirth&&(!profile.year||!profile.month||!profile.day)){
      setMS(m,{error:'иҜ·е…Ҳе®Ңе–„еҮәз”ҹе№ҙжңҲж—ҘдҝЎжҒҜпјҲеңЁ"жҲ‘зҡ„"йЎөйқўеҸҜдҝ®ж”№пјү'});return;
    }
    // ж—¶иҫ°: е…«еӯ—/еҚ°еәҰ/еҗҲе©ҡ/еҗҲзӣҳејәеҲ¶иҰҒжұӮпјҢжҳҹеә§/жҳҹеә§й…ҚеҜ№йҖүеЎ«
    const needsHourStrict=['bazi','vedic','hehun','hepan'].includes(m);
    if(needsHourStrict&&profile.hour===-1&&!hourSkipped){
      setMS(m,{error:'иҜ·е…ҲиЎҘе……еҮәз”ҹж—¶иҫ°пјҢжҲ–йҖүжӢ©"дёҚзҹҘйҒ“ж—¶иҫ°"з»§з»ӯ'});return;
    }
    const q = questionOverride !== undefined ? questionOverride : (engineOnly?'':getMS(m).q);
    // Meihua requires a specific question
    if(m==='meihua'&&!q.trim()&&!engineOnly){
      setMS(m,{error:'вқҖ жў…иҠұжҳ“ж•°и®Із©¶"дёҖдәӢдёҖеҚ "пјҢиҜ·е…ҲжҸҸиҝ°дҪ иҰҒеҚ зҡ„е…·дҪ“дәӢжғ…пјҢеҶҚиө·еҚҰгҖӮ'});return;
    }
    if(questionOverride!==undefined)setMS(m,{q:questionOverride});
    setMS(m,{loading:true,error:null,result:null});
    setReportExpanded(true);
    startTimer(m);
    try{
      const body={mode:m,year:profile.year,month:profile.month,day:profile.day,hour:profile.hour,gender:profile.gender,question:q,displayMode:dm};
      if(profile.hour===-1)body.hourUnknown=true;
      if(hourApprox)body.hourApprox=true;
      if(['hehun','synastry','hepan'].includes(m))body.profileB=p2;
      if(m==='tarot'){if(tarotCards.length>0)body.selectedCards=tarotCards;body.spreadType=tarotSpread}
      if(m==='meihua'&&mhNum1!==''){body.meihuaNum1=parseInt(mhNum1);if(mhNum2!=='')body.meihuaNum2=parseInt(mhNum2)}

      if(engineOnly){
        // Non-streaming for engine-only
        const r=await apiPost('/api/calculate',body);
        setMS(m,{result:{engineData:r.engineData,response:null,structured:r.structured},loading:false});
      }else{
        // Streaming SSE for AI divine
        const abortCtrl=new AbortController();
        const timeout=setTimeout(()=>abortCtrl.abort(),180000); // 3 min timeout
        try{
        const resp=await fetch('/api/divine-stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),signal:abortCtrl.signal});
        const reader=resp.body.getReader();
        const decoder=new TextDecoder();
        let fullText='';let structured=null;let engineData='';let buf='';
        let updateTimer=null;let streaming=true;
        const flushUpdate=(final)=>{
          let clean=fullText.replace(/<think>[\s\S]*?<\/think>/g,'').trim();
          // During streaming, also strip unclosed <think> tags
          if(!final)clean=clean.replace(/<think>[\s\S]*$/,'').trim();
          if(final)streaming=false;
          setMS(m,{result:{response:clean,engineData,structured,_genTime:new Date().toLocaleTimeString(),_elapsed:getMS(m).elapsed,_streaming:streaming},loading:false});
        };
        while(true){
          const {done,value}=await reader.read();
          if(done)break;
          buf+=decoder.decode(value,{stream:true});
          const lines=buf.split('\n');
          buf=lines.pop()||'';
          for(const line of lines){
            const t=line.trim();
            if(!t.startsWith('data: '))continue;
            const d=t.slice(6);
            if(d==='[DONE]'){if(updateTimer)clearInterval(updateTimer);flushUpdate(true);break}
            try{
              const ev=JSON.parse(d);
              if(ev.type==='init'){structured=ev.structured;engineData=ev.engineData||'';
                // Show header immediately with structured data
                setMS(m,{result:{response:'',engineData,structured,_streaming:true},loading:false});
                // Scroll to report when it first appears
                if(m===mode)setTimeout(()=>ref.current?.scrollIntoView({behavior:'smooth'}),300);
                // Start periodic updates every 300ms
                updateTimer=setInterval(flushUpdate,300);
              }
              else if(ev.type==='chunk'){fullText+=ev.text}
              else if(ev.type==='error'){setMS(m,{error:ev.error,loading:false});if(updateTimer)clearInterval(updateTimer);return}
            }catch(e){}
          }
        }
        if(updateTimer)clearInterval(updateTimer);
        flushUpdate(true);
        // Save to history
        try{const hist=JSON.parse(localStorage.getItem('yuanhe_history')||'[]');hist.unshift({mode:m,question:q,time:new Date().toLocaleString(),ts:Date.now()});if(hist.length>50)hist.length=50;localStorage.setItem('yuanhe_history',JSON.stringify(hist))}catch(e){}
        // еҗҢжӯҘеҲ°жңҚеҠЎеҷЁ
        if(localStorage.getItem('yuanhe_token')){const ms_=modeStates[m];apiPost('/api/auth/divination',{mode:m,question:q,response:ms_?.result?.response||'',structured:ms_?.result?.structured,engineData:ms_?.result?.engineData}).catch(()=>{})}
        }catch(abortErr){
          if(abortErr.name==='AbortError'){
            if(fullText){flushUpdate(true)}
            else{setMS(m,{error:'иҜ·жұӮи¶…ж—¶пјҢиҜ·йҮҚиҜ•',loading:false})}
          }else throw abortErr;
        }finally{clearTimeout(timeout)}
      }
    }catch(e){setMS(m,{error:e.message,loading:false})}
    stopTimer(m);
  };

  const md=t=>{try{return{__html:marked.parse(t)}}catch(e){return{__html:t.replace(/\n/g,'<br>')}}};
  const SECTION_ICONS={'жҺ’зӣҳ':'рҹ“Ӣ','жҖ§ж ј':'рҹ§ ','еӨ©иөӢ':'рҹ§ ','еӨ§иҝҗ':'рҹ“Ҳ','е‘Ҫиҝҗ':'рҹ“Ҳ','дәӢдёҡ':'рҹ’ј','иҙўиҝҗ':'рҹ’°','е©ҡе§»':'рҹ’•','е®¶еәӯ':'рҹҸЎ','ж„ҹжғ…':'рҹ’•','еҒҘеә·':'рҹҸҘ','жөҒе№ҙ':'рҹ”®','йў„жөӢ':'рҹ”®','жҖ»иҜ„':'вӯҗ','е»әи®®':'рҹ’Ў','жіЁж„Ҹ':'вҡ пёҸ','й…ҚеҜ№':'рҹ’‘','ж–№дҪҚ':'рҹ§ӯ','иЎҢдёҡ':'рҹ’ј','еӯҗеҘі':'рҹ‘¶','жҳҹеә§':'вҳ…','еЎ”зҪ—':'рҹҺҙ','зүҢ':'рҹҺҙ','еҚҰ':'вқҖ','жў…иҠұ':'вқҖ','еҗ йҷҖ':'в—Һ','ж ёеҝғ':'рҹ’Һ','зӣёдҪҚ':'рҹ”—','е…ғзҙ ':'рҹҢҖ'};
  const SECTION_COLORS=['#8B5CF6','#DB2777','#0D9488','#D97706','#2563EB','#DC2626','#059669','#7C3AED','#E11D48','#0891B2'];
  const parseSections=(resp,isStreaming)=>{
    const sections=[];const clean=resp.replace(/<think>[\s\S]*?<\/think>/g,'').trim();const lines=clean.split('\n');let cur=null;

      else if(cur){if(line.trim())cur.lines.push(line)}

    });
    return sections.filter(s=>s.lines.some(l=>l.trim()));
  };
  const followUp=async(q)=>{
    if(!q.trim()||chatLoading)return;

    if(ch.length>=20){window.yuanheToast?.('жң¬ж¬ЎдјҡиҜқе·ІиҫҫдёҠйҷҗпјҢиҜ·зӮ№еҮ»йҮҚж–°жҸҗй—®');return}
    setReportExpanded(false); // auto-collapse report
    // Add user message immediately
    const newChat=[...ch,{role:'user',text:q,time:new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}];
    setMS(mode,{chatHistory:newChat});
    setFollowUpQ('');
    setChatLoading(true);
    try{
      const reportSummary=ms.result?.response?.substring(0,500)||'';
      const body={mode,year:profile.year,month:profile.month,day:profile.day,hour:profile.hour,gender:profile.gender,question:q,reportSummary,recentChat:ch.slice(-6)};
      // жүҖжңүжЁЎејҸ: иҝҪй—®ж—¶еёҰдёҠеј•ж“Һж•°жҚ®(жҸҗеҚҮAIеӣһзӯ”иҙЁйҮҸ)
      if(ms.result?.engineData){
        const label={bazi:'е…«еӯ—ж•°жҚ®',astrology:'жҳҹзӣҳж•°жҚ®',tarot:'зүҢйқўж•°жҚ®',meihua:'еҚҰиұЎж•°жҚ®',vedic:'жҳҹе®ҝж•°жҚ®',hehun:'еҗҲе©ҡж•°жҚ®',synastry:'й…ҚеҜ№ж•°жҚ®',hepan:'еҗҲзӣҳж•°жҚ®'}[mode]||'еҲҶжһҗж•°жҚ®';
        body.reportSummary=`[${label}]\n${ms.result.engineData.substring(0,800)}\n\n[еҲҶжһҗж‘ҳиҰҒ]\n${reportSummary}`;
      }

    setChatLoading(false);
    setTimeout(()=>chatEndRef.current?.scrollIntoView({behavior:'smooth'}),300);
  };
  const P={bg:T.bg,accent:T.accent2,accentLight:'#DDD6FE',accentDark:'#7C3AED'};

  return(<div ref={scrollRef} onScroll={e=>{setScrolledPastModes(e.target.scrollTop>160)}} style={{height:'100%',overflow:'auto',background:P.bg}}>
    {/* === HEADER вҖ” matches Discover style === */}
    <div style={{padding:'14px 16px 0',background:T.bg,position:'sticky',top:0,zIndex:60,borderBottom:scrolledPastModes?`1px solid ${T.border}`:'none'}}>
      {/* Category tabs as title вҖ” like Discover */}

          boxShadow:(mode==='meihua'&&!ms.q.trim())?'none':`0 4px 16px ${mc}40`,transition:'all .3s',

          {mode==='meihua'&&!ms.q.trim()?'вқҖ иҜ·е…Ҳиҫ“е…ҘиҰҒеҚ зҡ„й—®йўҳ':`рҹ”® ${modeInfo.icon} ${MODE_FULL[mode]} В· AIйў„жөӢ`}
        </button>
        <div style={{textAlign:'center',marginTop:3}}>
          <button onClick={()=>divine(mode,true)} style={{background:'none',border:'none',fontSize:11,color:T.textThi,cursor:'pointer'}}>вҡЎ д»…еј•ж“ҺпјҲз§’еҮәпјү</button>
        </div>
      </>:<>
        {/* Has result: chips + input + send */}
        <div style={{display:'flex',gap:4,marginBottom:6,overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
          {(()=>{
            const ch=ms.chatHistory||[];
            const asked=ch.filter(m=>m.role==='user').map(m=>m.text);
            const base=(QUICK_QS[mode]||[]).filter(q=>!asked.includes(q));
            // Dynamic chips based on report content
            const resp=ms.result?.response||'';
            const dynamic=[];
            if(resp.includes('жЎғиҠұ')&&!asked.some(a=>a.includes('жЎғиҠұ')))dynamic.push('жЎғиҠұиҝҗиҜҰи§Ј');
            if(resp.includes('еӨ§иҝҗ')&&!asked.some(a=>a.includes('еӨ§иҝҗ')))dynamic.push('еҪ“еүҚеӨ§иҝҗеҲҶжһҗ');
            if(resp.includes('еҲӣдёҡ')&&!asked.some(a=>a.includes('еҲӣдёҡ')))dynamic.push('йҖӮеҗҲеҲӣдёҡеҗ—');
            if(resp.includes('иҙөдәә')&&!asked.some(a=>a.includes('иҙөдәә')))dynamic.push('иҙөдәәж–№дҪҚ');
            const chips=[...dynamic,...base].slice(0,5);
            return chips.map(qq=>(
              <button key={qq} onClick={()=>followUp(qq)} disabled={chatLoading} style={{padding:'4px 10px',borderRadius:8,border:`1px solid ${mc}25`,background:`${mc}06`,color:mc,fontSize:10,fontWeight:500,cursor:'pointer',flexShrink:0,whiteSpace:'nowrap'}}>{qq}</button>
            ));
          })()}
        </div>
        <div style={{display:'flex',gap:8}}>
          <input
            value={followUpQ}
            onChange={e=>setFollowUpQ(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&followUpQ.trim())followUp(followUpQ)}}
            placeholder="иҫ“е…ҘиҝҪй—®вҖҰ"
            style={{flex:1,padding:'10px 14px',borderRadius:20,border:`1.5px solid ${T.border}`,background:T.bg,fontSize:13,outline:'none'}}
          />
          <button onClick={()=>followUp(followUpQ)}
            disabled={!followUpQ.trim()||chatLoading}
            style={{width:40,height:40,borderRadius:20,border:'none',
              background:(!followUpQ.trim()||chatLoading)?T.border:`linear-gradient(135deg,${mc},${mc}dd)`,
              color:'#fff',fontSize:16,cursor:(!followUpQ.trim()||chatLoading)?'default':'pointer',
              flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',
              boxShadow:(!followUpQ.trim()||chatLoading)?'none':`0 2px 8px ${mc}40`}}>{chatLoading?'вҖҰ':'вҶ‘'}</button>
        </div>
        {/* йҮҚж–°еҲҶжһҗ/иө·еҚҰ/жҠҪзүҢжҢүй’® вҖ” жүҖжңүжЁЎејҸз»ҹдёҖеңЁеә•йғЁжҳҫзӨә */}
        <button onClick={()=>{
          setMS(mode,{result:null,error:null,chatHistory:[],q:mode==='meihua'?'':ms.q||''});
          if(mode==='meihua'){setMhNum1('');setMhNum2('')}
          if(mode==='tarot'){setTarotCards([])}
          try{const s=JSON.parse(localStorage.getItem('yuanhe_mode_results')||'{}');delete s[mode];localStorage.setItem('yuanhe_mode_results',JSON.stringify(s))}catch(e){}
        }} style={{width:'100%',padding:'14px',borderRadius:14,border:'none',marginTop:16,fontSize:14,fontWeight:600,cursor:'pointer',
          background:mode==='meihua'?'linear-gradient(135deg,#D97706,#F59E0B)':mode==='tarot'?'linear-gradient(135deg,#0D9488,#14B8A6)':`linear-gradient(135deg,${T.accent2},${T.accent2}CC)`,
          color:'#fff',boxShadow:mode==='meihua'?'0 4px 14px rgba(217,119,6,0.3)':mode==='tarot'?'0 4px 14px rgba(13,148,136,0.3)':`0 4px 14px ${T.accent2}33`,letterSpacing:1}}>
          {mode==='meihua'?'рҹ”„ йҮҚж–°иө·еҚҰ В· ж–°й—®йўҳ':mode==='tarot'?'рҹ”„ йҮҚж–°жҠҪзүҢ В· ж–°и§ЈиҜ»':'рҹ”„ жё…йҷӨжҠҘе‘Ҡ В· йҮҚж–°еҲҶжһҗ'}
        </button>
      </>}
    </div>

    {/* === LOADING TOAST (shows when bg mode is loading) === */}
    {loadingMode&&loadingMode!==mode&&<div style={{position:'fixed',top:100,left:'50%',transform:'translateX(-50%)',background:'rgba(0,0,0,0.8)',color:'#fff',borderRadius:16,padding:'10px 20px',zIndex:200,display:'flex',alignItems:'center',gap:8,fontSize:13,boxShadow:'0 4px 20px rgba(0,0,0,0.3)',animation:'fadeIn .3s ease'}}>
      <div style={{animation:'pulse 1.5s infinite'}}>рҹ”®</div>
      <span>{loadingModeInfo?.label||loadingMode} и§ЈиҜ»дёӯвҖҰ {getMS(loadingMode).elapsed}s</span>
      <button onClick={()=>setMode(loadingMode)} style={{background:'rgba(255,255,255,0.2)',border:'none',borderRadius:8,padding:'4px 10px',color:'#fff',fontSize:11,cursor:'pointer',marginLeft:4}}>жҹҘзңӢ</button>
    </div>}

    {/* Tarot Modal */}
    {showTarotModal&&<TarotModal spread={tarotSpread} setSpread={setTarotSpread} cards={tarotCards} setCards={setTarotCards} pool={tarotPool} onDone={(autoDivine)=>{setShowTarotModal(false);if(autoDivine)setTimeout(()=>divine(mode,false),100)}} onClose={()=>setShowTarotModal(false)}/>}

    {/* Hour Correction Assistant */}
    {showHourAssistant&&<HourAssistantModal profile={profile} onResult={(h)=>{onUpdateProfile({...profile,hour:h})}} onClose={()=>setShowHourAssistant(false)}/>}
    {showShare&&<ShareModal type="personality" profile={profile} structured={ms.result?.structured} onClose={()=>setShowShare(false)}/>}
  </div>);
}

// ===== DISCOVER =====
function FortuneWheel({profile,goTo,addConv,setOpenConvId,autoGreet,onClose}){
  const genderPref=localStorage.getItem('yuanhe_gender_pref')||(profile.gender==='male'?'female':'male');
  const [pool,setPool]=useState([]);
  const [spinning,setSpinning]=useState(false);
  const [result,setResult]=useState(null);
  const [showDetail,setShowDetail]=useState(false);
  const [angle,setAngle]=useState(0);
  const todayKey='yuanhe_wheel_'+new Date().toDateString();
  const [spinsLeft,setSpinsLeft]=useState(()=>{const used=parseInt(localStorage.getItem(todayKey)||'0');return Math.max(0,2-used)});
  const [loading,setLoading]=useState(true);
  const [matched,setMatched]=useState([]); // е·ІеҢ№й…Қзҡ„з”ЁжҲ·IDпјҢйҒҝе…ҚйҮҚеӨҚ

  useEffect(()=>{
    const cands=[...USERS,...BOTS].filter(u=>genderPref==='all'||u.gender===genderPref);
    apiPost('/api/batch-match',{profile,candidates:cands}).then(results=>{
      const scored=results.map(r=>({...r,score:r.matchResult?.score||r.score})).sort((a,b)=>b.score-a.score).slice(0,8);
      setPool(scored);setLoading(false);
    }).catch(()=>{
      setPool(cands.sort(()=>Math.random()-0.5).slice(0,8));setLoading(false);
    });
  },[]);

  const spin=()=>{
    if(spinning||spinsLeft<=0||pool.length===0)return;
    setSpinning(true);setResult(null);
    const weights=pool.map(u=>{const s=u.score||60;return s*s});
    const totalW=weights.reduce((a,b)=>a+b,0);
    let rand=Math.random()*totalW,target=0;
    for(let i=0;i<weights.length;i++){rand-=weights[i];if(rand<=0){target=i;break}}
    const n=pool.length;
    const extra=5*360+target*(360/n)+(360/n/2);
    setAngle(prev=>prev+extra);
    setTimeout(()=>{
      setResult(pool[target]);
      setSpinning(false);
      const used=parseInt(localStorage.getItem(todayKey)||'0')+1;
      localStorage.setItem(todayKey,String(used));
      setSpinsLeft(Math.max(0,2-used));
    },4000);
  };

  const handleLike=()=>{
    if(!result)return;
    const c=addConv(result);autoGreet(c);
    setMatched(prev=>[...prev,result.id]);
    window.yuanheToast?.(`е·Іе’Ң${result.name}еҢ№й…ҚпјҢеҸҜеңЁж¶ҲжҒҜйЎөиҒҠеӨ© рҹ’¬`);
    setResult(null);
  };
  const handleSkip=()=>{setResult(null)};
  const handleChat=()=>{
    if(!result)return;
    const c=addConv(result);autoGreet(c);
    if(setOpenConvId)setOpenConvId(c.id);
    if(onClose)onClose();
    goTo(S.MSGS);
  };

  const n=pool.length||8;
  const sz=320,cx=sz/2,cy=sz/2,r=sz/2-14;
  const sectorColors=['#4C1D95','#6D28D9','#5B21B6','#7C3AED','#4C1D95','#6D28D9','#5B21B6','#7C3AED'];
  return(
    <div className="anim-in" style={{background:'linear-gradient(135deg,#1E1146,#2D1B69,#1E1146)',borderRadius:20,padding:16,boxShadow:'0 8px 32px rgba(30,17,70,0.4)',position:'relative',overflow:'hidden'}}>
      {[...Array(12)].map((_,i)=><div key={i} style={{position:'absolute',width:2,height:2,borderRadius:1,background:'rgba(255,255,255,'+(0.1+Math.random()*0.3)+')',top:Math.random()*100+'%',left:Math.random()*100+'%'}}/>)}
      <div style={{textAlign:'center',marginBottom:10}}>
        <div style={{fontSize:16,fontWeight:800,color:'#E9D5FF',letterSpacing:2}}>вңҰ е‘ҪиҝҗиҪ¬зӣҳ вңҰ</div>
        <div style={{fontSize:11,color:'rgba(196,181,253,0.6)',marginTop:4}}>иҪ¬еҠЁе‘Ҫиҝҗд№ӢиҪ®пјҢеҜ»жүҫдҪ зҡ„е‘ҪдёӯжіЁе®ҡ</div>
      </div>
      {loading?<div style={{textAlign:'center',padding:'40px 0',color:'rgba(196,181,253,0.5)',fontSize:12}}>вңҰ ж„ҹеә”зјҳеҲҶдёӯвҖҰ вңҰ</div>:<>
      <div style={{position:'relative',width:'100%',maxWidth:sz,margin:'0 auto',aspectRatio:'1'}}>
        <div style={{position:'absolute',inset:-6,borderRadius:'50%',background:'radial-gradient(circle,rgba(139,92,246,0.15) 60%,transparent 70%)',animation:spinning?'pulse 1s infinite':'none'}}/>
        <svg viewBox={`0 0 ${sz} ${sz}`} style={{width:'100%',height:'100%',position:'absolute',top:0,left:0}}>
          <circle cx={cx} cy={cy} r={r+8} fill="none" stroke="rgba(196,181,253,0.12)" strokeWidth={1}/>
          <circle cx={cx} cy={cy} r={r+4} fill="none" stroke="rgba(196,181,253,0.08)" strokeWidth={1} strokeDasharray="4,6"/>
        </svg>
        <div style={{position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',zIndex:5}}>
          <svg width={22} height={28}><polygon points="11,0 3,24 19,24" fill="#F59E0B"/><polygon points="11,3 6,21 16,21" fill="#FBBF24"/></svg>
        </div>
        <svg viewBox={`0 0 ${sz} ${sz}`} style={{width:'100%',height:'100%',transition:spinning?'transform 4s cubic-bezier(0.17,0.67,0.12,0.99)':'none',transform:`rotate(${angle}deg)`}}>
          {pool.map((u,i)=>{
            const a1=(i*360/n-90)*Math.PI/180,a2=((i+1)*360/n-90)*Math.PI/180;
            const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
            const mid=((i+0.5)*360/n-90)*Math.PI/180;
            const tx=cx+(r*0.62)*Math.cos(mid),ty=cy+(r*0.62)*Math.sin(mid);
            const textAngle=(i+0.5)*360/n;
            const emoji=u.gender==='female'?'рҹ‘©':'рҹ‘Ё';
            const isMatched=matched.includes(u.id);
            return(<g key={i}>
              <path d={`M${cx},${cy} L${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2} Z`} fill={isMatched?'#1a1040':sectorColors[i%sectorColors.length]} stroke="rgba(196,181,253,0.2)" strokeWidth={1}/>
              <text x={tx} y={ty-6} fill={isMatched?'rgba(196,181,253,0.2)':'#fff'} fontSize={18} textAnchor="middle" dominantBaseline="central" transform={`rotate(${textAngle},${tx},${ty-6})`}>{emoji}</text>
              <text x={tx} y={ty+14} fill={isMatched?'rgba(196,181,253,0.15)':'rgba(233,213,255,0.8)'} fontSize={9} fontWeight={700} textAnchor="middle" dominantBaseline="central" transform={`rotate(${textAngle},${tx},${ty+14})`}>{isMatched?'е·ІеҢ№й…Қ':u.name.substring(0,3)}</text>
            </g>);
          })}
          <circle cx={cx} cy={cy} r={34} fill="url(#centerGrad)"/>
          <circle cx={cx} cy={cy} r={32} fill="none" stroke="rgba(251,191,36,0.3)" strokeWidth={1}/>
          <defs><radialGradient id="centerGrad"><stop offset="0%" stopColor="#2D1B69"/><stop offset="100%" stopColor="#1E1146"/></radialGradient></defs>
          <text x={cx} y={cy-6} fill="#FBBF24" fontSize={10} fontWeight={700} textAnchor="middle" dominantBaseline="central">е‘Ҫдёӯ</text>
          <text x={cx} y={cy+8} fill="#FBBF24" fontSize={10} fontWeight={700} textAnchor="middle" dominantBaseline="central">жіЁе®ҡ</text>
        </svg>
      </div>
      {/* Spin button */}
      {!result&&<button onClick={spin} disabled={spinning||spinsLeft<=0} style={{width:'100%',padding:'14px',borderRadius:28,border:'none',marginTop:14,fontSize:15,fontWeight:700,cursor:spinning||spinsLeft<=0?'default':'pointer',letterSpacing:1,
        background:spinning?'rgba(255,255,255,0.08)':spinsLeft<=0?'rgba(255,255,255,0.05)':'linear-gradient(135deg,#F59E0B,#D97706)',
        color:spinning||spinsLeft<=0?'rgba(196,181,253,0.4)':'#fff',boxShadow:spinning||spinsLeft<=0?'none':'0 4px 20px rgba(245,158,11,0.3)'}}>
        {spinning?'вңҰ е‘Ҫиҝҗд№ӢиҪ®иҪ¬еҠЁдёӯ вңҰ':spinsLeft<=0?'д»Ҡж—Ҙж„ҹеә”е·Із”Ёе®ҢпјҲжҜҸеӨ©2ж¬Ўпјү':`вңҰ ж„ҹеә”е‘ҪиҝҗпјҲ${spinsLeft}ж¬Ўпјү`}
      </button>}
      {/* Result card */}
      {result&&<div className="anim-in" style={{marginTop:14,background:'rgba(255,255,255,0.06)',border:'1px solid rgba(196,181,253,0.15)',borderRadius:16,padding:16,backdropFilter:'blur(4px)'}}>
        <div style={{textAlign:'center',marginBottom:10}}>
          <div style={{fontSize:11,color:'rgba(196,181,253,0.6)'}}>вңҰ е‘Ҫиҝҗд№ӢиҪ®жҢҮеҗ‘дәҶ вңҰ</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div style={{width:56,height:56,borderRadius:28,background:'linear-gradient(135deg,#4C1D95,#6D28D9)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,flexShrink:0,border:'2px solid rgba(251,191,36,0.3)'}}>{result.gender==='female'?'рҹ‘©':'рҹ‘Ё'}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:16,fontWeight:700,color:'#E9D5FF'}}>{result.name}пјҢ{result.age}еІҒ</div>
            <div style={{fontSize:12,color:'rgba(196,181,253,0.7)',marginTop:2}}>{result.sign} В· {result.bio}</div>
            <div style={{display:'flex',gap:4,marginTop:6}}>{(result.tags||[]).map(t=><span key={t} style={{padding:'2px 8px',borderRadius:6,background:'rgba(139,92,246,0.15)',fontSize:10,color:'#C4B5FD'}}>{t}</span>)}</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10,marginTop:12,padding:'10px 14px',background:'rgba(251,191,36,0.08)',border:'1px solid rgba(251,191,36,0.15)',borderRadius:12}}>
          <div style={{fontSize:24,fontWeight:800,color:'#FBBF24'}}>{result.score}%</div>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:600,color:'#FBBF24'}}>{result.score>=80?'еӨ©дҪңд№ӢеҗҲ рҹ’•':result.score>=65?'жңүзјҳжңүд»Ҫ вңЁ':'жҪңеҠӣд№Ӣзјҳ рҹҢұ'}</div>
            <div style={{fontSize:10,color:'rgba(196,181,253,0.5)'}}>{result.score>=80?'е‘ҪдёӯжіЁе®ҡзҡ„зјҳеҲҶ':result.score>=65?'еҖјеҫ—ж·ұе…ҘдәҶи§Ј':'з”Ёеҝғз»ҸиҗҘдјҡз»Ҫж”ҫ'}</div>
          </div>
        </div>
        {/* Action buttons: 3 options */}
        <div style={{display:'flex',gap:8,marginTop:12}}>
          <button onClick={handleSkip} style={{flex:1,padding:'12px',borderRadius:12,border:'1px solid rgba(196,181,253,0.2)',background:'rgba(255,255,255,0.05)',color:'rgba(196,181,253,0.6)',fontSize:13,fontWeight:500,cursor:'pointer'}}>дёӢдёҖдҪҚ вҶ’</button>
          <button onClick={handleLike} style={{flex:1,padding:'12px',borderRadius:12,border:'none',background:'linear-gradient(135deg,#EC4899,#DB2777)',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',boxShadow:'0 3px 12px rgba(236,72,153,0.3)'}}>рҹ’• жңүзјҳ</button>
          <button onClick={handleChat} style={{padding:'12px 16px',borderRadius:12,border:'none',background:'linear-gradient(135deg,#F59E0B,#D97706)',color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer'}}>рҹ’¬</button>
        </div>
      </div>}
      {showDetail&&result&&<CardDetailModal user={result} profile={profile} onClose={()=>setShowDetail(false)} goTo={goTo} addConv={addConv} autoGreet={autoGreet}/>}
      </>}
    </div>
  );
}

// ===== MOOD TRACKER (еҝғжғ…жү“еҚЎ) =====
function MoodTracker({profile}){
  const MOODS=[
    {emoji:'рҹҳ„',label:'ејҖеҝғ',color:'#22C55E',msg:'д»ҠеӨ©еҝғжғ…зңҹеҘҪпјҒдҝқжҢҒиҝҷд»Ҫеҝ«д№җеҗ§пҪһ'},
    {emoji:'рҹҳҠ',label:'дёҚй”ҷ',color:'#3B82F6',msg:'зҠ¶жҖҒдёҚй”ҷе“ҰпјҢз»§з»ӯдҝқжҢҒпјҒ'},
    {emoji:'рҹҳҗ',label:'дёҖиҲ¬',color:'#F59E0B',msg:'е№іж·Ўд№ҹжҳҜдёҖз§Қе№ёзҰҸпјҢеҘҪеҘҪз…§йЎҫиҮӘе·ұ'},
    {emoji:'рҹҳ”',label:'дҪҺиҗҪ',color:'#8B5CF6',msg:'жҜҸдёӘдәәйғҪжңүдҪҺи°·зҡ„ж—¶еҖҷпјҢжҳҺеӨ©дјҡжӣҙеҘҪзҡ„ рҹ’ҷ'},
    {emoji:'рҹҳў',label:'йҡҫиҝҮ',color:'#EF4444',msg:'жҠұжҠұдҪ пјҢе…Ғи®ёиҮӘе·ұдј‘жҒҜдёҖдёӢ вқӨпёҸ'},
  ];
  const todayKey='yuanhe_mood_'+new Date().toDateString();
  const [todayMood,setTodayMood]=useState(()=>{const s=localStorage.getItem(todayKey);return s!==null?parseInt(s):-1});
  const [showMsg,setShowMsg]=useState(false);
  const getStreak=()=>{let s=0;const d=new Date();for(let i=0;i<30;i++){if(localStorage.getItem('yuanhe_mood_'+new Date(d.getTime()-i*86400000).toDateString())!==null)s++;else break}return s};
  const pickMood=(idx)=>{localStorage.setItem(todayKey,String(idx));setTodayMood(idx);setShowMsg(true);setTimeout(()=>setShowMsg(false),3000)};
  const streak=getStreak();
  // Already checked in вҖ” compact one-liner
  if(todayMood>=0&&!showMsg){
    return(<div style={{background:T.card,borderRadius:14,padding:'10px 16px',boxShadow:T.shadow,marginBottom:14,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:18}}>{MOODS[todayMood].emoji}</span><span style={{fontSize:12,color:T.textSec}}>д»Ҡж—Ҙе·Іжү“еҚЎ В· {MOODS[todayMood].label}</span></div>
      {streak>1&&<span style={{fontSize:10,color:T.primary,fontWeight:600}}>рҹ”Ҙ {streak}еӨ©</span>}
    </div>);
  }
  return(
    <div style={{background:T.card,borderRadius:18,padding:16,boxShadow:T.shadow,marginBottom:14,border:`1px solid ${T.border}`}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{fontSize:13,fontWeight:700,color:T.text}}>рҹ’ӯ д»ҠеӨ©еҝғжғ…еҰӮдҪ•пјҹ</div>
        {streak>1&&<div style={{fontSize:10,color:T.primary,fontWeight:600}}>рҹ”Ҙ иҝһз»ӯ{streak}еӨ©</div>}
      </div>
      <div style={{display:'flex',justifyContent:'space-around',gap:4}}>

// Get icebreaker for conversation based on state
function getIcebreaker(conv){
  const msgs=conv.messages||[];
  const msgCount=msgs.length;
  const seed=(conv.user.id*7+new Date().getDate()*13)%100;
  // Already shown icebreakers in this session?
  const shownKey='yuanhe_ice_'+conv.id;
  const shown=parseInt(localStorage.getItem(shownKey)||'0');

  // First interaction (0-1 messages): topic card
  if(msgCount<=1&&shown<1){
    return{type:'topic',data:ICE_TOPICS[seed%ICE_TOPICS.length],shown:1};
  }
  // After 4+ messages: compatibility test
  if(msgCount>=4&&msgCount<8&&shown<2){
    return{type:'compat',data:ICE_COMPAT[seed%ICE_COMPAT.length],shown:2};
  }
  // After 8+ messages: this-or-that
  if(msgCount>=8&&msgCount<14&&shown<3){
    return{type:'choose',data:ICE_CHOOSE[seed%ICE_CHOOSE.length],shown:3};
  }
  // After 14+ messages: daily task
  if(msgCount>=14&&shown<4){
    return{type:'daily',data:ICE_DAILY[seed%ICE_DAILY.length],shown:4};
  }
  return null;
}
