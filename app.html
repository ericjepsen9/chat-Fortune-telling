async function apiPost(p,b){const r=await fetch(p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});const t=await r.text();try{return JSON.parse(t)}catch(e){throw new Error('服务器返回非JSON: '+t.substring(0,100))}}
async function apiGet(p){const r=await fetch(p);const t=await r.text();try{return JSON.parse(t)}catch(e){throw new Error('服务器返回非JSON: '+t.substring(0,100))}}

// ===== SCORE RING =====
function ScoreRing({score,size=60,stroke=4}){
  const r=(size-stroke)/2,c=2*Math.PI*r;
  const color=score>=90?'#FF6B6B':score>=80?'#FFB347':score>=70?'#4ECDC4':'#9CA3AF';
  const label=score>=90?'天作之合':score>=80?'良缘佳偶':score>=70?'有缘有份':'需要磨合';
  return(<div style={{position:'relative',width:size,height:size,display:'inline-flex',alignItems:'center',justifyContent:'center'}}>
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={c} strokeDashoffset={c*(1-score/100)} strokeLinecap="round" style={{transition:'stroke-dashoffset 1s ease'}}/></svg>
    <div style={{position:'absolute',textAlign:'center'}}><div style={{fontSize:size*0.28,fontWeight:700,color:'#fff'}}>{score}</div><div style={{fontSize:size*0.12,color:'rgba(255,255,255,0.7)'}}>{label}</div></div>
  </div>);
}

// ===== SPLASH =====
function Splash({onDone}){useEffect(()=>{const t=setTimeout(onDone,2200);return()=>clearTimeout(t)},[]);
  return(<div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#FF6B6B 0%,#7C5CFC 50%,#4ECDC4 100%)'}}><div className="anim-in" style={{color:'#fff',textAlign:'center'}}><div className="serif" style={{fontSize:48,fontWeight:700,letterSpacing:8}}>缘合</div><div style={{fontSize:14,opacity:.8,marginTop:8,letterSpacing:4}}>YUANHE</div><div style={{fontSize:12,opacity:.6,marginTop:16}}>以命理连接缘分</div></div></div>);
}

// ===== BIRTH =====
function BirthScreen({onSubmit}){
  const [f,sF]=useState(()=>{
    try{const p=JSON.parse(localStorage.getItem('yuanhe_profile'));
      if(p&&p.year)return{year:String(p.year),month:String(p.month),day:String(p.day),hour:p.hour>=0?String(p.hour):'',gender:p.gender||'female',name:p.name||''};
    }catch(e){}
    return{year:'',month:'',day:'',hour:'',gender:'female',name:''};
  });
  const [err,setErr]=useState('');
  const [lunar,sL]=useState(null);
  useEffect(()=>{if(f.year&&f.month&&f.day&&f.hour)apiGet(`/api/lunar?year=${f.year}&month=${f.month}&day=${f.day}&hour=${f.hour}`).then(sL).catch(()=>sL(null));else sL(null)},[f.year,f.month,f.day,f.hour]);
  const validate=()=>{
    const y=+f.year,m=+f.month,d=+f.day,h=+f.hour;
    if(!f.year||!f.month||!f.day)return'请填写完整的出生年月日';
    if(y<1900||y>2030)return'年份请输入1900-2030';
    if(m<1||m>12)return'月份请输入1-12';
    if(d<1||d>31)return'日期请输入1-31';
    if(f.hour!==''&&(h<0||h>23))return'时辰请输入0-23（24小时制）';
    return'';
  };
  const submit=()=>{
    const e=validate();if(e){setErr(e);return}
    const p={year:+f.year,month:+f.month,day:+f.day,hour:f.hour!==''?+f.hour:-1,gender:f.gender,name:f.name||'缘友'};
    localStorage.setItem('yuanhe_profile',JSON.stringify(p));onSubmit(p);
  };
  const is={width:'100%',padding:'12px 14px',border:`1.5px solid ${T.borderDark}`,borderRadius:12,fontSize:15,background:'#fff',outline:'none'};
  const filled=f.year&&f.month&&f.day;
  return(<div style={{height:'100%',overflow:'auto',background:T.bg}}><div style={{padding:'60px 24px 100px'}}>
    <div className="anim-in serif" style={{textAlign:'center',marginBottom:32}}><div style={{fontSize:28,fontWeight:700}}>你的生辰</div><div style={{fontSize:13,color:T.textSec,marginTop:8}}>请输入公历出生信息</div></div>
    {lunar&&<div className="anim-in" style={{background:'linear-gradient(135deg,#FF6B6B10,#7C5CFC10)',padding:'14px 16px',borderRadius:14,marginBottom:24,textAlign:'center'}}><div style={{fontSize:13,color:T.primary,fontWeight:500}}>{lunar.lunarFull}</div><div style={{fontSize:12,color:T.textSec,marginTop:4}}>{lunar.ganzhi}</div></div>}
    <div style={{marginBottom:16}}><label style={{fontSize:13,color:T.textSec,marginBottom:6,display:'block'}}>昵称</label><input value={f.name} onChange={e=>sF({...f,name:e.target.value})} placeholder="输入昵称（可选）" style={is}/></div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:10,marginBottom:8}}>
      {[['年*','year','1996'],['月*','month','8'],['日*','day','15'],['时辰','hour','14']].map(([l,k,ph])=><div key={k}><label style={{fontSize:12,color:k==='hour'?T.textThi:T.textSec,marginBottom:4,display:'block'}}>{l}</label><input type="number" value={f[k]} onChange={e=>{sF({...f,[k]:e.target.value});setErr('')}} placeholder={ph} style={{...is,padding:'10px 8px',textAlign:'center',borderColor:err&&!f[k]&&k!=='hour'?'#EF4444':T.borderDark}}/></div>)}
    </div>
    <div style={{fontSize:11,color:T.textThi,marginBottom:16}}>* 年月日为必填 · 时辰留空也可使用（部分功能精度降低）</div>
    {err&&<div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:10,padding:'10px 14px',marginBottom:14,fontSize:13,color:'#EF4444',fontWeight:500}}>{err}</div>}
    <div style={{marginBottom:24}}><label style={{fontSize:13,color:T.textSec,marginBottom:8,display:'block'}}>性别</label><div style={{display:'flex',gap:12}}>
      {[{v:'female',l:'♀ 女',c:T.accent3},{v:'male',l:'♂ 男',c:T.accent4}].map(g=><button key={g.v} onClick={()=>sF({...f,gender:g.v})} style={{flex:1,padding:'12px 0',borderRadius:12,fontSize:15,fontWeight:600,cursor:'pointer',border:f.gender===g.v?'none':`1.5px solid ${T.borderDark}`,background:f.gender===g.v?g.c:'#fff',color:f.gender===g.v?'#fff':T.textSec}}>{g.l}</button>)}
    </div></div>
    <button onClick={submit} style={{width:'100%',padding:'16px',borderRadius:14,border:'none',fontSize:16,fontWeight:700,color:'#fff',cursor:filled?'pointer':'default',background:filled?'linear-gradient(135deg,#FF6B6B,#FF8A9B)':'#ccc',boxShadow:filled?'0 4px 20px rgba(255,107,107,0.35)':'none',transition:'all .3s'}}>开启我的命运之旅 ✦</button>
  </div></div>);
}

// ===== SWIPE CARD =====
function SwipeCard({user,onSwipe,isTop,onDetail}){
  const [dx,setDx]=useState(0);const [dragging,setDragging]=useState(false);const startX=useRef(0);
  const onS=x=>{startX.current=x;setDragging(true)};
  const onM=x=>{if(dragging)setDx(x-startX.current)};
  const onE=()=>{if(Math.abs(dx)>80)onSwipe(dx>0?'right':'left');else if(Math.abs(dx)<5&&onDetail)onDetail();setDx(0);setDragging(false)};
  const rot=dx*0.08,opa=Math.min(Math.abs(dx)/80,1);
  return(
    <div onMouseDown={e=>onS(e.clientX)} onMouseMove={e=>onM(e.clientX)} onMouseUp={onE} onMouseLeave={()=>dragging&&onE()}
      onTouchStart={e=>onS(e.touches[0].clientX)} onTouchMove={e=>onM(e.touches[0].clientX)} onTouchEnd={onE}
      style={{position:'absolute',inset:0,borderRadius:24,overflow:'hidden',cursor:'grab',userSelect:'none',transform:`translateX(${dx}px) rotate(${rot}deg) scale(${isTop?1:0.95})`,transition:dragging?'none':'all 0.4s ease',opacity:isTop?1:0.5,pointerEvents:isTop?'auto':'none',boxShadow:T.shadowLg}}>
      <div style={{position:'absolute',inset:0,background:GRADS[user.id%GRADS.length]}}/>
      <div style={{position:'absolute',top:'12%',left:'50%',transform:'translateX(-50%)',width:110,height:110,borderRadius:'50%',background:'rgba(255,255,255,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:52,backdropFilter:'blur(8px)'}}>{AVATARS[user.id%AVATARS.length]}</div>
      <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'80px 20px 20px',background:'linear-gradient(transparent,rgba(0,0,0,0.6))'}}>
        <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between'}}>
          <div><div style={{color:'#fff',fontSize:24,fontWeight:700}}>{user.name} <span style={{fontSize:16,fontWeight:400,opacity:.8}}>{user.age}</span></div>
            <div style={{color:'rgba(255,255,255,0.8)',fontSize:13,marginTop:4}}>{user.sign} · {user.dist}</div>
            <div style={{color:'rgba(255,255,255,0.7)',fontSize:12,marginTop:6}}>{user.bio}</div>
            <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>{user.tags.map(t=><span key={t} style={{padding:'3px 10px',borderRadius:12,background:'rgba(255,255,255,0.15)',color:'rgba(255,255,255,0.9)',fontSize:11}}>{t}</span>)}</div>
          </div>
          <ScoreRing score={user.score} size={64} stroke={4}/>
        </div>
      </div>
      {dx>30&&<div style={{position:'absolute',top:40,left:20,padding:'8px 16px',borderRadius:8,border:'3px solid #34D399',color:'#34D399',fontSize:20,fontWeight:700,transform:'rotate(-15deg)',opacity:opa}}>LIKE ♥</div>}
      {dx<-30&&<div style={{position:'absolute',top:40,right:20,padding:'8px 16px',borderRadius:8,border:'3px solid #FF6B6B',color:'#FF6B6B',fontSize:20,fontWeight:700,transform:'rotate(15deg)',opacity:opa}}>PASS ✕</div>}
    </div>
  );
}

function MatchPopup({user,onChat,onClose}){
  return(<div style={{position:'fixed',inset:0,zIndex:200,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
    <div style={{background:'#fff',borderRadius:24,padding:'32px 24px',textAlign:'center',maxWidth:340,width:'100%',animation:'matchPop 0.5s ease'}}>
      <div style={{fontSize:48,marginBottom:8}}>💕</div>
      <div className="serif" style={{fontSize:22,fontWeight:700,color:T.primary}}>缘分已到！</div>
      <div style={{fontSize:14,color:T.textSec,marginTop:8}}>你和 <b>{user.name}</b> 命理契合度</div>
      <div style={{margin:'16px auto'}}><ScoreRing score={user.score} size={80} stroke={5}/></div>
      <div style={{display:'flex',gap:10,marginTop:20}}>

}

function HomeScreen({profile,goTo}){
  const [cards,setCards]=useState(()=>{const tg=profile.gender==='male'?'female':'male';return USERS.filter(u=>u.gender===tg).sort(()=>Math.random()-0.5)});
  const [matchUser,setMatchUser]=useState(null);
  const [detailUser,setDetailUser]=useState(null);
  const [swiped,setSwiped]=useState(0);
  // Fetch real match scores on mount
  useEffect(()=>{
    const tg=profile.gender==='male'?'female':'male';
    const cands=USERS.filter(u=>u.gender===tg);
    apiPost('/api/batch-match',{profile,candidates:cands}).then(results=>{
      const scored=results.map(r=>({...r,score:r.matchResult?.score||r.score})).sort(()=>Math.random()-0.5);
      setCards(scored);
    }).catch(()=>{});
  },[]);
  const swipe=(dir)=>{const top=cards[cards.length-1];if(dir==='right'&&top.score>=80)setTimeout(()=>setMatchUser(top),300);setCards(c=>c.slice(0,-1));setSwiped(s=>s+1)};
  return(<div style={{height:'100%',overflow:'hidden'}}>
    <div style={{padding:'48px 20px 12px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div><div className="serif" style={{fontSize:22,fontWeight:700,color:T.primary}}>缘合</div><div style={{fontSize:12,color:T.textSec,marginTop:2}}>命理匹配 · 已看{swiped}人</div></div>
      <button onClick={()=>goTo(S.AI)} style={{background:'linear-gradient(135deg,#8B5CF6,#7C3AED)',border:'none',borderRadius:12,padding:'8px 14px',color:'#fff',fontSize:12,fontWeight:600,cursor:'pointer',boxShadow:'0 2px 12px rgba(139,92,246,0.3)',display:'flex',alignItems:'center',gap:4}}><Icons.sparkles s={14} c="#fff"/> AI占卜</button>
    </div>
    <div style={{position:'relative',height:window.innerHeight-240,margin:'0 16px'}}>
      {cards.length===0?(<div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:T.textThi}}>
        <div style={{fontSize:48,marginBottom:16}}>🎋</div><div style={{fontSize:16,fontWeight:500}}>今日缘分已看完</div><div style={{fontSize:13,marginTop:8}}>明天会有新的有缘人出现</div>
        <button onClick={()=>goTo(S.AI)} style={{marginTop:20,padding:'12px 24px',borderRadius:12,border:'none',background:T.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}><Icons.sparkles s={16} c="#fff"/> 先去AI占卜</button>
      </div>)
      :cards.map((u,i)=><SwipeCard key={u.id} user={u} onSwipe={swipe} isTop={i===cards.length-1} onDetail={()=>setDetailUser(u)}/>)}
    </div>
    {cards.length>0&&<div style={{position:'fixed',bottom:68,left:0,right:0,maxWidth:480,margin:'0 auto',display:'flex',justifyContent:'center',gap:16,padding:'6px 0',alignItems:'center',background:'rgba(250,250,247,0.95)',zIndex:90}}>
      <button onClick={()=>swipe('left')} style={{width:44,height:44,borderRadius:'50%',border:`2px solid ${T.borderDark}`,background:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:T.shadow}}><Icons.x s={22} c="#999"/></button>
      <button onClick={()=>swipe('right')} style={{width:52,height:52,borderRadius:'50%',border:'none',background:'linear-gradient(135deg,#FF6B6B,#FF8A9B)',color:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 20px rgba(255,107,107,0.35)'}}><Icons.heart s={26} c="#fff" fill="#fff"/></button>
      <button onClick={()=>goTo(S.AI)} style={{width:44,height:44,borderRadius:'50%',border:`2px solid ${T.borderDark}`,background:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:T.shadow}}><Icons.sparkles s={18} c="#7C5CFC"/></button>
    </div>}
    {matchUser&&<MatchPopup user={matchUser} onChat={()=>{setMatchUser(null);goTo(S.MSGS)}} onClose={()=>setMatchUser(null)}/>}
    {detailUser&&<CardDetailModal user={detailUser} profile={profile} onClose={()=>setDetailUser(null)} goTo={goTo}/>}
  </div>);
}

// ===== REPORT CARD =====
function ReportCard({title, icon, color, content, index, md, isLong}) {
  const [expanded, setExpanded] = useState(true);
  const trimmed = content.replace(/^\s*\n+/, '').trim();
  const displayContent = expanded ? trimmed : trimmed.substring(0, 280) + '…';
  return (
    <div className="anim-in" style={{animationDelay: index*0.06+'s', background:T.card, borderRadius:16, overflow:'hidden', boxShadow:T.shadow, marginBottom:10}}>
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'14px 16px',borderBottom:`1px solid ${T.border}`,position:'relative'}}>
        <div style={{position:'absolute',left:0,top:0,bottom:0,width:4,background:color,borderRadius:'0 4px 4px 0'}}/>
        <div style={{width:36,height:36,borderRadius:10,background:`${color}12`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>{icon}</div>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:600,color:T.text}}>{title.replace(/^[一二三四五六七八九十]+、\s*/,'')}</div>
        </div>
        {isLong&&<button onClick={()=>setExpanded(!expanded)} style={{background:'none',border:'none',fontSize:18,color:T.textThi,cursor:'pointer',transform:expanded?'rotate(180deg)':'none',transition:'transform .2s'}}>▾</button>}
      </div>
      {expanded&&<div style={{padding:'12px 16px',fontSize:13.5,lineHeight:1.75,color:T.textSec}}>
        <div className="markdown" dangerouslySetInnerHTML={md(displayContent)}/>
      </div>}
      {isLong&&!expanded&&<div style={{padding:'10px 16px'}}>
        <button onClick={()=>setExpanded(true)} style={{width:'100%',padding:'8px',borderRadius:8,border:`1px solid ${color}30`,background:`${color}08`,color:color,fontSize:12,fontWeight:500,cursor:'pointer'}}>展开查看 ▾</button>
      </div>}
    </div>
  );
}

// Tarot Modal
function TarotModal({spread,setSpread,cards,setCards,pool,onDone,onClose}){
  const sz={single:1,threeCard:3,relationship:4};
  const need=sz[spread]||3;
  return(
    <div style={{position:'fixed',inset:0,zIndex:300,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div style={{background:'linear-gradient(180deg,#F0FDF9,#fff)',borderRadius:'24px 24px 0 0',width:'100%',maxWidth:480,maxHeight:'85vh',overflow:'auto',padding:'20px 16px 24px',animation:'slideUp .3s ease'}}>
        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{fontSize:18,fontWeight:700,color:'#0D9488'}}>🎴 选择你的塔罗牌</div>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:16,border:'none',background:'#f0f0f0',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>
        {/* Spread type */}
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          {[{k:'single',l:'🃏 单张指引',n:1},{k:'threeCard',l:'🎴 时间三张',n:3},{k:'relationship',l:'💕 关系四张',n:4}].map(s=>(
            <button key={s.k} onClick={()=>{setSpread(s.k);setCards([])}} style={{flex:1,padding:'10px 4px',borderRadius:12,fontSize:12,fontWeight:600,border:spread===s.k?'2px solid #0D9488':'1.5px solid #e0e0e0',cursor:'pointer',background:spread===s.k?'#0D9488':'#fff',color:spread===s.k?'#fff':'#0D9488',textAlign:'center'}}>{s.l}</button>
          ))}
        </div>
        {/* Progress */}
        <div style={{textAlign:'center',marginBottom:12}}>
          <span style={{fontSize:13,fontWeight:600,color:'#0D9488'}}>已选 {cards.length} / {need} 张</span>
          {cards.length>=need&&<span style={{marginLeft:8,fontSize:12,color:'#059669'}}>✓ 选好了</span>}
        </div>
        {/* Cards grid */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
          {pool.slice(0,12).map((cid,i)=>{
            const picked=cards.includes(cid);const full=cards.length>=need;const order=picked?cards.indexOf(cid)+1:null;
            return <button key={i} onClick={()=>{if(picked)setCards(c=>c.filter(x=>x!==cid));else if(!full)setCards(c=>[...c,cid])}} style={{
              aspectRatio:'2/3',borderRadius:12,cursor:picked||!full?'pointer':'default',
              border:picked?'3px solid #0D9488':'2px solid #c8c8c8',
              background:picked?'linear-gradient(135deg,#0D9488,#14B8A6)':'linear-gradient(160deg,#6366F1,#4338CA)',
              display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:'#fff',
              transition:'all .25s',transform:picked?'translateY(-4px) scale(1.04)':'scale(1)',
              boxShadow:picked?'0 6px 20px #0D948860':'0 2px 8px rgba(0,0,0,0.15)',opacity:!picked&&full?0.3:1,
            }}>
              {picked?<><div style={{fontSize:12,opacity:.8,fontWeight:600}}>第{order}张</div><div style={{fontSize:24,marginTop:2}}>✦</div></>:<><div style={{fontSize:28,opacity:.4}}>✧</div><div style={{fontSize:10,opacity:.4,marginTop:4}}>翻牌</div></>}
            </button>;
          })}
        </div>
        {/* Actions */}
        <div style={{display:'flex',gap:10,marginTop:16}}>
          <button onClick={()=>{setCards([]);onDone(true)}} style={{flex:1,padding:'14px',borderRadius:14,border:'1.5px solid #e0e0e0',background:'#fff',fontSize:14,fontWeight:600,color:'#666',cursor:'pointer'}}>🎴 随机抽取</button>
          <button onClick={()=>onDone(true)} disabled={cards.length===0} style={{flex:1,padding:'14px',borderRadius:14,border:'none',background:cards.length>0?'linear-gradient(135deg,#0D9488,#059669)':'#ccc',fontSize:14,fontWeight:700,color:'#fff',cursor:cards.length>0?'pointer':'default'}}>{cards.length>=need?`✦ 确认${need}张牌`:'继续选牌'}</button>
        </div>
      </div>
    </div>
  );
}

    {key:'turning',title:'③ 你第一次重大人生转折约在？',sub:'如：升学/工作/恋爱/搬家等重要变化',opts:[{v:'10-18',l:'10-18岁',d:'青少年时期'},{v:'19-25',l:'19-25岁',d:'大学/初入社会'},{v:'26-33',l:'26-33岁',d:'而立前后'},{v:'34+',l:'34岁以后',d:'中年以后'}]},
    {key:'bodyType',title:'④ 你的体型总体偏向？',opts:[{v:'slim',l:'🦴 偏瘦',d:'不容易胖'},{v:'medium',l:'⚖️ 匀称',d:'正常体型'},{v:'strong',l:'💪 偏壮',d:'容易长肉/壮实'}]},
    {key:'energy',title:'⑤ 你通常哪个时段最有精力？',opts:[{v:'earlyMorning',l:'🌅 清晨5-8点'},{v:'morning',l:'☀️ 上午9-12点'},{v:'afternoon',l:'🌇 下午14-18点'},{v:'lateNight',l:'🌙 深夜22点后'}]},
  ];
  const pick=(key,val)=>{
    const a={...answers,[key]:val};setAnswers(a);
    if(step<questions.length-1)setTimeout(()=>setStep(step+1),300);
    else doCorrect(a);
  };
  const doCorrect=async(a)=>{
    setLoading(true);
    try{
      const r=await apiPost('/api/hour-correct',{year:profile.year,month:profile.month,day:profile.day,gender:profile.gender,answers:a});
      setResult(r);
    }catch(e){setResult({error:e.message})}

  };
  const q=questions[step];
  const progress=result?100:Math.round((step/questions.length)*100);
  return(
    <div style={{position:'fixed',inset:0,zIndex:300,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div style={{background:'#fff',borderRadius:'24px 24px 0 0',width:'100%',maxWidth:480,maxHeight:'90vh',overflow:'auto',padding:'20px 16px 30px',animation:'slideUp .3s ease'}}>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>

          <button onClick={onClose} style={{width:32,height:32,borderRadius:16,border:'none',background:'#f0f0f0',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>
        {/* Progress */}
        <div style={{height:4,background:'#FEF3C7',borderRadius:2,marginBottom:16,overflow:'hidden'}}>
          <div style={{height:'100%',background:'linear-gradient(90deg,#D97706,#F59E0B)',borderRadius:2,width:progress+'%',transition:'width .4s ease'}}/>
        </div>

        {!result&&!loading&&<>
          {/* Question */}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:16,fontWeight:700,color:'#1F2937',marginBottom:4}}>{q.title}</div>
            {q.sub&&<div style={{fontSize:12,color:'#6B7280'}}>{q.sub}</div>}
          </div>
          {/* Options */}
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {q.opts.map(o=>{
              const selected=answers[q.key]===o.v;
              return <button key={o.v} onClick={()=>pick(q.key,o.v)} style={{padding:'14px 16px',borderRadius:14,border:selected?'2px solid #D97706':'1.5px solid #E5E7EB',background:selected?'#FFF8EB':'#fff',cursor:'pointer',textAlign:'left',transition:'all .2s',transform:selected?'scale(1.02)':'none'}}>
                <div style={{fontSize:14,fontWeight:600,color:selected?'#D97706':'#374151'}}>{o.l}</div>
                {o.d&&<div style={{fontSize:11,color:'#6B7280',marginTop:2}}>{o.d}</div>}
              </button>;
            })}
          </div>
          {/* Back */}
          {step>0&&<button onClick={()=>setStep(step-1)} style={{marginTop:12,background:'none',border:'none',fontSize:13,color:'#6B7280',cursor:'pointer'}}>← 上一题</button>}
          {/* Steps indicator */}
          <div style={{display:'flex',justifyContent:'center',gap:6,marginTop:16}}>
            {questions.map((_,i)=><div key={i} style={{width:i===step?20:8,height:8,borderRadius:4,background:i<step?'#D97706':i===step?'#F59E0B':'#E5E7EB',transition:'all .3s'}}/>)}
          </div>
        </>}

        {/* Loading */}
        {loading&&<div style={{textAlign:'center',padding:'40px 20px'}}>
          <div style={{width:60,height:60,margin:'0 auto 16px',position:'relative'}}>
            <div style={{position:'absolute',inset:0,borderRadius:'50%',border:'3px solid #FEF3C7'}}/>
            <div style={{position:'absolute',inset:0,borderRadius:'50%',border:'3px solid transparent',borderTopColor:'#D97706',animation:'spin 1s linear infinite'}}/>
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>🔮</div>
          </div>
          <div style={{fontSize:15,fontWeight:600,color:'#D97706'}}>AI正在分析你的时辰…</div>
          <div style={{fontSize:12,color:'#6B7280',marginTop:6}}>综合五维特征匹配12个候选时辰</div>
        </div>}

        {/* Result */}
        {result&&!result.error&&<div>
          <div style={{textAlign:'center',marginBottom:16}}>
            <div style={{fontSize:48,marginBottom:8}}>{result.level==='high'?'🎯':result.level==='medium'?'🔮':'🤔'}</div>
            <div style={{fontSize:16,fontWeight:700,color:'#1F2937'}}>{result.message}</div>
          </div>
          {/* Top 3 results */}
          <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
            {result.ranking.map((r,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',borderRadius:14,border:i===0?'2px solid #D97706':'1.5px solid #E5E7EB',background:i===0?'#FFF8EB':'#fff'}}>
                <div style={{width:36,height:36,borderRadius:18,background:i===0?'#D97706':i===1?'#F59E0B':'#E5E7EB',display:'flex',alignItems:'center',justifyContent:'center',color:i<2?'#fff':'#666',fontSize:14,fontWeight:700,flexShrink:0}}>{i+1}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700,color:i===0?'#D97706':'#374151'}}>{r.label}（{r.range}点）</div>
                  <div style={{fontSize:11,color:'#6B7280',marginTop:2}}>{r.reason}</div>
                </div>
                <div style={{fontSize:14,fontWeight:700,color:i===0?'#D97706':'#6B7280'}}>{r.score}分</div>
              </div>
            ))}
          </div>
          <div style={{fontSize:11,color:'#6B7280',textAlign:'center',marginBottom:16}}>置信度 {result.confidence}% · 基于排行+性格+转折+体型+精力五维匹配</div>
          {/* Actions */}
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>{onResult(result.bestHour);onClose()}} style={{flex:1,padding:'14px',borderRadius:14,border:'none',background:'linear-gradient(135deg,#D97706,#B45309)',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer'}}>✓ 采用{result.bestLabel}</button>
            <button onClick={()=>{setResult(null);setStep(0);setAnswers({})}} style={{padding:'14px 20px',borderRadius:14,border:'1.5px solid #E5E7EB',background:'#fff',fontSize:14,color:'#6B7280',cursor:'pointer'}}>重测</button>
          </div>
        </div>}

        {result&&result.error&&<div style={{textAlign:'center',padding:'30px 20px'}}>
          <div style={{fontSize:14,color:'#EF4444',marginBottom:12}}>⚠️ {result.error}</div>
          <button onClick={()=>{setResult(null);setStep(0);setAnswers({})}} style={{padding:'10px 20px',borderRadius:10,border:'none',background:'#EF4444',color:'#fff',fontSize:13,cursor:'pointer'}}>重试</button>
        </div>}
      </div>
    </div>
  );
}

function AIScreen({profile,initialMode,onUpdateProfile}){

              <div style={{fontSize:10,color:'#DB2777',marginBottom:3,fontWeight:600}}>{l}</div>
              <input type="number" value={p2[k]} onChange={e=>setP2({...p2,[k]:e.target.value})} style={{width:'100%',padding:'7px 4px',border:'1.5px solid #F9A8D4',borderRadius:8,fontSize:13,textAlign:'center',background:'#fff',outline:'none'}}/>
            </div>)}
          </div>
        </div>}

        {/* Question */}
        <div style={{background:'#fff',borderRadius:14,padding:12,boxShadow:T.shadow,marginBottom:14}}>
          <input value={ms.q} onChange={e=>setMS(mode,{q:e.target.value})} placeholder="输入具体问题 · 留空则全面分析" style={{width:'100%',padding:'11px 12px',border:`1.5px solid ${T.borderDark}`,borderRadius:10,fontSize:13,background:'#FAFAFA',outline:'none'}}/>
          <div style={{display:'flex',gap:5,flexWrap:'wrap',marginTop:8}}>
            {(QUICK_QS[mode]||[]).map(qq=>(
              <button key={qq} onClick={()=>setMS(mode,{q:ms.q===qq?'':qq})} style={{padding:'4px 10px',borderRadius:10,border:`1px solid ${ms.q===qq?mc:T.border}`,background:ms.q===qq?`${mc}0A`:'#fff',color:ms.q===qq?mc:T.textSec,fontSize:11,cursor:'pointer',transition:'all .2s'}}>{qq}</button>
            ))}
          </div>
        </div>
      </>}

      {/* Empty state with mode intro */}
      {!ms.loading&&!ms.result&&!ms.error&&<div style={{textAlign:'center',padding:'20px 10px',marginBottom:6}}>
        <div style={{width:56,height:56,borderRadius:28,background:`${mc}10`,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 10px',fontSize:28}}>{modeInfo.icon}</div>
        <div style={{fontSize:15,fontWeight:600,color:T.text}}>{MODE_FULL[mode]}</div>
        <div style={{fontSize:12,color:T.textThi,marginTop:4,lineHeight:1.6}}>{MODE_INTRO[mode]||''}</div>
        <div style={{fontSize:11,color:mc,marginTop:8,opacity:.7}}>选择问题或直接点击底部按钮开始</div>
      </div>}

      {/* Loading overlay - covers AI area only, TabBar still clickable */}
      {ms.loading&&<div style={{position:'fixed',top:0,left:0,right:0,bottom:64,zIndex:55,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.3)',animation:'fadeIn .3s ease'}}>
      <div className="anim-in" style={{background:'#fff',borderRadius:22,padding:'32px 24px',boxShadow:'0 8px 40px rgba(0,0,0,0.15)',textAlign:'center',maxWidth:320,width:'85%',border:`2px solid ${mc}20`}}>
        {/* Mode-specific animated icon */}
        <div style={{position:'relative',width:80,height:80,margin:'0 auto 14px'}}>
          <div style={{position:'absolute',inset:0,borderRadius:'50%',border:`3px solid ${mc}20`}}/>
          <div style={{position:'absolute',inset:0,borderRadius:'50%',border:`3px solid transparent`,borderTopColor:mc,animation:'spin 1.2s linear infinite'}}/>
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:32}}>
            {mode==='bazi'?'☰':mode==='tarot'?'🎴':mode==='meihua'?'❀':mode==='astrology'?'★':mode==='vedic'?'◎':isPair?'💑':'🔮'}
          </div>
        </div>

        <div style={{fontSize:12,color:T.textThi,marginTop:6}}>

        </div>

      {/* "New query" button when result exists */}
      {ms.result&&!ms.loading&&<button onClick={()=>setMS(mode,{result:null,error:null})} style={{width:'100%',padding:'10px',borderRadius:12,border:`1.5px solid ${P.accentLight}`,background:'#fff',fontSize:13,fontWeight:500,color:P.accent,cursor:'pointer',marginBottom:14,textAlign:'center'}}>🔄 重新提问（{MODE_FULL[mode]}）</button>}

      {/* Error */}

      {/* Results for CURRENT mode */}
      {ms.result&&<div ref={ref} className="anim-slide" style={{scrollMarginTop:120}}>

        }

        {ms.result.response&&(()=>{
          const sections=[];const cleanResp=ms.result.response.replace(/<think>[\s\S]*?<\/think>/g,'').trim();const lines=cleanResp.split('\n');let cur=null;
          const ICONS={'排盘':'📋','性格':'🧠','天赋':'🧠','大运':'📈','命运':'📈','事业':'💼','财运':'💰','婚姻':'💕','家庭':'🏡','感情':'💕','健康':'🏥','流年':'🔮','预测':'🔮','总评':'⭐','建议':'💡','注意':'⚠️','配对':'💑','方位':'🧭','行业':'💼','子女':'👶','星座':'★','塔罗':'🎴','牌':'🎴','卦':'❀','梅花':'❀','吠陀':'◎','核心':'💎','相位':'🔗','元素':'🌀'};
          const COLORS=['#8B5CF6','#DB2777','#0D9488','#D97706','#2563EB','#DC2626','#059669','#7C3AED','#E11D48','#0891B2'];
          lines.forEach(line=>{const h=line.match(/^#{1,3}\s+(.+)/);if(h){const title=h[1].replace(/\*\*/g,'').replace(/^[一二三四五六七八九十]+、\s*/,'').trim();const ik=Object.keys(ICONS).find(k=>title.includes(k));cur={title,icon:ik?ICONS[ik]:'📌',lines:[]};sections.push(cur)}else if(cur)cur.lines.push(line);else if(line.trim()&&!line.startsWith('让我')&&!line.startsWith('用户要求')&&!line.startsWith('需要我')){if(!sections.length)sections.push(cur={title:'概述',icon:'📋',lines:[]});cur.lines.push(line)}});
          return(<div>
            <div style={{background:`linear-gradient(135deg,${mc},${mc}bb)`,borderRadius:16,padding:'16px',marginBottom:10,color:'#fff'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div><div style={{fontSize:10,opacity:.6}}>命理报告</div><div className="serif" style={{fontSize:17,fontWeight:700,marginTop:2}}>{modeInfo.icon} {MODE_FULL[mode]}</div><div style={{fontSize:11,opacity:.75,marginTop:4}}>{profile.name||'缘友'} · {profile.year}.{profile.month}.{profile.day} · {dm==='expert'?'专家':'大众'}</div><div style={{display:'flex',gap:8,marginTop:6,opacity:.6,fontSize:10}}>{ms.result._genTime&&<span>⏰ {ms.result._genTime}</span>}{ms.result._elapsed&&<span>⚡ {ms.result._elapsed}s</span>}<span>📝 {ms.result.response?.length||0}字</span></div></div>
                <div style={{background:'rgba(255,255,255,0.2)',borderRadius:10,padding:'6px 10px',textAlign:'center'}}><div style={{fontSize:18,fontWeight:700}}>{sections.length}</div><div style={{fontSize:9,opacity:.7}}>维度</div></div>
              </div>
            </div>
            {isPair&&<div style={{background:'rgba(255,255,255,0.15)',borderRadius:12,padding:'12px 14px',marginBottom:10,display:'flex',justifyContent:'space-around',alignItems:'center',gap:8}}>
              <div style={{textAlign:'center',flex:1}}>
                <div style={{fontSize:10,opacity:.6}}>甲方</div>
                <div style={{fontSize:14,fontWeight:700}}>{profile.name||'我'}</div>
                <div style={{fontSize:10,opacity:.7}}>{profile.year}.{profile.month}.{profile.day} {profile.gender==='male'?'♂':'♀'}</div>
              </div>
              <div style={{fontSize:20,opacity:.6}}>💕</div>
              <div style={{textAlign:'center',flex:1}}>
                <div style={{fontSize:10,opacity:.6}}>乙方</div>
                <div style={{fontSize:14,fontWeight:700}}>对方</div>
                <div style={{fontSize:10,opacity:.7}}>{p2.year}.{p2.month}.{p2.day} {p2.gender==='male'?'♂':'♀'}</div>
              </div>
            </div>}
            {sections.filter(s=>s.lines.some(l=>l.trim())).map((sec,i)=>{const content=sec.lines.join('\n').trim();if(!content)return null;return <ReportCard key={i} title={sec.title} icon={sec.icon} color={COLORS[i%COLORS.length]} content={content} index={i} md={md} isLong={content.length>300}/>})}
            <div style={{display:'flex',gap:8,marginTop:10}}>
              <button onClick={()=>{navigator.clipboard?.writeText(ms.result.response);alert('已复制')}} style={{flex:1,padding:'10px',borderRadius:10,border:`1px solid ${P.accentLight}`,background:'#fff',fontSize:12,color:T.textSec,cursor:'pointer'}}>📋 复制全文</button>
            </div>
          </div>);
        })()}

        

        {!ms.result.response&&ms.result.engineData&&<div style={{background:'#fff',borderRadius:14,padding:16,boxShadow:T.shadow}}>
          <div style={{fontSize:13,fontWeight:600,color:mc,marginBottom:8}}>📦 引擎结果</div>
          <pre style={{fontSize:12,lineHeight:1.7,color:T.textSec,whiteSpace:'pre-wrap',wordBreak:'break-all',fontFamily:'inherit'}}>{ms.result.engineData}</pre>
        </div>}

        {ms.result.response&&<details style={{background:'#fff',borderRadius:14,boxShadow:T.shadow,marginTop:10}}>
          <summary style={{padding:'12px 16px',fontSize:12,fontWeight:600,color:mc,cursor:'pointer',listStyle:'none',display:'flex',justifyContent:'space-between'}}><span>📦 引擎数据（{ms.result.engineData?.length||0}字）</span><span style={{color:T.textThi}}>▾</span></summary>
          <div style={{padding:'0 16px 12px'}}><pre style={{fontSize:11,lineHeight:1.6,color:T.textSec,whiteSpace:'pre-wrap',wordBreak:'break-all',fontFamily:'inherit'}}>{ms.result.engineData}</pre></div>
        </details>}

        {ms.result.response&&<div style={{marginTop:10,padding:'12px 14px',background:P.accentLight,borderRadius:12}}>
          <div style={{fontSize:11,fontWeight:600,color:mc,marginBottom:6}}>💡 继续追问</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {(QUICK_QS[mode]||[]).filter(x=>x!==ms.q).slice(0,3).map(qq=>(
              <button key={qq} onClick={()=>{setMS(mode,{q:qq,result:null});window.scrollTo({top:0,behavior:'smooth'})}} style={{padding:'5px 10px',borderRadius:8,border:`1px solid ${mc}30`,background:'#fff',color:mc,fontSize:11,cursor:'pointer'}}>{qq}</button>
            ))}
          </div>
        </div>}
      </div>}
    </div>

    {/* === FIXED BOTTOM CTA === */}
    <div style={{position:'fixed',bottom:64,left:0,right:0,maxWidth:480,margin:'0 auto',background:'rgba(255,255,255,0.97)',borderTop:`1px solid ${T.border}`,padding:'8px 16px',zIndex:50}}>
      <button onClick={()=>divine(mode,false)} disabled={ms.loading||!!loadingMode} style={{
        width:'100%',height:48,borderRadius:14,border:'none',fontSize:14,fontWeight:700,color:'#fff',
        cursor:ms.loading?'default':'pointer',display:'flex',alignItems:'center',justifyContent:'center',
        background:ms.loading?T.textThi:`linear-gradient(135deg,${mc},${mc}cc)`,
        boxShadow:ms.loading?'none':`0 4px 16px ${mc}40`,transition:'all .3s',whiteSpace:'nowrap',
      }}>
        {ms.loading?`🔮 ${ms.loadMsg}`:ms.result?`🔄 ${MODE_FULL[mode]} · 重新解读`:`🔮 ${modeInfo.icon} ${MODE_FULL[mode]} · AI解读`}
      </button>
      {ms.loading&&<div style={{height:3,background:P.accentLight,borderRadius:2,marginTop:4,overflow:'hidden'}}>
        <div style={{height:'100%',background:`linear-gradient(90deg,${mc},${P.accentDark})`,borderRadius:2,width:Math.min(ms.elapsed/90*100,95)+'%',transition:'width 1s linear'}}/>
      </div>}
      <div style={{textAlign:'center',marginTop:3}}>
        <button onClick={()=>divine(mode,true)} disabled={ms.loading} style={{background:'none',border:'none',fontSize:11,color:T.textThi,cursor:'pointer'}}>⚡ 仅引擎（秒出）</button>
      </div>
    </div>

    {/* === LOADING TOAST (shows when bg mode is loading) === */}
    {loadingMode&&loadingMode!==mode&&<div style={{position:'fixed',top:100,left:'50%',transform:'translateX(-50%)',background:'rgba(0,0,0,0.8)',color:'#fff',borderRadius:16,padding:'10px 20px',zIndex:200,display:'flex',alignItems:'center',gap:8,fontSize:13,boxShadow:'0 4px 20px rgba(0,0,0,0.3)',animation:'fadeIn .3s ease'}}>
      <div style={{animation:'pulse 1.5s infinite'}}>🔮</div>
      <span>{loadingModeInfo?.label||loadingMode} 解读中… {getMS(loadingMode).elapsed}s</span>
      <button onClick={()=>setMode(loadingMode)} style={{background:'rgba(255,255,255,0.2)',border:'none',borderRadius:8,padding:'4px 10px',color:'#fff',fontSize:11,cursor:'pointer',marginLeft:4}}>查看</button>
    </div>}

    {/* Tarot Modal */}
    {showTarotModal&&<TarotModal spread={tarotSpread} setSpread={setTarotSpread} cards={tarotCards} setCards={setTarotCards} pool={tarotPool} onDone={(autoDivine)=>{setShowTarotModal(false);if(autoDivine)setTimeout(()=>divine(mode,false),100)}} onClose={()=>setShowTarotModal(false)}/>}

    {/* Hour Correction Assistant */}
    {showHourAssistant&&<HourAssistantModal profile={profile} onResult={(h)=>{onUpdateProfile({...profile,hour:h})}} onClose={()=>setShowHourAssistant(false)}/>}
  </div>);
}

  return(<div style={{height:'100%',overflow:'auto',paddingBottom:80}}>
    <div style={{padding:'48px 20px 16px'}}><div className="serif" style={{fontSize:20,fontWeight:700}}>💬 消息</div><div style={{fontSize:12,color:T.textThi,marginTop:4}}>匹配成功后在这里聊天</div></div>
    {matched.length===0?
      <div style={{padding:'50px 20px',textAlign:'center',color:T.textThi}}>
        <div style={{width:80,height:80,borderRadius:40,background:'#F3F4F6',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}><Icons.msgCircle s={36} c="#D1D5DB"/></div>
        <div style={{fontSize:15,fontWeight:500,color:T.text}}>暂无匹配消息</div>
        <div style={{fontSize:12,marginTop:8,lineHeight:1.6}}>在首页右滑喜欢的人<br/>匹配成功后可以开始聊天</div>
      </div>
      :
      <div style={{padding:'0 16px'}}>{matched.map((u,i)=>
        <div key={i} style={{background:T.card,borderRadius:14,padding:14,boxShadow:T.shadow,marginBottom:8,display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:44,height:44,borderRadius:22,background:'#EDE9FE',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>{u.gender==='female'?'👩':'👨'}</div>
          <div style={{flex:1}}><div style={{fontSize:14,fontWeight:500}}>{u.name}</div><div style={{fontSize:11,color:T.textThi,marginTop:2}}>匹配成功！打个招呼吧</div></div>
          <div style={{fontSize:11,color:T.textThi}}>刚刚</div>
        </div>
      )}</div>
    }
  </div>);
}

// ===== ME =====
function MeScreen({profile,onLogout,goTo,onEdit}){
  const [history]=useState(()=>{try{return JSON.parse(localStorage.getItem('yuanhe_history')||'[]')}catch(e){return[]}});
  const resultCount=Object.keys(JSON.parse(localStorage.getItem('yuanhe_mode_results')||'{}')).length;
  return(<div style={{height:'100%',overflow:'auto',paddingBottom:80}}>
  <div style={{background:'linear-gradient(135deg,#8B5CF6,#A78BFA)',padding:'48px 24px 28px',borderRadius:'0 0 28px 28px'}}>
    <div style={{display:'flex',alignItems:'center',gap:14}}>
      <div style={{width:56,height:56,borderRadius:'50%',background:'rgba(255,255,255,.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,color:'#fff'}}>{profile.gender==='female'?'👩':'👨'}</div>
      <div>
        <div style={{color:'#fff',fontSize:18,fontWeight:700}}>{profile.name||'缘友'}</div>
        <div style={{color:'rgba(255,255,255,.7)',fontSize:12,marginTop:2}}>{profile.year}年{profile.month}月{profile.day}日{profile.hour>=0?' '+profile.hour+'时':''}</div>
        {profile.hour===-1&&<div style={{color:'#FCD34D',fontSize:11,marginTop:2}}>⚠️ 时辰未知</div>}
      </div>
    </div>
    {/* Stats */}
    <div style={{display:'flex',gap:16,marginTop:16}}>
      {[{n:resultCount,l:'报告'},{n:history.length,l:'记录'},{n:0,l:'收藏'}].map(s=>
        <div key={s.l} style={{textAlign:'center',flex:1}}>
          <div style={{fontSize:20,fontWeight:700,color:'#fff'}}>{s.n}</div>
          <div style={{fontSize:10,color:'rgba(255,255,255,.6)',marginTop:2}}>{s.l}</div>
        </div>
      )}
    </div>
  </div>

  {profile.hour===-1&&<div style={{margin:'12px 16px 0',padding:'10px 14px',background:'#FFF8EB',border:'1px solid #FCD34D',borderRadius:10,fontSize:12,color:'#D97706'}}>⚠️ 未填写出生时辰，八字排盘精度会降低。<button onClick={onEdit} style={{background:'none',border:'none',color:'#D97706',fontWeight:700,cursor:'pointer',textDecoration:'underline',fontSize:12}}>补充时辰</button></div>}

  <div style={{padding:16}}>
    {[{icon:'✦',label:'AI占卜',desc:'八字·星座·塔罗·梅花',a:()=>goTo(S.AI)},{icon:'✏️',label:'修改生辰',desc:profile.year+'年'+profile.month+'月'+profile.day+'日',a:onEdit},{icon:'🔮',label:'AI测时辰',desc:'回答5个问题推算时辰',a:()=>goTo(S.AI)},{icon:'🗑️',label:'清除占卜记录',desc:resultCount+'条报告',a:()=>{if(confirm('确定清除所有占卜记录？')){localStorage.removeItem('yuanhe_mode_results');localStorage.removeItem('yuanhe_history');location.reload()}}},{icon:'⚙️',label:'设置',desc:'账号与隐私'}].map((it,i)=>
      <div key={it.label} className="anim-in" onClick={it.a} style={{animationDelay:i*0.06+'s',background:T.card,borderRadius:14,padding:14,boxShadow:T.shadow,marginBottom:8,display:'flex',alignItems:'center',gap:12,cursor:it.a?'pointer':'default'}}><span style={{fontSize:20}}>{it.icon}</span><div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{it.label}</div><div style={{fontSize:11,color:T.textThi,marginTop:2}}>{it.desc}</div></div><span style={{color:T.textThi,fontSize:12}}>›</span></div>)}

    {/* Recent history */}
    {history.length>0&&<>
      <div style={{fontSize:13,fontWeight:600,color:T.text,marginTop:16,marginBottom:8}}>最近记录</div>
      {history.slice(0,5).map((h,i)=>
        <div key={i} style={{background:'#F9FAFB',borderRadius:10,padding:'10px 12px',marginBottom:6,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div><div style={{fontSize:12,fontWeight:500}}>{MODE_FULL[h.mode]||h.mode} · {h.question}</div></div>
          <div style={{fontSize:10,color:T.textThi,flexShrink:0}}>{h.time}</div>
        </div>
      )}
    </>}

    <button onClick={onLogout} style={{width:'100%',padding:'14px',borderRadius:12,border:`1.5px solid ${T.borderDark}`,background:'#fff',fontSize:14,color:T.textSec,cursor:'pointer',marginTop:20}}>退出登录</button>
  </div>
</div>);}

// ===== TAB BAR =====
function TabBar({active,onTap}){
  const tabs=[{id:S.HOME,ic:p=><Icons.flame s={20} c={p}/>,label:"首页"},{id:S.DISCOVER,ic:p=><Icons.compass s={20} c={p}/>,label:"发现"},{id:S.AI,ic:null,label:"AI占卜",center:true},{id:S.MSGS,ic:p=><Icons.msgCircle s={20} c={p}/>,label:"消息"},{id:S.ME,ic:p=><Icons.user s={20} c={p}/>,label:"我的"}];
  return(<div style={{position:'fixed',bottom:0,left:0,right:0,maxWidth:480,margin:'0 auto',height:64,background:'#fff',borderTop:`1px solid ${T.border}`,display:'flex',alignItems:'flex-end',justifyContent:'space-around',padding:'0 4px 6px',zIndex:100}}>
    {tabs.map(tab=>{const act=active===tab.id;if(tab.center)return<button key={tab.id} onClick={()=>onTap(tab.id)} style={{background:'linear-gradient(135deg,#8B5CF6,#7C3AED)',border:'none',borderRadius:'50%',width:48,height:48,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',boxShadow:'0 4px 16px rgba(139,92,246,.35)',marginBottom:4}}><Icons.sparkles s={22} c="#fff"/></button>;
    return<button key={tab.id} onClick={()=>onTap(tab.id)} style={{background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'4px 8px',opacity:act?1:.5}}>{tab.ic(act?T.primary:T.textThi)}<span style={{fontSize:10,color:act?T.primary:T.textThi,fontWeight:act?600:400}}>{tab.label}</span></button>})}
  </div>);
}

// ===== APP =====
function App(){
  const [scr,setScr]=useState(S.SPLASH);
  const [profile,setProfile]=useState(()=>{try{const p=JSON.parse(localStorage.getItem('yuanhe_profile'));return p&&p.year?p:null}catch(e){return null}});
  const [aiMode,setAiMode]=useState(null);
  const goTo=(s,m)=>{setScr(s);if(m)setAiMode(m)};
  const showTabs=[S.HOME,S.DISCOVER,S.AI,S.MSGS,S.ME].includes(scr);
  return(<div style={{maxWidth:480,margin:'0 auto',height:window.innerHeight,position:'relative',overflow:'hidden',background:T.bg,boxShadow:'0 0 40px rgba(0,0,0,0.08)'}}>
    {scr===S.SPLASH&&<Splash onDone={()=>setScr(profile?S.HOME:S.BIRTH)}/>}
    {scr===S.BIRTH&&<BirthScreen onSubmit={p=>{setProfile(p);setScr(S.HOME)}}/>}
    {scr===S.HOME&&profile&&<HomeScreen profile={profile} goTo={goTo}/>}
    {scr===S.DISCOVER&&<DiscoverScreen goTo={goTo} profile={profile}/>}
    {/* AIScreen always mounted, hidden when not active — preserves loading state */}
    {profile&&<div style={{display:scr===S.AI?'contents':'none'}}><AIScreen profile={profile} initialMode={aiMode} onUpdateProfile={p=>{setProfile(p);localStorage.setItem('yuanhe_profile',JSON.stringify(p))}}/></div>}
    {scr===S.MSGS&&<MsgsScreen/>}
    {scr===S.ME&&profile&&<MeScreen profile={profile} onLogout={()=>{localStorage.removeItem('yuanhe_profile');localStorage.removeItem('yuanhe_mode_results');setProfile(null);setScr(S.BIRTH)}} goTo={goTo} onEdit={()=>setScr(S.BIRTH)}/>}
    {showTabs&&<TabBar active={scr} onTap={s=>goTo(s)}/>}
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
