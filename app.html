class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,error:null}}
  static getDerivedStateFromError(error){return{hasError:true,error}}
  componentDidCatch(error,info){console.error('ErrorBoundary caught:',error,info)}
  render(){
    if(this.state.hasError){
      const T_=THEMES[getThemeMode()];
      return React.createElement('div',{style:{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:T_.bg,color:T_.text,padding:40,textAlign:'center'}},
        React.createElement('div',{style:{fontSize:48,marginBottom:16}},'⚠️'),
        React.createElement('div',{style:{fontSize:18,fontWeight:700,marginBottom:8}},t('errTitle')),
        React.createElement('div',{style:{fontSize:13,color:T_.textSec,marginBottom:20,lineHeight:1.6}},(this.state.error?.message||'').substring(0,100)||t('errUnknown')),
        React.createElement('button',{onClick:()=>{this.setState({hasError:false,error:null})},style:{padding:'12px 28px',borderRadius:14,border:'none',background:T_.accent2,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}},t('errReload')),
        React.createElement('button',{onClick:()=>{localStorage.clear();window.location.reload()},style:{marginTop:10,padding:'10px 24px',borderRadius:14,border:`1px solid ${T_.border}`,background:'none',color:T_.textSec,fontSize:12,cursor:'pointer'}},t('errClearRestart'))
      );
    }
    return this.props.children;
  }
}

// ===== DIAGNOSTIC LOGGER (诊断日志) =====
const DiagLog={
  _logs:[],
  _maxLogs:500,
  _startTime:Date.now(),
  _session:'s_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),

  add(category,action,data){
    const entry={
      ts:Date.now(),
      dt:Date.now()-this._startTime,
      cat:category, // api|sse|state|error|ui|ws
      act:action,
      data:typeof data==='string'?data:JSON.parse(JSON.stringify(data||null,(key,val)=>{
        if(typeof val==='string'&&val.length>500)return val.substring(0,500)+'…[truncated]';
        return val;
      })),
    };
    this._logs.push(entry);
    if(this._logs.length>this._maxLogs)this._logs.shift();
  },

  api(method,url,status,body,resp,duration){
    this.add('api',method+' '+url,{status,duration:duration+'ms',reqBody:body,respPreview:typeof resp==='string'?resp.substring(0,300):resp});
  },

  sse(event,data){
    this.add('sse',event,data);
  },

  state(component,change){
    this.add('state',component,change);
  },

  error(source,err){
    this.add('error',source,{message:err?.message||String(err),stack:err?.stack?.split('\n').slice(0,3).join('\n')});
  },

  ui(action,detail){
    this.add('ui',action,detail);
  },

  // 导出完整诊断报告
  export(){
    const profile=JSON.parse(localStorage.getItem('yuanhe_profile')||'null');
    const report={
      version:'1.0',
      session:this._session,
      exportedAt:new Date().toISOString(),
      uptime:Math.round((Date.now()-this._startTime)/1000)+'s',
      env:{
        lang:typeof getLang==='function'?getLang():'unknown',
        theme:localStorage.getItem('yuanhe_theme')||'dark',
        userAgent:navigator.userAgent,
        screen:window.innerWidth+'x'+window.innerHeight,
        online:navigator.onLine,
      },
      profile:profile?{year:profile.year,month:profile.month,day:profile.day,hour:profile.hour,gender:profile.gender}:null,
      logs:this._logs,
      localStorage:{
        keys:Object.keys(localStorage).filter(k=>k.startsWith('yuanhe_')).map(k=>k+' ('+((localStorage.getItem(k)||'').length)+'B)'),
      },
    };
    return report;
  },

  // 下载为JSON文件
  download(){
    const data=JSON.stringify(this.export(),null,2);
    const blob=new Blob([data],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`yuanhe-diag-${new Date().toISOString().slice(0,10)}.json`;
    a.click();URL.revokeObjectURL(url);
  },

  // 复制到剪贴板
  copy(){
    const data=JSON.stringify(this.export(),null,2);
    navigator.clipboard?.writeText(data).then(()=>{
      if(window.yuanheToast)window.yuanheToast('诊断日志已复制到剪贴板 ✓');
    });
  },

  clear(){this._logs=[]},
};
window.DiagLog=DiagLog; // 控制台可直接调用

// 拦截 fetch 自动记录API日志
const _origFetch=window.fetch;
window.fetch=async function(...args){
  const url=typeof args[0]==='string'?args[0]:args[0]?.url||'unknown';
  const method=(args[1]?.method||'GET').toUpperCase();
  const body=args[1]?.body?JSON.parse(args[1].body||'{}'):undefined;
  const start=Date.now();
  try{
    const resp=await _origFetch.apply(this,args);
    const duration=Date.now()-start;
    // 只记录API请求，跳过CDN
    if(url.startsWith('/api')){
      const clone=resp.clone();
      // 对SSE不读body
      if(resp.headers.get('content-type')?.includes('event-stream')){
        DiagLog.api(method,url,resp.status,body,'[SSE stream]',duration);
      }else{
        try{const text=await clone.text();DiagLog.api(method,url,resp.status,body,text.substring(0,500),duration)}
        catch(e){DiagLog.api(method,url,resp.status,body,'[read error]',duration)}
      }
    }
    return resp;
  }catch(e){
    DiagLog.api(method,url,'FAIL',body,e.message,Date.now()-start);
    throw e;
  }
};

// ===== WEBSOCKET MANAGER =====
const WsManager = {
  ws: null,
  url: null,
  token: null,
  authed: false,
  reconnectTimer: null,
  heartbeatTimer: null,
  reconnectDelay: 1000,   // 初始重连延迟1秒
  maxReconnectDelay: 30000,
  listeners: {},          // { eventType: Set<callback> }
  onlineUsers: new Set(),

  // 连接
  connect(token) {
    if (this.ws && (this.ws.readyState === 0 || this.ws.readyState === 1)) return;
    this.token = token;
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    this.url = `${proto}//${location.host}/ws`;
    try {
      this.ws = new WebSocket(this.url);
    } catch (e) { console.error('WS connect error:', e); return; }

    this.ws.onopen = () => {
      console.log('🔌 WS connected');
      this.reconnectDelay = 1000; // 重置重连延迟
      // 发送认证
      this._send({ type: 'auth', token: 'Bearer ' + this.token });
      // 启动心跳
      this._startHeartbeat();
    };

    this.ws.onmessage = (e) => {
      let msg;
      try { msg = JSON.parse(e.data); } catch (err) { return; }
      this._handleMessage(msg);
    };

    this.ws.onclose = (e) => {
      console.log('🔌 WS closed:', e.code);
      this.authed = false;
      this._stopHeartbeat();
      // 自动重连(非主动关闭)
      if (this.token && e.code !== 4000) {
        this._scheduleReconnect();
      }
    };

    this.ws.onerror = () => {}; // onclose会触发重连
  },

  // 断开(主动)
  disconnect() {
    this.token = null;
    this.authed = false;
    this.onlineUsers.clear();
    this._stopHeartbeat();
    clearTimeout(this.reconnectTimer);
    if (this.ws) {
      this.ws.close(4000, 'logout'); // 4000=主动关闭，不重连
      this.ws = null;
    }
  },

  // 发送消息
  send(data) {
    this._send(data);
  },

  // 监听事件
  on(type, cb) {
    if (!this.listeners[type]) this.listeners[type] = new Set();
    this.listeners[type].add(cb);
    return () => this.listeners[type]?.delete(cb); // 返回取消函数
  },

  // 是否在线
  isOnline(userId) {
    return this.onlineUsers.has(userId);
  },

  // 是否已连接且认证
  get connected() {
    return this.authed && this.ws?.readyState === 1;
  },

  // === 内部方法 ===

  _send(data) {
    if (this.ws?.readyState === 1) {
      this.ws.send(JSON.stringify(data));
    }
  },

  _handleMessage(msg) {
    switch (msg.type) {
      case 'auth_ok':
        this.authed = true;
        this.onlineUsers = new Set(msg.online || []);
        console.log('🔌 WS authed, online:', this.onlineUsers.size);
        break;
      case 'auth_fail':
        console.warn('WS auth fail:', msg.error);
        this.disconnect();
        break;
      case 'online':
        if (msg.online) this.onlineUsers.add(msg.userId);
        else this.onlineUsers.delete(msg.userId);
        break;
      case 'pong':
        break;
    }
    // 触发所有该类型的监听器
    this._emit(msg.type, msg);
  },

  _emit(type, data) {
    const cbs = this.listeners[type];
    if (cbs) cbs.forEach(cb => { try { cb(data); } catch (e) { console.error('WS listener error:', e); } });
    // 也触发通配符监听
    const allCbs = this.listeners['*'];
    if (allCbs) allCbs.forEach(cb => { try { cb(data); } catch (e) {} });
  },

  _startHeartbeat() {
    this._stopHeartbeat();
    this.heartbeatTimer = setInterval(() => {
      this._send({ type: 'ping' });
    }, 25000); // 25秒ping一次(服务器30秒超时)
  },

  _stopHeartbeat() {
    if (this.heartbeatTimer) { clearInterval(this.heartbeatTimer); this.heartbeatTimer = null; }
  },

  _scheduleReconnect() {
    clearTimeout(this.reconnectTimer);
    console.log(`🔌 WS reconnecting in ${this.reconnectDelay/1000}s...`);
    this.reconnectTimer = setTimeout(() => {
      this.connect(this.token);
    }, this.reconnectDelay);
    // 指数退避，最大30秒
    this.reconnectDelay = Math.min(this.reconnectDelay * 2, this.maxReconnectDelay);
  },
};
window.WsManager = WsManager; // 全局可访问

// ===== CHAT DATA LAYER =====
const ChatStore={
  _key:'yuanhe_conversations',
  load(){try{return JSON.parse(localStorage.getItem(this._key)||'[]')}catch(e){return[]}},
  save(convs){try{localStorage.setItem(this._key,JSON.stringify(convs))}catch(e){}},
  getAll(){return this.load()},
  getById(id){return this.load().find(c=>c.id===id)||null},
  // Create new conversation (if not exists for this user)
  create(user,profile){
    const convs=this.load();
    const existing=convs.find(c=>c.user.id===user.id);
    if(existing)return existing;
    const conv={
      id:'conv_'+user.id+'_'+Date.now(),
      user:{id:user.id,name:user.name,age:user.age,gender:user.gender,sign:user.sign,bio:user.bio,tags:user.tags||[],score:user.score,year:user.year,month:user.month,day:user.day,hour:user.hour,isBot:user.isBot||false,chatStyle:user.chatStyle||''},
      messages:[],
      unread:0,
      lastMessage:'',
      lastTime:new Date().toISOString(),
      createdAt:new Date().toISOString(),
    };
    convs.unshift(conv);
    this.save(convs);
    return conv;
  },
  // Add message to conversation
  addMessage(convId,msg){
    const convs=this.load();
    const conv=convs.find(c=>c.id===convId);
    if(!conv)return null;
    const message={id:'msg_'+Date.now()+'_'+Math.random().toString(36).substr(2,4),role:msg.role,text:msg.text,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),ts:Date.now()};
    if(msg.image)message.image=msg.image;
    conv.messages.push(message);
    conv.lastMessage=msg.image?'[图片]':msg.text.substring(0,50);
    conv.lastTime=new Date().toISOString();
    if(msg.role==='ai')conv.unread=(conv.unread||0)+1;
    this.save(convs);
    return message;
  },
  // Recall a message (within 2 minutes)
  recallMessage(convId,msgId){
    const convs=this.load();
    const conv=convs.find(c=>c.id===convId);
    if(!conv)return;
    const msg=conv.messages.find(m=>m.id===msgId);
    if(msg){msg.recalled=true;msg.text='';delete msg.image;conv.lastMessage=getLang()==='zh-CN'?'消息已撤回':'Recalled';this.save(convs)}
  },
  // Mark conversation as read
  markRead(convId){
    const convs=this.load();
    const conv=convs.find(c=>c.id===convId);
    if(conv){conv.unread=0;this.save(convs)}
  },
  // Get total unread count
  totalUnread(){return this.load().reduce((sum,c)=>sum+(c.unread||0),0)},
};

function ScoreRing({score,size=60,stroke=4}){

  const color=score>=90?'#FF6B6B':score>=80?'#FFB347':score>=70?'#4ECDC4':'#9CA3AF';

    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={c} strokeDashoffset={c*(1-score/100)} strokeLinecap="round" style={{transition:'stroke-dashoffset 1s ease'}}/></svg>

  </div>);
}

// Haptic feedback (vibration API)
function haptic(type='light'){
  if(!navigator.vibrate)return;
  if(type==='light')navigator.vibrate(10);
  else if(type==='medium')navigator.vibrate(20);
  else if(type==='heavy')navigator.vibrate([30,10,30]);
  else if(type==='success')navigator.vibrate([10,30,10]);
}
// Pull-to-refresh hook
function usePullRefresh(onRefresh){
  const [pulling,setPulling]=useState(false);
  const [pullDist,setPullDist]=useState(0);
  const startY=useRef(0);const scrollRef=useRef(null);
  const onTouchStart=(e)=>{if(scrollRef.current?.scrollTop<=0)startY.current=e.touches[0].clientY};
  const onTouchMove=(e)=>{if(startY.current===0)return;const dy=e.touches[0].clientY-startY.current;if(dy>0&&scrollRef.current?.scrollTop<=0){setPullDist(Math.min(dy*0.4,60));if(dy>80)setPulling(true)}};
  const onTouchEnd=()=>{if(pulling&&onRefresh){onRefresh();haptic('medium')}setPullDist(0);setPulling(false);startY.current=0};
  const pullIndicator=pullDist>5?React.createElement('div',{style:{textAlign:'center',padding:`${Math.min(pullDist,50)}px 0 8px`,transition:pulling?'none':'padding .3s',fontSize:12,color:T.textThi}},pulling?t('pullRelease'):t('pullDown')):null;
  return{scrollRef,onTouchStart,onTouchMove,onTouchEnd,pullIndicator};
}

        {/* Dots */}
        <div style={{display:'flex',justifyContent:'center',gap:8,marginBottom:24}}>
          {pages.map((_,i)=><div key={i} style={{width:i===step?24:8,height:8,borderRadius:4,background:i===step?'#fff':'rgba(255,255,255,0.3)',transition:'all .3s'}}/>)}
        </div>
        {/* Button */}
        <button onClick={()=>{if(isLast)onDone();else setStep(s=>s+1)}} style={{width:'100%',height:52,borderRadius:26,border:'none',fontSize:16,fontWeight:700,cursor:'pointer',background:'rgba(255,255,255,0.95)',color:p.bg.includes('8B5CF6')?'#7C3AED':p.bg.includes('EC4899')?'#DB2777':'#D97706',boxShadow:'0 4px 20px rgba(0,0,0,0.15)',transition:'all .3s'}}>
          {isLast?t('onboardStart'):t('onboardNext')}
        </button>
      </div>
    </div>
  );
}

// ===== WHEEL PICKER =====
function WheelPicker({items,value,onChange,label}){
  const ref=useRef(null);const itemH=40;const visibleCount=5;
  const idx=items.findIndex(i=>String(i.v)===String(value));
  useEffect(()=>{if(ref.current&&idx>=0)ref.current.scrollTop=idx*itemH},[]);
  const onScroll=()=>{if(!ref.current)return;const i=Math.round(ref.current.scrollTop/itemH);if(i>=0&&i<items.length&&String(items[i].v)!==String(value))onChange(String(items[i].v))};
  return(<div style={{flex:1,position:'relative',height:itemH*visibleCount}}>
    {label&&<div style={{position:'absolute',top:-20,left:0,right:0,textAlign:'center',fontSize:11,color:T.textThi}}>{label}</div>}
    <div style={{position:'absolute',top:itemH*2,left:0,right:0,height:itemH,borderRadius:10,background:`${T.accent2}08`,border:`1px solid ${T.accent2}20`,zIndex:0}}/>
    <div style={{position:'absolute',top:0,left:0,right:0,height:itemH*2,background:`linear-gradient(to bottom,${T.card},${T.card}00)`,zIndex:1,pointerEvents:'none'}}/>
    <div style={{position:'absolute',bottom:0,left:0,right:0,height:itemH*2,background:`linear-gradient(to top,${T.card},${T.card}00)`,zIndex:1,pointerEvents:'none'}}/>
    <div ref={ref} onScroll={onScroll} style={{height:'100%',overflow:'auto',scrollSnapType:'y mandatory',WebkitOverflowScrolling:'touch',position:'relative',zIndex:0}}>
      <div style={{height:itemH*2}}/>
      {items.map(it=>{const sel=String(it.v)===String(value);return(
        <div key={it.v} style={{height:itemH,display:'flex',alignItems:'center',justifyContent:'center',scrollSnapAlign:'start',fontSize:sel?18:14,fontWeight:sel?700:400,color:sel?T.text:T.textThi,transition:'all .15s'}}>{it.l}</div>
      )})}
      <div style={{height:itemH*2}}/>
    </div>
  </div>);
}

function BirthScreen({onSubmit}){
  const [f,sF]=useState(()=>{
    try{const p=JSON.parse(localStorage.getItem('yuanhe_profile'));
      if(p&&p.year)return{year:String(p.year),month:String(p.month),day:String(p.day),hour:p.hour>=0?String(p.hour):'',gender:p.gender||'female',name:p.name||'',bio:p.bio||'',city:p.city||''};
    }catch(e){}
    return{year:'1995',month:'6',day:'15',hour:'',gender:'female',name:'',bio:'',city:''};
  });
  const [err,setErr]=useState('');
  const [showDatePicker,setShowDatePicker]=useState(false);
  const [showHourPicker,setShowHourPicker]=useState(false);
  const [tempDate,setTempDate]=useState({year:f.year||'1995',month:f.month||'6',day:f.day||'15'});
  const [tempHour,setTempHour]=useState(f.hour||'12');
  const [lunar,sL]=useState(null);
  useEffect(()=>{if(f.year&&f.month&&f.day&&f.hour)apiGet(`/api/lunar?year=${f.year}&month=${f.month}&day=${f.day}&hour=${f.hour}`).then(sL).catch(()=>sL(null));else sL(null)},[f.year,f.month,f.day,f.hour]);
  const validate=()=>{
    const y=+f.year,m=+f.month,d=+f.day,h=+f.hour;
    if(!f.year||!f.month||!f.day)return t('validBirthDate');
    if(y<1900||y>2030)return t('validYearRange');
    if(f.hour!==''&&(h<0||h>23))return t('validHourRange');
    const today=new Date();const birth=new Date(y,m-1,d);
    const age=Math.floor((today-birth)/(365.25*24*60*60*1000));
    if(age<13)return t('ageGate');
    return'';
  };
  const submit=()=>{
    const e=validate();if(e){setErr(e);return}
    const p={year:+f.year,month:+f.month,day:+f.day,hour:f.hour!==''?+f.hour:-1,gender:f.gender,name:f.name||(getLang()==='zh-CN'?'缘友':'Friend'),bio:f.bio||'',city:f.city||''};

  const days=[];for(let d=1;d<=31;d++)days.push({v:String(d),l:isEN?String(d):d+'日'});
  const hours=[];for(let h=0;h<=23;h++)hours.push({v:String(h),l:isEN?`${h}:00 ${h<12?'AM':'PM'}`:h+'时 ('+['子','丑','丑','寅','寅','卯','卯','辰','辰','巳','巳','午','午','未','未','申','申','酉','酉','戌','戌','亥','亥','子'][h]+')'});
  return(<div style={{height:'100%',overflow:'auto',background:T.bg}}><div style={{padding:'60px 24px 100px'}}>
    <div className="anim-in serif" style={{textAlign:'center',marginBottom:32}}><div style={{fontSize:28,fontWeight:700}}>{t('profileTitle')}</div><div style={{fontSize:13,color:T.textSec,marginTop:8}}>{t('profileSubtitle')}</div></div>
    {lunar&&!isEN&&<div className="anim-in" style={{background:'linear-gradient(135deg,#FF6B6B10,#8B5CF610)',padding:'14px 16px',borderRadius:14,marginBottom:24,textAlign:'center'}}><div style={{fontSize:13,color:T.primary,fontWeight:500}}>{lunar.lunarFull}</div><div style={{fontSize:12,color:T.textSec,marginTop:4}}>{lunar.ganzhi}</div></div>}
    <div style={{marginBottom:16}}><label style={{fontSize:13,color:T.textSec,marginBottom:6,display:'block'}}>{isEN?'Nickname':t('profileCity')&&'昵称'}</label><input value={f.name} onChange={e=>sF({...f,name:e.target.value})} placeholder={isEN?'Optional':'输入昵称（可选）'} style={is}/></div>
    {/* Date picker trigger */}
    <div style={{marginBottom:12}}><label style={{fontSize:13,color:T.textSec,marginBottom:6,display:'block'}}>{isEN?'Date of Birth *':t('profileBirthYear')&&'出生日期 *'}</label>
      <button onClick={()=>{setTempDate({year:f.year||'1995',month:f.month||'6',day:f.day||'15'});setShowDatePicker(true)}} style={{...is,textAlign:'left',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{color:f.year?T.text:T.textThi}}>{f.year?(isEN?`${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][f.month-1]} ${f.day}, ${f.year}`:`${f.year}年${f.month}月${f.day}日`):(isEN?'Tap to select':'点击选择')}</span>

    {/* Hour picker trigger */}
    <div style={{marginBottom:12}}><label style={{fontSize:13,color:T.textThi,marginBottom:6,display:'block'}}>{t('profileHour')}</label>
      <button onClick={()=>{setTempHour(f.hour||'12');setShowHourPicker(true)}} style={{...is,textAlign:'left',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{color:f.hour?T.text:T.textThi}}>{f.hour?(isEN?`${f.hour}:00`:f.hour+'时'):t('profileHourHint')}</span>

    </div>
    <div style={{fontSize:11,color:T.textThi,marginBottom:16}}>{t('profileRequired')}</div>
    {err&&<div style={{background:T.isDark?'#EF444415':'#FEF2F2',border:`1px solid ${T.isDark?'#EF444440':'#FECACA'}`,borderRadius:10,padding:'10px 14px',marginBottom:14,fontSize:13,color:'#EF4444',fontWeight:500}}>{err}</div>}
    <div style={{marginBottom:24}}><label style={{fontSize:13,color:T.textSec,marginBottom:8,display:'block'}}>{t('profileGender')}</label><div style={{display:'flex',gap:12}}>

  </div>
  {/* Date Picker Modal */}

    <div onClick={e=>e.stopPropagation()} style={{background:T.card,borderRadius:'20px 20px 0 0',width:'100%',maxWidth:480,padding:'16px 16px 30px',animation:'slideUp .3s ease'}}>

        <WheelPicker items={days} value={tempDate.day} onChange={v=>setTempDate({...tempDate,day:v})}/>

// ===== LOGIN SCREEN (手机号+验证码) =====
function LoginScreen({onLogin}){
  const [phone,setPhone]=useState('');
  const [code,setCode]=useState('');
  const [step,setStep]=useState('phone'); // 'phone' | 'code'
  const [sending,setSending]=useState(false);
  const [verifying,setVerifying]=useState(false);
  const [err,setErr]=useState('');
  const [countdown,setCountdown]=useState(0);
  const codeRef=useRef(null);

  // 倒计时
  useEffect(()=>{if(countdown<=0)return;const t=setTimeout(()=>setCountdown(countdown-1),1000);return()=>clearTimeout(t)},[countdown]);

  const sendCode=async()=>{
    setErr('');setSending(true);
    try{
      const r=await apiPost('/api/auth/send-code',{phone});
      if(r.error){setErr(r.error);setSending(false);return}
      setStep('code');setCountdown(60);setSending(false);
      setTimeout(()=>codeRef.current?.focus(),300);
    }catch(e){setErr(t('networkError'));setSending(false)}
  };

  const verify=async()=>{
    setErr('');setVerifying(true);
    try{
      const r=await apiPost('/api/auth/verify',{phone,code});
      if(r.error){setErr(r.error);setVerifying(false);return}
      // 保存token
      localStorage.setItem('yuanhe_token',r.token);
      onLogin({token:r.token,isNew:r.isNew,user:r.user});
    }catch(e){setErr(t('networkError'));setVerifying(false)}
  };

  const phoneValid=/^1[3-9]\d{9}$/.test(phone);

  return(<div style={{height:'100%',overflow:'auto',background:T.bg}}>
    <div style={{padding:'80px 24px 40px',maxWidth:360,margin:'0 auto'}}>
      {/* Logo */}
      <div className="anim-in" style={{textAlign:'center',marginBottom:48}}>
        <div style={{fontSize:48,marginBottom:12}}>🔮</div>
        <div className="serif" style={{fontSize:28,fontWeight:700,color:T.text}}>{t('appName')}</div>
        <div style={{fontSize:13,color:T.textSec,marginTop:8}}>{t('appSlogan')}</div>
      </div>

      {step==='phone'&&<div className="anim-in">
        <div style={{fontSize:15,fontWeight:600,color:T.text,marginBottom:16}}>{t('loginTitle')}</div>
        <div style={{position:'relative',marginBottom:16}}>
          <span style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',fontSize:14,color:T.textSec}}>+86</span>
          <input
            type="tel" maxLength={11} value={phone}
            onChange={e=>setPhone(e.target.value.replace(/\D/g,''))}
            placeholder={t('loginPhone')}
            style={{width:'100%',padding:'14px 14px 14px 52px',borderRadius:14,border:`1.5px solid ${T.border}`,background:T.card,fontSize:15,color:T.text,outline:'none'}}
          />
        </div>
        {err&&<div style={{fontSize:12,color:'#EF4444',marginBottom:12}}>{err}</div>}
        <button onClick={sendCode} disabled={!phoneValid||sending}
          style={{width:'100%',padding:'15px',borderRadius:14,border:'none',background:phoneValid?`linear-gradient(135deg,${T.accent2},${T.accent2}CC)`:T.border,color:phoneValid?'#fff':T.textThi,fontSize:15,fontWeight:600,cursor:phoneValid?'pointer':'default'}}>
          {sending?t('loginSending'):t('loginGetCode')}
        </button>
        <div style={{fontSize:11,color:T.textThi,textAlign:'center',marginTop:20,lineHeight:1.6}}>
          登录即表示同意《用户协议》和《隐私政策》
        </div>
      </div>}

      {step==='code'&&<div className="anim-in">
        <button onClick={()=>{setStep('phone');setCode('');setErr('')}} style={{background:'none',border:'none',fontSize:13,color:T.textSec,cursor:'pointer',marginBottom:16}}>← 返回修改</button>
        <div style={{fontSize:15,fontWeight:600,color:T.text,marginBottom:6}}>{t('loginCode')}</div>
        <div style={{fontSize:13,color:T.textSec,marginBottom:20}}>已发送到 {phone.replace(/(\d{3})\d{4}(\d{4})/,'$1****$2')}</div>
        {/* 6-digit code input */}
        <div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:20}}>
          {[0,1,2,3,4,5].map(i=>(
            <div key={i} style={{width:44,height:52,borderRadius:12,border:`2px solid ${code.length===i?T.accent2:code[i]?T.accent2+'60':T.border}`,background:T.card,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:700,color:T.text,transition:'border .2s'}}>
              {code[i]||''}
            </div>
          ))}
        </div>
        <input ref={codeRef} type="tel" maxLength={6} value={code} autoFocus
          onChange={e=>{const v=e.target.value.replace(/\D/g,'');setCode(v);if(v.length===6){setErr('');setTimeout(()=>verify(),200)}}}
          onKeyDown={e=>{if(e.key==='Enter'&&code.length===6)verify()}}
          style={{position:'fixed',top:-100,opacity:0}}
        />
        {/* Tap anywhere on code area to focus hidden input */}
        <div onClick={()=>codeRef.current?.focus()} style={{position:'absolute',top:0,left:0,right:0,bottom:'40%',zIndex:1}}/>
        {err&&<div style={{fontSize:12,color:'#EF4444',marginBottom:12,textAlign:'center'}}>{err}</div>}
        <button onClick={verify} disabled={code.length!==6||verifying}
          style={{width:'100%',padding:'15px',borderRadius:14,border:'none',background:code.length===6?`linear-gradient(135deg,${T.accent2},${T.accent2}CC)`:T.border,color:code.length===6?'#fff':T.textThi,fontSize:15,fontWeight:600,cursor:code.length===6?'pointer':'default'}}>
          {verifying?t('loginVerifying'):t('loginSubmit')}
        </button>
        <div style={{textAlign:'center',marginTop:16}}>
          <button onClick={()=>{if(countdown<=0)sendCode()}} disabled={countdown>0}
            style={{background:'none',border:'none',fontSize:13,color:countdown>0?T.textThi:T.accent2,cursor:countdown>0?'default':'pointer'}}>
            {countdown>0?`重新发送(${countdown}s)`:'重新发送验证码'}
          </button>
        </div>
      </div>}
    </div>
  </div>);
}

// ===== SWIPE CARD (prototype style: white card + photo/info split) =====
function SwipeCard({user,onSwipe,isTop,onDetail}){
  const [dx,setDx]=useState(0);const [dragging,setDragging]=useState(false);const startX=useRef(0);
  const onS=x=>{startX.current=x;setDragging(true)};
  const onM=x=>{if(dragging)setDx(x-startX.current)};
  const onE=()=>{if(Math.abs(dx)>80)onSwipe(dx>0?'right':'left');else if(Math.abs(dx)<5&&onDetail)onDetail();setDx(0);setDragging(false)};
  const rot=dx*0.05,opa=Math.min(Math.abs(dx)/100,1);
  const grad=GRADS[user.id%GRADS.length];
  const isOnline=user.isBot?((user.id*7+new Date().getHours())%3!==0):true;
  const _gl=t('matchGradeLabels')||[];
  const typeTag=user.matchResult?.gradeDesc?user.matchResult.gradeDesc.substring(0,4):(user.score>=80?_gl[0]||'天作之合':user.score>=65?_gl[2]||'有缘有份':t('matchPotential'));
  return(
    <div onMouseDown={e=>onS(e.clientX)} onMouseMove={e=>onM(e.clientX)} onMouseUp={onE} onMouseLeave={()=>dragging&&onE()}
      onTouchStart={e=>onS(e.touches[0].clientX)} onTouchMove={e=>onM(e.touches[0].clientX)} onTouchEnd={onE}
      style={{position:'absolute',inset:0,borderRadius:20,overflow:'hidden',cursor:'grab',userSelect:'none',
        transform:`translateX(${dx}px) rotate(${rot}deg) scale(${isTop?1:0.96})`,
        transition:dragging?'none':'transform 0.4s cubic-bezier(0.4,0,0.2,1)',
        opacity:isTop?1:0.5,pointerEvents:isTop?'auto':'none',
        background:T.card,boxShadow:'0 1px 6px rgba(0,0,0,0.03)',display:'flex',flexDirection:'column'}}>
      {/* LIKE/NOPE labels */}
      {dx>20&&<div style={{position:'absolute',top:16,left:16,padding:'8px 18px',borderRadius:12,background:`${T.primary}15`,border:`2px solid ${T.primary}`,color:T.primary,fontSize:16,fontWeight:800,transform:'rotate(-12deg)',opacity:opa,zIndex:10}}>有缘 ♥</div>}
      {dx<-20&&<div style={{position:'absolute',top:16,right:16,padding:'8px 18px',borderRadius:12,background:'rgba(156,163,175,0.12)',border:'2px solid #9CA3AF',color:'#9CA3AF',fontSize:16,fontWeight:800,transform:'rotate(12deg)',opacity:opa,zIndex:10}}>无缘</div>}

      {/* Photo area */}
      <div style={{flex:1,background:grad,display:'flex',alignItems:'center',justifyContent:'center',position:'relative',minHeight:0}}>
        <div style={{fontSize:88}}>{AVATARS[user.id%AVATARS.length]}</div>
        {/* Online badge */}
        <div style={{position:'absolute',top:10,left:10,padding:'4px 10px',borderRadius:12,background:'rgba(0,0,0,0.25)',backdropFilter:'blur(4px)',display:'flex',alignItems:'center',gap:4}}>
          <div style={{width:6,height:6,borderRadius:3,background:isOnline?'#34D399':'#9CA3AF'}}/>
          <span style={{fontSize:10,color:'#fff',fontWeight:500}}>{isOnline?'在线':'离线'}</span>
        </div>
        {/* "TA喜欢你" badge */}
        {user.likedMe&&<div style={{position:'absolute',top:38,left:10,padding:'4px 10px',borderRadius:12,background:'linear-gradient(135deg,#EC4899,#F472B6)',boxShadow:'0 2px 8px rgba(236,72,153,0.3)'}}>
          <span style={{fontSize:10,color:'#fff',fontWeight:600}}>💕 TA喜欢你</span>

// Simulates real user count — in production this comes from backend
function getBotConfig(){
  const realUserCount=USERS.length; // 12 real users currently
  // Ratio rules: fewer real users → more bots
  let botRatio,label;
  if(realUserCount<100){botRatio=0.8;label='冷启动(80%机器人)'}
  else if(realUserCount<1000){botRatio=0.5;label='成长期(50%机器人)'}
  else if(realUserCount<5000){botRatio=0.2;label='活跃期(20%机器人)'}
  else{botRatio=0;label='成熟期(机器人已关闭)'}
  return{realUserCount,botRatio,label};
}

    水:{theme:'智慧·流动',color:'#3B82F6',bg:'#EFF6FF',keywords:['灵感','直觉','适应','变通'],relation:['用心感受对方的情绪','适合浪漫的小惊喜','保持神秘感'],action:['写日记记录灵感','听一张新专辑','泡澡或散步放空']},
  };

  // Get day pillar for any date
  const getDayInfo=(date)=>{
    const y=date.getFullYear(),m=date.getMonth()+1,d=date.getDate();
    const jd=Math.floor(367*y-Math.floor(7*(y+Math.floor((m+9)/12))/4)+Math.floor(275*m/9)+d+1721013.5);
    const tg=TG[(jd+9)%10],dz=DZ[(jd+1)%12];
    const wx=WX_TG[tg];
    return{tg,dz,wx,theme:wxThemes[wx]||wxThemes['火']};
  };

  // Calendar grid
  const firstDay=new Date(viewYear,viewMonth,1).getDay();
  const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();
  const calDays=[];
  for(let i=0;i<firstDay;i++)calDays.push(null);
  for(let i=1;i<=daysInMonth;i++)calDays.push(i);

  const isToday=(d)=>d===now.getDate()&&viewMonth===now.getMonth()&&viewYear===now.getFullYear();
  const isSel=(d)=>d===selDate.getDate()&&viewMonth===selDate.getMonth()&&viewYear===selDate.getFullYear();
  const prevMonth=()=>{if(viewMonth===0){setViewYear(viewYear-1);setViewMonth(11)}else setViewMonth(viewMonth-1)};
  const nextMonth=()=>{if(viewMonth===11){setViewYear(viewYear+1);setViewMonth(0)}else setViewMonth(viewMonth+1)};

  const sel=getDayInfo(selDate);
  const weekDays=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  const selDateStr=`${selDate.getFullYear()}年${selDate.getMonth()+1}月${selDate.getDate()}日 · ${weekDays[selDate.getDay()]}`;
  const t=sel.theme;

  return(<div style={{position:'fixed',inset:0,zIndex:300,background:T.bg,overflow:'auto'}}>
    <div style={{maxWidth:480,margin:'0 auto',padding:'12px 16px 40px'}}>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <button onClick={onClose} style={{width:32,height:32,borderRadius:16,border:'none',background:T.card,fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:T.textSec}}>←</button>
        <div style={{fontSize:16,fontWeight:700,color:T.text}}>{t('calTitle')}</div>
        <button onClick={()=>{setSelDate(now);setViewMonth(now.getMonth());setViewYear(now.getFullYear())}} style={{fontSize:12,color:T.primary,background:'none',border:'none',cursor:'pointer',fontWeight:600}}>今天</button>
      </div>

      {/* Month navigation */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <button onClick={prevMonth} style={{width:28,height:28,borderRadius:14,border:`1px solid ${T.border}`,background:T.card,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:T.textSec}}>‹</button>
        <div style={{fontSize:15,fontWeight:700,color:T.text}}>{viewYear}年{viewMonth+1}月</div>
        <button onClick={nextMonth} style={{width:28,height:28,borderRadius:14,border:`1px solid ${T.border}`,background:T.card,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:T.textSec}}>›</button>
      </div>

      {/* Calendar grid */}
      <div style={{background:T.card,borderRadius:16,padding:'10px 8px',marginBottom:16,boxShadow:T.shadow}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
          {['日','一','二','三','四','五','六'].map(w=><div key={w} style={{textAlign:'center',fontSize:10,color:T.textThi,padding:'4px 0',fontWeight:600}}>{w}</div>)}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
          {calDays.map((d,i)=>{
            if(!d)return <div key={i}/>;
            const dateObj=new Date(viewYear,viewMonth,d);
            const info=getDayInfo(dateObj);
            const today=isToday(d);const selected=isSel(d);
            return <button key={i} onClick={()=>setSelDate(dateObj)} style={{padding:'6px 0',borderRadius:10,border:'none',cursor:'pointer',textAlign:'center',
              background:selected?T.accent2:today?`${T.accent2}15`:'transparent',
              color:selected?'#fff':today?T.accent2:T.text,fontSize:13,fontWeight:today||selected?700:400,position:'relative'}}>
              {d}
              <div style={{width:4,height:4,borderRadius:2,background:selected?'#fff':WX_DOT[info.wx],margin:'2px auto 0'}}/>
            </button>;
          })}
        </div>
      </div>

      {/* Selected date info */}
      <div style={{fontSize:12,color:T.textThi,marginBottom:8}}>{selDateStr}</div>
      <div style={{fontSize:22,fontWeight:800,color:T.text,marginBottom:14}}>{t('todayStatus')}</div>

      {/* Theme card */}
      <div style={{background:t.bg,borderRadius:20,padding:'24px 20px',textAlign:'center',marginBottom:16}}>
        <div style={{fontSize:28,fontWeight:800,color:t.color,letterSpacing:4}}>{t.theme}</div>
        <div style={{fontSize:13,color:T.textSec,marginTop:6}}>{sel.tg}{sel.dz}日 · {sel.wx}旺</div>
      </div>

      {/* Sections */}
      {[{title:'今日关键词',items:t.keywords,color:t.color},{title:'关系建议',items:t.relation,color:'#0D9488'},{title:'行动建议',items:t.action,color:'#3B82F6'}].map(sec=>(
        <div key={sec.title} style={{background:T.card,borderRadius:16,padding:'16px 20px',marginBottom:12,boxShadow:T.shadow}}>
          <div style={{fontSize:14,fontWeight:700,color:sec.color,marginBottom:10}}>{sec.title}</div>
          {sec.items.map(item=><div key={item} style={{display:'flex',alignItems:'flex-start',gap:10,padding:'6px 0'}}>
            <div style={{width:7,height:7,borderRadius:4,background:sec.color,flexShrink:0,marginTop:5}}/>
            <span style={{fontSize:13,color:T.text,lineHeight:1.6}}>{item}</span>
          </div>)}
        </div>
      ))}
      {/* 本周小结 */}
      {(()=>{
        const history=JSON.parse(localStorage.getItem('yuanhe_history')||'[]');
        const allConvs=ChatStore.getAll();
        const weekStart=new Date(now);weekStart.setDate(now.getDate()-now.getDay());weekStart.setHours(0,0,0,0);
        const weekHistory=history.filter(h=>{try{const d=new Date(h.time);return d>=weekStart}catch(e){return false}});
        const weekModes={};weekHistory.forEach(h=>{weekModes[h.mode]=(weekModes[h.mode]||0)+1});
        const topMode=Object.entries(weekModes).sort((a,b)=>b[1]-a[1])[0];
        const weekMoods=[];for(let i=0;i<7;i++){const d=new Date(weekStart.getTime()+i*86400000);const m=localStorage.getItem('yuanhe_mood_'+d.toDateString());if(m!==null)weekMoods.push(parseInt(m))}
        const MOOD_E=['😄','😊','😐','😔','😢'];
        const MODE_F=MODE_FULL;
        const weekMsgs=allConvs.reduce((s,c)=>{const msgs=(c.messages||[]).filter(m=>m.role==='user'&&m.ts&&m.ts>=weekStart.getTime());return s+msgs.length},0);
        const bestMatch=allConvs.length>0?[...allConvs].sort((a,b)=>(b.user.score||0)-(a.user.score||0))[0]:null;
        if(weekHistory.length===0&&weekMoods.length===0&&allConvs.length===0)return null;
        return<div style={{background:`${T.accent2}06`,borderRadius:14,padding:14,border:`1px solid ${T.accent2}20`,marginBottom:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div style={{fontSize:14,fontWeight:700,color:T.text}}>📊 本周小结</div>
            <button onClick={()=>setShowShare({type:'weekly'})} style={{padding:'4px 12px',borderRadius:8,border:`1px solid ${T.accent2}40`,background:'none',fontSize:11,color:T.accent2,cursor:'pointer',fontWeight:500}}>📤 分享</button>
          </div>
          {weekHistory.length>0&&<div style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0'}}>
            <span style={{fontSize:14}}>🔮</span>
            <span style={{fontSize:12,color:T.text}}>占卜 <b>{weekHistory.length}</b> 次{topMode?` · ${MODE_F[topMode[0]]||topMode[0]}为主`:''}</span>
          </div>}
          {weekMoods.length>0&&<div style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0'}}>
            <span style={{fontSize:14}}>💭</span>
            <div style={{fontSize:12,color:T.text,display:'flex',alignItems:'center',gap:2}}>心情 {weekMoods.map((m,i)=><span key={i}>{MOOD_E[m]}</span>)}</div>
          </div>}
          {allConvs.length>0&&<div style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0'}}>
            <span style={{fontSize:14}}>💬</span>
            <span style={{fontSize:12,color:T.text}}>匹配 <b>{allConvs.length}</b> 人{weekMsgs>0?` · ${weekMsgs} 条消息`:''}</span>
          </div>}
          {bestMatch&&<div style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0'}}>
            <span style={{fontSize:14}}>💕</span>
            <span style={{fontSize:12,color:T.text}}>最佳匹配 <b>{bestMatch.user.name}</b> {bestMatch.user.score}%</span>
          </div>}
        </div>;
      })()}

      {/* Share */}
      <button onClick={()=>setShowShare(true)} style={{width:'100%',padding:'12px',borderRadius:14,border:`1px solid ${T.border}`,background:T.card,fontSize:13,color:T.textSec,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>📤 {t('shareToday')}</button>
    </div>
    {showShare&&<ShareModal type={showShare.type==='weekly'?'fortune':'fortune'} profile={profile} dayInfo={{date:selDate.getDate(),month:selDate.getMonth()+1,year:selDate.getFullYear(),theme:t.theme,tgdz:sel.tg+sel.dz,wx:sel.wx,color:t.color,keywords:t.keywords}} onClose={()=>setShowShare(false)}/>}
  </div>);
}

function HomeScreen({profile,goTo,addConv,setOpenConvId,autoGreet}){
  const [genderPref,setGenderPref]=useState(()=>localStorage.getItem('yuanhe_gender_pref')||(profile.gender==='male'?'female':'male'));
  const getFilteredBots=(pref)=>{
    const allBots=[...USERS,...BOTS];
    const filtered=pref==='all'?allBots:allBots.filter(u=>u.gender===pref);
    return filtered.sort(()=>Math.random()-0.5);
  };
  const [cards,setCards]=useState(()=>getFilteredBots(genderPref));
  const [matchUser,setMatchUser]=useState(null);
  const [detailUser,setDetailUser]=useState(null);
  const [swiped,setSwiped]=useState(0);
  const [lastSwiped,setLastSwiped]=useState(null);
  const [showWheel,setShowWheel]=useState(false);

  // 转盘自动弹出: 每天有剩余次数时，首次进入首页弹出一次
  useEffect(()=>{
    if(window._yuanheWheelShown)return; // 本次session已弹过
    const wheelKey='yuanhe_wheel_'+new Date().toDateString();
    const used=parseInt(localStorage.getItem(wheelKey)||'0');
    if(used<2){
      window._yuanheWheelShown=true;
      const timer=setTimeout(()=>setShowWheel(true),1500);
      return()=>clearTimeout(timer);
    }
  },[]);

  const [guideHidden,setGuideHidden]=useState(()=>!!localStorage.getItem('yuanhe_swipe_guided'));
  const showGuide=!guideHidden&&swiped===0;

  // 加载候选: 真实用户(API) + Bot, 计算匹配分数
  const loadCandidates=async(pref)=>{
    let bots=getFilteredBots(pref);
    let realUsers=[];
    // 尝试从服务器获取真实用户
    if(localStorage.getItem('yuanhe_token')){
      try{const r=await apiGet('/api/candidates?gender='+(pref||'')+'&limit=20');if(Array.isArray(r))realUsers=r}catch(e){}
    }
    const allCands=[...realUsers,...bots];
    // 批量计算匹配分数
    try{
      const results=await apiPost('/api/batch-match',{profile,candidates:allCands});
      if(results?.length>0){
        setCards(results.map(r=>({...r,score:r.matchResult?.score||r.score})).sort(()=>Math.random()-0.5));
        return;
      }
    }catch(e){}
    setCards(allCands.sort(()=>Math.random()-0.5));
  };

  const switchPref=(p)=>{setGenderPref(p);localStorage.setItem('yuanhe_gender_pref',p);setSwiped(0);setLastSwiped(null);loadCandidates(p)};
  useEffect(()=>{loadCandidates(genderPref)},[]);
  const swipe=(dir)=>{
    haptic('light');const top=cards[cards.length-1];if(!top)return;
    setLastSwiped(top);setCards(c=>c.slice(0,-1));setSwiped(s=>s+1);
    if(!localStorage.getItem('yuanhe_swipe_guided'))localStorage.setItem('yuanhe_swipe_guided','1');
    // 记录滑动到服务器(真实用户)
    if(top.realUserId&&localStorage.getItem('yuanhe_token')){
      apiPost('/api/swipe',{targetId:top.realUserId,direction:dir}).then(r=>{
        if(r?.matched){haptic('success');setTimeout(()=>setMatchUser(top),300)}
        else if(dir==='right'){window.yuanheToast?.('已喜欢 💕 等待对方回应')}
      }).catch(()=>{});
    }
    // Bot匹配: 保持原有逻辑
    if((top.isBot||!top.realUserId)&&dir==='right'&&top.score>=65){haptic('success');setTimeout(()=>setMatchUser(top),300)}
  };
  const undoSwipe=()=>{if(!lastSwiped)return;setCards(c=>[...c,lastSwiped]);setLastSwiped(null);setSwiped(s=>Math.max(0,s-1))};
  // 五行 energy data from profile
  const wxLabels=['金','木','水','火','土'];
  const wxColors=['#F59E0B','#22C55E','#3B82F6','#EF4444','#D97706'];
  const wxSeed=(profile.year*7+profile.month*13+profile.day*3+new Date().getDate()*11);
  const wxValues=wxLabels.map((_,i)=>15+((wxSeed*(i+1)*17)%40)); // 15-55 range
  const wxTotal=wxValues.reduce((a,b)=>a+b,0);
  const dominantIdx=wxValues.indexOf(Math.max(...wxValues));
  const dominantWx=wxLabels[dominantIdx];

  return(<div style={{height:'100%',overflow:'hidden',display:'flex',flexDirection:'column',paddingBottom:80}}>
    {/* Header matching prototype: 五行轮盘 + title + action buttons */}
    <div style={{padding:'10px 16px 6px',flexShrink:0,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        {/* 五行 Energy Ring — clickable to open wheel */}
        <div onClick={()=>setShowWheel(true)} style={{position:'relative',width:48,height:48,cursor:'pointer'}}>
          <svg width={48} height={48} viewBox="0 0 48 48">
            {(()=>{
              let startAngle=-90;
              return wxValues.map((val,i)=>{
                const angle=(val/wxTotal)*360;
                const endAngle=startAngle+angle;
                const r=19,cx=24,cy=24;
                const startRad=startAngle*Math.PI/180;
                const endRad=endAngle*Math.PI/180;
                const x1=cx+r*Math.cos(startRad),y1=cy+r*Math.sin(startRad);
                const x2=cx+r*Math.cos(endRad),y2=cy+r*Math.sin(endRad);
                const large=angle>180?1:0;
                const d=`M${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2}`;
                startAngle=endAngle;
                return React.createElement('path',{key:i,d:d,fill:'none',stroke:wxColors[i],strokeWidth:i===dominantIdx?6:4,strokeLinecap:'round',opacity:i===dominantIdx?1:0.35});
              });
            })()}
          </svg>
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:wxColors[dominantIdx]}}>{dominantWx}</div>
        </div>
        <div>
          <div style={{fontSize:17,fontWeight:800,color:T.text,letterSpacing:1}}>缘合</div>
          <div style={{fontSize:10,color:T.textThi}}>今日{dominantWx}象能量活跃</div>
        </div>
      </div>
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        {/* Gender preference filter */}
        <div style={{display:'flex',borderRadius:10,border:`1px solid ${T.border}`,overflow:'hidden',background:T.card}}>
          {[{v:'female',l:'女生'},{v:'male',l:'男生'},{v:'all',l:'全部'}].map(o=>
            <button key={o.v} onClick={()=>{if(genderPref!==o.v)switchPref(o.v)}} style={{padding:'5px 10px',border:'none',fontSize:10,fontWeight:genderPref===o.v?600:400,cursor:'pointer',background:genderPref===o.v?`${T.accent2}15`:'transparent',color:genderPref===o.v?T.accent2:T.textThi}}>{o.l}</button>
          )}
        </div>
      </div>
    </div>
    {/* Card area */}
    <div key={genderPref} style={{position:'relative',flex:1,margin:'0 14px',minHeight:100,marginBottom:4}}>
      {cards.length===0?(<div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:T.textThi}}>
        <div style={{fontSize:48,marginBottom:16}}>🎋</div><div style={{fontSize:16,fontWeight:500,color:T.text}}>今日缘分已看完</div><div style={{fontSize:13,marginTop:8}}>明天会有新的有缘人出现</div>
        <button onClick={()=>goTo(S.AI)} style={{marginTop:20,padding:'12px 24px',borderRadius:12,border:'none',background:T.accent2,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>{getLang()==='zh-CN'?'先去AI占卜':'Try AI Reading'}</button>
      </div>)
      :cards.slice(-2).map((u,i,arr)=><SwipeCard key={u.id} user={u} onSwipe={swipe} isTop={i===arr.length-1} onDetail={()=>setDetailUser(u)}/>)}
      {/* First-time swipe guide */}
      {showGuide&&cards.length>0&&<div onClick={()=>{localStorage.setItem('yuanhe_swipe_guided','1');setGuideHidden(true)}} style={{position:'absolute',inset:0,borderRadius:20,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:5,cursor:'pointer'}}>
        <div style={{textAlign:'center',color:'#fff'}}>
          <div style={{display:'flex',justifyContent:'center',gap:40,marginBottom:16}}>
            <div><div style={{fontSize:28}}>👈</div><div style={{fontSize:12,marginTop:4}}>左滑无缘</div></div>
            <div><div style={{fontSize:28}}>👆</div><div style={{fontSize:12,marginTop:4}}>点击详情</div></div>
            <div><div style={{fontSize:28}}>👉</div><div style={{fontSize:12,marginTop:4}}>右滑有缘</div></div>
          </div>
          <div style={{fontSize:11,opacity:.7}}>点击任意位置关闭</div>
        </div>
      </div>}
    </div>
    {/* Action buttons — below card */}
    {cards.length>0&&<div style={{display:'flex',justifyContent:'center',gap:24,alignItems:'center',padding:'6px 0 2px',flexShrink:0}}>
      {lastSwiped&&<button onClick={undoSwipe} style={{width:36,height:36,borderRadius:18,border:`1.5px solid ${T.success}40`,background:`${T.success}08`,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:T.success}}>↩</button>}
      <button onClick={()=>swipe('left')} style={{width:50,height:50,borderRadius:25,border:`2px solid ${T.border}`,background:T.card,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:T.shadow}}><Icons.x s={22} c={T.textThi}/></button>
      <button onClick={()=>swipe('right')} style={{width:50,height:50,borderRadius:25,border:'none',background:T.primary,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 3px 12px ${T.primary}40`}}><Icons.heart s={22} c="#fff" fill="#fff"/></button>
    </div>}
    {matchUser&&<MatchPopup user={matchUser} onChat={()=>{
      const c=addConv(matchUser);autoGreet(c);setOpenConvId(c.id);setLastSwiped(null);setMatchUser(null);goTo(S.MSGS);
    }} onClose={()=>{
      addConv(matchUser);autoGreet(ChatStore.getAll().find(c=>c.user.id===matchUser.id));setLastSwiped(null);setMatchUser(null);
      window.yuanheToast?.(`已和${matchUser.name}匹配成功，可在消息页找到 TA 💬`);
    }}/>}
    {detailUser&&<CardDetailModal user={detailUser} profile={profile} onClose={()=>setDetailUser(null)} goTo={goTo} addConv={addConv} autoGreet={autoGreet}/>}
    {/* Fortune Wheel — fullscreen */}
    {showWheel&&<div style={{position:'fixed',inset:0,zIndex:250,background:'#0F0F1A',display:'flex',flexDirection:'column',overflow:'auto'}}>
      <div style={{padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
        <div style={{fontSize:16,fontWeight:700,color:'#E9D5FF'}}>🎡 命运转盘</div>
        <button onClick={()=>setShowWheel(false)} style={{width:32,height:32,borderRadius:16,border:'none',background:'rgba(255,255,255,0.1)',color:'#C4B5FD',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
      </div>
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 12px'}}>
        <div style={{width:'100%',maxWidth:360}}>
          <FortuneWheel profile={profile} goTo={(s,m)=>{setShowWheel(false);goTo(s,m)}} addConv={addConv} setOpenConvId={setOpenConvId} autoGreet={autoGreet} onClose={()=>setShowWheel(false)}/>
        </div>
      </div>
    </div>}
  </div>);
}

// ===== WUXING RADAR (SVG五行雷达图) =====
function WuxingRadar({data,size=140}){
  if(!data)return null;
  const pad=24; // padding for labels
  const vw=size+pad*2;
  const cx=vw/2,cy=vw/2,r=size*0.34;
  const labels=['木','火','土','金','水'];
  const dotColors=['#86EFAC','#FCA5A5','#FCD34D','#E2E8F0','#93C5FD']; // softer dots on purple
  const labelColors=['#D1FAE5','#FEE2E2','#FEF3C7','#F1F5F9','#DBEAFE']; // light label colors
  const vals=labels.map(l=>data[l]||0);
  const max=Math.max(...vals,1);
  const pts=labels.map((_,i)=>{
    const a=Math.PI*2*i/5-Math.PI/2;
    const v=(vals[i]/max)*r;
    return[cx+v*Math.cos(a),cy+v*Math.sin(a)];
  });
  const poly=pts.map(p=>p.join(',')).join(' ');
  const gridLevels=[0.25,0.5,0.75,1];
  return(
    <svg width={size} height={size} viewBox={`0 0 ${vw} ${vw}`}>
      {/* Grid */}
      {gridLevels.map(gl=>(
        <polygon key={gl} points={labels.map((_,i)=>{const a=Math.PI*2*i/5-Math.PI/2;return`${cx+r*gl*Math.cos(a)},${cy+r*gl*Math.sin(a)}`}).join(' ')}
          fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth={0.5}/>
      ))}
      {/* Axes */}
      {labels.map((_,i)=>{const a=Math.PI*2*i/5-Math.PI/2;return<line key={i} x1={cx} y1={cy} x2={cx+r*Math.cos(a)} y2={cy+r*Math.sin(a)} stroke="rgba(255,255,255,0.08)" strokeWidth={0.5}/>})}
      {/* Data polygon */}
      <polygon points={poly} fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.7)" strokeWidth={1.5}/>
      {/* Data points */}
      {pts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r={3} fill={dotColors[i]} stroke="rgba(255,255,255,0.6)" strokeWidth={1}/>)}
      {/* Labels */}
      {labels.map((l,i)=>{const a=Math.PI*2*i/5-Math.PI/2;const lx=cx+(r+14)*Math.cos(a);const ly=cy+(r+14)*Math.sin(a);return<text key={l} x={lx} y={ly} fill={labelColors[i]} fontSize={11} fontWeight={700} textAnchor="middle" dominantBaseline="central">{l}</text>})}
    </svg>
  );
}

// ===== WUXING BAR (五行条形图) =====
function WuxingBar({data,height=6}){
  if(!data)return null;
  const WX_C={木:'#22C55E',火:'#EF4444',土:'#D97706',金:'#C4A35A',水:'#3B82F6'};
  const max=Math.max(...Object.values(data),1);
  return(
    <div style={{display:'flex',flexDirection:'column',gap:4}}>
      {Object.entries(data).map(([wx,val])=>(
        <div key={wx} style={{display:'flex',alignItems:'center',gap:6}}>
          <span style={{width:14,fontSize:11,fontWeight:600,color:WX_C[wx]}}>{wx}</span>
          <div style={{flex:1,height,background:T.isDark?T.border:'#F3F4F6',borderRadius:height/2,overflow:'hidden'}}>

function ReportCard({title, icon, color, content, index, md}) {

  return (
    <div className="anim-in" style={{animationDelay:index*0.08+'s',background:T.card, borderRadius:16, overflow:'hidden', boxShadow:T.shadow, marginBottom:10}}>

        <div style={{width:36,height:36,borderRadius:10,background:`${color}12`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>{icon}</div>

  );
}

// 当前语言状态 (全局)
let _currentLang = localStorage.getItem('yuanhe_lang') || (navigator.language?.startsWith('zh') ? 'zh-CN' : 'en-US');
let _locale = LOCALES[_currentLang] || LOCALES['zh-CN'];

function getLang(){ return _currentLang; }
function getLocale(){ return _locale; }
function t(key){
  const keys = key.split('.');
  let val = _locale.t;
  for(const k of keys){ val = val?.[k]; if(val===undefined) break; }
  // fallback到中文
  if(val===undefined){
    val = LOCALES['zh-CN'].t;
    for(const k of keys){ val = val?.[k]; if(val===undefined) break; }
  }
  return val ?? key;
}

// 获取当前locale的模式列表(已排序+过滤)
function getLocaleModes(){
  const L=getLocale();
  const modeColors={bazi:'#8B5CF6',astrology:'#6366F1',tarot:'#0D9488',meihua:'#D97706',vedic:'#2563EB',hehun:'#DB2777',synastry:'#9333EA',hepan:'#E11D48'};
  const modeCats={bazi:'single',astrology:'single',tarot:'single',meihua:'single',vedic:'single',hehun:'pair',synastry:'pair',hepan:'pair'};
  return L.modeOrder.filter(id=>!L.hiddenModes.includes(id)).map(id=>{
    const m=L.t.modes[id]||{};
    return {id,label:m.label||id,icon:m.icon||'?',c:modeColors[id],cat:modeCats[id]};
  });
}
function getModeFull(id){ return getLocale().t.modes?.[id]?.full || id; }
function getModeDesc(id){ return getLocale().t.modes?.[id]?.desc || ''; }
function getQuickQs(id){ return getLocale().t.quickQ?.[id] || []; }

// ===== AI =====
// 向后兼容：MODES/MODE_FULL/MODE_INTRO/QUICK_QS/LOAD_MSGS 动态从locale获取
// 使用getter使它们随语言切换自动更新
Object.defineProperty(window,'__yuanheModes',{get:()=>getLocaleModes()});
const MODES_PROXY=new Proxy([],{
  get(_,prop){
    const modes=getLocaleModes();
    if(prop==='length')return modes.length;
    if(prop==='find')return modes.find.bind(modes);
    if(prop==='filter')return modes.filter.bind(modes);
    if(prop==='map')return modes.map.bind(modes);
    if(prop==='forEach')return modes.forEach.bind(modes);
    if(prop==='some')return modes.some.bind(modes);
    if(prop===Symbol.iterator)return modes[Symbol.iterator].bind(modes);
    const n=Number(prop);
    if(!isNaN(n))return modes[n];
    return modes[prop];
  }
});
const MODES=MODES_PROXY;
const MODE_FULL=new Proxy({},{get:(_,k)=>getModeFull(k)});
const MODE_INTRO=new Proxy({},{get:(_,k)=>getModeDesc(k)});
const QUICK_QS=new Proxy({},{get:(_,k)=>getQuickQs(k)});
const LOAD_MSGS=new Proxy([],{
  get(_,prop){
    const msgs=t('loadMsgs')||[];
    if(prop==='length')return msgs.length;
    const n=Number(prop);
    if(!isNaN(n))return msgs[n];
    return msgs[prop];
  }
});

      // 如果没有DOM变化也要兜底恢复
      timer=setTimeout(doRestore,80);

                {(()=>{const favKey='yuanhe_fav_'+mode;const isFav=localStorage.getItem(favKey);return <button onClick={()=>{if(isFav){localStorage.removeItem(favKey);window.yuanheToast?.('已取消收藏')}else{localStorage.setItem(favKey,JSON.stringify({mode,question:ms.q||'',response:ms.result.response||'',structured:ms.result.structured||null,engineData:(ms.result.engineData||'').substring(0,500),time:new Date().toLocaleString(),ts:Date.now()}));window.yuanheToast?.('已收藏 ⭐')}setMS(mode,{...getMS(mode)})}} title="收藏" style={{width:32,height:32,borderRadius:8,border:'none',background:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',opacity:isFav?.8:.45}}><svg width="18" height="18" viewBox="0 0 24 24" fill={isFav?'#F59E0B':'none'} stroke={isFav?'#F59E0B':T.text} strokeWidth="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>})()}
