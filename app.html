                  <button onClick={()=>{localStorage.setItem(fbKey,'down');setMS(mode,{...getMS(mode)})}} title="不准" style={{width:28,height:28,borderRadius:6,border:'none',background:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',opacity:.45}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={T.text} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/><path d="M17 2h3a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-3"/></svg></button>
                </div>;
              })()}
              {/* Collapse button at bottom */}
              {hasChat&&<div onClick={()=>setReportExpanded(false)} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6,padding:'8px',cursor:'pointer',color:mc,fontSize:11,fontWeight:600,borderTop:`1px solid ${T.border}`}}>
                ▴ 收起报告
              </div>}
            </>}

            {/* Chat History (follow-up bubbles) */}
            {chatHistory.length>0&&<div style={{marginBottom:10}}>
              {expanded&&<div style={{borderTop:`1px solid ${T.border}`,marginTop:4,marginBottom:12}}/>}
              <div style={{fontSize:12,fontWeight:600,color:mc,marginBottom:8,paddingLeft:2}}>💬 追问会话</div>
              {chatHistory.map((msg,i)=>(
                <div key={i} style={{display:'flex',justifyContent:msg.role==='user'?'flex-end':'flex-start',marginBottom:8}}>
                  <div style={{maxWidth:'85%',padding:'10px 14px',borderRadius:msg.role==='user'?'16px 16px 4px 16px':'16px 16px 16px 4px',
                    background:msg.role==='user'?`linear-gradient(135deg,${mc},${mc}dd)`:T.card,
                    color:msg.role==='user'?'#fff':T.text,fontSize:13,lineHeight:1.7,
                    boxShadow:'0 1px 3px rgba(0,0,0,0.06)',border:msg.role==='user'?'none':`1px solid ${T.border}`}}>
                    {msg.role==='user'?msg.text:<div className="markdown" dangerouslySetInnerHTML={md(msg.text)}/>}
                    {msg.time&&<div style={{fontSize:9,opacity:.4,marginTop:4,textAlign:msg.role==='user'?'right':'left'}}>{msg.time}</div>}
                  </div>
                </div>
              ))}
              {chatLoading&&<div style={{display:'flex',justifyContent:'flex-start',marginBottom:8}}>
                <div style={{padding:'10px 14px',borderRadius:'16px 16px 16px 4px',background:T.card,boxShadow:T.shadow}}>
                  <div style={{display:'flex',gap:4,alignItems:'center'}}>
                    <div style={{width:6,height:6,borderRadius:3,background:mc,animation:'pulse 1s infinite'}}/>
                    <div style={{width:6,height:6,borderRadius:3,background:mc,animation:'pulse 1s infinite 0.2s'}}/>
                    <div style={{width:6,height:6,borderRadius:3,background:mc,animation:'pulse 1s infinite 0.4s'}}/>
                  </div>
                </div>
              </div>}
              {/* 折叠模式下 — 同样的线性图标 */}
              {!expanded&&!ms.result._streaming&&!chatLoading&&<>
              <div style={{display:'flex',alignItems:'center',gap:2,marginTop:10}}>
                <button onClick={()=>{navigator.clipboard?.writeText(ms.result.response);window.yuanheToast?.('已复制 ✓')}} title="复制" style={{width:32,height:32,borderRadius:8,border:'none',background:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',opacity:.45}}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={T.text} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
                <button onClick={()=>setShowShare(true)} title="分享" style={{width:32,height:32,borderRadius:8,border:'none',background:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',opacity:.45}}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={T.text} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg></button>
                {(()=>{const favKey='yuanhe_fav_'+mode;const isFav=localStorage.getItem(favKey);return <button onClick={()=>{if(isFav){localStorage.removeItem(favKey);window.yuanheToast?.('已取消收藏')}else{localStorage.setItem(favKey,JSON.stringify({mode,question:ms.q||'',response:ms.result.response||'',structured:ms.result.structured||null,engineData:(ms.result.engineData||'').substring(0,500),time:new Date().toLocaleString(),ts:Date.now()}));window.yuanheToast?.('已收藏 ⭐')}setMS(mode,{...getMS(mode)})}} title="收藏" style={{width:32,height:32,borderRadius:8,border:'none',background:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',opacity:isFav?.8:.45}}><svg width="18" height="18" viewBox="0 0 24 24" fill={isFav?'#F59E0B':'none'} stroke={isFav?'#F59E0B':T.text} strokeWidth="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>})()}
                <button onClick={()=>divine(mode,false)} title="重新生成" style={{width:32,height:32,borderRadius:8,border:'none',background:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',opacity:.45}}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={T.text} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></button>
              </div>
              {(()=>{const fbKey='yuanhe_fb_'+mode;const fb=localStorage.getItem(fbKey);
                if(fb)return <div style={{fontSize:11,color:T.textThi,padding:'4px 0'}}>感谢反馈 {fb==='up'?'👍':'👎'}</div>;
                return <div style={{display:'flex',alignItems:'center',gap:6,padding:'6px 0',fontSize:12,color:T.textThi}}>
                  <span>这个分析准确吗？</span>
                  <button onClick={()=>{localStorage.setItem(fbKey,'up');setMS(mode,{...getMS(mode)})}} title="准" style={{width:28,height:28,borderRadius:6,border:'none',background:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',opacity:.45}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={T.text} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg></button>
                  <button onClick={()=>{localStorage.setItem(fbKey,'down');setMS(mode,{...getMS(mode)})}} title="不准" style={{width:28,height:28,borderRadius:6,border:'none',background:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',opacity:.45}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={T.text} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/><path d="M17 2h3a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-3"/></svg></button>
                </div>;
              })()}
              </>}
              <div ref={chatEndRef}/>
            </div>}
            {/* 报告不完整提示 */}
            {!ms.result._streaming&&sections.length<=2&&ms.result.response?.length<500&&<div style={{background:T.isDark?'#F59E0B15':'#FFFBEB',border:`1px solid ${T.isDark?'#F59E0B40':'#FCD34D'}`,borderRadius:10,padding:'10px 14px',marginTop:10,display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:14}}>⚠️</span>
              <span style={{fontSize:12,color:T.isDark?'#F59E0B':'#92400E',flex:1}}>报告可能不完整</span>
              <button onClick={()=>divine(mode,false)} style={{padding:'4px 14px',borderRadius:8,border:'none',background:'#F59E0B',color:'#fff',fontSize:11,fontWeight:600,cursor:'pointer'}}>重新生成</button>
            </div>}
            {/* 清除追问按钮(仅有追问时显示) */}
            {chatHistory.length>0&&!chatLoading&&<button onClick={()=>{
              setMS(mode,{chatHistory:[]});
              try{const s=JSON.parse(localStorage.getItem('yuanhe_mode_results')||'{}');if(s[mode]){s[mode].chatHistory=[];localStorage.setItem('yuanhe_mode_results',JSON.stringify(s))}}catch(e){}
              setReportExpanded(true);
            }} style={{width:'100%',padding:'10px',borderRadius:10,border:`1.5px solid ${T.border}`,marginTop:12,fontSize:12,fontWeight:500,cursor:'pointer',background:T.card,color:T.textSec}}>
              🗑️ 清除追问记录
            </button>}
          </div>);
        })()}

        {!ms.result.response&&!ms.result._streaming&&ms.result.engineData&&<div style={{background:T.card,borderRadius:14,padding:16,boxShadow:T.shadow}}>
          <div style={{fontSize:13,fontWeight:600,color:mc,marginBottom:8}}>📦 引擎结果</div>
          <pre style={{fontSize:12,lineHeight:1.7,color:T.textSec,whiteSpace:'pre-wrap',wordBreak:'break-all',fontFamily:'inherit'}}>{ms.result.engineData}</pre>
        </div>}
      </div>}
    </div>

    {/* === FIXED BOTTOM BAR === */}
    <div style={{position:'fixed',bottom:64,left:0,right:0,maxWidth:480,margin:'0 auto',background:T.isDark?'rgba(15,15,26,0.97)':'rgba(255,255,255,0.97)',borderTop:`1px solid ${T.border}`,padding:'8px 16px',zIndex:50,minHeight:66}}>
      {(ms.loading||ms.result?._streaming)?<>
        {/* Loading / Streaming: button itself is progress bar */}
        <button disabled style={{width:'100%',height:50,borderRadius:14,border:'none',fontSize:14,fontWeight:700,color:'#fff',position:'relative',overflow:'hidden',cursor:'default',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{position:'absolute',inset:0,background:`${mc}40`}}/>
          <div style={{position:'absolute',left:0,top:0,bottom:0,background:`linear-gradient(135deg,${mc},${mc}cc)`,width:ms.result?._streaming?'95%':Math.min(ms.elapsed/90*100,95)+'%',transition:'width 1s linear',borderRadius:14}}/>
          <span style={{position:'relative',zIndex:1}}>{ms.result?._streaming?'🔮 AI正在生成分析…':'🔮 '+(ms.loadMsg||'加载中')+' · '+ms.elapsed+'s'}</span>
        </button>
      </>:!ms.result?<>
        {/* Initial: big AI button only */}
        <button onClick={()=>divine(mode,false)} disabled={ms.loading||(mode==='meihua'&&!ms.q.trim())} style={{
          width:'100%',height:50,borderRadius:14,border:'none',fontSize:15,fontWeight:700,color:'#fff',
          cursor:(mode==='meihua'&&!ms.q.trim())?'default':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,
          background:(mode==='meihua'&&!ms.q.trim())?T.textThi:`linear-gradient(135deg,${mc},${mc}cc)`,
          boxShadow:(mode==='meihua'&&!ms.q.trim())?'none':`0 4px 16px ${mc}40`,transition:'all .3s',
        }}>
          {mode==='meihua'&&!ms.q.trim()?'❀ 请在上方输入问题后点此预测':`🔮 ${modeInfo.icon} ${MODE_FULL[mode]} · AI预测`}
        </button>
        <div style={{textAlign:'center',marginTop:3}}>
          <button onClick={()=>divine(mode,true)} style={{background:'none',border:'none',fontSize:11,color:T.textThi,cursor:'pointer'}}>⚡ 仅引擎（秒出）</button>
        </div>
      </>:<>
        {/* Has result: chips + input + send */}
        <div style={{display:'flex',gap:4,marginBottom:6,overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
          {(()=>{
            const ch=ms.chatHistory||[];
            const asked=ch.filter(m=>m.role==='user').map(m=>m.text);
            const base=(QUICK_QS[mode]||[]).filter(q=>!asked.includes(q));
            // Dynamic chips based on report content
            const resp=ms.result?.response||'';
            const dynamic=[];
            if(resp.includes('桃花')&&!asked.some(a=>a.includes('桃花')))dynamic.push('桃花运详解');
            if(resp.includes('大运')&&!asked.some(a=>a.includes('大运')))dynamic.push('当前大运分析');
            if(resp.includes('创业')&&!asked.some(a=>a.includes('创业')))dynamic.push('适合创业吗');
            if(resp.includes('贵人')&&!asked.some(a=>a.includes('贵人')))dynamic.push('贵人方位');
            const chips=[...dynamic.slice(0,2),...base].slice(0,5);
            return chips.map(qq=>(
              <button key={qq} onClick={()=>followUp(qq)} disabled={chatLoading||chatCooldown} style={{padding:'4px 10px',borderRadius:8,border:`1px solid ${mc}25`,background:`${mc}06`,color:mc,fontSize:10,fontWeight:500,cursor:chatLoading||chatCooldown?'default':'pointer',opacity:chatCooldown?0.5:1,flexShrink:0,whiteSpace:'nowrap'}}>{qq}</button>
            ));
          })()}
        </div>
        <div style={{display:'flex',gap:8}}>
          <input
            value={followUpQ}
            onChange={e=>setFollowUpQ(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&followUpQ.trim())followUp(followUpQ)}}
            placeholder="输入追问…"
            style={{flex:1,padding:'10px 14px',borderRadius:20,border:`1.5px solid ${T.border}`,background:T.bg,fontSize:13,outline:'none'}}
          />
          <button onClick={()=>followUp(followUpQ)}
            disabled={!followUpQ.trim()||chatLoading||chatCooldown}
            style={{width:40,height:40,borderRadius:20,border:'none',
              background:(!followUpQ.trim()||chatLoading)?T.border:`linear-gradient(135deg,${mc},${mc}dd)`,
              color:'#fff',fontSize:16,cursor:(!followUpQ.trim()||chatLoading)?'default':'pointer',
              flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',
              boxShadow:(!followUpQ.trim()||chatLoading)?'none':`0 2px 8px ${mc}40`}}>{chatLoading?'…':'↑'}</button>
        </div>
      </>}
    </div>

    {/* === LOADING TOAST (shows when bg mode is loading) === */}
    {loadingMode&&loadingMode!==mode&&!getMS(loadingMode).error&&<div style={{position:'fixed',top:100,left:'50%',transform:'translateX(-50%)',background:'rgba(0,0,0,0.8)',color:'#fff',borderRadius:16,padding:'10px 20px',zIndex:200,display:'flex',alignItems:'center',gap:8,fontSize:13,boxShadow:'0 4px 20px rgba(0,0,0,0.3)',animation:'fadeIn .3s ease'}}>
      <div style={{animation:'pulse 1.5s infinite'}}>🔮</div>
      <span>{loadingModeInfo?.label||loadingMode} 解读中… {getMS(loadingMode).elapsed}s</span>
      <button onClick={()=>setMode(loadingMode)} style={{background:'rgba(255,255,255,0.2)',border:'none',borderRadius:8,padding:'4px 10px',color:'#fff',fontSize:11,cursor:'pointer',marginLeft:4}}>查看</button>
    </div>}

    {/* Tarot Modal */}
    {showTarotModal&&<TarotModal spread={tarotSpread} setSpread={setTarotSpread} cards={tarotCards} setCards={setTarotCards} pool={tarotPool} onDone={(autoDivine)=>{setShowTarotModal(false);if(autoDivine)setTimeout(()=>divine(mode,false),100)}} onClose={()=>setShowTarotModal(false)}/>}

    {/* Hour Correction Assistant */}
    {showHourAssistant&&<HourAssistantModal profile={profile} onResult={(h)=>{onUpdateProfile({...profile,hour:h})}} onClose={()=>setShowHourAssistant(false)}/>}
    {showShare&&<ShareModal type="personality" profile={profile} structured={ms.result?.structured} onClose={()=>setShowShare(false)}/>}
  </div>);
}

// ===== DISCOVER =====
function FortuneWheel({profile,goTo,addConv,setOpenConvId,autoGreet,onClose}){
  const genderPref=localStorage.getItem('yuanhe_gender_pref')||(profile.gender==='male'?'female':'male');
  const [pool,setPool]=useState([]);
  const [spinning,setSpinning]=useState(false);
  const [result,setResult]=useState(null);
  const [showDetail,setShowDetail]=useState(false);
  const [angle,setAngle]=useState(0);
  const todayKey='yuanhe_wheel_'+new Date().toDateString();
  const [spinsLeft,setSpinsLeft]=useState(()=>{const used=parseInt(localStorage.getItem(todayKey)||'0');return Math.max(0,2-used)});
  const [loading,setLoading]=useState(true);
  const [matched,setMatched]=useState([]); // 已匹配的用户ID，避免重复

  useEffect(()=>{
    const cands=[...USERS,...BOTS].filter(u=>genderPref==='all'||u.gender===genderPref);
    apiPost('/api/batch-match',{profile,candidates:cands}).then(results=>{
      const scored=results.map(r=>({...r,score:r.matchResult?.score||r.score})).sort((a,b)=>b.score-a.score).slice(0,8);
      setPool(scored);setLoading(false);
    }).catch(()=>{
      setPool(cands.sort(()=>Math.random()-0.5).slice(0,8));setLoading(false);
    });
  },[]);

  const spin=()=>{
    if(spinning||spinsLeft<=0||pool.length===0)return;
    setSpinning(true);setResult(null);
    const weights=pool.map(u=>{const s=u.score||60;return s*s});
    const totalW=weights.reduce((a,b)=>a+b,0);
    let rand=Math.random()*totalW,target=0;
    for(let i=0;i<weights.length;i++){rand-=weights[i];if(rand<=0){target=i;break}}
    const n=pool.length;
    const extra=5*360+target*(360/n)+(360/n/2);
    setAngle(prev=>prev+extra);
    setTimeout(()=>{
      setResult(pool[target]);
      setSpinning(false);
      const used=parseInt(localStorage.getItem(todayKey)||'0')+1;
      localStorage.setItem(todayKey,String(used));
      setSpinsLeft(Math.max(0,2-used));
    },4000);
  };

  const handleLike=()=>{
    if(!result)return;
    const c=addConv(result);autoGreet(c);
    setMatched(prev=>[...prev,result.id]);
    window.yuanheToast?.(`已和${result.name}匹配，可在消息页聊天 💬`);
    setResult(null);
  };
  const handleSkip=()=>{setResult(null)};
  const handleChat=()=>{
    if(!result)return;
    const c=addConv(result);autoGreet(c);
    if(setOpenConvId)setOpenConvId(c.id);
    if(onClose)onClose();
    goTo(S.MSGS);
  };

  const n=pool.length||8;
  const sz=320,cx=sz/2,cy=sz/2,r=sz/2-14;
  const sectorColors=['#4C1D95','#6D28D9','#5B21B6','#7C3AED','#4C1D95','#6D28D9','#5B21B6','#7C3AED'];
  return(
    <div className="anim-in" style={{background:'linear-gradient(135deg,#1E1146,#2D1B69,#1E1146)',borderRadius:20,padding:16,boxShadow:'0 8px 32px rgba(30,17,70,0.4)',position:'relative',overflow:'hidden'}}>
      {[...Array(12)].map((_,i)=><div key={i} style={{position:'absolute',width:2,height:2,borderRadius:1,background:'rgba(255,255,255,'+(0.1+Math.random()*0.3)+')',top:Math.random()*100+'%',left:Math.random()*100+'%'}}/>)}
      <div style={{textAlign:'center',marginBottom:10}}>
        <div style={{fontSize:16,fontWeight:800,color:'#E9D5FF',letterSpacing:2}}>✦ 命运转盘 ✦</div>
        <div style={{fontSize:11,color:'rgba(196,181,253,0.6)',marginTop:4}}>转动命运之轮，寻找你的命中注定</div>
      </div>
      {loading?<div style={{textAlign:'center',padding:'40px 0',color:'rgba(196,181,253,0.5)',fontSize:12}}>✦ 感应缘分中… ✦</div>:<>
      <div style={{position:'relative',width:'100%',maxWidth:sz,margin:'0 auto',aspectRatio:'1'}}>
        <div style={{position:'absolute',inset:-6,borderRadius:'50%',background:'radial-gradient(circle,rgba(139,92,246,0.15) 60%,transparent 70%)',animation:spinning?'pulse 1s infinite':'none'}}/>
        <svg viewBox={`0 0 ${sz} ${sz}`} style={{width:'100%',height:'100%',position:'absolute',top:0,left:0}}>
          <circle cx={cx} cy={cy} r={r+8} fill="none" stroke="rgba(196,181,253,0.12)" strokeWidth={1}/>
          <circle cx={cx} cy={cy} r={r+4} fill="none" stroke="rgba(196,181,253,0.08)" strokeWidth={1} strokeDasharray="4,6"/>
        </svg>
        <div style={{position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',zIndex:5}}>
          <svg width={22} height={28}><polygon points="11,0 3,24 19,24" fill="#F59E0B"/><polygon points="11,3 6,21 16,21" fill="#FBBF24"/></svg>
        </div>
        <svg viewBox={`0 0 ${sz} ${sz}`} style={{width:'100%',height:'100%',transition:spinning?'transform 4s cubic-bezier(0.17,0.67,0.12,0.99)':'none',transform:`rotate(${angle}deg)`}}>
          {pool.map((u,i)=>{
            const a1=(i*360/n-90)*Math.PI/180,a2=((i+1)*360/n-90)*Math.PI/180;
            const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
            const mid=((i+0.5)*360/n-90)*Math.PI/180;
            const tx=cx+(r*0.62)*Math.cos(mid),ty=cy+(r*0.62)*Math.sin(mid);
            const textAngle=(i+0.5)*360/n;
            const emoji=u.gender==='female'?'👩':'👨';
            const isMatched=matched.includes(u.id);
            return(<g key={i}>
              <path d={`M${cx},${cy} L${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2} Z`} fill={isMatched?'#1a1040':sectorColors[i%sectorColors.length]} stroke="rgba(196,181,253,0.2)" strokeWidth={1}/>
              <text x={tx} y={ty-6} fill={isMatched?'rgba(196,181,253,0.2)':'#fff'} fontSize={18} textAnchor="middle" dominantBaseline="central" transform={`rotate(${textAngle},${tx},${ty-6})`}>{emoji}</text>
              <text x={tx} y={ty+14} fill={isMatched?'rgba(196,181,253,0.15)':'rgba(233,213,255,0.8)'} fontSize={9} fontWeight={700} textAnchor="middle" dominantBaseline="central" transform={`rotate(${textAngle},${tx},${ty+14})`}>{isMatched?'已匹配':u.name.substring(0,3)}</text>
            </g>);
          })}
          <circle cx={cx} cy={cy} r={34} fill="url(#centerGrad)"/>
          <circle cx={cx} cy={cy} r={32} fill="none" stroke="rgba(251,191,36,0.3)" strokeWidth={1}/>
          <defs><radialGradient id="centerGrad"><stop offset="0%" stopColor="#2D1B69"/><stop offset="100%" stopColor="#1E1146"/></radialGradient></defs>
          <text x={cx} y={cy-6} fill="#FBBF24" fontSize={10} fontWeight={700} textAnchor="middle" dominantBaseline="central">命中</text>
          <text x={cx} y={cy+8} fill="#FBBF24" fontSize={10} fontWeight={700} textAnchor="middle" dominantBaseline="central">注定</text>
        </svg>
      </div>
      {/* Spin button */}
      {!result&&<button onClick={spin} disabled={spinning||spinsLeft<=0} style={{width:'100%',padding:'14px',borderRadius:28,border:'none',marginTop:14,fontSize:15,fontWeight:700,cursor:spinning||spinsLeft<=0?'default':'pointer',letterSpacing:1,
        background:spinning?'rgba(255,255,255,0.08)':spinsLeft<=0?'rgba(255,255,255,0.05)':'linear-gradient(135deg,#F59E0B,#D97706)',
        color:spinning||spinsLeft<=0?'rgba(196,181,253,0.4)':'#fff',boxShadow:spinning||spinsLeft<=0?'none':'0 4px 20px rgba(245,158,11,0.3)'}}>
        {spinning?'✦ 命运之轮转动中 ✦':spinsLeft<=0?'今日感应已用完（每天2次）':`✦ 感应命运（${spinsLeft}次）`}
      </button>}
      {/* Result card */}
      {result&&<div className="anim-in" style={{marginTop:14,background:'rgba(255,255,255,0.06)',border:'1px solid rgba(196,181,253,0.15)',borderRadius:16,padding:16,backdropFilter:'blur(4px)'}}>
        <div style={{textAlign:'center',marginBottom:10}}>
          <div style={{fontSize:11,color:'rgba(196,181,253,0.6)'}}>✦ 命运之轮指向了 ✦</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div style={{width:56,height:56,borderRadius:28,background:'linear-gradient(135deg,#4C1D95,#6D28D9)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,flexShrink:0,border:'2px solid rgba(251,191,36,0.3)'}}>{result.gender==='female'?'👩':'👨'}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:16,fontWeight:700,color:'#E9D5FF'}}>{result.name}，{result.age}岁</div>
            <div style={{fontSize:12,color:'rgba(196,181,253,0.7)',marginTop:2}}>{result.sign} · {result.bio}</div>
            <div style={{display:'flex',gap:4,marginTop:6}}>{(result.tags||[]).map(t=><span key={t} style={{padding:'2px 8px',borderRadius:6,background:'rgba(139,92,246,0.15)',fontSize:10,color:'#C4B5FD'}}>{t}</span>)}</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10,marginTop:12,padding:'10px 14px',background:'rgba(251,191,36,0.08)',border:'1px solid rgba(251,191,36,0.15)',borderRadius:12}}>
          <div style={{fontSize:24,fontWeight:800,color:'#FBBF24'}}>{result.score}%</div>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:600,color:'#FBBF24'}}>{result.score>=80?((t('matchGradeLabels')||[])[0]||'Soulmates')+' 💕':result.score>=65?((t('matchGradeLabels')||[])[2]||'Good')+' ✨':t('matchPotential')+' 🌱'}</div>
            <div style={{fontSize:10,color:'rgba(196,181,253,0.5)'}}>{result.score>=80?t('matchDescHigh'):result.score>=65?t('matchDescMid'):t('matchDescLow')}</div>
          </div>
        </div>
        {/* Action buttons: 3 options */}
        <div style={{display:'flex',gap:8,marginTop:12}}>
          <button onClick={handleSkip} style={{flex:1,padding:'12px',borderRadius:12,border:'1px solid rgba(196,181,253,0.2)',background:'rgba(255,255,255,0.05)',color:'rgba(196,181,253,0.6)',fontSize:13,fontWeight:500,cursor:'pointer'}}>下一位 →</button>
          <button onClick={handleLike} style={{flex:1,padding:'12px',borderRadius:12,border:'none',background:'linear-gradient(135deg,#EC4899,#DB2777)',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',boxShadow:'0 3px 12px rgba(236,72,153,0.3)'}}>💕 有缘</button>
          <button onClick={handleChat} style={{padding:'12px 16px',borderRadius:12,border:'none',background:'linear-gradient(135deg,#F59E0B,#D97706)',color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer'}}>💬</button>
        </div>
      </div>}
      {showDetail&&result&&<CardDetailModal user={result} profile={profile} onClose={()=>setShowDetail(false)} goTo={goTo} addConv={addConv} autoGreet={autoGreet}/>}
      </>}
    </div>
  );
}

// ===== MOOD TRACKER (心情打卡) =====
function MoodTracker({profile}){
  const MOODS=[
    {emoji:'😄',label:'开心',color:'#22C55E',msg:'今天心情真好！保持这份快乐吧～'},
    {emoji:'😊',label:'不错',color:'#3B82F6',msg:'状态不错哦，继续保持！'},
    {emoji:'😐',label:'一般',color:'#F59E0B',msg:'平淡也是一种幸福，好好照顾自己'},
    {emoji:'😔',label:'低落',color:'#8B5CF6',msg:'每个人都有低谷的时候，明天会更好的 💙'},
    {emoji:'😢',label:'难过',color:'#EF4444',msg:'抱抱你，允许自己休息一下 ❤️'},
  ];
  const todayKey='yuanhe_mood_'+new Date().toDateString();
  const [todayMood,setTodayMood]=useState(()=>{const s=localStorage.getItem(todayKey);return s!==null?parseInt(s):-1});
  const [showMsg,setShowMsg]=useState(false);
  const getStreak=()=>{let s=0;const d=new Date();for(let i=0;i<30;i++){if(localStorage.getItem('yuanhe_mood_'+new Date(d.getTime()-i*86400000).toDateString())!==null)s++;else break}return s};
  const pickMood=(idx)=>{localStorage.setItem(todayKey,String(idx));setTodayMood(idx);setShowMsg(true);setTimeout(()=>setShowMsg(false),3000)};
  const streak=getStreak();
  // Already checked in — compact one-liner
  if(todayMood>=0&&!showMsg){
    return(<div style={{background:T.card,borderRadius:14,padding:'10px 16px',boxShadow:T.shadow,marginBottom:14,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:18}}>{MOODS[todayMood].emoji}</span><span style={{fontSize:12,color:T.textSec}}>今日已打卡 · {MOODS[todayMood].label}</span></div>
      {streak>1&&<span style={{fontSize:10,color:T.primary,fontWeight:600}}>🔥 {streak}天</span>}
    </div>);
  }
  return(
    <div style={{background:T.card,borderRadius:18,padding:16,boxShadow:T.shadow,marginBottom:14,border:`1px solid ${T.border}`}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{fontSize:13,fontWeight:700,color:T.text}}>💭 今天心情如何？</div>
        {streak>1&&<div style={{fontSize:10,color:T.primary,fontWeight:600}}>🔥 连续{streak}天</div>}
      </div>
      <div style={{display:'flex',justifyContent:'space-around',gap:4}}>
        {MOODS.map((m,i)=><button key={i} onClick={()=>pickMood(i)} style={{flex:1,padding:'8px 2px',borderRadius:12,border:'1.5px solid transparent',background:T.card,cursor:'pointer',textAlign:'center',transition:'all .2s'}}><div style={{fontSize:22}}>{m.emoji}</div><div style={{fontSize:9,color:T.textThi,marginTop:2}}>{m.label}</div></button>)}
      </div>
      {showMsg&&todayMood>=0&&<div className="anim-in" style={{marginTop:10,padding:'10px 14px',borderRadius:12,background:`${MOODS[todayMood].color}08`,border:`1px solid ${MOODS[todayMood].color}20`,fontSize:12,color:MOODS[todayMood].color,lineHeight:1.6,textAlign:'center'}}>{MOODS[todayMood].msg}</div>}
    </div>
  );
}

function IcebreakerCard({type,data,onAction,done}){
  const [picked,setPicked]=useState(null);
  const [aiPick,setAiPick]=useState(null);
  const [revealed,setRevealed]=useState(false);

  const handlePick=(opt)=>{
    if(picked)return;
    setPicked(opt);
    // AI also picks after delay
    setTimeout(()=>{
      const aiChoice=data.opts?data.opts[Math.floor(Math.random()*data.opts.length)]:null;
      setAiPick(aiChoice);
      setRevealed(true);
      if(onAction)onAction(opt,aiChoice);
    },1200);
  };

  const handleChoose=(choice)=>{
    if(picked)return;
    setPicked(choice);
    const aiChoice=Math.random()>0.5?data.a:data.b;
    setTimeout(()=>{setAiPick(aiChoice);setRevealed(true);if(onAction)onAction(choice,aiChoice)},1000);
  };

  if(type==='topic'){
    return(<div style={{background:T.isDark?`linear-gradient(135deg,${T.accent2}15,${T.accent2}25)`:'linear-gradient(135deg,#F5F3FF,#DDD6FE)',borderRadius:16,padding:16,marginBottom:10,border:`1px solid ${T.isDark?T.accent2+'40':'#C4B5FD'}`}}>
      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
        <span style={{fontSize:14}}>💬</span>
        <span style={{fontSize:11,fontWeight:600,color:T.accent2}}>破冰话题</span>
      </div>
      <div style={{fontSize:14,fontWeight:600,color:T.text,lineHeight:1.6,marginBottom:12}}>{data}</div>
      {!done&&<button onClick={()=>onAction&&onAction(data)} style={{padding:'8px 20px',borderRadius:20,border:'none',background:`linear-gradient(135deg,${T.accent2},${T.accent2}CC)`,color:'#fff',fontSize:12,fontWeight:600,cursor:'pointer'}}>聊这个话题 →</button>}
    </div>);
  }

  if(type==='compat'){
    return(<div style={{background:T.isDark?'linear-gradient(135deg,#DB277715,#DB277725)':'linear-gradient(135deg,#FDF2F8,#FCE7F3)',borderRadius:16,padding:16,marginBottom:10,border:`1px solid ${T.isDark?'#DB277740':'#FBCFE8'}`}}>

            style={{padding:'8px 14px',borderRadius:12,border:isPicked?'2px solid #DB2777':isAi&&revealed?'2px solid #F59E0B':`1.5px solid ${T.isDark?'#DB277730':' #FBCFE8'}`,

            {opt}

      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
        <span style={{fontSize:14}}>✨</span>
        <span style={{fontSize:11,fontWeight:600,color:'#059669'}}>今日缘分任务</span>
      </div>
      <div style={{fontSize:14,fontWeight:600,color:T.text,lineHeight:1.6}}>{data}</div>
      {!done&&<button onClick={()=>onAction&&onAction(data)} style={{marginTop:10,padding:'8px 20px',borderRadius:20,border:'none',background:'linear-gradient(135deg,#10B981,#059669)',color:'#fff',fontSize:12,fontWeight:600,cursor:'pointer'}}>完成任务 ✓</button>}
    </div>);
  }
  return null;
}

// Get icebreaker for conversation based on state
function getIcebreaker(conv){
  const msgs=conv.messages||[];
  const msgCount=msgs.length;
  const seed=(conv.user.id*7+new Date().getDate()*13)%100;
  // Already shown icebreakers in this session?
  const shownKey='yuanhe_ice_'+conv.id;
  const shown=parseInt(localStorage.getItem(shownKey)||'0');

  // First interaction (0-1 messages): topic card
  if(msgCount<=1&&shown<1){
    return{type:'topic',data:ICE_TOPICS[seed%ICE_TOPICS.length],shown:1};
  }
  // After 4+ messages: compatibility test
  if(msgCount>=4&&msgCount<8&&shown<2){
    return{type:'compat',data:ICE_COMPAT[seed%ICE_COMPAT.length],shown:2};
  }
  // After 8+ messages: this-or-that
  if(msgCount>=8&&msgCount<14&&shown<3){
    return{type:'choose',data:ICE_CHOOSE[seed%ICE_CHOOSE.length],shown:3};
  }
  // After 14+ messages: daily task
  if(msgCount>=14&&shown<4){
    return{type:'daily',data:ICE_DAILY[seed%ICE_DAILY.length],shown:4};
  }
  return null;
}

function DataManagementModal({profile,onClose,onLogout}){
  const dataItems=[
    {key:'yuanhe_profile',label:'出生信息',desc:'年月日时+性别+昵称',icon:'📋'},
    {key:'yuanhe_mode_results',label:'占卜报告',desc:Object.keys(JSON.parse(localStorage.getItem('yuanhe_mode_results')||'{}')).length+'条',icon:'🔮'},
    {key:'yuanhe_history',label:'占卜历史',desc:(JSON.parse(localStorage.getItem('yuanhe_history')||'[]')).length+'条记录',icon:'📜'},
    {key:'yuanhe_convs',label:'聊天记录',desc:'所有匹配会话+消息',icon:'💬'},
    {key:'yuanhe_blacklist',label:'黑名单',desc:(JSON.parse(localStorage.getItem('yuanhe_blacklist')||'[]')).length+'人',icon:'🚫'},
    {key:'yuanhe_privacy',label:'隐私设置',desc:localStorage.getItem('yuanhe_privacy')||'standard',icon:'🔐'},
  ];
  const exportData=()=>{
    const data={};
    dataItems.forEach(d=>{try{data[d.key]=JSON.parse(localStorage.getItem(d.key)||'null')}catch(e){data[d.key]=localStorage.getItem(d.key)}});
    data._exportTime=new Date().toISOString();
    data._version='缘合 v0.7.0';
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const link=document.createElement('a');
    link.download=`yuanhe_data_${Date.now()}.json`;
    link.href=URL.createObjectURL(blob);
    link.click();
  };
  const deleteItem=(key,label)=>{
    window.yuanheConfirm(`确定删除${label}？`,()=>{
      localStorage.removeItem(key);
      if(key==='yuanhe_profile'){onLogout();onClose();return}
      // 通知其他组件数据已变化
      window.dispatchEvent(new CustomEvent('yuanhe-data-deleted',{detail:{key}}));
      window.yuanheToast?.(`${label}已删除`);
      onClose();
    },{detail:'此操作不可恢复'});
  };
  const deleteAll=()=>{
    window.yuanheConfirm('确定删除所有数据并注销账号？',()=>{
      const keys=Object.keys(localStorage).filter(k=>k.startsWith('yuanhe_'));
      keys.forEach(k=>localStorage.removeItem(k));
      onLogout();onClose();
    },{detail:'将清除出生信息、占卜报告、聊天记录和所有设置，此操作不可恢复。'});
  };
  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:400,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:T.card,borderRadius:'24px 24px 0 0',width:'100%',maxWidth:480,maxHeight:'85vh',overflow:'auto',animation:'slideUp .3s ease',padding:'20px 16px 30px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{fontSize:18,fontWeight:700}}>📊 我的数据</div>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:16,border:'none',background:T.bg,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>
        <div style={{fontSize:11,color:T.textThi,marginBottom:14,padding:'8px 12px',background:T.bg,borderRadius:10}}>以下是缘合存储在你设备上的所有数据。数据仅保存在本地，不上传到服务器。</div>
        {dataItems.map(d=><div key={d.key} style={{display:'flex',alignItems:'center',gap:10,padding:'12px',borderRadius:12,border:`1px solid ${T.border}`,marginBottom:8}}>
          <span style={{fontSize:18}}>{d.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600}}>{d.label}</div>
            <div style={{fontSize:11,color:T.textThi,marginTop:2}}>{d.desc}</div>
          </div>
          <button onClick={()=>deleteItem(d.key,d.label)} style={{padding:'4px 10px',borderRadius:8,border:`1px solid ${T.isDark?'#EF444440':'#FECACA'}`,background:T.isDark?'#EF444415':'#FEF2F2',fontSize:10,color:'#EF4444',cursor:'pointer'}}>删除</button>
        </div>)}
        <div style={{display:'flex',gap:8,marginTop:16}}>
          <button onClick={exportData} style={{flex:1,padding:'12px',borderRadius:12,border:'none',background:`linear-gradient(135deg,${T.accent2},${T.accent2}CC)`,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer'}}>📥 导出全部数据 (JSON)</button>
        </div>
        <button onClick={deleteAll} style={{width:'100%',padding:'12px',borderRadius:12,border:'1.5px solid #EF4444',background:T.card,color:'#EF4444',fontSize:13,fontWeight:600,cursor:'pointer',marginTop:8}}>⚠️ 删除所有数据并注销</button>
      </div>
    </div>
  );
}

    </div>
  );
}

function ShareModal({type,profile,structured,partner,score,compatibility,dayInfo,onClose}){
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);
  const cardRef=useRef(null);

  const saveImage=async()=>{
    if(!cardRef.current||saving)return;
    setSaving(true);
    try{
      const canvas=await html2canvas(cardRef.current,{scale:2,backgroundColor:null,useCORS:true});
      const link=document.createElement('a');
      link.download=`yuanhe_${type}_${Date.now()}.png`;
      link.href=canvas.toDataURL('image/png');
      link.click();
      setSaved(true);
      setTimeout(()=>setSaved(false),2000);
    }catch(e){window.yuanheToast?.('保存失败，请重试')}
    setSaving(false);
  };

  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:500,background:'rgba(0,0,0,0.7)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{marginBottom:16,transform:'scale(0.9)',transformOrigin:'center'}}>
        <div ref={cardRef}>
          {type==='personality'&&<PersonalityShareCard profile={profile} structured={structured}/>}
          {type==='match'&&<MatchShareCard profile={profile} partner={partner} score={score} compatibility={compatibility}/>}
          {type==='fortune'&&<FortuneShareCard profile={profile} dayInfo={dayInfo}/>}
        </div>
      </div>
      <div style={{display:'flex',gap:12}}>
        <button onClick={saveImage} disabled={saving} style={{padding:'12px 28px',borderRadius:20,border:'none',background:saved?'#22C55E':'#fff',color:saved?'#fff':'#8B5CF6',fontSize:14,fontWeight:700,cursor:'pointer',boxShadow:'0 4px 16px rgba(0,0,0,0.2)'}}>
          {saving?'生成中…':saved?'✓ 已保存':'📥 保存图片'}
        </button>
        <button onClick={onClose} style={{padding:'12px 28px',borderRadius:20,border:'2px solid rgba(255,255,255,0.3)',background:'transparent',color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>关闭</button>
      </div>
    </div>
  );
}

// ===== TAB BAR =====
function TabBar({active,onTap}){
  const unread=ChatStore.totalUnread();
  const tabs=[{id:S.HOME,ic:p=><Icons.flame s={20} c={p}/>,label:t('navHome')},{id:S.DISCOVER,ic:p=><Icons.compass s={20} c={p}/>,label:t('navDiscover')},{id:S.AI,ic:null,label:t('navAI'),center:true},{id:S.MSGS,ic:p=><Icons.msgCircle s={20} c={p}/>,label:t('navMsgs'),badge:unread},{id:S.ME,ic:p=><Icons.user s={20} c={p}/>,label:t('navMe')}];
  return(<div style={{position:'fixed',bottom:0,left:0,right:0,maxWidth:480,margin:'0 auto',height:60,background:T.card,borderTop:`1px solid ${T.border}`,display:'flex',alignItems:'center',justifyContent:'space-around',padding:'0 4px 0',zIndex:100}}>
    {tabs.map(tab=>{const act=active===tab.id;
      if(tab.center)return<button key={tab.id} onClick={()=>onTap(tab.id)} style={{background:`linear-gradient(135deg,${T.accent2},${T.accent2}DD)`,border:'none',borderRadius:22,width:44,height:44,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',boxShadow:`0 3px 12px ${T.accent2}40`,marginTop:-14}}><Icons.sparkles s={20} c="#fff"/></button>;
      return<button key={tab.id} onClick={()=>onTap(tab.id)} style={{background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:1,padding:'6px 12px',position:'relative',transition:'opacity .2s'}}>
        {tab.ic(act?T.accent2:T.textThi)}
        {tab.badge>0&&<div style={{position:'absolute',top:2,right:4,minWidth:16,height:16,borderRadius:8,background:T.primary,color:'#fff',fontSize:9,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 4px'}}>{tab.badge>99?'99+':tab.badge}</div>}
        <span style={{fontSize:10,color:act?T.accent2:T.textThi,fontWeight:act?600:400}}>{tab.label}</span>
        {act&&<div style={{position:'absolute',bottom:-1,width:16,height:2,borderRadius:1,background:T.accent2}}/>}
      </button>})}
  </div>);
}

// ===== APP =====
function App(){
  const [langChosen,setLangChosen]=useState(()=>!!localStorage.getItem('yuanhe_lang'));
  const [scr,setScr]=useState(langChosen?S.SPLASH:S.LANG_SELECT);
  const [authToken,setAuthToken]=useState(()=>localStorage.getItem('yuanhe_token')||null);
  const [profile,setProfile]=useState(()=>{try{const p=JSON.parse(localStorage.getItem('yuanhe_profile'));return p&&p.year?p:null}catch(e){return null}});
  const [aiMode,setAiMode]=useState(null);
  const [convs,setConvs]=useState(()=>ChatStore.getAll());
  const [chatActive,setChatActive]=useState(false);
  const [openConvId,setOpenConvId]=useState(null);
  const [globalToast,setGlobalToast]=useState('');
  const [themeMode,setThemeMode]=useState(getThemeMode);
  // Apply theme globally
  T=THEMES[themeMode];
  useEffect(()=>{const s=document.body.style;s.background=T.bg;s.color=T.text;document.body.className=themeMode==='dark'?'dark':'';const r=document.documentElement.style;r.setProperty('--yuanhe-bg',T.bg);r.setProperty('--yuanhe-card',T.card);r.setProperty('--yuanhe-text',T.text);r.setProperty('--yuanhe-textSec',T.textSec);r.setProperty('--yuanhe-border',T.border)},[themeMode]);
  const toggleTheme=()=>{const next=themeMode==='light'?'dark':'light';localStorage.setItem('yuanhe_theme',next);setThemeMode(next);T=THEMES[next]};
  // WebSocket: 登录后自动连接，退出时断开
  useEffect(()=>{
    if(authToken){WsManager.connect(authToken)}
    else{WsManager.disconnect()}
    return()=>WsManager.disconnect();
  },[authToken]);

  const [termsAccepted,setTermsAccepted]=useState(()=>!!localStorage.getItem('yuanhe_terms_accepted'));
  const onboarded=!!localStorage.getItem('yuanhe_onboarded');
  const goTo=(s,m)=>{setScr(s);if(m)setAiMode(m)};
  const addConv=(user)=>{const c=ChatStore.create(user,profile);setConvs(ChatStore.getAll());return c};
  // Global toast — accessible from anywhere
  const toast=(msg)=>{setGlobalToast(msg);setTimeout(()=>setGlobalToast(''),2500)};
  window.yuanheToast=toast;
  // Global confirm dialog — replaces native confirm()
  const [confirmDlg,setConfirmDlg]=useState(null); // {msg,detail,onOk,danger}
  window.yuanheConfirm=(msg,onOk,opts={})=>{setConfirmDlg({msg,onOk,detail:opts.detail||'',danger:opts.danger!==false})};
  window.yuanheAlert=(msg)=>{setConfirmDlg({msg,onOk:null,detail:'',danger:false})};
  // Auto-greet: AI sends first message after match
  const autoGreet=async(conv)=>{
    try{
      const r=await apiPost('/api/chat',{partner:conv.user,message:'[系统：你们刚刚匹配成功，请主动打个招呼，用一句话开启对话。要提到你们的缘分值'+conv.user.score+'%。]',history:[]});
      if(r.reply){ChatStore.addMessage(conv.id,{role:'ai',text:r.reply});setConvs(ChatStore.getAll())}
    }catch(e){}
  };

  // 统一的profile更新+同步
  const saveProfile=useCallback((p)=>{
    setProfile(p);
    localStorage.setItem('yuanhe_profile',JSON.stringify(p));
    if(authToken)apiPost('/api/auth/profile',p).catch(()=>{});
  },[authToken]);

  // Bot proactive messages — bots initiate conversation after idle periods
  const BOT_PROACTIVE_PROMPTS=[
    '[系统：对方已经有一段时间没回复了。根据你的性格，主动发一条消息，可以分享你今天做了什么，或者问一个轻松的问题。]',
    '[系统：根据当前时间段，发一条应景的消息。早上说早安分享计划，中午聊吃什么，晚上聊今天的感受。简短自然。]',
    '[系统：分享一个和你兴趣爱好相关的小事，比如看到了什么、做了什么、想到了什么。像朋友圈一样自然。]',
  ];
  useEffect(()=>{
    if(!profile)return;
    const checkBots=()=>{
      const allConvs=ChatStore.getAll();
      allConvs.forEach(conv=>{
        if(!conv.user.isBot)return; // only bots
        if(conv.messages.length===0)return; // no messages yet, autoGreet handles this
        const lastMsg=conv.messages[conv.messages.length-1];
        const idleMs=Date.now()-(lastMsg.ts||0);
        const idleMin=idleMs/60000;
        // Send proactive message if idle 3-10 minutes (demo timing, production would be hours)
        if(idleMin<3||idleMin>30)return; // too recent or too old
        // Check if we already sent a proactive in this idle period
        const proactiveKey='yuanhe_bot_proactive_'+conv.id;
        const lastProactive=parseInt(localStorage.getItem(proactiveKey)||'0');
        if(Date.now()-lastProactive<180000)return; // max 1 proactive per 3 min
        // 25% chance each check (don't spam)
        if(Math.random()>0.25)return;
        // Send proactive message
        localStorage.setItem(proactiveKey,String(Date.now()));
        const prompt=BOT_PROACTIVE_PROMPTS[Math.floor(Math.random()*BOT_PROACTIVE_PROMPTS.length)];
        apiPost('/api/chat',{partner:conv.user,message:prompt,history:conv.messages.slice(-6)}).then(r=>{
          if(r.reply){ChatStore.addMessage(conv.id,{role:'ai',text:r.reply});setConvs(ChatStore.getAll())}
        }).catch(()=>{});
      });
    };
    const timer=setInterval(checkBots,60000); // check every 60s
    return()=>clearInterval(timer);
  },[profile]);
  const showTabs=[S.HOME,S.DISCOVER,S.AI,S.MSGS,S.ME].includes(scr)&&!chatActive;
  return(<div style={{maxWidth:480,margin:'0 auto',height:'100dvh',position:'relative',overflow:'hidden',background:T.bg,boxShadow:'0 0 40px rgba(0,0,0,0.08)'}}>
    {scr===S.LANG_SELECT&&<LangSelectScreen onSelect={()=>{setLangChosen(true);setScr(S.SPLASH)}}/>}
    {scr===S.SPLASH&&<Splash onDone={()=>{
      if(authToken&&profile)setScr(S.HOME);
      else if(authToken&&!profile)setScr(onboarded?S.BIRTH:S.ONBOARD);
      else setScr(S.LOGIN);
    }}/>}
    {scr===S.LOGIN&&<LoginScreen onLogin={({token,isNew,user})=>{
      setAuthToken(token);
      // 登录后同步数据
      const syncData=async()=>{
        try{
          // 黑名单: 服务器→本地
          const bl=await apiGet('/api/auth/blacklist');
          if(Array.isArray(bl)&&bl.length>0)localStorage.setItem('yuanhe_blacklist',JSON.stringify(bl));
          else{const local=JSON.parse(localStorage.getItem('yuanhe_blacklist')||'[]');if(local.length>0)apiPost('/api/auth/blacklist',{blacklist:local}).catch(()=>{})}
          // 收藏: 服务器→本地
          const fav=await apiGet('/api/auth/favorites');
          if(fav&&Object.keys(fav).length>0){Object.entries(fav).forEach(([k,v])=>localStorage.setItem(k,typeof v==='string'?v:JSON.stringify(v)))}
        }catch(e){}
      };
      if(user.profile&&user.profile.year){
        setProfile(user.profile);localStorage.setItem('yuanhe_profile',JSON.stringify(user.profile));syncData();setScr(S.HOME);
      }else if(!isNew&&profile){
        apiPost('/api/auth/profile',profile).catch(()=>{});syncData();setScr(S.HOME);
      }else{
        setScr(onboarded?S.BIRTH:S.ONBOARD);
      }
    }}/>}
    {scr===S.ONBOARD&&<OnboardingScreen onDone={()=>{localStorage.setItem('yuanhe_onboarded','1');setScr(S.BIRTH)}}/>}
    {scr===S.BIRTH&&!profile&&!termsAccepted&&<TermsModal onAccept={()=>{localStorage.setItem('yuanhe_terms_accepted','1');setTermsAccepted(true)}}/>}
    {scr===S.BIRTH&&<BirthScreen onSubmit={p=>{saveProfile(p);setScr(S.HOME)}}/>}
    {scr===S.HOME&&profile&&<div key="home" style={{height:'100%'}}><HomeScreen profile={profile} goTo={goTo} addConv={addConv} setOpenConvId={setOpenConvId} autoGreet={autoGreet}/></div>}
    {scr===S.DISCOVER&&<div key="discover" style={{height:'100%'}}><DiscoverScreen goTo={goTo} profile={profile} onUpdateProfile={saveProfile}/></div>}
    {/* AIScreen always mounted, hidden when not active — preserves loading state */}
    {profile&&<div style={{display:scr===S.AI?'contents':'none'}}><AIScreen profile={profile} initialMode={aiMode} onUpdateProfile={saveProfile}/></div>}
    {scr===S.MSGS&&<div key="msgs" style={{height:'100%'}}><MsgsScreen convs={convs} refreshConvs={()=>setConvs(ChatStore.getAll())} openConvId={openConvId} setOpenConvId={setOpenConvId} setChatActive={setChatActive} profile={profile} goTo={goTo}/></div>}
    {scr===S.ME&&profile&&<div key="me" style={{height:'100%'}}><MeScreen profile={profile} onLogout={()=>{window.yuanheConfirm(getLang()==='zh-CN'?'确定退出登录？':'Sign out?',()=>{const keys=Object.keys(localStorage).filter(k=>k.startsWith('yuanhe_'));keys.forEach(k=>localStorage.removeItem(k));setAuthToken(null);setProfile(null);setScr(S.LOGIN)},{detail:getLang()==='zh-CN'?'退出后本地数据将被清除':'Local data will be cleared'})}} goTo={goTo} onEdit={()=>setScr(S.BIRTH)} onUpdateProfile={saveProfile} themeMode={themeMode} toggleTheme={toggleTheme}/></div>}
    {showTabs&&<TabBar active={scr} onTap={s=>goTo(s)}/>}
    {globalToast&&<div style={{position:'fixed',top:'38%',left:'50%',transform:'translateX(-50%)',background:'rgba(0,0,0,0.78)',color:'#fff',padding:'12px 28px',borderRadius:22,fontSize:13,fontWeight:500,zIndex:9999,animation:'toastIn .25s ease',maxWidth:'80%',textAlign:'center',backdropFilter:'blur(4px)'}}>{globalToast}</div>}
    {/* Global confirm dialog */}
    {confirmDlg&&<div onClick={()=>setConfirmDlg(null)} style={{position:'fixed',inset:0,zIndex:9998,background:'rgba(0,0,0,0.45)',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div onClick={e=>e.stopPropagation()} style={{background:T.card,borderRadius:20,padding:'24px 20px 16px',width:'100%',maxWidth:300,textAlign:'center',animation:'scaleIn .2s ease',boxShadow:'0 8px 32px rgba(0,0,0,0.15)'}}>
        <div style={{fontSize:15,fontWeight:600,color:T.text,lineHeight:1.6,marginBottom:confirmDlg.detail?8:20}}>{confirmDlg.msg}</div>
        {confirmDlg.detail&&<div style={{fontSize:12,color:T.textThi,lineHeight:1.6,marginBottom:20}}>{confirmDlg.detail}</div>}
        <div style={{display:'flex',gap:10}}>
          {confirmDlg.onOk?<>
            <button onClick={()=>setConfirmDlg(null)} style={{flex:1,padding:'12px',borderRadius:12,border:'none',background:T.bg,fontSize:14,color:T.textSec,cursor:'pointer',fontWeight:500}}>取消</button>
            <button onClick={()=>{confirmDlg.onOk();setConfirmDlg(null)}} style={{flex:1,padding:'12px',borderRadius:12,border:'none',background:confirmDlg.danger?T.primary:T.accent2,fontSize:14,color:'#fff',cursor:'pointer',fontWeight:600}}>确定</button>
          </>:<button onClick={()=>setConfirmDlg(null)} style={{flex:1,padding:'12px',borderRadius:12,border:'none',background:T.accent2,fontSize:14,color:'#fff',cursor:'pointer',fontWeight:600}}>知道了</button>}
        </div>
      </div>
    </div>}
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
