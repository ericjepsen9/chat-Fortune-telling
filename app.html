const USERS=[
  {id:1,name:'林雨薇',age:31,bio:'喜欢旅行和音乐 ✈️',year:1994,month:3,day:15,hour:8,gender:'female',score:92,dist:'1km',sign:'双鱼座',tags:['旅行','音乐','瑜伽']},

  {id:3,name:'王思琪',age:29,bio:'瑜伽爱好者 🧘‍♀️',year:1996,month:11,day:8,hour:22,gender:'female',score:78,dist:'5km',sign:'天蝎座',tags:['瑜伽','冥想','素食']},
  {id:4,name:'李浩然',age:28,bio:'美食探店达人 🍜',year:1997,month:2,day:14,hour:6,gender:'male',score:95,dist:'3km',sign:'水瓶座',tags:['美食','摄影','旅行']},
  {id:5,name:'陈雨桐',age:27,bio:'摄影师·记录生活 📸',year:1998,month:8,day:3,hour:10,gender:'female',score:71,dist:'7km',sign:'狮子座',tags:['摄影','徒步','猫']},
  {id:6,name:'杨梓涵',age:26,bio:'书虫·猫奴·咖啡控 ☕',year:1999,month:5,day:28,hour:16,gender:'male',score:83,dist:'2km',sign:'双子座',tags:['阅读','猫','咖啡']},
  {id:7,name:'赵思源',age:30,bio:'设计师·追求美 🎨',year:1995,month:10,day:17,hour:0,gender:'female',score:88,dist:'1km',sign:'天秤座',tags:['设计','绘画','展览']},
  {id:8,name:'孙若曦',age:29,bio:'金融从业·爱跑步 🏃',year:1996,month:1,day:9,hour:12,gender:'male',score:76,dist:'8km',sign:'摩羯座',tags:['跑步','投资','健身']},
  {id:9,name:'周宇航',age:28,bio:'自由撰稿人 ✍️',year:1997,month:6,day:20,hour:18,gender:'female',score:90,dist:'2km',sign:'双子座',tags:['写作','旅行','电影']},
  {id:10,name:'吴诗涵',age:27,bio:'教师·热爱自然 🌿',year:1998,month:9,day:11,hour:4,gender:'male',score:85,dist:'4km',sign:'处女座',tags:['自然','徒步','阅读']},
  {id:11,name:'刘星辰',age:31,bio:'创业者·永不停歇 🚀',year:1994,month:4,day:25,hour:20,gender:'female',score:93,dist:'3km',sign:'金牛座',tags:['创业','健身','旅行']},
  {id:12,name:'郑梦瑶',age:28,bio:'心理学研究生 🔮',year:1997,month:12,day:6,hour:2,gender:'male',score:69,dist:'6km',sign:'射手座',tags:['心理学','冥想','写作']},
];

async function apiPost(p,b){const r=await fetch(p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});const t=await r.text();try{return JSON.parse(t)}catch(e){throw new Error('服务器返回非JSON: '+t.substring(0,100))}}
async function apiGet(p){const r=await fetch(p);const t=await r.text();try{return JSON.parse(t)}catch(e){throw new Error('服务器返回非JSON: '+t.substring(0,100))}}

// ===== SCORE RING =====
function ScoreRing({score,size=60,stroke=4}){
  const r=(size-stroke)/2,c=2*Math.PI*r;
  const color=score>=90?'#FF6B6B':score>=80?'#FFB347':score>=70?'#4ECDC4':'#9CA3AF';
  const label=score>=90?'天作之合':score>=80?'良缘佳偶':score>=70?'有缘有份':'需要磨合';
  return(<div style={{position:'relative',width:size,height:size,display:'inline-flex',alignItems:'center',justifyContent:'center'}}>
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={c} strokeDashoffset={c*(1-score/100)} strokeLinecap="round" style={{transition:'stroke-dashoffset 1s ease'}}/></svg>
    <div style={{position:'absolute',textAlign:'center'}}><div style={{fontSize:size*0.28,fontWeight:700,color:'#fff'}}>{score}</div><div style={{fontSize:size*0.12,color:'rgba(255,255,255,0.7)'}}>{label}</div></div>
  </div>);
}

// ===== SPLASH =====
function Splash({onDone}){useEffect(()=>{const t=setTimeout(onDone,2200);return()=>clearTimeout(t)},[]);
  return(<div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#FF6B6B 0%,#7C5CFC 50%,#4ECDC4 100%)'}}><div className="anim-in" style={{color:'#fff',textAlign:'center'}}><div className="serif" style={{fontSize:48,fontWeight:700,letterSpacing:8}}>缘合</div><div style={{fontSize:14,opacity:.8,marginTop:8,letterSpacing:4}}>YUANHE</div><div style={{fontSize:12,opacity:.6,marginTop:16}}>以命理连接缘分</div></div></div>);
}

// ===== BIRTH =====
function BirthScreen({onSubmit}){
  const [f,sF]=useState({year:'1996',month:'8',day:'15',hour:'14',gender:'female',name:''});
  const [lunar,sL]=useState(null);
  useEffect(()=>{apiGet(`/api/lunar?year=${f.year}&month=${f.month}&day=${f.day}&hour=${f.hour}`).then(sL).catch(()=>sL(null))},[f.year,f.month,f.day,f.hour]);
  const is={width:'100%',padding:'12px 14px',border:`1.5px solid ${T.borderDark}`,borderRadius:12,fontSize:15,background:'#fff',outline:'none'};
  return(<div style={{height:'100%',overflow:'auto',background:T.bg}}><div style={{padding:'60px 24px 100px'}}>
    <div className="anim-in serif" style={{textAlign:'center',marginBottom:32}}><div style={{fontSize:28,fontWeight:700}}>你的生辰</div><div style={{fontSize:13,color:T.textSec,marginTop:8}}>请输入公历出生信息</div></div>
    {lunar&&<div className="anim-in" style={{background:'linear-gradient(135deg,#FF6B6B10,#7C5CFC10)',padding:'14px 16px',borderRadius:14,marginBottom:24,textAlign:'center'}}><div style={{fontSize:13,color:T.primary,fontWeight:500}}>{lunar.lunarFull}</div><div style={{fontSize:12,color:T.textSec,marginTop:4}}>{lunar.ganzhi}</div></div>}
    <div style={{marginBottom:16}}><label style={{fontSize:13,color:T.textSec,marginBottom:6,display:'block'}}>昵称</label><input value={f.name} onChange={e=>sF({...f,name:e.target.value})} placeholder="输入昵称（可选）" style={is}/></div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:10,marginBottom:16}}>
      {[['年','year'],['月','month'],['日','day'],['时(24h)','hour']].map(([l,k])=><div key={k}><label style={{fontSize:12,color:T.textSec,marginBottom:4,display:'block'}}>{l}</label><input type="number" value={f[k]} onChange={e=>sF({...f,[k]:e.target.value})} style={{...is,padding:'10px 8px',textAlign:'center'}}/></div>)}
    </div>
    <div style={{marginBottom:24}}><label style={{fontSize:13,color:T.textSec,marginBottom:8,display:'block'}}>性别</label><div style={{display:'flex',gap:12}}>
      {[{v:'female',l:'♀ 女',c:T.accent3},{v:'male',l:'♂ 男',c:T.accent4}].map(g=><button key={g.v} onClick={()=>sF({...f,gender:g.v})} style={{flex:1,padding:'12px 0',borderRadius:12,fontSize:15,fontWeight:600,cursor:'pointer',border:f.gender===g.v?'none':`1.5px solid ${T.borderDark}`,background:f.gender===g.v?g.c:'#fff',color:f.gender===g.v?'#fff':T.textSec}}>{g.l}</button>)}
    </div></div>
    <button onClick={()=>{const p={year:+f.year,month:+f.month,day:+f.day,hour:+f.hour,gender:f.gender,name:f.name||'缘友'};localStorage.setItem('yuanhe_profile',JSON.stringify(p));onSubmit(p)}} style={{width:'100%',padding:'16px',borderRadius:14,border:'none',fontSize:16,fontWeight:700,color:'#fff',cursor:'pointer',background:'linear-gradient(135deg,#FF6B6B,#FF8A9B)',boxShadow:'0 4px 20px rgba(255,107,107,0.35)'}}>开启我的命运之旅 ✦</button>
  </div></div>);
}

// ===== SWIPE CARD =====
function SwipeCard({user,onSwipe,isTop}){
  const [dx,setDx]=useState(0);const [dragging,setDragging]=useState(false);const startX=useRef(0);
  const onS=x=>{startX.current=x;setDragging(true)};
  const onM=x=>{if(dragging)setDx(x-startX.current)};
  const onE=()=>{if(Math.abs(dx)>80)onSwipe(dx>0?'right':'left');setDx(0);setDragging(false)};
  const rot=dx*0.08,opa=Math.min(Math.abs(dx)/80,1);
  return(
    <div onMouseDown={e=>onS(e.clientX)} onMouseMove={e=>onM(e.clientX)} onMouseUp={onE} onMouseLeave={()=>dragging&&onE()}
      onTouchStart={e=>onS(e.touches[0].clientX)} onTouchMove={e=>onM(e.touches[0].clientX)} onTouchEnd={onE}
      style={{position:'absolute',inset:0,borderRadius:24,overflow:'hidden',cursor:'grab',userSelect:'none',transform:`translateX(${dx}px) rotate(${rot}deg) scale(${isTop?1:0.95})`,transition:dragging?'none':'all 0.4s ease',opacity:isTop?1:0.5,pointerEvents:isTop?'auto':'none',boxShadow:T.shadowLg}}>
      <div style={{position:'absolute',inset:0,background:GRADS[user.id%GRADS.length]}}/>
      <div style={{position:'absolute',top:'12%',left:'50%',transform:'translateX(-50%)',width:110,height:110,borderRadius:'50%',background:'rgba(255,255,255,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:52,backdropFilter:'blur(8px)'}}>{AVATARS[user.id%AVATARS.length]}</div>
      <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'80px 20px 20px',background:'linear-gradient(transparent,rgba(0,0,0,0.6))'}}>
        <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between'}}>
          <div><div style={{color:'#fff',fontSize:24,fontWeight:700}}>{user.name} <span style={{fontSize:16,fontWeight:400,opacity:.8}}>{user.age}</span></div>
            <div style={{color:'rgba(255,255,255,0.8)',fontSize:13,marginTop:4}}>{user.sign} · {user.dist}</div>
            <div style={{color:'rgba(255,255,255,0.7)',fontSize:12,marginTop:6}}>{user.bio}</div>
            <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>{user.tags.map(t=><span key={t} style={{padding:'3px 10px',borderRadius:12,background:'rgba(255,255,255,0.15)',color:'rgba(255,255,255,0.9)',fontSize:11}}>{t}</span>)}</div>
          </div>
          <ScoreRing score={user.score} size={64} stroke={4}/>
        </div>
      </div>
      {dx>30&&<div style={{position:'absolute',top:40,left:20,padding:'8px 16px',borderRadius:8,border:'3px solid #34D399',color:'#34D399',fontSize:20,fontWeight:700,transform:'rotate(-15deg)',opacity:opa}}>LIKE ♥</div>}
      {dx<-30&&<div style={{position:'absolute',top:40,right:20,padding:'8px 16px',borderRadius:8,border:'3px solid #FF6B6B',color:'#FF6B6B',fontSize:20,fontWeight:700,transform:'rotate(15deg)',opacity:opa}}>PASS ✕</div>}
    </div>
  );
}

// ===== MATCH POPUP =====
function MatchPopup({user,onChat,onClose}){
  return(<div style={{position:'fixed',inset:0,zIndex:200,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
    <div style={{background:'#fff',borderRadius:24,padding:'32px 24px',textAlign:'center',maxWidth:340,width:'100%',animation:'matchPop 0.5s ease'}}>
      <div style={{fontSize:48,marginBottom:8}}>💕</div>
      <div className="serif" style={{fontSize:22,fontWeight:700,color:T.primary}}>缘分已到！</div>
      <div style={{fontSize:14,color:T.textSec,marginTop:8}}>你和 <b>{user.name}</b> 命理契合度</div>
      <div style={{margin:'16px auto'}}><ScoreRing score={user.score} size={80} stroke={5}/></div>
      <div style={{display:'flex',gap:10,marginTop:20}}>
        <button onClick={onChat} style={{flex:1,padding:'14px',borderRadius:12,border:'none',background:'linear-gradient(135deg,#FF6B6B,#FF8A9B)',color:'#fff',fontSize:15,fontWeight:600,cursor:'pointer'}}>💬 打个招呼</button>
        <button onClick={onClose} style={{flex:1,padding:'14px',borderRadius:12,border:`1.5px solid ${T.borderDark}`,background:'#fff',color:T.textSec,fontSize:15,cursor:'pointer'}}>继续看看</button>
      </div>
    </div>
  </div>);
}

// ===== HOME =====
function HomeScreen({profile,goTo}){
  const [cards,setCards]=useState(()=>{const tg=profile.gender==='male'?'female':'male';return USERS.filter(u=>u.gender===tg).sort(()=>Math.random()-0.5)});
  const [matchUser,setMatchUser]=useState(null);
  const [swiped,setSwiped]=useState(0);
  const swipe=(dir)=>{const top=cards[cards.length-1];if(dir==='right'&&top.score>=80)setTimeout(()=>setMatchUser(top),300);setCards(c=>c.slice(0,-1));setSwiped(s=>s+1)};
  return(<div style={{height:'100%',overflow:'hidden',paddingBottom:64}}>
    <div style={{padding:'48px 20px 12px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div><div className="serif" style={{fontSize:22,fontWeight:700,color:T.primary}}>缘合</div><div style={{fontSize:12,color:T.textSec,marginTop:2}}>命理匹配 · 已看{swiped}人</div></div>
      <button onClick={()=>goTo(S.AI)} style={{background:'linear-gradient(135deg,#7C5CFC,#4ECDC4)',border:'none',borderRadius:12,padding:'8px 14px',color:'#fff',fontSize:12,fontWeight:600,cursor:'pointer',boxShadow:'0 2px 12px rgba(124,92,252,0.3)'}}>✦ AI占卜</button>
    </div>
    <div style={{position:'relative',height:'calc(100% - 160px)',margin:'0 16px'}}>
      {cards.length===0?(<div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:T.textThi}}>
        <div style={{fontSize:48,marginBottom:16}}>🎋</div><div style={{fontSize:16,fontWeight:500}}>今日缘分已看完</div><div style={{fontSize:13,marginTop:8}}>明天会有新的有缘人出现</div>
        <button onClick={()=>goTo(S.AI)} style={{marginTop:20,padding:'12px 24px',borderRadius:12,border:'none',background:T.primary,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>✦ 先去AI占卜</button>
      </div>)
      :cards.map((u,i)=><SwipeCard key={u.id} user={u} onSwipe={swipe} isTop={i===cards.length-1}/>)}
    </div>
    {cards.length>0&&<div style={{display:'flex',justifyContent:'center',gap:24,padding:'12px 0'}}>
      <button onClick={()=>swipe('left')} style={{width:52,height:52,borderRadius:'50%',border:`2px solid ${T.borderDark}`,background:'#fff',fontSize:22,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:T.shadow}}>✕</button>
      <button onClick={()=>swipe('right')} style={{width:60,height:60,borderRadius:'50%',border:'none',background:'linear-gradient(135deg,#FF6B6B,#FF8A9B)',color:'#fff',fontSize:26,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 20px rgba(255,107,107,0.35)'}}>♥</button>
      <button onClick={()=>goTo(S.AI)} style={{width:52,height:52,borderRadius:'50%',border:`2px solid ${T.borderDark}`,background:'#fff',fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:T.shadow}}>✦</button>
    </div>}
    {matchUser&&<MatchPopup user={matchUser} onChat={()=>{setMatchUser(null);goTo(S.MSGS)}} onClose={()=>setMatchUser(null)}/>}
  </div>);
}

// ===== REPORT CARD =====
function ReportCard({title, icon, color, content, index, md, isLong}) {
  const [expanded, setExpanded] = useState(!isLong);
  const displayContent = expanded ? content : content.substring(0, 280) + '…';
  return (
    <div className="anim-in" style={{animationDelay: index*0.06+'s', background:T.card, borderRadius:16, overflow:'hidden', boxShadow:T.shadow, marginBottom:10}}>
      {/* Card header with colored accent */}
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'14px 16px',borderBottom:`1px solid ${T.border}`,position:'relative'}}>
        <div style={{position:'absolute',left:0,top:0,bottom:0,width:4,background:color,borderRadius:'0 4px 4px 0'}}/>
        <div style={{width:36,height:36,borderRadius:10,background:`${color}12`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>{icon}</div>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:600,color:T.text}}>{title.replace(/^[一二三四五六七八九十]+、\s*/,'')}</div>
        </div>
        <button onClick={()=>setExpanded(!expanded)} style={{background:'none',border:'none',fontSize:18,color:T.textThi,cursor:'pointer',transform:expanded?'rotate(180deg)':'none',transition:'transform .2s'}}>▾</button>
      </div>
      {/* Card content */}
      <div style={{padding:'12px 16px',fontSize:13.5,lineHeight:1.75,color:T.textSec,transition:'max-height .3s ease'}}>
        <div className="markdown" dangerouslySetInnerHTML={md(displayContent)}/>
        {isLong && !expanded && (
          <button onClick={()=>setExpanded(true)} style={{marginTop:8,padding:'6px 14px',borderRadius:8,border:`1px solid ${color}30`,background:`${color}08`,color:color,fontSize:12,fontWeight:500,cursor:'pointer'}}>展开全部 ▾</button>
        )}
      </div>
    </div>
  );
}

// ===== AI =====
const MODES=[
  {id:'bazi',label:'八字',icon:'☰',c:'#8B5CF6',cat:'single'},
  {id:'astrology',label:'星座',icon:'★',c:'#8B5CF6',cat:'single'},

  {id:'vedic',label:'印占',icon:'◎',c:'#8B5CF6',cat:'single'},
  {id:'hehun',label:'合婚',icon:'💑',c:'#D946EF',cat:'pair'},
  {id:'synastry',label:'配对',icon:'💫',c:'#D946EF',cat:'pair'},
  {id:'hepan',label:'合盘',icon:'❤',c:'#D946EF',cat:'pair'},
];
const MODE_FULL={bazi:'八字命理',astrology:'星座运势',tarot:'塔罗牌',meihua:'梅花易数',vedic:'印度占星',hehun:'八字合婚',synastry:'星座配对',hepan:'综合合盘'};
const QUICK_QS={bazi:['今年运势','事业方向','感情运','财运分析','健康注意'],astrology:['本月运势','感情运','适合什么工作'],tarot:['今天适合做什么','感情指引','事业抉择'],meihua:['这件事能成吗','近期运势'],vedic:['当前大运','事业方向'],hehun:['适合在一起吗','婚姻分析'],synastry:['化学反应','相处建议'],hepan:['综合匹配度','长远建议']};
const LOAD_MSGS=['排盘计算中…','分析命局格局…','推演大运流年…','AI撰写解读…','即将完成…'];

function AIScreen({profile,initialMode}){
  const [mode,setMode]=useState(initialMode||'bazi');
  const [q,setQ]=useState('');
  const [dm,setDm]=useState('expert');
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);
  const [loadMsg,setLoadMsg]=useState('');
  const [elapsed,setElapsed]=useState(0);
  const [error,setError]=useState(null);
  const [viewMode,setViewMode]=useState('card');
  const [showQuick,setShowQuick]=useState(false);
  const ref=useRef(null);
  const timerRef=useRef(null);
  const [p2,setP2]=useState({year:'1992',month:'3',day:'22',hour:'8',gender:profile.gender==='male'?'female':'male'});
  const isPair=['hehun','synastry','hepan'].includes(mode);

  useEffect(()=>{
    if(loading){let i=0;setElapsed(0);setLoadMsg(LOAD_MSGS[0]);timerRef.current=setInterval(()=>{setElapsed(e=>e+1);i++;setLoadMsg(LOAD_MSGS[Math.min(Math.floor(i/15),LOAD_MSGS.length-1)])},1000)}
    else{if(timerRef.current)clearInterval(timerRef.current)}
    return()=>{if(timerRef.current)clearInterval(timerRef.current)};
  },[loading]);

  const divine=async(engineOnly)=>{
    setLoading(true);setError(null);setResult(null);
    try{const body={mode,...profile,question:engineOnly?'':q,displayMode:dm};if(isPair)body.profileB=p2;
      const r=await apiPost(engineOnly?'/api/calculate':'/api/divine',body);
      if(r.blocked)setError(r.reason);else if(r.error)setError(r.error);
      else{setResult(engineOnly?{engineData:r.engineData,response:null}:r);
        try{const h=JSON.parse(localStorage.getItem('yuanhe_history')||'[]');h.unshift({mode,question:q||'全面分析',time:new Date().toLocaleString()});localStorage.setItem('yuanhe_history',JSON.stringify(h.slice(0,20)))}catch(e){}}
    }catch(e){setError(e.message)}
    setLoading(false);setTimeout(()=>ref.current?.scrollIntoView({behavior:'smooth'}),300);
  };
  const md=t=>{try{return{__html:marked.parse(t)}}catch(e){return{__html:t.replace(/\n/g,'<br>')}}};

  // Purple palette
  const P={bg:'#F8F5FF',accent:'#8B5CF6',accentLight:'#EDE9FE',accentDark:'#7C3AED',pairAccent:'#D946EF',headerGrad:'linear-gradient(135deg,#8B5CF6,#A78BFA,#C4B5FD)'};

  return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:P.bg,position:'relative'}}>
    {/* === HEADER === */}
    <div style={{background:P.headerGrad,padding:'44px 16px 14px',flexShrink:0}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div className="serif" style={{color:'#fff',fontSize:18,fontWeight:700}}>✦ AI 占卜</div>
        <div style={{display:'flex',gap:4}}>
          {[{v:'expert',l:'专家'},{v:'simple',l:'大众'}].map(d=>(
            <button key={d.v} onClick={()=>setDm(d.v)} style={{padding:'4px 12px',borderRadius:14,fontSize:11,fontWeight:600,border:'none',cursor:'pointer',background:dm===d.v?'rgba(255,255,255,0.95)':'rgba(255,255,255,0.2)',color:dm===d.v?P.accent:'rgba(255,255,255,0.8)'}}>{d.l}</button>
          ))}
        </div>
      </div>
    </div>

    {/* === SCROLLABLE CONTENT === */}
    <div style={{flex:1,overflow:'auto',padding:'12px 16px 140px'}}>
      {/* Mode grid (large cards) */}
      <div style={{marginBottom:14}}>
        <div style={{display:'flex',gap:6,marginBottom:8}}>
          {[{k:'single',l:'个人占卜'},{k:'pair',l:'配对分析'}].map(c=>{
            const active=MODES.find(m=>m.id===mode)?.cat===c.k;
            return <button key={c.k} onClick={()=>setMode(MODES.find(m=>m.cat===c.k).id)} style={{padding:'5px 14px',borderRadius:14,fontSize:12,fontWeight:600,border:'none',cursor:'pointer',background:active?P.accent:'#fff',color:active?'#fff':T.textSec,boxShadow:active?`0 2px 8px ${P.accent}40`:T.shadow}}>{c.l}</button>;
          })}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
          {MODES.filter(m=>m.cat===(isPair?'pair':'single')||(isPair&&m.cat==='pair')||(!isPair&&m.cat==='single')).map(m=>(
            <button key={m.id} onClick={()=>setMode(m.id)} style={{
              padding:'12px 4px',borderRadius:12,cursor:'pointer',textAlign:'center',transition:'all .2s',
              border:mode===m.id?`2px solid ${P.accent}`:`1.5px solid ${T.border}`,
              background:mode===m.id?`${P.accent}08`:'#fff',
              boxShadow:mode===m.id?`0 2px 10px ${P.accent}20`:T.shadow,
            }}>
              <div style={{fontSize:20}}>{m.icon}</div>
              <div style={{fontSize:11,fontWeight:600,color:mode===m.id?P.accent:T.text,marginTop:4}}>{MODE_FULL[m.id]?.substring(0,4)||m.label}</div>
            </button>
          ))}
        </div>
      </div>

      {/* Partner panel */}
      {isPair&&<div className="anim-in" style={{background:'#FCE7F3',border:'1px solid #F9A8D420',borderRadius:14,padding:14,marginBottom:12}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <span style={{fontSize:13,fontWeight:600,color:'#D946EF'}}>💑 对方信息</span>
          <div style={{display:'flex',gap:4}}>{[{v:'female',l:'♀'},{v:'male',l:'♂'}].map(g=><button key={g.v} onClick={()=>setP2({...p2,gender:g.v})} style={{width:28,height:28,borderRadius:14,border:'none',cursor:'pointer',fontSize:12,background:p2.gender===g.v?'#D946EF':'#f0e0f5',color:p2.gender===g.v?'#fff':'#999'}}>{g.l}</button>)}</div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:6}}>
          {[['年','year'],['月','month'],['日','day'],['时','hour']].map(([l,k])=><input key={k} type="number" value={p2[k]} onChange={e=>setP2({...p2,[k]:e.target.value})} placeholder={l} style={{padding:'8px',border:'1px solid #F0D0E8',borderRadius:10,fontSize:13,textAlign:'center',background:'#fff',outline:'none'}}/>)}
        </div>
      </div>}

      {/* Loading */}
      {loading&&<div className="anim-in" style={{background:'#fff',borderRadius:16,padding:20,boxShadow:T.shadow,textAlign:'center',marginBottom:12}}>
        <div style={{fontSize:28,marginBottom:8,animation:'pulse 1.5s infinite'}}>🔮</div>
        <div style={{fontSize:14,fontWeight:600,color:P.accent}}>{loadMsg}</div>
        <div style={{fontSize:12,color:T.textThi,marginTop:6}}>已等待 {elapsed} 秒 · 预计60-120秒</div>
        <div style={{height:4,background:P.accentLight,borderRadius:2,marginTop:10,overflow:'hidden'}}>
          <div style={{height:'100%',background:`linear-gradient(90deg,${P.accent},${P.accentDark})`,borderRadius:2,width:Math.min(elapsed/90*100,95)+'%',transition:'width 1s linear'}}/>
        </div>
      </div>}

      {/* Error */}
      {error&&<div className="anim-in" style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:14,padding:16,marginBottom:12}}>
        <div style={{fontSize:14,fontWeight:600,color:'#EF4444',marginBottom:6}}>⚠️ {error}</div>
        <button onClick={()=>divine(false)} style={{padding:'6px 14px',borderRadius:8,border:'none',background:'#EF4444',color:'#fff',fontSize:12,cursor:'pointer'}}>🔄 重试</button>
      </div>}

      {/* Results */}
      {result&&<div ref={ref}>
        {/* View toggle */}
        {result.response&&<div style={{display:'flex',gap:0,marginBottom:12,background:'#EDE9FE',borderRadius:10,padding:3}}>
          {[{v:'card',l:'📊 报告卡片'},{v:'text',l:'📝 长文阅读'}].map(v=>(
            <button key={v.v} onClick={()=>setViewMode(v.v)} style={{flex:1,padding:'7px 0',borderRadius:8,fontSize:12,fontWeight:600,cursor:'pointer',border:'none',background:viewMode===v.v?'#fff':'transparent',color:viewMode===v.v?P.accent:T.textThi,boxShadow:viewMode===v.v?T.shadow:'none',transition:'all .2s'}}>{v.l}</button>
          ))}
        </div>}

        {/* CARD VIEW */}
        {result.response&&viewMode==='card'&&(()=>{
          const sections=[];const lines=result.response.split('\n');let cur=null;
          const ICONS={'排盘':'📋','性格':'🧠','天赋':'🧠','大运':'📈','命运':'📈','事业':'💼','财运':'💰','婚姻':'💕','家庭':'🏡','感情':'💕','健康':'🏥','流年':'🔮','预测':'🔮','总命运':'⭐','总评':'⭐','建议':'💡','注意':'⚠️','配对':'💑','方位':'🧭','行业':'💼','子女':'👶'};
          const COLORS=['#8B5CF6','#D946EF','#EC4899','#F59E0B','#10B981','#3B82F6','#6366F1','#14B8A6','#F43F5E','#8B5CF6'];
          lines.forEach(line=>{const h=line.match(/^#{2,3}\s+(.+)/);if(h){const title=h[1].replace(/\*\*/g,'').trim();const ik=Object.keys(ICONS).find(k=>title.includes(k));cur={title,icon:ik?ICONS[ik]:'📌',lines:[]};sections.push(cur)}else if(cur)cur.lines.push(line);else if(line.trim()){if(!sections.length)sections.push(cur={title:'概述',icon:'📋',lines:[]});cur.lines.push(line)}});
          return(<div>
            <div style={{background:P.headerGrad,borderRadius:16,padding:'18px',marginBottom:10,color:'#fff'}}>
              <div style={{fontSize:11,opacity:.7}}>命理报告</div>
              <div className="serif" style={{fontSize:18,fontWeight:700,marginTop:2}}>{MODE_FULL[mode]||mode}</div>
              <div style={{fontSize:11,opacity:.8,marginTop:4}}>{profile.name||'缘友'} · {profile.year}.{profile.month}.{profile.day} · {dm==='expert'?'专家':'大众'} · {elapsed}s</div>
            </div>
            {sections.filter(s=>s.lines.some(l=>l.trim())).map((sec,i)=>{
              const content=sec.lines.join('\n').trim();if(!content)return null;
              return <ReportCard key={i} title={sec.title} icon={sec.icon} color={COLORS[i%COLORS.length]} content={content} index={i} md={md} isLong={content.length>300}/>;
            })}
            <div style={{display:'flex',gap:8,marginTop:10}}>
              <button onClick={()=>{navigator.clipboard?.writeText(result.response);alert('已复制')}} style={{flex:1,padding:'10px',borderRadius:10,border:`1px solid ${P.accentLight}`,background:'#fff',fontSize:12,color:T.textSec,cursor:'pointer'}}>📋 复制</button>
              <button onClick={()=>setViewMode('text')} style={{flex:1,padding:'10px',borderRadius:10,border:`1px solid ${P.accentLight}`,background:'#fff',fontSize:12,color:T.textSec,cursor:'pointer'}}>📝 长文</button>
            </div>
          </div>);
        })()}

        {/* TEXT VIEW */}
        {result.response&&viewMode==='text'&&<div style={{background:'#fff',borderRadius:16,overflow:'hidden',boxShadow:T.shadow}}>
          <div style={{background:P.accentLight,padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:13,fontWeight:600,color:P.accent}}>{MODE_FULL[mode]} · AI解读</div>
            <button onClick={()=>{navigator.clipboard?.writeText(result.response);alert('已复制')}} style={{padding:'4px 10px',borderRadius:6,border:`1px solid ${P.accentLight}`,background:'#fff',fontSize:11,color:T.textSec,cursor:'pointer'}}>📋</button>
          </div>
          <div style={{padding:16}}><div className="markdown" style={{fontSize:14,lineHeight:1.8}} dangerouslySetInnerHTML={md(result.response)}/></div>
        </div>}

        {/* Engine only */}
        {!result.response&&result.engineData&&<div style={{background:'#fff',borderRadius:14,padding:16,boxShadow:T.shadow}}>
          <div style={{fontSize:13,fontWeight:600,color:P.accent,marginBottom:8}}>📦 引擎结果</div>
          <pre style={{fontSize:12,lineHeight:1.7,color:T.textSec,whiteSpace:'pre-wrap',wordBreak:'break-all',fontFamily:'inherit'}}>{result.engineData}</pre>
        </div>}

        {/* Engine data collapsible */}
        {result.response&&<details style={{background:'#fff',borderRadius:14,boxShadow:T.shadow,marginTop:10}}>
          <summary style={{padding:'12px 16px',fontSize:12,fontWeight:600,color:P.accent,cursor:'pointer',listStyle:'none',display:'flex',justifyContent:'space-between'}}><span>📦 引擎数据（{result.engineData?.length||0}字）</span><span style={{color:T.textThi}}>▾</span></summary>
          <div style={{padding:'0 16px 12px'}}><pre style={{fontSize:11,lineHeight:1.6,color:T.textSec,whiteSpace:'pre-wrap',wordBreak:'break-all',fontFamily:'inherit'}}>{result.engineData}</pre></div>
        </details>}

        {/* Follow-up */}
        {result.response&&<div style={{marginTop:10,padding:'12px 14px',background:P.accentLight,borderRadius:12}}>
          <div style={{fontSize:11,fontWeight:600,color:P.accent,marginBottom:6}}>💡 继续追问</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {(QUICK_QS[mode]||[]).filter(x=>x!==q).slice(0,3).map(qq=>(
              <button key={qq} onClick={()=>{setQ(qq);window.scrollTo({top:0,behavior:'smooth'})}} style={{padding:'5px 10px',borderRadius:8,border:`1px solid ${P.accent}30`,background:'#fff',color:P.accent,fontSize:11,cursor:'pointer'}}>{qq}</button>
            ))}
          </div>
        </div>}
      </div>}

      {/* Empty state */}
      {!result&&!loading&&!error&&<div style={{textAlign:'center',padding:'40px 20px',color:T.textThi}}>
        <div style={{fontSize:48,marginBottom:12}}>🔮</div>
        <div style={{fontSize:15,fontWeight:500,color:T.text}}>选择占术，开始解读</div>
        <div style={{fontSize:12,marginTop:6}}>当前：{MODE_FULL[mode]} · {dm==='expert'?'专家模式':'大众模式'}</div>
      </div>}
    </div>

    {/* === BOTTOM INPUT BAR (above TabBar) === */}
    <div style={{position:'fixed',bottom:64,left:0,right:0,maxWidth:480,margin:'0 auto',background:'#fff',borderTop:`1px solid ${T.border}`,padding:'8px 16px 10px',zIndex:50}}>
      {showQuick&&<div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
        {(QUICK_QS[mode]||[]).map(qq=><button key={qq} onClick={()=>{setQ(qq);setShowQuick(false)}} style={{padding:'5px 10px',borderRadius:10,border:`1px solid ${q===qq?P.accent:T.border}`,background:q===qq?P.accentLight:'#fff',color:q===qq?P.accent:T.textSec,fontSize:11,cursor:'pointer'}}>{qq}</button>)}
      </div>}
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <button onClick={()=>setShowQuick(!showQuick)} style={{width:36,height:36,borderRadius:18,border:`1.5px solid ${T.borderDark}`,background:'#fff',fontSize:14,cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',color:showQuick?P.accent:T.textThi}}>💬</button>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder={isPair?'问配对问题…':'留空=全面分析'} style={{flex:1,padding:'10px 14px',border:`1.5px solid ${T.borderDark}`,borderRadius:20,fontSize:13,background:'#F9FAFB',outline:'none'}}/>
        <button onClick={()=>divine(false)} disabled={loading} style={{height:36,padding:'0 16px',borderRadius:18,border:'none',background:loading?T.textThi:`linear-gradient(135deg,${P.accent},${P.accentDark})`,color:'#fff',fontSize:13,fontWeight:700,cursor:loading?'default':'pointer',flexShrink:0,boxShadow:loading?'none':`0 2px 10px ${P.accent}40`}}>
          {loading?'…':'🔮 解读'}
        </button>
      </div>
      <div style={{display:'flex',justifyContent:'center',gap:16,marginTop:4}}>
        <button onClick={()=>divine(true)} disabled={loading} style={{background:'none',border:'none',fontSize:11,color:T.textThi,cursor:'pointer'}}>⚡ 仅引擎</button>
      </div>
    </div>
  </div>);
}

// ===== TAB BAR =====
function TabBar({active,onTap}){
  const tabs=[{id:S.HOME,icon:"🔥",label:"首页"},{id:S.DISCOVER,icon:"🌍",label:"发现"},{id:S.AI,icon:"✦",label:"AI占卜",center:true},{id:S.MSGS,icon:"💬",label:"消息"},{id:S.ME,icon:"👤",label:"我的"}];
  return(<div style={{position:'fixed',bottom:0,left:0,right:0,maxWidth:480,margin:'0 auto',height:64,background:'#fff',borderTop:`1px solid ${T.border}`,display:'flex',alignItems:'flex-end',justifyContent:'space-around',padding:'0 4px 6px',zIndex:100}}>
    {tabs.map(tab=>{const act=active===tab.id;if(tab.center)return<button key={tab.id} onClick={()=>onTap(tab.id)} style={{background:'linear-gradient(135deg,#FF6B6B,#7C5CFC)',border:'none',borderRadius:'50%',width:48,height:48,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:20,cursor:'pointer',boxShadow:'0 4px 16px rgba(124,92,252,.35)',marginBottom:4,fontFamily:'serif'}}>{tab.icon}</button>;
    return<button key={tab.id} onClick={()=>onTap(tab.id)} style={{background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'4px 8px',opacity:act?1:.5}}><span style={{fontSize:20}}>{tab.icon}</span><span style={{fontSize:10,color:act?T.primary:T.textThi,fontWeight:act?600:400}}>{tab.label}</span></button>})}
  </div>);
}

// ===== APP =====
function App(){
  const [scr,setScr]=useState(S.SPLASH);
  const [profile,setProfile]=useState(()=>{try{const p=JSON.parse(localStorage.getItem('yuanhe_profile'));return p&&p.year?p:null}catch(e){return null}});
  const [aiMode,setAiMode]=useState(null);
  const goTo=(s,m)=>{setScr(s);if(m)setAiMode(m)};
  const showTabs=[S.HOME,S.DISCOVER,S.AI,S.MSGS,S.ME].includes(scr);
  return(<div style={{maxWidth:480,margin:'0 auto',height:'100vh',position:'relative',overflow:'hidden',background:T.bg,boxShadow:'0 0 40px rgba(0,0,0,0.08)'}}>
    {scr===S.SPLASH&&<Splash onDone={()=>setScr(profile?S.HOME:S.BIRTH)}/>}
    {scr===S.BIRTH&&<BirthScreen onSubmit={p=>{setProfile(p);setScr(S.HOME)}}/>}
    {scr===S.HOME&&profile&&<HomeScreen profile={profile} goTo={goTo}/>}
    {scr===S.DISCOVER&&<DiscoverScreen goTo={goTo}/>}
    {scr===S.AI&&profile&&<AIScreen profile={profile} initialMode={aiMode}/>}
    {scr===S.MSGS&&<MsgsScreen/>}
    {scr===S.ME&&profile&&<MeScreen profile={profile} onLogout={()=>{localStorage.removeItem('yuanhe_profile');setProfile(null);setScr(S.BIRTH)}} goTo={goTo}/>}
    {showTabs&&<TabBar active={scr} onTap={s=>goTo(s)}/>}
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
