async function apiPost(p,b){const r=await fetch(p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});const t=await r.text();try{return JSON.parse(t)}catch(e){if(t.includes('<!DOCTYPE'))throw new Error('服务器未启动或需要重启。请运行: node test-server.js');throw new Error('服务器返回异常: '+t.substring(0,80))}}
async function apiGet(p){const r=await fetch(p);const t=await r.text();try{return JSON.parse(t)}catch(e){if(t.includes('<!DOCTYPE'))throw new Error('服务器未启动或需要重启。请运行: node test-server.js');throw new Error('服务器返回异常: '+t.substring(0,80))}}

// ===== CHAT DATA LAYER =====
const ChatStore={
  _key:'yuanhe_conversations',
  load(){try{return JSON.parse(localStorage.getItem(this._key)||'[]')}catch(e){return[]}},
  save(convs){try{localStorage.setItem(this._key,JSON.stringify(convs))}catch(e){}},
  getAll(){return this.load()},
  getById(id){return this.load().find(c=>c.id===id)||null},
  // Create new conversation (if not exists for this user)
  create(user,profile){
    const convs=this.load();
    const existing=convs.find(c=>c.user.id===user.id);
    if(existing)return existing;
    const conv={
      id:'conv_'+user.id+'_'+Date.now(),
      user:{id:user.id,name:user.name,age:user.age,gender:user.gender,sign:user.sign,bio:user.bio,tags:user.tags||[],score:user.score,year:user.year,month:user.month,day:user.day,hour:user.hour,isBot:user.isBot||false,chatStyle:user.chatStyle||''},
      messages:[],
      unread:0,
      lastMessage:'',
      lastTime:new Date().toISOString(),
      createdAt:new Date().toISOString(),
    };
    convs.unshift(conv);
    this.save(convs);
    return conv;
  },
  // Add message to conversation
  addMessage(convId,msg){
    const convs=this.load();
    const conv=convs.find(c=>c.id===convId);
    if(!conv)return null;
    const message={id:'msg_'+Date.now()+'_'+Math.random().toString(36).substr(2,4),role:msg.role,text:msg.text,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),ts:Date.now()};
    conv.messages.push(message);
    conv.lastMessage=msg.text.substring(0,50);
    conv.lastTime=new Date().toISOString();
    if(msg.role==='ai')conv.unread=(conv.unread||0)+1;
    this.save(convs);
    return message;
  },
  // Mark conversation as read
  markRead(convId){
    const convs=this.load();
    const conv=convs.find(c=>c.id===convId);
    if(conv){conv.unread=0;this.save(convs)}
  },
  // Get total unread count
  totalUnread(){return this.load().reduce((sum,c)=>sum+(c.unread||0),0)},
};

// ===== SCORE RING =====
function ScoreRing({score,size=60,stroke=4}){
  const r=(size-stroke)/2,c=2*Math.PI*r;
  const color=score>=90?'#FF6B6B':score>=80?'#FFB347':score>=70?'#4ECDC4':'#9CA3AF';
  const label=score>=90?'天作之合':score>=80?'良缘佳偶':score>=70?'有缘有份':'需要磨合';
  return(<div style={{position:'relative',width:size,height:size,display:'inline-flex',alignItems:'center',justifyContent:'center'}}>
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={c} strokeDashoffset={c*(1-score/100)} strokeLinecap="round" style={{transition:'stroke-dashoffset 1s ease'}}/></svg>
    <div style={{position:'absolute',textAlign:'center'}}><div style={{fontSize:size*0.28,fontWeight:700,color:'#fff'}}>{score}</div><div style={{fontSize:size*0.12,color:'rgba(255,255,255,0.7)'}}>{label}</div></div>
  </div>);
}

function SwipeCard({user,onSwipe,isTop,onDetail}){
  const [dx,setDx]=useState(0);const [dragging,setDragging]=useState(false);const startX=useRef(0);
  const onS=x=>{startX.current=x;setDragging(true)};
  const onM=x=>{if(dragging)setDx(x-startX.current)};
  const onE=()=>{if(Math.abs(dx)>80)onSwipe(dx>0?'right':'left');else if(Math.abs(dx)<5&&onDetail)onDetail();setDx(0);setDragging(false)};
  const rot=dx*0.05,opa=Math.min(Math.abs(dx)/100,1);
  const grad=GRADS[user.id%GRADS.length];
  return(
    <div onMouseDown={e=>onS(e.clientX)} onMouseMove={e=>onM(e.clientX)} onMouseUp={onE} onMouseLeave={()=>dragging&&onE()}
      onTouchStart={e=>onS(e.touches[0].clientX)} onTouchMove={e=>onM(e.touches[0].clientX)} onTouchEnd={onE}
      style={{position:'absolute',inset:0,borderRadius:20,overflow:'hidden',cursor:'grab',userSelect:'none',
        transform:`translateX(${dx}px) rotate(${rot}deg) scale(${isTop?1:0.96})`,

      <div onClick={e=>{if(Math.abs(dx)<5){e.stopPropagation();onDetail&&onDetail()}}} style={{padding:'12px 16px 14px',cursor:'pointer'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>

// Simulates real user count — in production this comes from backend
function getBotConfig(){
  const realUserCount=USERS.length; // 12 real users currently
  // Ratio rules: fewer real users → more bots
  let botRatio,label;
  if(realUserCount<100){botRatio=0.8;label='冷启动(80%机器人)'}
  else if(realUserCount<1000){botRatio=0.5;label='成长期(50%机器人)'}
  else if(realUserCount<5000){botRatio=0.2;label='活跃期(20%机器人)'}
  else{botRatio=0;label='成熟期(机器人已关闭)'}
  return{realUserCount,botRatio,label};
}

function HomeScreen({profile,goTo,addConv,setOpenConvId,autoGreet}){
  const [cards,setCards]=useState(()=>{
    const tg=profile.gender==='male'?'female':'male';
    const {botRatio}=getBotConfig();
    const realCards=USERS.filter(u=>u.gender===tg);
    if(botRatio<=0)return realCards.sort(()=>Math.random()-0.5);
    // Calculate how many bots to mix in
    const botPool=BOTS.filter(u=>u.gender===tg).sort(()=>Math.random()-0.5);
    const botCount=Math.round(realCards.length*(botRatio/(1-botRatio)));
    const selectedBots=botPool.slice(0,Math.min(botCount,botPool.length));
    return[...realCards,...selectedBots].sort(()=>Math.random()-0.5);
  });
  const [matchUser,setMatchUser]=useState(null);
  const [detailUser,setDetailUser]=useState(null);
  const [swiped,setSwiped]=useState(0);
  // Fetch real match scores on mount
  useEffect(()=>{
    const tg=profile.gender==='male'?'female':'male';
    const {botRatio}=getBotConfig();
    const realCands=USERS.filter(u=>u.gender===tg);
    const botPool=BOTS.filter(u=>u.gender===tg).sort(()=>Math.random()-0.5);
    const botCount=botRatio>0?Math.round(realCands.length*(botRatio/(1-botRatio))):0;
    const cands=[...realCands,...botPool.slice(0,Math.min(botCount,botPool.length))];
    apiPost('/api/batch-match',{profile,candidates:cands}).then(results=>{
      const scored=results.map(r=>({...r,score:r.matchResult?.score||r.score})).sort(()=>Math.random()-0.5);

  const swipe=(dir)=>{const top=cards[cards.length-1];if(dir==='right'&&top.score>=65)setTimeout(()=>setMatchUser(top),300);setCards(c=>c.slice(0,-1));setSwiped(s=>s+1)};
  return(<div style={{height:'100%',overflow:'hidden',display:'flex',flexDirection:'column',paddingBottom:64}}>

      {cards.length===0?(<div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:T.textThi}}>
        <div style={{fontSize:48,marginBottom:16}}>🎋</div><div style={{fontSize:16,fontWeight:500}}>今日缘分已看完</div><div style={{fontSize:13,marginTop:8}}>明天会有新的有缘人出现</div>

// ===== WUXING RADAR (SVG五行雷达图) =====
function WuxingRadar({data,size=140}){
  if(!data)return null;
  const pad=24; // padding for labels
  const vw=size+pad*2;
  const cx=vw/2,cy=vw/2,r=size*0.34;
  const labels=['木','火','土','金','水'];
  const dotColors=['#86EFAC','#FCA5A5','#FCD34D','#E2E8F0','#93C5FD']; // softer dots on purple
  const labelColors=['#D1FAE5','#FEE2E2','#FEF3C7','#F1F5F9','#DBEAFE']; // light label colors
  const vals=labels.map(l=>data[l]||0);
  const max=Math.max(...vals,1);
  const pts=labels.map((_,i)=>{
    const a=Math.PI*2*i/5-Math.PI/2;
    const v=(vals[i]/max)*r;
    return[cx+v*Math.cos(a),cy+v*Math.sin(a)];
  });
  const poly=pts.map(p=>p.join(',')).join(' ');
  const gridLevels=[0.25,0.5,0.75,1];
  return(
    <svg width={size} height={size} viewBox={`0 0 ${vw} ${vw}`}>
      {/* Grid */}
      {gridLevels.map(gl=>(
        <polygon key={gl} points={labels.map((_,i)=>{const a=Math.PI*2*i/5-Math.PI/2;return`${cx+r*gl*Math.cos(a)},${cy+r*gl*Math.sin(a)}`}).join(' ')}
          fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth={0.5}/>
      ))}
      {/* Axes */}
      {labels.map((_,i)=>{const a=Math.PI*2*i/5-Math.PI/2;return<line key={i} x1={cx} y1={cy} x2={cx+r*Math.cos(a)} y2={cy+r*Math.sin(a)} stroke="rgba(255,255,255,0.08)" strokeWidth={0.5}/>})}
      {/* Data polygon */}
      <polygon points={poly} fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.7)" strokeWidth={1.5}/>
      {/* Data points */}
      {pts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r={3} fill={dotColors[i]} stroke="rgba(255,255,255,0.6)" strokeWidth={1}/>)}
      {/* Labels */}
      {labels.map((l,i)=>{const a=Math.PI*2*i/5-Math.PI/2;const lx=cx+(r+14)*Math.cos(a);const ly=cy+(r+14)*Math.sin(a);return<text key={l} x={lx} y={ly} fill={labelColors[i]} fontSize={11} fontWeight={700} textAnchor="middle" dominantBaseline="central">{l}</text>})}
    </svg>
  );
}

// Tarot Modal
function TarotModal({spread,setSpread,cards,setCards,pool,onDone,onClose}){
  const sz={single:1,threeCard:3,relationship:4};
  const need=sz[spread]||3;
  return(
    <div style={{position:'fixed',inset:0,zIndex:300,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div style={{background:'linear-gradient(180deg,#F0FDF9,#fff)',borderRadius:'24px 24px 0 0',width:'100%',maxWidth:480,maxHeight:'85vh',overflow:'auto',padding:'20px 16px 24px',animation:'slideUp .3s ease'}}>
        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{fontSize:18,fontWeight:700,color:'#0D9488'}}>🎴 选择你的塔罗牌</div>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:16,border:'none',background:'#f0f0f0',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>
        {/* Spread type */}
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          {[{k:'single',l:'🃏 单张指引',n:1},{k:'threeCard',l:'🎴 时间三张',n:3},{k:'relationship',l:'💕 关系四张',n:4}].map(s=>(
            <button key={s.k} onClick={()=>{setSpread(s.k);setCards([])}} style={{flex:1,padding:'10px 4px',borderRadius:12,fontSize:12,fontWeight:600,border:spread===s.k?'2px solid #0D9488':'1.5px solid #e0e0e0',cursor:'pointer',background:spread===s.k?'#0D9488':'#fff',color:spread===s.k?'#fff':'#0D9488',textAlign:'center'}}>{s.l}</button>
          ))}
        </div>
        {/* Progress */}
        <div style={{textAlign:'center',marginBottom:12}}>
          <span style={{fontSize:13,fontWeight:600,color:'#0D9488'}}>已选 {cards.length} / {need} 张</span>
          {cards.length>=need&&<span style={{marginLeft:8,fontSize:12,color:'#059669'}}>✓ 选好了</span>}
        </div>
        {/* Cards grid */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
          {pool.slice(0,12).map((cid,i)=>{
            const picked=cards.includes(cid);const full=cards.length>=need;const order=picked?cards.indexOf(cid)+1:null;
            return <button key={i} onClick={()=>{if(picked)setCards(c=>c.filter(x=>x!==cid));else if(!full)setCards(c=>[...c,cid])}} style={{
              aspectRatio:'2/3',borderRadius:12,cursor:picked||!full?'pointer':'default',
              border:picked?'3px solid #0D9488':'2px solid #c8c8c8',
              background:picked?'linear-gradient(135deg,#0D9488,#14B8A6)':'linear-gradient(160deg,#6366F1,#4338CA)',
              display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:'#fff',
              transition:'all .25s',transform:picked?'translateY(-4px) scale(1.04)':'scale(1)',
              boxShadow:picked?'0 6px 20px #0D948860':'0 2px 8px rgba(0,0,0,0.15)',opacity:!picked&&full?0.3:1,
            }}>
              {picked?<><div style={{fontSize:12,opacity:.8,fontWeight:600}}>第{order}张</div><div style={{fontSize:24,marginTop:2}}>✦</div></>:<><div style={{fontSize:28,opacity:.4}}>✧</div><div style={{fontSize:10,opacity:.4,marginTop:4}}>翻牌</div></>}
            </button>;
          })}
        </div>
        {/* Actions */}
        <div style={{display:'flex',gap:10,marginTop:16}}>
          <button onClick={()=>{setCards([]);onDone(true)}} style={{flex:1,padding:'14px',borderRadius:14,border:'1.5px solid #e0e0e0',background:'#fff',fontSize:14,fontWeight:600,color:'#666',cursor:'pointer'}}>🎴 随机抽取</button>
          <button onClick={()=>onDone(true)} disabled={cards.length===0} style={{flex:1,padding:'14px',borderRadius:14,border:'none',background:cards.length>0?'linear-gradient(135deg,#0D9488,#059669)':'#ccc',fontSize:14,fontWeight:700,color:'#fff',cursor:cards.length>0?'pointer':'default'}}>{cards.length>=need?`✦ 确认${need}张牌`:'继续选牌'}</button>
        </div>
      </div>
    </div>
  );
}

// Hour Correction Assistant Modal
function HourAssistantModal({profile,onResult,onClose}){
  const [step,setStep]=useState(0);
  const [answers,setAnswers]=useState({});
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const questions=[
    {key:'rank',title:'① 你在兄弟姐妹中排行？',opts:[{v:'oldest',l:'👆 老大/长子长女'},{v:'middle',l:'✌️ 中间'},{v:'youngest',l:'👇 最小'},{v:'only',l:'🙋 独生'}]},
    {key:'personality',title:'② 你的性格更偏向？',opts:[{v:'extrovert',l:'🔥 外向主动',d:'爱社交，表达欲强'},{v:'introvert',l:'🌊 内敛沉稳',d:'独处充电，深思熟虑'},{v:'ambivert',l:'⚖️ 看情况',d:'有时外向有时安静'}]},
    {key:'turning',title:'③ 你第一次重大人生转折约在？',sub:'如：升学/工作/恋爱/搬家等重要变化',opts:[{v:'10-18',l:'10-18岁',d:'青少年时期'},{v:'19-25',l:'19-25岁',d:'大学/初入社会'},{v:'26-33',l:'26-33岁',d:'而立前后'},{v:'34+',l:'34岁以后',d:'中年以后'}]},
    {key:'bodyType',title:'④ 你的体型总体偏向？',opts:[{v:'slim',l:'🦴 偏瘦',d:'不容易胖'},{v:'medium',l:'⚖️ 匀称',d:'正常体型'},{v:'strong',l:'💪 偏壮',d:'容易长肉/壮实'}]},
    {key:'energy',title:'⑤ 你通常哪个时段最有精力？',opts:[{v:'earlyMorning',l:'🌅 清晨5-8点'},{v:'morning',l:'☀️ 上午9-12点'},{v:'afternoon',l:'🌇 下午14-18点'},{v:'lateNight',l:'🌙 深夜22点后'}]},
  ];
  const pick=(key,val)=>{
    const a={...answers,[key]:val};setAnswers(a);
    if(step<questions.length-1)setTimeout(()=>setStep(step+1),300);
    else doCorrect(a);
  };
  const doCorrect=async(a)=>{
    setLoading(true);
    try{
      const r=await apiPost('/api/hour-correct',{year:profile.year,month:profile.month,day:profile.day,gender:profile.gender,answers:a});
      setResult(r);
    }catch(e){setResult({error:e.message})}
    setLoading(false);
  };
  const q=questions[step];
  const progress=result?100:Math.round((step/questions.length)*100);
  return(
    <div style={{position:'fixed',inset:0,zIndex:300,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div style={{background:'#fff',borderRadius:'24px 24px 0 0',width:'100%',maxWidth:480,maxHeight:'90vh',overflow:'auto',padding:'20px 16px 30px',animation:'slideUp .3s ease'}}>
        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{fontSize:18,fontWeight:700,color:'#D97706'}}>🔮 AI时辰校正助手</div>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:16,border:'none',background:'#f0f0f0',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>
        {/* Progress */}
        <div style={{height:4,background:'#FEF3C7',borderRadius:2,marginBottom:16,overflow:'hidden'}}>
          <div style={{height:'100%',background:'linear-gradient(90deg,#D97706,#F59E0B)',borderRadius:2,width:progress+'%',transition:'width .4s ease'}}/>
        </div>

        {!result&&!loading&&<>
          {/* Question */}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:16,fontWeight:700,color:'#1F2937',marginBottom:4}}>{q.title}</div>
            {q.sub&&<div style={{fontSize:12,color:'#6B7280'}}>{q.sub}</div>}
          </div>
          {/* Options */}
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {q.opts.map(o=>{
              const selected=answers[q.key]===o.v;
              return <button key={o.v} onClick={()=>pick(q.key,o.v)} style={{padding:'14px 16px',borderRadius:14,border:selected?'2px solid #D97706':'1.5px solid #E5E7EB',background:selected?'#FFF8EB':'#fff',cursor:'pointer',textAlign:'left',transition:'all .2s',transform:selected?'scale(1.02)':'none'}}>
                <div style={{fontSize:14,fontWeight:600,color:selected?'#D97706':'#374151'}}>{o.l}</div>
                {o.d&&<div style={{fontSize:11,color:'#6B7280',marginTop:2}}>{o.d}</div>}
              </button>;
            })}
          </div>
          {/* Back */}
          {step>0&&<button onClick={()=>setStep(step-1)} style={{marginTop:12,background:'none',border:'none',fontSize:13,color:'#6B7280',cursor:'pointer'}}>← 上一题</button>}
          {/* Steps indicator */}
          <div style={{display:'flex',justifyContent:'center',gap:6,marginTop:16}}>
            {questions.map((_,i)=><div key={i} style={{width:i===step?20:8,height:8,borderRadius:4,background:i<step?'#D97706':i===step?'#F59E0B':'#E5E7EB',transition:'all .3s'}}/>)}
          </div>
        </>}

        {/* Loading */}
        {loading&&<div style={{textAlign:'center',padding:'40px 20px'}}>
          <div style={{width:60,height:60,margin:'0 auto 16px',position:'relative'}}>
            <div style={{position:'absolute',inset:0,borderRadius:'50%',border:'3px solid #FEF3C7'}}/>
            <div style={{position:'absolute',inset:0,borderRadius:'50%',border:'3px solid transparent',borderTopColor:'#D97706',animation:'spin 1s linear infinite'}}/>
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>🔮</div>
          </div>
          <div style={{fontSize:15,fontWeight:600,color:'#D97706'}}>AI正在分析你的时辰…</div>
          <div style={{fontSize:12,color:'#6B7280',marginTop:6}}>综合五维特征匹配12个候选时辰</div>
        </div>}

        {/* Result */}
        {result&&!result.error&&<div>
          <div style={{textAlign:'center',marginBottom:16}}>
            <div style={{fontSize:48,marginBottom:8}}>{result.level==='high'?'🎯':result.level==='medium'?'🔮':'🤔'}</div>
            <div style={{fontSize:16,fontWeight:700,color:'#1F2937'}}>{result.message}</div>
          </div>
          {/* Top 3 results */}
          <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
            {result.ranking.map((r,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',borderRadius:14,border:i===0?'2px solid #D97706':'1.5px solid #E5E7EB',background:i===0?'#FFF8EB':'#fff'}}>
                <div style={{width:36,height:36,borderRadius:18,background:i===0?'#D97706':i===1?'#F59E0B':'#E5E7EB',display:'flex',alignItems:'center',justifyContent:'center',color:i<2?'#fff':'#666',fontSize:14,fontWeight:700,flexShrink:0}}>{i+1}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700,color:i===0?'#D97706':'#374151'}}>{r.label}（{r.range}点）</div>
                  <div style={{fontSize:11,color:'#6B7280',marginTop:2}}>{r.reason}</div>
                </div>
                <div style={{fontSize:14,fontWeight:700,color:i===0?'#D97706':'#6B7280'}}>{r.score}分</div>
              </div>
            ))}
          </div>
          <div style={{fontSize:11,color:'#6B7280',textAlign:'center',marginBottom:16}}>置信度 {result.confidence}% · 基于排行+性格+转折+体型+精力五维匹配</div>
          {/* Actions */}
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>{onResult(result.bestHour);onClose()}} style={{flex:1,padding:'14px',borderRadius:14,border:'none',background:'linear-gradient(135deg,#D97706,#B45309)',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer'}}>✓ 采用{result.bestLabel}</button>
            <button onClick={()=>{setResult(null);setStep(0);setAnswers({})}} style={{padding:'14px 20px',borderRadius:14,border:'1.5px solid #E5E7EB',background:'#fff',fontSize:14,color:'#6B7280',cursor:'pointer'}}>重测</button>
          </div>
        </div>}

        {result&&result.error&&<div style={{textAlign:'center',padding:'30px 20px'}}>
          <div style={{fontSize:14,color:'#EF4444',marginBottom:12}}>⚠️ {result.error}</div>
          <button onClick={()=>{setResult(null);setStep(0);setAnswers({})}} style={{padding:'10px 20px',borderRadius:10,border:'none',background:'#EF4444',color:'#fff',fontSize:13,cursor:'pointer'}}>重试</button>
        </div>}
      </div>
    </div>
  );
}

function AIScreen({profile,initialMode,onUpdateProfile}){
  const [mode,setMode]=useState(initialMode||'bazi');
  const [dm,setDm]=useState('expert');
    const [showTarotModal,setShowTarotModal]=useState(false);
  const [showHourAssistant,setShowHourAssistant]=useState(false);
  const [hourSkipped,setHourSkipped]=useState(false); // user chose to skip hour
  const [hourApprox,setHourApprox]=useState(false); // user chose approximate time
  const ref=useRef(null);
  const chatEndRef=useRef(null);
  const scrollRef=useRef(null);
  const [scrolledPastModes,setScrolledPastModes]=useState(false);
  const [followUpQ,setFollowUpQ]=useState('');
  const [chatLoading,setChatLoading]=useState(false);
  const [reportExpanded,setReportExpanded]=useState(true);
  // Reset states when switching modes
  useEffect(()=>{
    setReportExpanded((getMS(mode).chatHistory||[]).length===0); // expand if no chat, collapse if has chat
    setFollowUpQ('');
    if(getMS(mode).error)setMS(mode,{error:null}); // clear stale errors
  },[mode]); // auto-collapse on followUp

  // Per-mode state: {bazi:{q,result,loading,elapsed,error,loadMsg}, ...}
  const [modeStates,setModeStates]=useState(()=>{
    // Load saved results from localStorage
    const saved={};
    try{const s=JSON.parse(localStorage.getItem('yuanhe_mode_results')||'{}');
      Object.keys(s).forEach(k=>{
        // Handle both old format (direct result) and new format ({result,chatHistory})
        const val=s[k];
        if(val&&val.result){saved[k]={q:'',result:val.result,loading:false,elapsed:0,error:null,loadMsg:'',chatHistory:val.chatHistory||[]};}
        else if(val&&(val.response||val.engineData)){saved[k]={q:'',result:val,loading:false,elapsed:0,error:null,loadMsg:'',chatHistory:[]};}
      });
    }catch(e){}
    return saved;
  });
  const getMS=(m)=>modeStates[m]||{q:'',result:null,loading:false,elapsed:0,error:null,loadMsg:'',chatHistory:[]};
  const setMS=(m,patch)=>setModeStates(prev=>{const cur=prev[m]||{q:'',result:null,loading:false,elapsed:0,error:null,loadMsg:'',chatHistory:[]};return{...prev,[m]:{...cur,...patch}}});

  // Active loading mode (for toast)
  const loadingMode=Object.keys(modeStates).find(k=>modeStates[k]?.loading);
  const loadingModeInfo=loadingMode?MODES.find(m=>m.id===loadingMode):null;

  // Current mode state
  const ms=getMS(mode);
  const isPair=['hehun','synastry','hepan'].includes(mode);
  const modeInfo=MODES.find(m=>m.id===mode)||MODES[0];
  const mc=modeInfo.c;

  // Pair input
  const [p2,setP2]=useState({year:'1992',month:'3',day:'22',hour:'8',gender:profile.gender==='male'?'female':'male'});
  // Tarot
  const [tarotCards,setTarotCards]=useState([]);
  const [tarotSpread,setTarotSpread]=useState('threeCard');
  const tarotPool=useState(()=>{const a=[];for(let i=0;i<78;i++)a.push(i);return a.sort(()=>Math.random()-0.5)})[0];
  // Meihua
  const [mhNum1,setMhNum1]=useState('');
  const [mhNum2,setMhNum2]=useState('');

  // Timer for loading
  const timers=useRef({});
  const startTimer=(m)=>{
    let i=0;
    setMS(m,{elapsed:0,loadMsg:LOAD_MSGS[0]});
    timers.current[m]=setInterval(()=>{
      i++;
      setMS(m,{elapsed:i,loadMsg:LOAD_MSGS[Math.min(Math.floor(i/15),LOAD_MSGS.length-1)]});
    },1000);
  };
  const stopTimer=(m)=>{if(timers.current[m]){clearInterval(timers.current[m]);delete timers.current[m]}};
  useEffect(()=>()=>{Object.values(timers.current).forEach(clearInterval)},[]);

  // Save results to localStorage whenever they change
  useEffect(()=>{
    const toSave={};
    Object.entries(modeStates).forEach(([k,v])=>{if(v.result){
      const r={...v.result};delete r._streaming; // never persist streaming flag
      toSave[k]={result:r,chatHistory:v.chatHistory||[]};
    }});
    try{localStorage.setItem('yuanhe_mode_results',JSON.stringify(toSave))}catch(e){}
  },[modeStates]);

  const divine=async(divineMode,engineOnly,questionOverride)=>{
    const m=divineMode||mode;
    // Validate: bazi/astrology/vedic/pair modes need complete birth data
    const needsBirth=['bazi','astrology','vedic','hehun','synastry','hepan'].includes(m);
    if(needsBirth&&(!profile.year||!profile.month||!profile.day)){
      setMS(m,{error:'请先完善出生年月日信息（在"我的"页面可修改）'});return;
    }
    if(needsBirth&&profile.hour===-1&&!hourSkipped){
      setMS(m,{error:'请先补充出生时辰，或选择"不知道时辰"继续'});return;
    }
    const q = questionOverride !== undefined ? questionOverride : (engineOnly?'':getMS(m).q);
    // Meihua requires a specific question
    if(m==='meihua'&&!q.trim()&&!engineOnly){
      setMS(m,{error:'❀ 梅花易数讲究"一事一占"，请先描述你要占的具体事情，再起卦。'});return;
    }
    if(questionOverride!==undefined)setMS(m,{q:questionOverride});
    setMS(m,{loading:true,error:null,result:null});
    setReportExpanded(true);
    startTimer(m);
    try{
      const body={mode:m,year:profile.year,month:profile.month,day:profile.day,hour:profile.hour,gender:profile.gender,question:q,displayMode:dm};
      if(profile.hour===-1)body.hourUnknown=true;
      if(hourApprox)body.hourApprox=true;
      if(['hehun','synastry','hepan'].includes(m))body.profileB=p2;
      if(m==='tarot'){if(tarotCards.length>0)body.selectedCards=tarotCards;body.spreadType=tarotSpread}
      if(m==='meihua'&&mhNum1!==''){body.meihuaNum1=parseInt(mhNum1);if(mhNum2!=='')body.meihuaNum2=parseInt(mhNum2)}

      if(engineOnly){
        // Non-streaming for engine-only
        const r=await apiPost('/api/calculate',body);
        setMS(m,{result:{engineData:r.engineData,response:null,structured:r.structured},loading:false});
      }else{
        // Streaming SSE for AI divine
        const abortCtrl=new AbortController();
        const timeout=setTimeout(()=>abortCtrl.abort(),180000); // 3 min timeout
        try{
        const resp=await fetch('/api/divine-stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),signal:abortCtrl.signal});
        const reader=resp.body.getReader();
        const decoder=new TextDecoder();
        let fullText='';let structured=null;let engineData='';let buf='';
        let updateTimer=null;let streaming=true;
        const flushUpdate=(final)=>{
          let clean=fullText.replace(/<think>[\s\S]*?<\/think>/g,'').trim();
          // During streaming, also strip unclosed <think> tags
          if(!final)clean=clean.replace(/<think>[\s\S]*$/,'').trim();
          if(final)streaming=false;
          setMS(m,{result:{response:clean,engineData,structured,_genTime:new Date().toLocaleTimeString(),_elapsed:getMS(m).elapsed,_streaming:streaming},loading:false});
        };
        while(true){
          const {done,value}=await reader.read();
          if(done)break;
          buf+=decoder.decode(value,{stream:true});
          const lines=buf.split('\n');
          buf=lines.pop()||'';
          for(const line of lines){
            const t=line.trim();
            if(!t.startsWith('data: '))continue;
            const d=t.slice(6);
            if(d==='[DONE]'){if(updateTimer)clearInterval(updateTimer);flushUpdate(true);break}
            try{
              const ev=JSON.parse(d);
              if(ev.type==='init'){structured=ev.structured;engineData=ev.engineData||'';
                // Show header immediately with structured data
                setMS(m,{result:{response:'',engineData,structured,_streaming:true},loading:false});
                // Start periodic updates every 300ms
                updateTimer=setInterval(flushUpdate,300);
              }
              else if(ev.type==='chunk'){fullText+=ev.text}
              else if(ev.type==='error'){setMS(m,{error:ev.error,loading:false});if(updateTimer)clearInterval(updateTimer);return}
            }catch(e){}
          }
        }
        if(updateTimer)clearInterval(updateTimer);
        flushUpdate(true);
        }catch(abortErr){
          if(abortErr.name==='AbortError'){
            if(fullText){flushUpdate(true)}
            else{setMS(m,{error:'请求超时，请重试',loading:false})}
          }else throw abortErr;
        }finally{clearTimeout(timeout)}
      }

        </div>}

            const base=(QUICK_QS[mode]||[]).filter(q=>!asked.includes(q));

            if(resp.includes('大运')&&!asked.some(a=>a.includes('大运')))dynamic.push('当前大运分析');
            if(resp.includes('创业')&&!asked.some(a=>a.includes('创业')))dynamic.push('适合创业吗');
            if(resp.includes('贵人')&&!asked.some(a=>a.includes('贵人')))dynamic.push('贵人方位');
            const chips=[...dynamic,...base].slice(0,5);
            return chips.map(qq=>(
              <button key={qq} onClick={()=>followUp(qq)} disabled={chatLoading} style={{padding:'4px 10px',borderRadius:8,border:`1px solid ${mc}25`,background:`${mc}06`,color:mc,fontSize:10,fontWeight:500,cursor:'pointer',flexShrink:0,whiteSpace:'nowrap'}}>{qq}</button>
            ));
          })()}
        </div>
        <div style={{display:'flex',gap:8}}>
          <input
            value={followUpQ}
            onChange={e=>setFollowUpQ(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&followUpQ.trim())followUp(followUpQ)}}
            placeholder="输入追问…"
            style={{flex:1,padding:'10px 14px',borderRadius:20,border:`1.5px solid ${T.border}`,background:'#FAFAFA',fontSize:13,outline:'none'}}
          />
          <button onClick={()=>followUp(followUpQ)}
            disabled={!followUpQ.trim()||chatLoading}
            style={{width:40,height:40,borderRadius:20,border:'none',
              background:(!followUpQ.trim()||chatLoading)?T.border:`linear-gradient(135deg,${mc},${mc}dd)`,
              color:'#fff',fontSize:16,cursor:(!followUpQ.trim()||chatLoading)?'default':'pointer',

              boxShadow:(!followUpQ.trim()||chatLoading)?'none':`0 2px 8px ${mc}40`}}>{chatLoading?'…':'↑'}</button>
        </div>
      </>}
    </div>

    {/* === LOADING TOAST (shows when bg mode is loading) === */}
    {loadingMode&&loadingMode!==mode&&<div style={{position:'fixed',top:100,left:'50%',transform:'translateX(-50%)',background:'rgba(0,0,0,0.8)',color:'#fff',borderRadius:16,padding:'10px 20px',zIndex:200,display:'flex',alignItems:'center',gap:8,fontSize:13,boxShadow:'0 4px 20px rgba(0,0,0,0.3)',animation:'fadeIn .3s ease'}}>
      <div style={{animation:'pulse 1.5s infinite'}}>🔮</div>
      <span>{loadingModeInfo?.label||loadingMode} 解读中… {getMS(loadingMode).elapsed}s</span>
      <button onClick={()=>setMode(loadingMode)} style={{background:'rgba(255,255,255,0.2)',border:'none',borderRadius:8,padding:'4px 10px',color:'#fff',fontSize:11,cursor:'pointer',marginLeft:4}}>查看</button>
    </div>}

    {/* Tarot Modal */}
    {showTarotModal&&<TarotModal spread={tarotSpread} setSpread={setTarotSpread} cards={tarotCards} setCards={setTarotCards} pool={tarotPool} onDone={(autoDivine)=>{setShowTarotModal(false);if(autoDivine)setTimeout(()=>divine(mode,false),100)}} onClose={()=>setShowTarotModal(false)}/>}

    {/* Hour Correction Assistant */}
    {showHourAssistant&&<HourAssistantModal profile={profile} onResult={(h)=>{onUpdateProfile({...profile,hour:h})}} onClose={()=>setShowHourAssistant(false)}/>}
  </div>);
}

// ===== MESSAGES =====
function MsgsScreen({convs,refreshConvs,openConvId,setOpenConvId,setChatActive}){
  const [activeId,setActiveId]=useState(openConvId||null);
  const [chatInput,setChatInput]=useState('');
  const [sending,setSending]=useState(false);
  const [typing,setTyping]=useState(false);
  const [readStatus,setReadStatus]=useState(''); // ''|'已发送'|'已读'
  const chatEndRef=useRef(null);
  const activeConv=activeId?(ChatStore.getById(activeId)||convs.find(c=>c.id===activeId)):null;
  const scrollBottom=()=>setTimeout(()=>chatEndRef.current?.scrollIntoView({behavior:'smooth'}),100);

  // Bot online status — simulate based on hour + bot id seed
  const getBotOnline=(bot)=>{
    if(!bot?.isBot)return true; // real users always "online" for now
    const h=new Date().getHours();
    const seed=(bot.id*7+h*13)%100;
    // Bots "online" 70% of daytime (8-23), 20% of night (0-7)
    if(h>=8&&h<=23)return seed<70;
    return seed<20;
  };
  const isOnline=activeConv?getBotOnline(activeConv.user):false;

  // Notify App when entering/leaving chat detail
  useEffect(()=>{setChatActive(!!activeId);return()=>setChatActive(false)},[activeId]);
  useEffect(()=>{if(openConvId){setActiveId(openConvId);setOpenConvId(null)}},[openConvId]);

  const sendMsg=async()=>{
    if(!chatInput.trim()||sending||!activeConv)return;
    const text=chatInput.trim();
    setChatInput('');
    setSending(true);
    ChatStore.addMessage(activeConv.id,{role:'user',text});
    refreshConvs();
    scrollBottom();

    // Bot behavior simulation
    const isBot=activeConv.user.isBot;
    if(isBot){
      // Phase 1: "已发送" → delay → "已读"
      setReadStatus('已发送');
      const readDelay=2000+Math.random()*5000; // 2-7s before "read"
      await new Promise(r=>setTimeout(r,readDelay));
      setReadStatus('已读');
      // Phase 2: delay before typing (thinking time)
      const thinkDelay=1000+Math.random()*3000; // 1-4s think
      await new Promise(r=>setTimeout(r,thinkDelay));
      // Phase 3: typing animation
      setTyping(true);
      const typeDelay=2000+Math.random()*4000; // 2-6s typing
      await new Promise(r=>setTimeout(r,typeDelay));
    }else{
      // Non-bot: quick reply
      setTyping(true);
      await new Promise(r=>setTimeout(r,1000+Math.random()*1500));
    }

    try{
      const freshConv=ChatStore.getById(activeConv.id);
      const r=await apiPost('/api/chat',{partner:activeConv.user,message:text,history:(freshConv?.messages||[]).slice(-10)});
      ChatStore.addMessage(activeConv.id,{role:'ai',text:r.reply||'😊'});
    }catch(e){ChatStore.addMessage(activeConv.id,{role:'ai',text:'[网络不稳定，请重试]'})}
    setTyping(false);setSending(false);setReadStatus('');
    refreshConvs();scrollBottom();
  };

  if(activeConv){
    const freshConv=ChatStore.getById(activeConv.id)||activeConv;
    const msgs=freshConv.messages||[];
    return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:T.bg}}>

          {activeConv.user.gender==='female'?'👩':'👨'}

          <div style={{fontSize:15,fontWeight:700,color:T.text}}>{activeConv.user.name}</div>

        </div>
      </div>
      <div style={{flex:1,overflow:'auto',padding:'12px 16px'}}>
        <div style={{textAlign:'center',marginBottom:16}}>
          <div style={{display:'inline-block',padding:'6px 16px',borderRadius:12,background:'#F3F4F6',fontSize:11,color:T.textThi}}>你们已匹配成功 💕 开始聊天吧</div>

          <div style={{fontSize:12,marginTop:6}}>发送第一条消息开始聊天</div>
        </div>}
        {msgs.map((msg,idx)=>(
          <div key={msg.id} className="anim-in" style={{display:'flex',justifyContent:msg.role==='user'?'flex-end':'flex-start',marginBottom:8}}>
            <div style={{maxWidth:'75%'}}>
              <div style={{padding:'10px 14px',borderRadius:msg.role==='user'?'16px 16px 4px 16px':'16px 16px 16px 4px',
                background:msg.role==='user'?`linear-gradient(135deg,${T.primary},#7C3AED)`:'#fff',

                {msg.text}

              </div>

            </div>
          </div>
        ))}
        {typing&&<div className="anim-in" style={{display:'flex',justifyContent:'flex-start',marginBottom:8}}>
          <div style={{padding:'12px 16px',borderRadius:'16px 16px 16px 4px',background:'#fff',boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
            <div style={{display:'flex',gap:4,alignItems:'center'}}>
              <div style={{width:6,height:6,borderRadius:3,background:T.primary,animation:'pulse 1s infinite'}}/>
              <div style={{width:6,height:6,borderRadius:3,background:T.primary,animation:'pulse 1s infinite 0.2s'}}/>
              <div style={{width:6,height:6,borderRadius:3,background:T.primary,animation:'pulse 1s infinite 0.4s'}}/>
            </div>
          </div>
        </div>}
        <div ref={chatEndRef}/>
      </div>
      <div style={{padding:'8px 16px 24px',background:'#fff',borderTop:`1px solid ${T.border}`,display:'flex',gap:8}}>
        <input value={chatInput} onChange={e=>setChatInput(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'&&chatInput.trim())sendMsg()}}
          placeholder="发送消息…" disabled={sending}
          style={{flex:1,padding:'10px 14px',borderRadius:20,border:`1.5px solid ${T.border}`,background:'#FAFAFA',fontSize:13,outline:'none'}}/>
        <button onClick={sendMsg} disabled={!chatInput.trim()||sending}
          style={{width:40,height:40,borderRadius:20,border:'none',
            background:(!chatInput.trim()||sending)?T.border:`linear-gradient(135deg,${T.primary},#7C3AED)`,
            color:'#fff',fontSize:16,cursor:(!chatInput.trim()||sending)?'default':'pointer',
            flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',
            boxShadow:(!chatInput.trim()||sending)?'none':'0 2px 8px rgba(139,92,246,0.3)'}}>↑</button>
      </div>
    </div>);
  }

  // Conversation list
  return(<div style={{height:'100%',overflow:'auto',paddingBottom:80}}>
    <div style={{padding:'48px 20px 16px'}}><div className="serif" style={{fontSize:20,fontWeight:700}}>💬 消息</div><div style={{fontSize:12,color:T.textThi,marginTop:4}}>{convs.length>0?convs.length+'个会话':'匹配成功后在这里聊天'}</div></div>
    {convs.length===0?
      <div style={{padding:'50px 20px',textAlign:'center',color:T.textThi}}>

        <div style={{fontSize:15,fontWeight:500,color:T.text}}>暂无匹配消息</div>
        <div style={{fontSize:12,marginTop:8,lineHeight:1.6}}>在首页右滑喜欢的人<br/>匹配成功后可以开始聊天</div>
      </div>
      :
      <div style={{padding:'0 16px'}}>{convs.map(conv=>(
        <div key={conv.id} onClick={()=>setActiveId(conv.id)} style={{background:T.card,borderRadius:14,padding:14,boxShadow:T.shadow,marginBottom:8,display:'flex',alignItems:'center',gap:12,cursor:'pointer'}}>
          <div style={{width:48,height:48,borderRadius:24,background:'linear-gradient(135deg,#EDE9FE,#DDD6FE)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0,position:'relative'}}>
            {conv.user.gender==='female'?'👩':'👨'}
            {conv.unread>0&&<div style={{position:'absolute',top:-2,right:-2,minWidth:16,height:16,borderRadius:8,background:'#EF4444',color:'#fff',fontSize:9,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 4px',border:'2px solid #fff'}}>{conv.unread}</div>}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:14,fontWeight:600,color:T.text}}>{conv.user.name}</span>
              <span style={{fontSize:10,color:T.textThi}}>{conv.lastTime?new Date(conv.lastTime).toLocaleDateString([],{month:'numeric',day:'numeric'}):''}</span>
            </div>
            <div style={{fontSize:12,color:T.textThi,marginTop:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{conv.lastMessage||'匹配成功！打个招呼吧 👋'}</div>
          </div>
          <div style={{fontSize:11,color:T.primary,fontWeight:500,flexShrink:0}}>聊天 →</div>
        </div>
      ))}</div>
    }
  </div>);
}

      <div key={it.label} className="anim-in" onClick={it.a} style={{animationDelay:i*0.06+'s',background:T.card,borderRadius:14,padding:14,boxShadow:T.shadow,marginBottom:8,display:'flex',alignItems:'center',gap:12,cursor:it.a?'pointer':'default'}}><span style={{fontSize:20}}>{it.icon}</span><div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{it.label}</div><div style={{fontSize:11,color:T.textThi,marginTop:2}}>{it.desc}</div></div><span style={{color:T.textThi,fontSize:12}}>›</span></div>)}

    {/* Recent history */}
    {history.length>0&&<>
      <div style={{fontSize:13,fontWeight:600,color:T.text,marginTop:16,marginBottom:8}}>最近记录</div>

            <div style={{fontSize:12,fontWeight:600,color:T.text,marginTop:2}}>{Math.round(cfg.botRatio*100)}%</div>
          </div>
          <div style={{background:'#fff',borderRadius:10,padding:'8px 10px'}}>
            <div style={{fontSize:10,color:T.textThi}}>总消息数</div>
            <div style={{fontSize:12,fontWeight:600,color:T.text,marginTop:2}}>{totalMsgs}</div>
          </div>
        </div>
        <div style={{fontSize:9,color:T.textThi,marginTop:6,textAlign:'center'}}>此面板仅管理员可见，用户版本将隐藏</div>
      </div>;
    })()}

    <button onClick={onLogout} style={{width:'100%',padding:'14px',borderRadius:12,border:`1.5px solid ${T.borderDark}`,background:'#fff',fontSize:14,color:T.textSec,cursor:'pointer',marginTop:20}}>退出登录</button>
  </div>
  {showPrivacy&&<PrivacySettingsModal onClose={()=>setShowPrivacy(false)}/>}
</div>);}

    <div id="share-card" style={{width:340,background:'linear-gradient(135deg,#EC4899,#BE185D)',borderRadius:24,padding:24,color:'#fff',fontFamily:'system-ui'}}>
      <div style={{fontSize:10,opacity:.6,marginBottom:12}}>缘合 · 命理匹配卡</div>
      <div style={{display:'flex',justifyContent:'space-around',alignItems:'center',marginBottom:16}}>
        <div style={{textAlign:'center'}}>
          <div style={{width:56,height:56,borderRadius:28,background:'rgba(255,255,255,0.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,margin:'0 auto'}}>{profile.gender==='female'?'👩':'👨'}</div>
          <div style={{fontSize:14,fontWeight:700,marginTop:6}}>{profile.name||'我'}</div>
        </div>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:28,fontWeight:800,color:'#FFF'}}>{score||'?'}%</div>
          <div style={{fontSize:10,opacity:.7}}>缘分值</div>
        </div>
        <div style={{textAlign:'center'}}>
          <div style={{width:56,height:56,borderRadius:28,background:'rgba(255,255,255,0.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,margin:'0 auto'}}>{partner?.gender==='female'?'👩':'👨'}</div>
          <div style={{fontSize:14,fontWeight:700,marginTop:6}}>{partner?.name||'TA'}</div>
        </div>
      </div>
      {compatibility&&<div style={{background:'rgba(255,255,255,0.12)',borderRadius:12,padding:'10px 14px',marginBottom:16,textAlign:'center'}}>
        <div style={{fontSize:13,fontWeight:700}}>{compatibility.icon||'💕'} {compatibility.type||'有缘有份'}</div>
        <div style={{fontSize:11,opacity:.7,marginTop:4}}>{compatibility.desc||'命理相合，值得珍惜'}</div>
      </div>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',opacity:.5}}>
        <span style={{fontSize:10}}>扫码测测你们的缘分</span>
        <span style={{fontSize:10}}>缘合 yuanhe.app</span>
      </div>
    </div>
  );
}

        <div style={{flex:1,background:'rgba(255,255,255,0.15)',borderRadius:12,padding:'10px 12px'}}>

          <div style={{fontSize:12,fontWeight:600,marginTop:4}}>{ji}</div>

      </div>
      <div style={{display:'flex',gap:12,marginBottom:16}}>
        <div style={{background:'rgba(255,255,255,0.15)',borderRadius:10,padding:'8px 14px',display:'flex',alignItems:'center',gap:6}}>
          <div style={{width:16,height:16,borderRadius:4,background:luckyColor}}/>
          <span style={{fontSize:11}}>幸运色</span>

        <div style={{background:'rgba(255,255,255,0.15)',borderRadius:10,padding:'8px 14px',fontSize:11}}>🔢 幸运数 {(d*3+7)%10}</div>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',opacity:.5}}>
        <span style={{fontSize:10}}>扫码查看详细运势</span>
        <span style={{fontSize:10}}>缘合 yuanhe.app</span>
      </div>
    </div>
  );
}

// ===== TAB BAR =====
function TabBar({active,onTap}){
  const unread=ChatStore.totalUnread();
  const tabs=[{id:S.HOME,ic:p=><Icons.flame s={20} c={p}/>,label:"首页"},{id:S.DISCOVER,ic:p=><Icons.compass s={20} c={p}/>,label:"发现"},{id:S.AI,ic:null,label:"AI占卜",center:true},{id:S.MSGS,ic:p=><Icons.msgCircle s={20} c={p}/>,label:"消息",badge:unread},{id:S.ME,ic:p=><Icons.user s={20} c={p}/>,label:"我的"}];
  return(<div style={{position:'fixed',bottom:0,left:0,right:0,maxWidth:480,margin:'0 auto',height:64,background:'#fff',borderTop:`1px solid ${T.border}`,display:'flex',alignItems:'flex-end',justifyContent:'space-around',padding:'0 4px 6px',zIndex:100}}>
    {tabs.map(tab=>{const act=active===tab.id;if(tab.center)return<button key={tab.id} onClick={()=>onTap(tab.id)} style={{background:'linear-gradient(135deg,#8B5CF6,#7C3AED)',border:'none',borderRadius:'50%',width:48,height:48,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',boxShadow:'0 4px 16px rgba(139,92,246,.35)',marginBottom:4}}><Icons.sparkles s={22} c="#fff"/></button>;
    return<button key={tab.id} onClick={()=>onTap(tab.id)} style={{background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'4px 8px',opacity:act?1:.5,position:'relative'}}>
      {tab.ic(act?T.primary:T.textThi)}
      {tab.badge>0&&<div style={{position:'absolute',top:0,right:2,minWidth:16,height:16,borderRadius:8,background:'#EF4444',color:'#fff',fontSize:9,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 4px'}}>{tab.badge>99?'99+':tab.badge}</div>}
      <span style={{fontSize:10,color:act?T.primary:T.textThi,fontWeight:act?600:400}}>{tab.label}</span>
    </button>})}
  </div>);
}

// ===== APP =====
function App(){
  const [scr,setScr]=useState(S.SPLASH);
  const [profile,setProfile]=useState(()=>{try{const p=JSON.parse(localStorage.getItem('yuanhe_profile'));return p&&p.year?p:null}catch(e){return null}});
  const [aiMode,setAiMode]=useState(null);
  const [convs,setConvs]=useState(()=>ChatStore.getAll());
  const [chatActive,setChatActive]=useState(false); // hide TabBar when in chat detail
  const [openConvId,setOpenConvId]=useState(null); // auto-open this conv
  const onboarded=!!localStorage.getItem('yuanhe_onboarded');
  const goTo=(s,m)=>{setScr(s);if(m)setAiMode(m)};
  const addConv=(user)=>{const c=ChatStore.create(user,profile);setConvs(ChatStore.getAll());return c};
  // Auto-greet: AI sends first message after match
  const autoGreet=async(conv)=>{
    try{
      const r=await apiPost('/api/chat',{partner:conv.user,message:'[系统：你们刚刚匹配成功，请主动打个招呼，用一句话开启对话。要提到你们的缘分值'+conv.user.score+'%。]',history:[]});
      if(r.reply){ChatStore.addMessage(conv.id,{role:'ai',text:r.reply});setConvs(ChatStore.getAll())}
    }catch(e){}
  };

  // Bot proactive messages — bots initiate conversation after idle periods
  const BOT_PROACTIVE_PROMPTS=[
    '[系统：对方已经有一段时间没回复了。根据你的性格，主动发一条消息，可以分享你今天做了什么，或者问一个轻松的问题。]',
    '[系统：根据当前时间段，发一条应景的消息。早上说早安分享计划，中午聊吃什么，晚上聊今天的感受。简短自然。]',
    '[系统：分享一个和你兴趣爱好相关的小事，比如看到了什么、做了什么、想到了什么。像朋友圈一样自然。]',
  ];
  useEffect(()=>{
    if(!profile)return;
    const checkBots=()=>{
      const allConvs=ChatStore.getAll();
      allConvs.forEach(conv=>{
        if(!conv.user.isBot)return; // only bots
        if(conv.messages.length===0)return; // no messages yet, autoGreet handles this
        const lastMsg=conv.messages[conv.messages.length-1];
        const idleMs=Date.now()-(lastMsg.ts||0);
        const idleMin=idleMs/60000;
        // Send proactive message if idle 3-10 minutes (demo timing, production would be hours)
        if(idleMin<3||idleMin>30)return; // too recent or too old
        // Check if we already sent a proactive in this idle period
        const proactiveKey='yuanhe_bot_proactive_'+conv.id;
        const lastProactive=parseInt(localStorage.getItem(proactiveKey)||'0');
        if(Date.now()-lastProactive<180000)return; // max 1 proactive per 3 min
        // 25% chance each check (don't spam)
        if(Math.random()>0.25)return;
        // Send proactive message
        localStorage.setItem(proactiveKey,String(Date.now()));
        const prompt=BOT_PROACTIVE_PROMPTS[Math.floor(Math.random()*BOT_PROACTIVE_PROMPTS.length)];
        apiPost('/api/chat',{partner:conv.user,message:prompt,history:conv.messages.slice(-6)}).then(r=>{
          if(r.reply){ChatStore.addMessage(conv.id,{role:'ai',text:r.reply});setConvs(ChatStore.getAll())}
        }).catch(()=>{});
      });
    };
    const timer=setInterval(checkBots,60000); // check every 60s
    return()=>clearInterval(timer);
  },[profile]);
  const showTabs=[S.HOME,S.DISCOVER,S.AI,S.MSGS,S.ME].includes(scr)&&!chatActive;
  return(<div style={{maxWidth:480,margin:'0 auto',height:window.innerHeight,position:'relative',overflow:'hidden',background:T.bg,boxShadow:'0 0 40px rgba(0,0,0,0.08)'}}>
    {scr===S.SPLASH&&<Splash onDone={()=>setScr(profile?S.HOME:onboarded?S.BIRTH:S.ONBOARD)}/>}
    {scr===S.ONBOARD&&<OnboardingScreen onDone={()=>{localStorage.setItem('yuanhe_onboarded','1');setScr(S.BIRTH)}}/>}
    {scr===S.BIRTH&&<BirthScreen onSubmit={p=>{setProfile(p);setScr(S.HOME)}}/>}
    {scr===S.HOME&&profile&&<HomeScreen profile={profile} goTo={goTo} addConv={addConv} setOpenConvId={setOpenConvId} autoGreet={autoGreet}/>}
    {scr===S.DISCOVER&&<DiscoverScreen goTo={goTo} profile={profile}/>}
    {/* AIScreen always mounted, hidden when not active — preserves loading state */}
    {profile&&<div style={{display:scr===S.AI?'contents':'none'}}><AIScreen profile={profile} initialMode={aiMode} onUpdateProfile={p=>{setProfile(p);localStorage.setItem('yuanhe_profile',JSON.stringify(p))}}/></div>}
    {scr===S.MSGS&&<MsgsScreen convs={convs} refreshConvs={()=>setConvs(ChatStore.getAll())} openConvId={openConvId} setOpenConvId={setOpenConvId} setChatActive={setChatActive}/>}
    {scr===S.ME&&profile&&<MeScreen profile={profile} onLogout={()=>{localStorage.removeItem('yuanhe_profile');localStorage.removeItem('yuanhe_mode_results');setProfile(null);setScr(S.BIRTH)}} goTo={goTo} onEdit={()=>setScr(S.BIRTH)}/>}
    {showTabs&&<TabBar active={scr} onTap={s=>goTo(s)}/>}
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
