      <div style={{fontSize:14,fontWeight:600,opacity:.8}}>{today.getFullYear()}年{m}月{d}日</div>
      <div style={{textAlign:'center',margin:'20px 0'}}>
        <div style={{fontSize:48,fontWeight:900,letterSpacing:4}}>{luck}</div>
        <div style={{fontSize:12,opacity:.7,marginTop:4}}>{profile.name||'缘友'} 的今日运势</div>
      </div>
      <div style={{display:'flex',gap:12,marginBottom:16}}>
        <div style={{flex:1,background:'rgba(255,255,255,0.15)',borderRadius:12,padding:'10px 12px'}}>
          <div style={{fontSize:10,opacity:.6}}>宜</div>
          <div style={{fontSize:12,fontWeight:600,marginTop:4}}>{yi}</div>
        </div>
        <div style={{flex:1,background:'rgba(255,255,255,0.15)',borderRadius:12,padding:'10px 12px'}}>
          <div style={{fontSize:10,opacity:.6}}>忌</div>
          <div style={{fontSize:12,fontWeight:600,marginTop:4}}>{ji}</div>
        </div>
      </div>
      <div style={{display:'flex',gap:12,marginBottom:16}}>
        <div style={{background:'rgba(255,255,255,0.15)',borderRadius:10,padding:'8px 14px',display:'flex',alignItems:'center',gap:6}}>
          <div style={{width:16,height:16,borderRadius:4,background:luckyColor}}/>
          <span style={{fontSize:11}}>幸运色</span>
        </div>
        <div style={{background:'rgba(255,255,255,0.15)',borderRadius:10,padding:'8px 14px',fontSize:11}}>🔢 幸运数 {(d*3+7)%10}</div>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',opacity:.5}}>
        <span style={{fontSize:10}}>扫码查看详细运势</span>
        <span style={{fontSize:10}}>缘合 yuanhe.app</span>
      </div>
    </div>
  );
}

function ShareModal({type,profile,structured,partner,score,compatibility,onClose}){
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);
  const cardRef=useRef(null);

  const saveImage=async()=>{
    if(!cardRef.current||saving)return;
    setSaving(true);
    try{
      const canvas=await html2canvas(cardRef.current,{scale:2,backgroundColor:null,useCORS:true});
      const link=document.createElement('a');
      link.download=`yuanhe_${type}_${Date.now()}.png`;
      link.href=canvas.toDataURL('image/png');
      link.click();
      setSaved(true);
      setTimeout(()=>setSaved(false),2000);
    }catch(e){window.yuanheToast?.('保存失败，请重试')}
    setSaving(false);
  };

  return(
    <div style={{position:'fixed',inset:0,zIndex:500,background:'rgba(0,0,0,0.7)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{marginBottom:16,transform:'scale(0.9)',transformOrigin:'center'}}>
        <div ref={cardRef}>
          {type==='personality'&&<PersonalityShareCard profile={profile} structured={structured}/>}
          {type==='match'&&<MatchShareCard profile={profile} partner={partner} score={score} compatibility={compatibility}/>}
          {type==='fortune'&&<FortuneShareCard profile={profile}/>}
        </div>
      </div>
      <div style={{display:'flex',gap:12}}>
        <button onClick={saveImage} disabled={saving} style={{padding:'12px 28px',borderRadius:20,border:'none',background:saved?'#22C55E':'#fff',color:saved?'#fff':'#8B5CF6',fontSize:14,fontWeight:700,cursor:'pointer',boxShadow:'0 4px 16px rgba(0,0,0,0.2)'}}>
          {saving?'生成中…':saved?'✓ 已保存':'📥 保存图片'}
        </button>
        <button onClick={onClose} style={{padding:'12px 28px',borderRadius:20,border:'2px solid rgba(255,255,255,0.3)',background:'transparent',color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>关闭</button>
      </div>
    </div>
  );
}

// ===== TAB BAR =====
function TabBar({active,onTap}){
  const unread=ChatStore.totalUnread();
  const tabs=[{id:S.HOME,ic:p=><Icons.flame s={20} c={p}/>,label:"首页"},{id:S.DISCOVER,ic:p=><Icons.compass s={20} c={p}/>,label:"发现"},{id:S.AI,ic:null,label:"AI占卜",center:true},{id:S.MSGS,ic:p=><Icons.msgCircle s={20} c={p}/>,label:"消息",badge:unread},{id:S.ME,ic:p=><Icons.user s={20} c={p}/>,label:"我的"}];
  return(<div style={{position:'fixed',bottom:0,left:0,right:0,maxWidth:480,margin:'0 auto',height:60,background:T.card,borderTop:`1px solid ${T.border}`,display:'flex',alignItems:'center',justifyContent:'space-around',padding:'0 4px 0',zIndex:100}}>
    {tabs.map(tab=>{const act=active===tab.id;
      if(tab.center)return<button key={tab.id} onClick={()=>onTap(tab.id)} style={{background:`linear-gradient(135deg,${T.accent2},${T.accent2}DD)`,border:'none',borderRadius:22,width:44,height:44,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',boxShadow:`0 3px 12px ${T.accent2}40`,marginTop:-14}}><Icons.sparkles s={20} c="#fff"/></button>;
      return<button key={tab.id} onClick={()=>onTap(tab.id)} style={{background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:1,padding:'6px 12px',position:'relative',transition:'opacity .2s'}}>
        {tab.ic(act?T.accent2:T.textThi)}
        {tab.badge>0&&<div style={{position:'absolute',top:2,right:4,minWidth:16,height:16,borderRadius:8,background:T.primary,color:'#fff',fontSize:9,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 4px'}}>{tab.badge>99?'99+':tab.badge}</div>}
        <span style={{fontSize:10,color:act?T.accent2:T.textThi,fontWeight:act?600:400}}>{tab.label}</span>
        {act&&<div style={{position:'absolute',bottom:-1,width:16,height:2,borderRadius:1,background:T.accent2}}/>}
      </button>})}
  </div>);
}

// ===== APP =====
function App(){
  const [scr,setScr]=useState(S.SPLASH);
  const [profile,setProfile]=useState(()=>{try{const p=JSON.parse(localStorage.getItem('yuanhe_profile'));return p&&p.year?p:null}catch(e){return null}});
  const [aiMode,setAiMode]=useState(null);
  const [convs,setConvs]=useState(()=>ChatStore.getAll());
  const [chatActive,setChatActive]=useState(false);
  const [openConvId,setOpenConvId]=useState(null);
  const [globalToast,setGlobalToast]=useState('');
  const [themeMode,setThemeMode]=useState(getThemeMode);
  // Apply theme globally
  T=THEMES[themeMode];
  useEffect(()=>{document.body.style.background=T.bg;document.body.className=themeMode==='dark'?'dark':''},[themeMode]);
  const toggleTheme=()=>{const next=themeMode==='light'?'dark':'light';localStorage.setItem('yuanhe_theme',next);setThemeMode(next);T=THEMES[next]};
  const onboarded=!!localStorage.getItem('yuanhe_onboarded');
  const goTo=(s,m)=>{setScr(s);if(m)setAiMode(m)};
  const addConv=(user)=>{const c=ChatStore.create(user,profile);setConvs(ChatStore.getAll());return c};
  // Global toast — accessible from anywhere
  const toast=(msg)=>{setGlobalToast(msg);setTimeout(()=>setGlobalToast(''),2500)};
  window.yuanheToast=toast;
  // Auto-greet: AI sends first message after match
  const autoGreet=async(conv)=>{
    try{
      const r=await apiPost('/api/chat',{partner:conv.user,message:'[系统：你们刚刚匹配成功，请主动打个招呼，用一句话开启对话。要提到你们的缘分值'+conv.user.score+'%。]',history:[]});
      if(r.reply){ChatStore.addMessage(conv.id,{role:'ai',text:r.reply});setConvs(ChatStore.getAll())}
    }catch(e){}
  };

  // Bot proactive messages — bots initiate conversation after idle periods
  const BOT_PROACTIVE_PROMPTS=[
    '[系统：对方已经有一段时间没回复了。根据你的性格，主动发一条消息，可以分享你今天做了什么，或者问一个轻松的问题。]',
    '[系统：根据当前时间段，发一条应景的消息。早上说早安分享计划，中午聊吃什么，晚上聊今天的感受。简短自然。]',
    '[系统：分享一个和你兴趣爱好相关的小事，比如看到了什么、做了什么、想到了什么。像朋友圈一样自然。]',
  ];
  useEffect(()=>{
    if(!profile)return;
    const checkBots=()=>{
      const allConvs=ChatStore.getAll();
      allConvs.forEach(conv=>{
        if(!conv.user.isBot)return; // only bots
        if(conv.messages.length===0)return; // no messages yet, autoGreet handles this
        const lastMsg=conv.messages[conv.messages.length-1];
        const idleMs=Date.now()-(lastMsg.ts||0);
        const idleMin=idleMs/60000;
        // Send proactive message if idle 3-10 minutes (demo timing, production would be hours)
        if(idleMin<3||idleMin>30)return; // too recent or too old
        // Check if we already sent a proactive in this idle period
        const proactiveKey='yuanhe_bot_proactive_'+conv.id;
        const lastProactive=parseInt(localStorage.getItem(proactiveKey)||'0');
        if(Date.now()-lastProactive<180000)return; // max 1 proactive per 3 min
        // 25% chance each check (don't spam)
        if(Math.random()>0.25)return;
        // Send proactive message
        localStorage.setItem(proactiveKey,String(Date.now()));
        const prompt=BOT_PROACTIVE_PROMPTS[Math.floor(Math.random()*BOT_PROACTIVE_PROMPTS.length)];
        apiPost('/api/chat',{partner:conv.user,message:prompt,history:conv.messages.slice(-6)}).then(r=>{
          if(r.reply){ChatStore.addMessage(conv.id,{role:'ai',text:r.reply});setConvs(ChatStore.getAll())}
        }).catch(()=>{});
      });
    };
    const timer=setInterval(checkBots,60000); // check every 60s
    return()=>clearInterval(timer);
  },[profile]);
  const showTabs=[S.HOME,S.DISCOVER,S.AI,S.MSGS,S.ME].includes(scr)&&!chatActive;
  return(<div style={{maxWidth:480,margin:'0 auto',height:'100dvh',position:'relative',overflow:'hidden',background:T.bg,boxShadow:'0 0 40px rgba(0,0,0,0.08)'}}>
    {scr===S.SPLASH&&<Splash onDone={()=>setScr(profile?S.HOME:onboarded?S.BIRTH:S.ONBOARD)}/>}
    {scr===S.ONBOARD&&<OnboardingScreen onDone={()=>{localStorage.setItem('yuanhe_onboarded','1');setScr(S.BIRTH)}}/>}
    {scr===S.BIRTH&&!profile&&!localStorage.getItem('yuanhe_terms_accepted')&&<TermsModal onAccept={()=>{localStorage.setItem('yuanhe_terms_accepted','1');window.location.reload()}}/>}
    {scr===S.BIRTH&&<BirthScreen onSubmit={p=>{setProfile(p);setScr(S.HOME)}}/>}
    {scr===S.HOME&&profile&&<div key="home" style={{height:'100%'}}><HomeScreen profile={profile} goTo={goTo} addConv={addConv} setOpenConvId={setOpenConvId} autoGreet={autoGreet}/></div>}
    {scr===S.DISCOVER&&<div key="discover" style={{height:'100%'}}><DiscoverScreen goTo={goTo} profile={profile} onUpdateProfile={p=>{setProfile(p);localStorage.setItem('yuanhe_profile',JSON.stringify(p))}}/></div>}
    {/* AIScreen always mounted, hidden when not active — preserves loading state */}
    {profile&&<div style={{display:scr===S.AI?'contents':'none'}}><AIScreen profile={profile} initialMode={aiMode} onUpdateProfile={p=>{setProfile(p);localStorage.setItem('yuanhe_profile',JSON.stringify(p))}}/></div>}
    {scr===S.MSGS&&<div key="msgs" style={{height:'100%'}}><MsgsScreen convs={convs} refreshConvs={()=>setConvs(ChatStore.getAll())} openConvId={openConvId} setOpenConvId={setOpenConvId} setChatActive={setChatActive} profile={profile}/></div>}
    {scr===S.ME&&profile&&<div key="me" style={{height:'100%'}}><MeScreen profile={profile} onLogout={()=>{localStorage.removeItem('yuanhe_profile');localStorage.removeItem('yuanhe_mode_results');setProfile(null);setScr(S.BIRTH)}} goTo={goTo} onEdit={()=>setScr(S.BIRTH)} onUpdateProfile={p=>{setProfile(p);localStorage.setItem('yuanhe_profile',JSON.stringify(p))}} themeMode={themeMode} toggleTheme={toggleTheme}/></div>}
    {showTabs&&<TabBar active={scr} onTap={s=>goTo(s)}/>}
    {globalToast&&<div style={{position:'fixed',top:'38%',left:'50%',transform:'translateX(-50%)',background:'rgba(0,0,0,0.78)',color:'#fff',padding:'12px 28px',borderRadius:22,fontSize:13,fontWeight:500,zIndex:9999,animation:'toastIn .25s ease',maxWidth:'80%',textAlign:'center',backdropFilter:'blur(4px)'}}>{globalToast}</div>}
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
