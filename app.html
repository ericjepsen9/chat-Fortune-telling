  const chatEndRef=useRef(null);
  const activeConv=activeId?(ChatStore.getById(activeId)||convs.find(c=>c.id===activeId)):null;
  const scrollBottom=()=>setTimeout(()=>chatEndRef.current?.scrollIntoView({behavior:'smooth'}),100);

  // Quick phrases вҖ” user customizable
  const defaultPhrases=['дҪ еҘҪе‘Җрҹ‘Ӣ','еңЁеҝҷд»Җд№Ҳе‘ў','жҷҡе®үрҹҢҷ','е“Ҳе“Ҳе“Ҳрҹҳ„','еҘҪзҡ„рҹ‘Ң','еҗғйҘӯдәҶеҗ—','жғідҪ дәҶрҹ’•','е‘Ёжң«жңүз©әеҗ—','д»ҠеӨ©ејҖеҝғеҗ—рҹҳҠ','жӢңжӢң~'];
  const [quickPhrases,setQuickPhrases]=useState(()=>{try{const s=JSON.parse(localStorage.getItem('yuanhe_quick_phrases'));return s&&s.length>0?s:defaultPhrases}catch(e){return defaultPhrases}});
  const [editingPhrases,setEditingPhrases]=useState(false);
  const [newPhrase,setNewPhrase]=useState('');
  const savePhrase=()=>{if(newPhrase.trim()&&quickPhrases.length<20){const updated=[newPhrase.trim(),...quickPhrases];setQuickPhrases(updated);localStorage.setItem('yuanhe_quick_phrases',JSON.stringify(updated));setNewPhrase('')}};
  const removePhrase=(idx)=>{const updated=quickPhrases.filter((_,i)=>i!==idx);setQuickPhrases(updated);localStorage.setItem('yuanhe_quick_phrases',JSON.stringify(updated))};
  const resetPhrases=()=>{setQuickPhrases(defaultPhrases);localStorage.removeItem('yuanhe_quick_phrases');setEditingPhrases(false)};

  // Emoji panel data
  const EMOJI_GROUPS=[
    {label:'еёёз”Ё',emojis:['рҹҳҠ','рҹҳӮ','рҹҘ°','рҹҳҚ','рҹӨЈ','рҹҳҳ','рҹҳӯ','рҹҳ…','рҹҳҺ','рҹҘә','рҹҳҸ','рҹҳҢ','рҹӨ—','рҹҳҮ','рҹҷғ','рҹҳӢ']},
    {label:'зҲұеҝғ',emojis:['вқӨпёҸ','рҹ’•','рҹ’—','рҹ’–','рҹ’ҳ','рҹ’қ','рҹ’“','рҹҘ°','рҹҳҳ','рҹҳҚ','рҹ’‘','рҹ’Ҹ','рҹ«¶','рҹ’Ң','рҹҢ№','вңЁ']},
    {label:'жүӢеҠҝ',emojis:['рҹ‘Ӣ','рҹ‘Қ','рҹ‘Һ','вңҢпёҸ','рҹӨһ','рҹ‘Ң','рҹӨҹ','рҹҷҸ','рҹ’Ә','рҹ‘Ҹ','рҹ«°','рҹӨқ','вңӢ','рҹӨҡ','рҹ«¶','вҳқпёҸ']},
    {label:'иҮӘз„¶',emojis:['рҹҢё','рҹҢә','рҹҢ»','рҹҢ№','рҹҚҖ','рҹҢҷ','вӯҗ','рҹҢҲ','вҳҖпёҸ','рҹҢҠ','рҹ”Ҙ','вқ„пёҸ','рҹҢҝ','рҹҚғ','рҹҰӢ','рҹҗұ']},
  ];

  // Blacklist
  const getBlacklist=()=>{try{return JSON.parse(localStorage.getItem('yuanhe_blacklist')||'[]')}catch(e){return[]}};
  const blockUser=(userId)=>{const bl=getBlacklist();if(!bl.includes(userId)){bl.push(userId);localStorage.setItem('yuanhe_blacklist',JSON.stringify(bl));if(localStorage.getItem('yuanhe_token'))apiPost('/api/auth/blacklist',{blacklist:bl}).catch(()=>{})}};
  const unblockUser=(userId)=>{const bl=getBlacklist().filter(id=>id!==userId);localStorage.setItem('yuanhe_blacklist',JSON.stringify(bl));if(localStorage.getItem('yuanhe_token'))apiPost('/api/auth/blacklist',{blacklist:bl}).catch(()=>{})};
  const isBlocked=(userId)=>getBlacklist().includes(userId);

  // Toast helper
  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(''),2000)};

  // Image handler
  const sendImage=()=>{
    const input=document.createElement('input');
    input.type='file';input.accept='image/*';
    input.onchange=(e)=>{
      const file=e.target.files[0];if(!file)return;
      if(file.size>2*1024*1024){showToast('еӣҫзүҮдёҚиғҪи¶…иҝҮ2MB');return}
      const reader=new FileReader();
      reader.onload=(ev)=>{
        const img=ev.target.result;
        ChatStore.addMessage(activeConv.id,{role:'user',text:'[еӣҫзүҮ]',image:img});
        refreshConvs();scrollBottom();
        // зңҹе®һз”ЁжҲ·: йҖҡиҝҮWSеҸ‘йҖҒеӣҫзүҮ
        if(!activeConv.user.isBot&&WsManager.connected&&activeConv.user.realUserId){
          WsManager.send({type:'message',to:activeConv.user.realUserId,text:'[еӣҫзүҮ]',msgType:'image',mediaUrl:img});
          return;
        }
        // Bot reacts to image
        if(activeConv.user.isBot){
          setTimeout(async()=>{
            setTyping(true);
            await new Promise(r=>setTimeout(r,2000+Math.random()*3000));
            try{
              const r=await apiPost('/api/chat',{partner:activeConv.user,message:'[з”ЁжҲ·еҸ‘дәҶдёҖеј еӣҫзүҮз»ҷдҪ пјҢиҜ·иҮӘз„¶ең°еӣһеә”пјҢжҜ”еҰӮеӨёиөһжҲ–еҘҪеҘҮең°й—®жҳҜд»Җд№Ҳ]',history:(ChatStore.getById(activeConv.id)?.messages||[]).slice(-6)});
              ChatStore.addMessage(activeConv.id,{role:'ai',text:r.reply||'еҘҪеҘҪзңӢпјҒрҹ“ё'});
            }catch(e){ChatStore.addMessage(activeConv.id,{role:'ai',text:'еҘҪеҘҪзңӢпјҒрҹ“ё'})}
            setTyping(false);refreshConvs();scrollBottom();
          },1000);
        }
      };
      reader.readAsDataURL(file);
    };
    input.click();
  };

  // Voice recording
  const cancelledRef=useRef(false);
  const startRecording=async()=>{
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const recorder=new MediaRecorder(stream);
      const chunks=[];
      cancelledRef.current=false;
      recorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data)};
      recorder.onstop=()=>{
        stream.getTracks().forEach(t=>t.stop());
        clearInterval(recTimerRef.current);
        if(cancelledRef.current){setRecording(false);setRecordDuration(0);return}
        if(chunks.length===0){setRecording(false);setRecordDuration(0);return}
        const blob=new Blob(chunks,{type:recorder.mimeType||'audio/webm'});
        const reader=new FileReader();
        reader.onload=()=>{
          const dur=recordDuration||1;
          ChatStore.addMessage(activeConv.id,{role:'user',text:`[иҜӯйҹі ${dur}вҖі]`,voice:reader.result,voiceDur:dur});
          refreshConvs();scrollBottom();
          // зңҹе®һз”ЁжҲ·: йҖҡиҝҮWSеҸ‘йҖҒиҜӯйҹі
          if(!activeConv.user.isBot&&WsManager.connected&&activeConv.user.realUserId){
            WsManager.send({type:'message',to:activeConv.user.realUserId,text:`[иҜӯйҹі ${dur}вҖі]`,msgType:'voice',mediaUrl:reader.result,voiceDuration:dur});
          }else if(activeConv.user.isBot){
            setTimeout(async()=>{
              setTyping(true);
              await new Promise(r=>setTimeout(r,2000+Math.random()*2000));
              try{const r=await apiPost('/api/chat',{partner:activeConv.user,message:'[з”ЁжҲ·еҸ‘дәҶдёҖжқЎиҜӯйҹіж¶ҲжҒҜз»ҷдҪ пјҢиҜ·иҮӘз„¶ең°еӣһеә”]',history:(ChatStore.getById(activeConv.id)?.messages||[]).slice(-6)});
                ChatStore.addMessage(activeConv.id,{role:'ai',text:r.reply||'ж”¶еҲ°дҪ зҡ„иҜӯйҹіе•ҰпҪһ рҹҺө'});
              }catch(e){ChatStore.addMessage(activeConv.id,{role:'ai',text:'ж”¶еҲ°дҪ зҡ„иҜӯйҹіе•ҰпҪһ рҹҺө'})}
              setTyping(false);refreshConvs();scrollBottom();
            },1000);
          }
        };
        reader.readAsDataURL(blob);
        setRecording(false);setRecordDuration(0);
      };
      recorder.start();
      recorderRef.current=recorder;
      setRecording(true);setRecordDuration(0);
      recTimerRef.current=setInterval(()=>setRecordDuration(d=>{if(d>=59){stopRecording();return d}return d+1}),1000);
    }catch(e){showToast('ж— жі•и®ҝй—®йәҰе…ӢйЈҺ')}
  };
  const stopRecording=()=>{if(recorderRef.current?.state==='recording')recorderRef.current.stop()};
  const cancelRecording=()=>{cancelledRef.current=true;if(recorderRef.current?.state==='recording')recorderRef.current.stop();setRecording(false);setRecordDuration(0);clearInterval(recTimerRef.current);showToast('е·ІеҸ–ж¶Ҳ')};

  // Bot online status
  const getBotOnline=(bot)=>{
    if(!bot?.isBot)return true;
    const h=new Date().getHours();
    const seed=(bot.id*7+h*13)%100;
    if(h>=8&&h<=23)return seed<70;
    return seed<20;
  };
  // Fuzzy last online time
  const getLastOnlineText=(user)=>{
    if(!user?.isBot)return 'еңЁзәҝ';
    if(getBotOnline(user))return 'еңЁзәҝ';
    const seed=(user.id*11+new Date().getHours()*3)%100;
    if(seed<30)return 'еҲҡеҲҡеңЁзәҝ';
    if(seed<55)return '1е°Ҹж—¶еҶ…';
    if(seed<80)return 'д»ҠеӨ©еңЁзәҝиҝҮ';
    return 'жҳЁеӨ©еңЁзәҝ';
  };
  const isOnline=activeConv?(activeConv.user.realUserId?WsManager.isOnline(activeConv.user.realUserId):getBotOnline(activeConv.user)):false;
  // typing: Botзҡ„жЁЎжӢҹtyping жҲ– зңҹе®һз”ЁжҲ·зҡ„WS typing
  const showTyping=typing||(wsTypingFrom&&activeConv?.user?.realUserId===wsTypingFrom);

  // Notify App when entering/leaving chat detail
  useEffect(()=>{setChatActive(!!activeId);return()=>setChatActive(false)},[activeId]);
  useEffect(()=>{if(openConvId){setActiveId(openConvId);setOpenConvId(null)}},[openConvId]);
  // жү“ејҖдјҡиҜқж—¶ж Үи®°жң¬ең°е·ІиҜ»
  useEffect(()=>{if(activeConv){ChatStore.markRead(activeConv.id);refreshConvs()}},[activeId]);

  const sendMsg=async()=>{
    if(!chatInput.trim()||sending||!activeConv)return;
    const text=chatInput.trim();
    setChatInput('');
    setSending(true);
    ChatStore.addMessage(activeConv.id,{role:'user',text});
    refreshConvs();
    scrollBottom();

    const isBot=activeConv.user.isBot;

    if(!isBot&&WsManager.connected&&activeConv.user.realUserId){
      // === зңҹе®һз”ЁжҲ·: иө°WebSocketеҸ‘йҖҒ ===
      WsManager.send({type:'message',to:activeConv.user.realUserId,text});
      setSending(false);
      // дёҚзӯүеӣһеӨҚпјҢеӣһеӨҚйҖҡиҝҮWS messageдәӢд»¶ејӮжӯҘеҲ°иҫҫ(Step 3еӨ„зҗҶ)
    }else{
      // === Botз”ЁжҲ·: иө°LLMжЁЎжӢҹеӣһеӨҚ(дҝқжҢҒеҺҹжңүйҖ»иҫ‘) ===
      if(isBot){
        const readDelay=2000+Math.random()*5000;
        await new Promise(r=>setTimeout(r,readDelay));
        const thinkDelay=1000+Math.random()*3000;
        await new Promise(r=>setTimeout(r,thinkDelay));
        setTyping(true);
        const typeDelay=2000+Math.random()*4000;
        await new Promise(r=>setTimeout(r,typeDelay));
      }else{
        // йқһBotдҪҶWebSocketжңӘиҝһжҺҘ: fallbackеҲ°LLM
        setTyping(true);
        await new Promise(r=>setTimeout(r,1000+Math.random()*1500));
      }
      try{
        const freshConv=ChatStore.getById(activeConv.id);
        const r=await apiPost('/api/chat',{partner:activeConv.user,message:text,history:(freshConv?.messages||[]).slice(-10)});
        ChatStore.addMessage(activeConv.id,{role:'ai',text:r.reply||'рҹҳҠ'});
      }catch(e){ChatStore.addMessage(activeConv.id,{role:'ai',text:'[зҪ‘з»ңдёҚзЁіе®ҡпјҢиҜ·йҮҚиҜ•]'})}
      setTyping(false);setSending(false);
    }
    refreshConvs();scrollBottom();
  };

  if(activeConv){
    const freshConv=ChatStore.getById(activeConv.id)||activeConv;
    const msgs=freshConv.messages||[];
    const ice=getIcebreaker(freshConv);
    const iceShownKey='yuanhe_ice_'+activeConv.id;
    const handleIceAction=(type,userChoice,aiChoice)=>{
      if(type==='topic'){
        // User clicked "иҒҠиҝҷдёӘиҜқйўҳ" вҶ’ set as chat input hint
        setChatInput(userChoice);
        localStorage.setItem(iceShownKey,String(ice.shown));
      }else if(type==='daily'){
        localStorage.setItem(iceShownKey,String(ice.shown));
      }else{
        // compat/choose вҶ’ mark as shown after interaction
        localStorage.setItem(iceShownKey,String(ice.shown));
      }
    };
    return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:T.bg}}>
      {/* Chat header */}
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 16px',background:T.card,borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
        <button onClick={()=>{ChatStore.markRead(activeConv.id);refreshConvs();setActiveId(null);setSearchMode(false)}} style={{width:32,height:32,borderRadius:16,border:'none',background:T.bg,fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:T.textSec}}>вҶҗ</button>
        <div onClick={()=>setShowProfile(true)} style={{display:'flex',alignItems:'center',gap:10,flex:1,cursor:'pointer'}}>
          <div style={{width:38,height:38,borderRadius:19,background:'linear-gradient(135deg,#DDD6FE,#C4B5FD)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,position:'relative',flexShrink:0}}>
            {activeConv.user.gender==='female'?'рҹ‘©':'рҹ‘Ё'}
            <div style={{position:'absolute',bottom:0,right:0,width:10,height:10,borderRadius:5,background:isOnline?'#34D399':'#D1D5DB',border:`2px solid ${T.card}`}}/>
          </div>
          <div>
            <div style={{fontSize:16,fontWeight:700,color:T.text}}>{activeConv.user.name}</div>
            <div style={{fontSize:11,color:showTyping?T.accent2:isOnline?'#34D399':T.textThi}}>{showTyping?'жӯЈеңЁиҫ“е…ҘвҖҰ':isOnline?'еңЁзәҝ':'зҰ»зәҝ'} В· {activeConv.user.sign}</div>
          </div>
        </div>
        <button onClick={()=>{setActiveId(null);goTo(S.AI,'synastry')}} title="AIзјҳеҲҶеҲҶжһҗ" style={{width:32,height:32,borderRadius:16,border:'none',background:`${T.accent2}12`,fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>вңЁ</button>
        <button onClick={()=>setShowReport(true)} style={{width:32,height:32,borderRadius:16,border:'none',background:T.bg,fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:T.textThi}}>вӢҜ</button>
      </div>
      {/* Search bar */}
      {searchMode&&<div style={{padding:'8px 16px',background:T.card,borderBottom:`1px solid ${T.border}`,display:'flex',gap:8,alignItems:'center'}}>
        <input value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="жҗңзҙўиҒҠеӨ©и®°еҪ•вҖҰ" autoFocus style={{flex:1,padding:'8px 12px',borderRadius:20,border:`1.5px solid ${T.accent2}40`,background:T.bg,fontSize:13,outline:'none',color:T.text}}/>
        {searchQuery&&<button onClick={()=>setSearchQuery('')} style={{fontSize:12,color:T.accent2,background:'none',border:'none',cursor:'pointer',fontWeight:500}}>жё…з©ә</button>}
      </div>}
      <div style={{flex:1,overflow:'auto',padding:'12px 16px'}}>
        <div style={{textAlign:'center',marginBottom:16}}>
          <div style={{display:'inline-block',padding:'5px 14px',borderRadius:20,background:`${T.accent2}08`,fontSize:11,color:T.textThi}}>еҢ№й…ҚжҲҗеҠҹ рҹ’• ејҖе§ӢиҒҠеӨ©еҗ§</div>
        </div>
        {msgs.length===0&&!typing&&<div style={{textAlign:'center',padding:'40px 20px',color:T.textThi}}>
          <div style={{fontSize:36,marginBottom:12}}>рҹ‘Ӣ</div>
          <div style={{fontSize:14,fontWeight:500,color:T.text}}>жү“дёӘжӢӣе‘јеҗ§</div>
          <div style={{fontSize:12,marginTop:6}}>еҸ‘йҖҒз¬¬дёҖжқЎж¶ҲжҒҜејҖе§ӢиҒҠеӨ©</div>
        </div>}
        {searchMode&&searchQuery&&<div style={{fontSize:11,color:T.textThi,marginBottom:8}}>рҹ”Қ жҗңзҙў"{searchQuery}" вҖ” {msgs.filter(m=>!m.recalled&&m.text&&m.text.toLowerCase().includes(searchQuery.toLowerCase())).length}жқЎз»“жһң</div>}
        {(searchMode&&searchQuery?msgs.filter(m=>!m.recalled&&m.text&&m.text.toLowerCase().includes(searchQuery.toLowerCase())):msgs).map((msg,idx)=>(
          <div key={msg.id} className="anim-in" style={{display:'flex',justifyContent:msg.role==='user'?'flex-end':'flex-start',marginBottom:12}}>
            <div style={{maxWidth:'72%'}}>
              <div onClick={()=>{if(msg.role==='user'&&!msg.recalled&&!msg.image&&!msg.voice){const canRecall=Date.now()-(msg.ts||0)<120000;setMsgAction({id:msg.id,text:msg.text,canRecall})}else if(msg.role!=='user'&&!msg.recalled&&msg.text){navigator.clipboard?.writeText(msg.text);showToast('е·ІеӨҚеҲ¶')}}}
                style={{padding:msg.recalled?'6px 14px':msg.image?'4px':'10px 14px',borderRadius:msg.role==='user'?'18px 18px 4px 18px':'18px 18px 18px 4px',
                background:msg.recalled?'transparent':msg.role==='user'?`linear-gradient(135deg,${T.accent2},${T.accent2}CC)`:T.card,
                color:msg.recalled?T.textThi:msg.role==='user'?'#fff':T.text,fontSize:msg.recalled?11:14,lineHeight:1.7,fontStyle:msg.recalled?'italic':'normal',
                boxShadow:msg.recalled?'none':'0 1px 3px rgba(0,0,0,0.04)',overflow:'hidden',cursor:msg.role==='user'?'pointer':'default'}}>
                {msg.recalled?'ж¶ҲжҒҜе·Іж’Өеӣһ':msg.image?<img src={msg.image} loading="lazy" style={{maxWidth:'100%',borderRadius:14,display:'block'}}/>:msg.voice?
                  <div onClick={()=>{const a=new Audio(msg.voice);a.play();showToast('ж’ӯж”ҫдёӯвҖҰ')}} style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',minWidth:80+Math.min((msg.voiceDur||3)*8,120)}}>
                    <span style={{fontSize:16}}>в–¶пёҸ</span>
                    <div style={{flex:1,display:'flex',gap:2,alignItems:'center'}}>{[...Array(Math.max(4,Math.min(msg.voiceDur||3,14)))].map((_,i)=>{const h=4+((i*7+3)%12);return <div key={i} style={{width:3,height:h,borderRadius:2,background:msg.role==='user'?'rgba(255,255,255,0.5)':`${T.accent2}40`}}/>})}</div>
                    <span style={{fontSize:10,opacity:.6,flexShrink:0}}>{msg.voiceDur||0}вҖі</span>
                  </div>
                :msg.text}
              </div>
              {!msg.recalled&&msg.time&&<div style={{fontSize:10,color:T.textThi,marginTop:3,textAlign:msg.role==='user'?'right':'left',paddingLeft:msg.role==='user'?0:4,paddingRight:msg.role==='user'?4:0}}>{msg.time}</div>}
            </div>
          </div>
        ))}
        {/* Icebreaker card */}
        {ice&&!typing&&!sending&&<div className="anim-in">
          <IcebreakerCard type={ice.type} data={ice.data} onAction={(c,ac)=>handleIceAction(ice.type,c,ac)}/>
        </div>}
        {showTyping&&<div className="anim-in" style={{display:'flex',justifyContent:'flex-start',marginBottom:8}}>
          <div style={{padding:'12px 16px',borderRadius:'16px 16px 16px 4px',background:T.card,boxShadow:T.shadow}}>
            <div style={{display:'flex',gap:4,alignItems:'center'}}>
              <div style={{width:6,height:6,borderRadius:3,background:T.accent2,animation:'pulse 1s infinite'}}/>
              <div style={{width:6,height:6,borderRadius:3,background:T.accent2,animation:'pulse 1s infinite 0.2s'}}/>
              <div style={{width:6,height:6,borderRadius:3,background:T.accent2,animation:'pulse 1s infinite 0.4s'}}/>
            </div>
          </div>
        </div>}
        <div ref={chatEndRef} data-chat-end/>
      </div>
      {/* Quick phrases panel */}
      {showQuick&&!showEmoji&&<div style={{padding:'8px 16px',background:T.bg,borderTop:`1px solid ${T.border}`}}>
        {editingPhrases?<div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <span style={{fontSize:12,fontWeight:600,color:T.text}}>з®ЎзҗҶеҝ«жҚ·зҹӯиҜӯ</span>
            <div style={{display:'flex',gap:6}}>
              <button onClick={resetPhrases} style={{fontSize:10,color:T.textThi,background:'none',border:'none',cursor:'pointer'}}>жҒўеӨҚй»ҳи®Ө</button>
              <button onClick={()=>setEditingPhrases(false)} style={{fontSize:10,color:T.accent2,background:'none',border:'none',cursor:'pointer',fontWeight:600}}>е®ҢжҲҗ</button>
            </div>

function ReportModal({target,onClose}){
  const [reason,setReason]=useState('');const [done,setDone]=useState(false);

function ProfileEditModal({profile,onSave,onClose}){
  const [f,sF]=useState({name:profile.name||'',bio:profile.bio||'',city:profile.city||''});
  const [avatar,setAvatar]=useState(profile.avatar||(profile.gender==='female'?'рҹ‘©':'рҹ‘Ё'));
  const [showAvatarPick,setShowAvatarPick]=useState(false);
  const uploadPhoto=()=>{
    const input=document.createElement('input');input.type='file';input.accept='image/*';
    input.onchange=e=>{const file=e.target.files[0];if(!file)return;if(file.size>2*1024*1024){window.yuanheToast?.('еӣҫзүҮдёҚиғҪи¶…иҝҮ2MB');return}
      const reader=new FileReader();reader.onload=ev=>{setAvatar(ev.target.result);setShowAvatarPick(false)};reader.readAsDataURL(file)};
    input.click();
  };
  const is={width:'100%',padding:'12px 14px',border:`1.5px solid ${T.borderDark}`,borderRadius:12,fontSize:14,background:T.card,outline:'none',boxSizing:'border-box',color:T.text};
  const save=()=>{const updated={...profile,name:f.name||'зјҳеҸӢ',bio:f.bio,city:f.city,avatar};localStorage.setItem('yuanhe_profile',JSON.stringify(updated));onSave(updated)};

    <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:400,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:T.card,borderRadius:'24px 24px 0 0',width:'100%',maxWidth:480,animation:'slideUp .3s ease',padding:'20px 16px 30px',maxHeight:'90vh',overflow:'auto'}}>

        <div style={{textAlign:'center',marginBottom:20}}>
          <div onClick={()=>setShowAvatarPick(!showAvatarPick)} style={{width:72,height:72,borderRadius:36,margin:'0 auto',background:`linear-gradient(135deg,${T.accent2}20,${T.accent2}10)`,border:`2px solid ${T.accent2}30`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',position:'relative',overflow:avatar?.startsWith('data:')?'hidden':'visible',fontSize:32}}>

              <span style={{fontSize:10,color:'#fff'}}>рҹ“·</span>
            </div>
          </div>
          <div style={{fontSize:11,color:T.textThi,marginTop:6}}>зӮ№еҮ»жӣҙжҚўеӨҙеғҸ</div>
          {showAvatarPick&&<div style={{marginTop:10,background:T.bg,borderRadius:14,padding:12,border:`1px solid ${T.border}`}}>
            <button onClick={uploadPhoto} style={{width:'100%',padding:'10px',borderRadius:10,border:`1.5px dashed ${T.accent2}`,background:`${T.accent2}06`,color:T.accent2,fontSize:12,fontWeight:600,cursor:'pointer',marginBottom:10}}>рҹ“Ө дёҠдј з…§зүҮ</button>

function DataManagementModal({profile,onClose,onLogout}){
  const dataItems=[

    {key:'yuanhe_mode_results',label:'еҚ еҚңжҠҘе‘Ҡ',desc:Object.keys(JSON.parse(localStorage.getItem('yuanhe_mode_results')||'{}')).length+'жқЎ',icon:'рҹ”®'},
    {key:'yuanhe_history',label:'еҚ еҚңеҺҶеҸІ',desc:(JSON.parse(localStorage.getItem('yuanhe_history')||'[]')).length+'жқЎи®°еҪ•',icon:'рҹ“ң'},
    {key:'yuanhe_convs',label:'иҒҠеӨ©и®°еҪ•',desc:'жүҖжңүеҢ№й…ҚдјҡиҜқ+ж¶ҲжҒҜ',icon:'рҹ’¬'},
    {key:'yuanhe_blacklist',label:'й»‘еҗҚеҚ•',desc:(JSON.parse(localStorage.getItem('yuanhe_blacklist')||'[]')).length+'дәә',icon:'рҹҡ«'},
    {key:'yuanhe_privacy',label:'йҡҗз§Ғи®ҫзҪ®',desc:localStorage.getItem('yuanhe_privacy')||'standard',icon:'рҹ”җ'},
  ];
  const exportData=()=>{
    const data={};
    dataItems.forEach(d=>{try{data[d.key]=JSON.parse(localStorage.getItem(d.key)||'null')}catch(e){data[d.key]=localStorage.getItem(d.key)}});
    data._exportTime=new Date().toISOString();
    data._version='зјҳеҗҲ v0.7.0';
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const link=document.createElement('a');
    link.download=`yuanhe_data_${Date.now()}.json`;
    link.href=URL.createObjectURL(blob);
    link.click();
  };
  const deleteItem=(key,label)=>{
    window.yuanheConfirm(`зЎ®е®ҡеҲ йҷӨ${label}пјҹ`,()=>{
      localStorage.removeItem(key);

function App(){
  const [scr,setScr]=useState(S.SPLASH);
  const [authToken,setAuthToken]=useState(()=>localStorage.getItem('yuanhe_token')||null);
  const [profile,setProfile]=useState(()=>{try{const p=JSON.parse(localStorage.getItem('yuanhe_profile'));return p&&p.year?p:null}catch(e){return null}});
  const [aiMode,setAiMode]=useState(null);
  const [convs,setConvs]=useState(()=>ChatStore.getAll());
  const [chatActive,setChatActive]=useState(false);
  const [openConvId,setOpenConvId]=useState(null);
  const [globalToast,setGlobalToast]=useState('');
  const [themeMode,setThemeMode]=useState(getThemeMode);
  // Apply theme globally
  T=THEMES[themeMode];
  useEffect(()=>{const s=document.body.style;s.background=T.bg;s.color=T.text;document.body.className=themeMode==='dark'?'dark':'';const r=document.documentElement.style;r.setProperty('--yuanhe-bg',T.bg);r.setProperty('--yuanhe-card',T.card);r.setProperty('--yuanhe-text',T.text);r.setProperty('--yuanhe-textSec',T.textSec);r.setProperty('--yuanhe-border',T.border)},[themeMode]);
  const toggleTheme=()=>{const next=themeMode==='light'?'dark':'light';localStorage.setItem('yuanhe_theme',next);setThemeMode(next);T=THEMES[next]};
  // WebSocket: зҷ»еҪ•еҗҺиҮӘеҠЁиҝһжҺҘпјҢйҖҖеҮәж—¶ж–ӯејҖ
  useEffect(()=>{
    if(authToken){WsManager.connect(authToken)}
    else{WsManager.disconnect()}
    return()=>WsManager.disconnect();
  },[authToken]);

  const [termsAccepted,setTermsAccepted]=useState(()=>!!localStorage.getItem('yuanhe_terms_accepted'));
  const onboarded=!!localStorage.getItem('yuanhe_onboarded');
  const goTo=(s,m)=>{setScr(s);if(m)setAiMode(m)};
  const addConv=(user)=>{const c=ChatStore.create(user,profile);setConvs(ChatStore.getAll());return c};
  // Global toast вҖ” accessible from anywhere
  const toast=(msg)=>{setGlobalToast(msg);setTimeout(()=>setGlobalToast(''),2500)};
  window.yuanheToast=toast;
  // Global confirm dialog вҖ” replaces native confirm()
  const [confirmDlg,setConfirmDlg]=useState(null); // {msg,detail,onOk,danger}
  window.yuanheConfirm=(msg,onOk,opts={})=>{setConfirmDlg({msg,onOk,detail:opts.detail||'',danger:opts.danger!==false})};
  window.yuanheAlert=(msg)=>{setConfirmDlg({msg,onOk:null,detail:'',danger:false})};
  // Auto-greet: AI sends first message after match
  const autoGreet=async(conv)=>{
    try{
      const r=await apiPost('/api/chat',{partner:conv.user,message:'[зі»з»ҹпјҡдҪ д»¬еҲҡеҲҡеҢ№й…ҚжҲҗеҠҹпјҢиҜ·дё»еҠЁжү“дёӘжӢӣе‘јпјҢз”ЁдёҖеҸҘиҜқејҖеҗҜеҜ№иҜқгҖӮиҰҒжҸҗеҲ°дҪ д»¬зҡ„зјҳеҲҶеҖј'+conv.user.score+'%гҖӮ]',history:[]});
      if(r.reply){ChatStore.addMessage(conv.id,{role:'ai',text:r.reply});setConvs(ChatStore.getAll())}
    }catch(e){}
  };

  // з»ҹдёҖзҡ„profileжӣҙж–°+еҗҢжӯҘ
  const saveProfile=useCallback((p)=>{
    setProfile(p);
    localStorage.setItem('yuanhe_profile',JSON.stringify(p));
    if(authToken)apiPost('/api/auth/profile',p).catch(()=>{});
  },[authToken]);

  // Bot proactive messages вҖ” bots initiate conversation after idle periods
  const BOT_PROACTIVE_PROMPTS=[
    '[зі»з»ҹпјҡеҜ№ж–№е·Із»ҸжңүдёҖж®өж—¶й—ҙжІЎеӣһеӨҚдәҶгҖӮж №жҚ®дҪ зҡ„жҖ§ж јпјҢдё»еҠЁеҸ‘дёҖжқЎж¶ҲжҒҜпјҢеҸҜд»ҘеҲҶдә«дҪ д»ҠеӨ©еҒҡдәҶд»Җд№ҲпјҢжҲ–иҖ…й—®дёҖдёӘиҪ»жқҫзҡ„й—®йўҳгҖӮ]',
    '[зі»з»ҹпјҡж №жҚ®еҪ“еүҚж—¶й—ҙж®өпјҢеҸ‘дёҖжқЎеә”жҷҜзҡ„ж¶ҲжҒҜгҖӮж—©дёҠиҜҙж—©е®үеҲҶдә«и®ЎеҲ’пјҢдёӯеҚҲиҒҠеҗғд»Җд№ҲпјҢжҷҡдёҠиҒҠд»ҠеӨ©зҡ„ж„ҹеҸ—гҖӮз®ҖзҹӯиҮӘз„¶гҖӮ]',
    '[зі»з»ҹпјҡеҲҶдә«дёҖдёӘе’ҢдҪ е…ҙи¶ЈзҲұеҘҪзӣёе…ізҡ„е°ҸдәӢпјҢжҜ”еҰӮзңӢеҲ°дәҶд»Җд№ҲгҖҒеҒҡдәҶд»Җд№ҲгҖҒжғіеҲ°дәҶд»Җд№ҲгҖӮеғҸжңӢеҸӢеңҲдёҖж ·иҮӘз„¶гҖӮ]',
  ];
  useEffect(()=>{
    if(!profile)return;
    const checkBots=()=>{
      const allConvs=ChatStore.getAll();
      allConvs.forEach(conv=>{
        if(!conv.user.isBot)return; // only bots
        if(conv.messages.length===0)return; // no messages yet, autoGreet handles this
        const lastMsg=conv.messages[conv.messages.length-1];
        const idleMs=Date.now()-(lastMsg.ts||0);
        const idleMin=idleMs/60000;
        // Send proactive message if idle 3-10 minutes (demo timing, production would be hours)
        if(idleMin<3||idleMin>30)return; // too recent or too old
        // Check if we already sent a proactive in this idle period
        const proactiveKey='yuanhe_bot_proactive_'+conv.id;
        const lastProactive=parseInt(localStorage.getItem(proactiveKey)||'0');
        if(Date.now()-lastProactive<180000)return; // max 1 proactive per 3 min
        // 25% chance each check (don't spam)
        if(Math.random()>0.25)return;
        // Send proactive message
        localStorage.setItem(proactiveKey,String(Date.now()));
        const prompt=BOT_PROACTIVE_PROMPTS[Math.floor(Math.random()*BOT_PROACTIVE_PROMPTS.length)];
        apiPost('/api/chat',{partner:conv.user,message:prompt,history:conv.messages.slice(-6)}).then(r=>{
          if(r.reply){ChatStore.addMessage(conv.id,{role:'ai',text:r.reply});setConvs(ChatStore.getAll())}
        }).catch(()=>{});
      });
    };
    const timer=setInterval(checkBots,60000); // check every 60s
    return()=>clearInterval(timer);
  },[profile]);
  const showTabs=[S.HOME,S.DISCOVER,S.AI,S.MSGS,S.ME].includes(scr)&&!chatActive;
  return(<div style={{maxWidth:480,margin:'0 auto',height:'100dvh',position:'relative',overflow:'hidden',background:T.bg,boxShadow:'0 0 40px rgba(0,0,0,0.08)'}}>
    {scr===S.SPLASH&&<Splash onDone={()=>{
      if(authToken&&profile)setScr(S.HOME);
      else if(authToken&&!profile)setScr(onboarded?S.BIRTH:S.ONBOARD);
      else setScr(S.LOGIN);
    }}/>}
    {scr===S.LOGIN&&<LoginScreen onLogin={({token,isNew,user})=>{
      setAuthToken(token);
      // зҷ»еҪ•еҗҺеҗҢжӯҘж•°жҚ®
      const syncData=async()=>{
        try{
          // й»‘еҗҚеҚ•: жңҚеҠЎеҷЁвҶ’жң¬ең°
          const bl=await apiGet('/api/auth/blacklist');
          if(Array.isArray(bl)&&bl.length>0)localStorage.setItem('yuanhe_blacklist',JSON.stringify(bl));
          else{const local=JSON.parse(localStorage.getItem('yuanhe_blacklist')||'[]');if(local.length>0)apiPost('/api/auth/blacklist',{blacklist:local}).catch(()=>{})}
          // ж”¶и—Ҹ: жңҚеҠЎеҷЁвҶ’жң¬ең°
          const fav=await apiGet('/api/auth/favorites');
          if(fav&&Object.keys(fav).length>0){Object.entries(fav).forEach(([k,v])=>localStorage.setItem(k,typeof v==='string'?v:JSON.stringify(v)))}
        }catch(e){}
      };
      if(user.profile&&user.profile.year){
        setProfile(user.profile);localStorage.setItem('yuanhe_profile',JSON.stringify(user.profile));syncData();setScr(S.HOME);
      }else if(!isNew&&profile){
        apiPost('/api/auth/profile',profile).catch(()=>{});syncData();setScr(S.HOME);
      }else{
        setScr(onboarded?S.BIRTH:S.ONBOARD);
      }
    }}/>}
    {scr===S.ONBOARD&&<OnboardingScreen onDone={()=>{localStorage.setItem('yuanhe_onboarded','1');setScr(S.BIRTH)}}/>}
    {scr===S.BIRTH&&!profile&&!termsAccepted&&<TermsModal onAccept={()=>{localStorage.setItem('yuanhe_terms_accepted','1');setTermsAccepted(true)}}/>}
    {scr===S.BIRTH&&<BirthScreen onSubmit={p=>{saveProfile(p);setScr(S.HOME)}}/>}
    {scr===S.HOME&&profile&&<div key="home" style={{height:'100%'}}><HomeScreen profile={profile} goTo={goTo} addConv={addConv} setOpenConvId={setOpenConvId} autoGreet={autoGreet}/></div>}
    {scr===S.DISCOVER&&<div key="discover" style={{height:'100%'}}><DiscoverScreen goTo={goTo} profile={profile} onUpdateProfile={saveProfile}/></div>}
    {/* AIScreen always mounted, hidden when not active вҖ” preserves loading state */}
    {profile&&<div style={{display:scr===S.AI?'contents':'none'}}><AIScreen profile={profile} initialMode={aiMode} onUpdateProfile={saveProfile}/></div>}
    {scr===S.MSGS&&<div key="msgs" style={{height:'100%'}}><MsgsScreen convs={convs} refreshConvs={()=>setConvs(ChatStore.getAll())} openConvId={openConvId} setOpenConvId={setOpenConvId} setChatActive={setChatActive} profile={profile} goTo={goTo}/></div>}
    {scr===S.ME&&profile&&<div key="me" style={{height:'100%'}}><MeScreen profile={profile} onLogout={()=>{window.yuanheConfirm('зЎ®е®ҡйҖҖеҮәзҷ»еҪ•пјҹ',()=>{const keys=Object.keys(localStorage).filter(k=>k.startsWith('yuanhe_'));keys.forEach(k=>localStorage.removeItem(k));setAuthToken(null);setProfile(null);setScr(S.LOGIN)},{detail:'йҖҖеҮәеҗҺжң¬ең°ж•°жҚ®е°Ҷиў«жё…йҷӨ'})}} goTo={goTo} onEdit={()=>setScr(S.BIRTH)} onUpdateProfile={saveProfile} themeMode={themeMode} toggleTheme={toggleTheme}/></div>}
    {showTabs&&<TabBar active={scr} onTap={s=>goTo(s)}/>}
    {globalToast&&<div style={{position:'fixed',top:'38%',left:'50%',transform:'translateX(-50%)',background:'rgba(0,0,0,0.78)',color:'#fff',padding:'12px 28px',borderRadius:22,fontSize:13,fontWeight:500,zIndex:9999,animation:'toastIn .25s ease',maxWidth:'80%',textAlign:'center',backdropFilter:'blur(4px)'}}>{globalToast}</div>}
    {/* Global confirm dialog */}
    {confirmDlg&&<div onClick={()=>setConfirmDlg(null)} style={{position:'fixed',inset:0,zIndex:9998,background:'rgba(0,0,0,0.45)',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div onClick={e=>e.stopPropagation()} style={{background:T.card,borderRadius:20,padding:'24px 20px 16px',width:'100%',maxWidth:300,textAlign:'center',animation:'scaleIn .2s ease',boxShadow:'0 8px 32px rgba(0,0,0,0.15)'}}>
        <div style={{fontSize:15,fontWeight:600,color:T.text,lineHeight:1.6,marginBottom:confirmDlg.detail?8:20}}>{confirmDlg.msg}</div>
        {confirmDlg.detail&&<div style={{fontSize:12,color:T.textThi,lineHeight:1.6,marginBottom:20}}>{confirmDlg.detail}</div>}
        <div style={{display:'flex',gap:10}}>
          {confirmDlg.onOk?<>
            <button onClick={()=>setConfirmDlg(null)} style={{flex:1,padding:'12px',borderRadius:12,border:'none',background:T.bg,fontSize:14,color:T.textSec,cursor:'pointer',fontWeight:500}}>еҸ–ж¶Ҳ</button>
            <button onClick={()=>{confirmDlg.onOk();setConfirmDlg(null)}} style={{flex:1,padding:'12px',borderRadius:12,border:'none',background:confirmDlg.danger?T.primary:T.accent2,fontSize:14,color:'#fff',cursor:'pointer',fontWeight:600}}>зЎ®е®ҡ</button>
          </>:<button onClick={()=>setConfirmDlg(null)} style={{flex:1,padding:'12px',borderRadius:12,border:'none',background:T.accent2,fontSize:14,color:'#fff',cursor:'pointer',fontWeight:600}}>зҹҘйҒ“дәҶ</button>}
        </div>
      </div>
    </div>}
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
