const ChatStore={
  _key:'yuanhe_conversations',
  load(){try{return JSON.parse(localStorage.getItem(this._key)||'[]')}catch(e){return[]}},
  save(convs){try{localStorage.setItem(this._key,JSON.stringify(convs))}catch(e){}},
  getAll(){return this.load()},
  getById(id){return this.load().find(c=>c.id===id)||null},
  // Create new conversation (if not exists for this user)
  create(user,profile){
    const convs=this.load();
    const existing=convs.find(c=>c.user.id===user.id);
    if(existing)return existing;
    const conv={
      id:'conv_'+user.id+'_'+Date.now(),
      user:{id:user.id,name:user.name,age:user.age,gender:user.gender,sign:user.sign,bio:user.bio,tags:user.tags||[],score:user.score,year:user.year,month:user.month,day:user.day,hour:user.hour,isBot:user.isBot||false,chatStyle:user.chatStyle||''},
      messages:[],
      unread:0,
      lastMessage:'',
      lastTime:new Date().toISOString(),
      createdAt:new Date().toISOString(),
    };
    convs.unshift(conv);
    this.save(convs);
    return conv;
  },
  // Add message to conversation
  addMessage(convId,msg){
    const convs=this.load();
    const conv=convs.find(c=>c.id===convId);
    if(!conv)return null;
    const message={id:'msg_'+Date.now()+'_'+Math.random().toString(36).substr(2,4),role:msg.role,text:msg.text,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),ts:Date.now()};
    if(msg.image)message.image=msg.image;
    conv.messages.push(message);
    conv.lastMessage=msg.image?'[图片]':msg.text.substring(0,50);
    conv.lastTime=new Date().toISOString();
    if(msg.role==='ai')conv.unread=(conv.unread||0)+1;
    this.save(convs);
    return message;
  },
  // Recall a message (within 2 minutes)
  recallMessage(convId,msgId){
    const convs=this.load();
    const conv=convs.find(c=>c.id===convId);
    if(!conv)return;
    const msg=conv.messages.find(m=>m.id===msgId);
    if(msg){msg.recalled=true;msg.text='';delete msg.image;conv.lastMessage='消息已撤回';this.save(convs)}
  },
  // Mark conversation as read
  markRead(convId){
    const convs=this.load();
    const conv=convs.find(c=>c.id===convId);
    if(conv){conv.unread=0;this.save(convs)}
  },
  // Get total unread count
  totalUnread(){return this.load().reduce((sum,c)=>sum+(c.unread||0),0)},
};

function ScoreRing({score,size=60,stroke=4}){

// Haptic feedback (vibration API)
function haptic(type='light'){
  if(!navigator.vibrate)return;
  if(type==='light')navigator.vibrate(10);
  else if(type==='medium')navigator.vibrate(20);
  else if(type==='heavy')navigator.vibrate([30,10,30]);
  else if(type==='success')navigator.vibrate([10,30,10]);
}
// Pull-to-refresh hook
function usePullRefresh(onRefresh){
  const [pulling,setPulling]=useState(false);
  const [pullDist,setPullDist]=useState(0);
  const startY=useRef(0);const scrollRef=useRef(null);
  const onTouchStart=(e)=>{if(scrollRef.current?.scrollTop<=0)startY.current=e.touches[0].clientY};
  const onTouchMove=(e)=>{if(startY.current===0)return;const dy=e.touches[0].clientY-startY.current;if(dy>0&&scrollRef.current?.scrollTop<=0){setPullDist(Math.min(dy*0.4,60));if(dy>80)setPulling(true)}};
  const onTouchEnd=()=>{if(pulling&&onRefresh){onRefresh();haptic('medium')}setPullDist(0);setPulling(false);startY.current=0};
  const pullIndicator=pullDist>5?React.createElement('div',{style:{textAlign:'center',padding:`${Math.min(pullDist,50)}px 0 8px`,transition:pulling?'none':'padding .3s',fontSize:12,color:T.textThi}},pulling?'🔄 松手刷新':'↓ 下拉刷新'):null;
  return{scrollRef,onTouchStart,onTouchMove,onTouchEnd,pullIndicator};
}

// Simulates real user count — in production this comes from backend
function getBotConfig(){
  const realUserCount=USERS.length; // 12 real users currently
  // Ratio rules: fewer real users → more bots
  let botRatio,label;
  if(realUserCount<100){botRatio=0.8;label='冷启动(80%机器人)'}
  else if(realUserCount<1000){botRatio=0.5;label='成长期(50%机器人)'}

  return{realUserCount,botRatio,label};
}

// ===== DAILY STATUS (今日状态) =====
function DailyStatusModal({profile,onClose}){
  const now=new Date();
  const [selDate,setSelDate]=useState(now);
  const [viewMonth,setViewMonth]=useState(now.getMonth());
  const [viewYear,setViewYear]=useState(now.getFullYear());

  const TG=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  const DZ=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  const WX_TG={甲:'木',乙:'木',丙:'火',丁:'火',戊:'土',己:'土',庚:'金',辛:'金',壬:'水',癸:'水'};
  const WX_DOT={木:'#22C55E',火:'#EF4444',土:'#D97706',金:'#9CA3AF',水:'#3B82F6'};
  const wxThemes={
    木:{theme:'成长·突破',color:'#22C55E',bg:'#ECFDF5',keywords:['学习','拓展','尝试新事物','接触自然'],relation:['主动表达感受','适合认识新朋友','多倾听对方的想法'],action:['列出本周目标','学一个新技能','去户外走走']},
    火:{theme:'表达·行动',color:'#EF4444',bg:'#FEF2F2',keywords:['独处','反思','整理','沉淀'],relation:['避免情绪波动时做承诺','适合与老朋友深度对话','给自己和伴侣一些空间'],action:['写下困扰你的三件事','用10分钟冥想静坐','整理社交关系清单']},
    土:{theme:'稳定·积累',color:'#D97706',bg:'#FFFBEB',keywords:['踏实','规划','耐心','沉稳'],relation:['适合讨论未来规划','给对方安全感','避免急于求成'],action:['整理财务记录','制定长期计划','做一顿用心的饭']},
    金:{theme:'决断·收获',color:'#6B7280',bg:'#F9FAFB',keywords:['果断','取舍','效率','简化'],relation:['适合解决悬而未决的问题','坦诚沟通比委婉更好','尊重彼此的边界'],action:['清理不需要的物品','做一个重要决定','完成拖延的任务']},
    水:{theme:'智慧·流动',color:'#3B82F6',bg:'#EFF6FF',keywords:['灵感','直觉','适应','变通'],relation:['用心感受对方的情绪','适合浪漫的小惊喜','保持神秘感'],action:['写日记记录灵感','听一张新专辑','泡澡或散步放空']},
  };

  // Get day pillar for any date
  const getDayInfo=(date)=>{
    const y=date.getFullYear(),m=date.getMonth()+1,d=date.getDate();
    const jd=Math.floor(367*y-Math.floor(7*(y+Math.floor((m+9)/12))/4)+Math.floor(275*m/9)+d+1721013.5);
    const tg=TG[(jd+9)%10],dz=DZ[(jd+1)%12];
    const wx=WX_TG[tg];
    return{tg,dz,wx,theme:wxThemes[wx]||wxThemes['火']};
  };

  // Calendar grid
  const firstDay=new Date(viewYear,viewMonth,1).getDay();
  const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();
  const calDays=[];
  for(let i=0;i<firstDay;i++)calDays.push(null);
  for(let i=1;i<=daysInMonth;i++)calDays.push(i);

  const isToday=(d)=>d===now.getDate()&&viewMonth===now.getMonth()&&viewYear===now.getFullYear();
  const isSel=(d)=>d===selDate.getDate()&&viewMonth===selDate.getMonth()&&viewYear===selDate.getFullYear();
  const prevMonth=()=>{if(viewMonth===0){setViewYear(viewYear-1);setViewMonth(11)}else setViewMonth(viewMonth-1)};
  const nextMonth=()=>{if(viewMonth===11){setViewYear(viewYear+1);setViewMonth(0)}else setViewMonth(viewMonth+1)};

function HomeScreen({profile,goTo,addConv,setOpenConvId,autoGreet}){

    const tg=profile.gender==='male'?'female':'male';
    const {botRatio}=getBotConfig();
    const realCards=USERS.filter(u=>u.gender===tg);
    if(botRatio<=0)return realCards.sort(()=>Math.random()-0.5);
    const botPool=BOTS.filter(u=>u.gender===tg).sort(()=>Math.random()-0.5);
    const botCount=Math.round(realCards.length*(botRatio/(1-botRatio)));
    const selectedBots=botPool.slice(0,Math.min(botCount,botPool.length));
    return[...realCards,...selectedBots].sort(()=>Math.random()-0.5);
  });
  const [matchUser,setMatchUser]=useState(null);

  const [swiped,setSwiped]=useState(0);

  useEffect(()=>{

    const realCands=USERS.filter(u=>u.gender===tg);
    const botPool=BOTS.filter(u=>u.gender===tg).sort(()=>Math.random()-0.5);
    const botCount=botRatio>0?Math.round(realCands.length*(botRatio/(1-botRatio))):0;
    const cands=[...realCands,...botPool.slice(0,Math.min(botCount,botPool.length))];
    apiPost('/api/batch-match',{profile,candidates:cands}).then(results=>{
      if(results&&results.length>0){

// ===== WUXING RADAR (SVG五行雷达图) =====
function WuxingRadar({data,size=140}){
  if(!data)return null;
  const pad=24; // padding for labels
  const vw=size+pad*2;
  const cx=vw/2,cy=vw/2,r=size*0.34;
  const labels=['木','火','土','金','水'];
  const dotColors=['#86EFAC','#FCA5A5','#FCD34D','#E2E8F0','#93C5FD']; // softer dots on purple
  const labelColors=['#D1FAE5','#FEE2E2','#FEF3C7','#F1F5F9','#DBEAFE']; // light label colors
  const vals=labels.map(l=>data[l]||0);
  const max=Math.max(...vals,1);
  const pts=labels.map((_,i)=>{
    const a=Math.PI*2*i/5-Math.PI/2;
    const v=(vals[i]/max)*r;
    return[cx+v*Math.cos(a),cy+v*Math.sin(a)];
  });
  const poly=pts.map(p=>p.join(',')).join(' ');
  const gridLevels=[0.25,0.5,0.75,1];
  return(
    <svg width={size} height={size} viewBox={`0 0 ${vw} ${vw}`}>
      {/* Grid */}
      {gridLevels.map(gl=>(
        <polygon key={gl} points={labels.map((_,i)=>{const a=Math.PI*2*i/5-Math.PI/2;return`${cx+r*gl*Math.cos(a)},${cy+r*gl*Math.sin(a)}`}).join(' ')}
          fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth={0.5}/>
      ))}
      {/* Axes */}
      {labels.map((_,i)=>{const a=Math.PI*2*i/5-Math.PI/2;return<line key={i} x1={cx} y1={cy} x2={cx+r*Math.cos(a)} y2={cy+r*Math.sin(a)} stroke="rgba(255,255,255,0.08)" strokeWidth={0.5}/>})}
      {/* Data polygon */}
      <polygon points={poly} fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.7)" strokeWidth={1.5}/>
      {/* Data points */}
      {pts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r={3} fill={dotColors[i]} stroke="rgba(255,255,255,0.6)" strokeWidth={1}/>)}
      {/* Labels */}
      {labels.map((l,i)=>{const a=Math.PI*2*i/5-Math.PI/2;const lx=cx+(r+14)*Math.cos(a);const ly=cy+(r+14)*Math.sin(a);return<text key={l} x={lx} y={ly} fill={labelColors[i]} fontSize={11} fontWeight={700} textAnchor="middle" dominantBaseline="central">{l}</text>})}
    </svg>
  );
}

function TarotModal({spread,setSpread,cards,setCards,pool,onDone,onClose}){

          <div style={{marginBottom:12}}>

            {q.sub&&<div style={{fontSize:12,color:'#6B7280'}}>{q.sub}</div>}
          </div>
          {/* Options */}
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {q.opts.map(o=>{

                {o.d&&<div style={{fontSize:11,color:'#6B7280',marginTop:2}}>{o.d}</div>}
              </button>;
            })}
          </div>
          {/* Back */}
          {step>0&&<button onClick={()=>setStep(step-1)} style={{marginTop:12,background:'none',border:'none',fontSize:13,color:'#6B7280',cursor:'pointer'}}>← 上一题</button>}
          {/* Steps indicator */}
          <div style={{display:'flex',justifyContent:'center',gap:6,marginTop:16}}>
            {questions.map((_,i)=><div key={i} style={{width:i===step?20:8,height:8,borderRadius:4,background:i<step?'#D97706':i===step?'#F59E0B':'#E5E7EB',transition:'all .3s'}}/>)}

        {/* Loading */}
        {loading&&<div style={{textAlign:'center',padding:'40px 20px'}}>

          <div style={{fontSize:12,color:'#6B7280',marginTop:6}}>综合五维特征匹配12个候选时辰</div>
        </div>}

        {/* Result */}
        {result&&!result.error&&<div>

            <button onClick={()=>{setMhNum1(String(Math.floor(Math.random()*100)+1));setMhNum2(String(Math.floor(Math.random()*100)+1))}} style={{width:50,borderRadius:10,border:'2px dashed #D9770640',background:'rgba(255,255,255,0.7)',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2,flexShrink:0}}>
              <div style={{fontSize:20}}>🎲</div><div style={{fontSize:9,color:'#D97706',fontWeight:600}}>掷骰</div>
            </button>
            <div style={{flex:1,display:'flex',gap:8}}>
              {[['上卦',mhNum1,setMhNum1],['下卦',mhNum2,setMhNum2]].map(([l,v,s])=>(
                <div key={l} style={{flex:1}}>
                  <div style={{fontSize:10,color:'#D97706',marginBottom:2,fontWeight:600}}>{l}</div>
                  <input type="number" value={v} onChange={e=>s(e.target.value)} placeholder="自动" style={{width:'100%',padding:'7px 4px',border:'1.5px solid #FCD34D',borderRadius:8,fontSize:14,textAlign:'center',background:T.card,outline:'none',fontWeight:700,color:'#D97706'}}/>
                </div>
              ))}
            </div>
            {(mhNum1||mhNum2)&&<button onClick={()=>{setMhNum1('');setMhNum2('')}} style={{alignSelf:'center',background:'none',border:'none',fontSize:16,color:'#D97706',cursor:'pointer',opacity:.4}}>✕</button>}
          </div>
        </div>}

        {/* Pair */}
        {isPair&&<div className="anim-in" style={{background:'linear-gradient(135deg,#FDF2F8,#FCE7F3)',border:'1px solid #DB277730',borderRadius:16,padding:14,marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <span style={{fontSize:14,fontWeight:700,color:'#DB2777'}}>💑 对方出生信息</span>
            <div style={{display:'flex',gap:4}}>{[{v:'female',l:'♀'},{v:'male',l:'♂'}].map(g=><button key={g.v} onClick={()=>setP2({...p2,gender:g.v})} style={{width:28,height:28,borderRadius:14,border:'none',cursor:'pointer',fontSize:12,background:p2.gender===g.v?'#DB2777':'#f0e0f5',color:p2.gender===g.v?'#fff':'#999'}}>{g.l}</button>)}</div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:6}}>
            {[['年','year'],['月','month'],['日','day'],['时','hour']].map(([l,k])=><div key={k} style={{textAlign:'center'}}>
              <div style={{fontSize:10,color:'#DB2777',marginBottom:3,fontWeight:600}}>{l}</div>
              <input type="number" value={p2[k]} onChange={e=>setP2({...p2,[k]:e.target.value})} style={{width:'100%',padding:'7px 4px',border:'1.5px solid #F9A8D4',borderRadius:8,fontSize:13,textAlign:'center',background:T.card,outline:'none'}}/>
            </div>)}
          </div>
        </div>}
      </>}

      {/* Empty state with mode intro */}
      {!ms.loading&&!ms.result&&!ms.error&&<div style={{textAlign:'center',padding:'20px 10px',marginBottom:6}}>
        <div style={{width:56,height:56,borderRadius:28,background:`${mc}10`,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 10px',fontSize:28}}>{modeInfo.icon}</div>
        <div style={{fontSize:15,fontWeight:600,color:T.text}}>{MODE_FULL[mode]}</div>
        <div style={{fontSize:12,color:T.textThi,marginTop:4,lineHeight:1.6}}>{MODE_INTRO[mode]||''}</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:6,justifyContent:'center',marginTop:12}}>
          {(QUICK_QS[mode]||[]).map(q=><span key={q} style={{padding:'4px 10px',borderRadius:8,background:`${mc}08`,border:`1px solid ${mc}15`,color:mc,fontSize:11}}>"{q}"</span>)}
        </div>
        <div style={{fontSize:10,color:T.textThi,marginTop:10,opacity:.6}}>分析约需60-90秒 · 包含{isPair?'配合度/相处/建议':'性格/事业/财运/感情'}等维度</div>
        <div style={{fontSize:11,color:mc,marginTop:6,opacity:.7}}>点击底部按钮开始AI预测</div>
      </div>}

      {/* History: show other modes that have saved results */}
      {!ms.loading&&!ms.result&&(()=>{
        const saved=MODES.filter(m=>m.id!==mode&&getMS(m.id).result);
        if(!saved.length)return null;
        return <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:600,color:T.textSec,marginBottom:8}}>📜 历史报告</div>
          {saved.map(m=>{const s=getMS(m.id);const chatLen=(s.chatHistory||[]).length;
            return <div key={m.id} onClick={()=>setMode(m.id)} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:T.card,borderRadius:12,marginBottom:6,cursor:'pointer',boxShadow:'0 1px 3px rgba(0,0,0,0.04)',border:`1px solid ${T.border}`}}>
              <div style={{width:32,height:32,borderRadius:8,background:`${m.c}10`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>{m.icon}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:T.text}}>{MODE_FULL[m.id]}</div>
                <div style={{fontSize:10,color:T.textThi,marginTop:1}}>{s.result?.response?.length||0}字{chatLen>0?` · ${chatLen/2|0}轮追问`:''}</div>
              </div>
              <div style={{fontSize:11,color:m.c,fontWeight:500}}>查看 →</div>
            </div>;
          })}
        </div>;
      })()}

      {/* Loading state in content area — only before init arrives */}
      {ms.loading&&!ms.result&&<div className="anim-in" style={{textAlign:'center',padding:'50px 20px'}}>
        <div style={{position:'relative',width:88,height:88,margin:'0 auto 20px'}}>
          <div style={{position:'absolute',inset:0,borderRadius:'50%',border:`3px solid ${mc}15`}}/>
          <div style={{position:'absolute',inset:0,borderRadius:'50%',border:`3px solid transparent`,borderTopColor:mc,animation:'spin 1s linear infinite'}}/>
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:36}}>{modeInfo.icon}</div>
        </div>
        <div style={{fontSize:16,fontWeight:700,color:mc,marginBottom:6}}>{ms.loadMsg}</div>
        {/* Progress bar */}
        <div style={{width:180,height:4,background:`${mc}15`,borderRadius:2,margin:'0 auto 8px',overflow:'hidden'}}>
          <div style={{height:'100%',background:mc,borderRadius:2,width:Math.min(ms.elapsed*1.2,95)+'%',transition:'width .5s ease'}}/>
        </div>
        <div style={{fontSize:11,color:T.textThi}}>{ms.elapsed}秒</div>
      </div>}

      {/* Error */}
      {ms.error&&<div className="anim-in" style={{background:ms.error.startsWith('🔮')?'#F5F3FF':'#FEF2F2',border:ms.error.startsWith('🔮')?'1px solid #C4B5FD':'1px solid #FECACA',borderRadius:14,padding:16,position:'relative'}}>
        <button onClick={()=>setMS(mode,{error:null})} style={{position:'absolute',top:8,right:8,background:'none',border:'none',fontSize:16,cursor:'pointer',opacity:.4,color:ms.error.startsWith('🔮')?'#6D28D9':'#EF4444'}}>✕</button>
        <div style={{fontSize:13,fontWeight:500,color:ms.error.startsWith('🔮')?'#6D28D9':'#EF4444',lineHeight:1.8,whiteSpace:'pre-line',paddingRight:20}}>{ms.error}</div>
        {!ms.error.startsWith('🔮')&&<button onClick={()=>divine(mode,false)} style={{padding:'6px 14px',borderRadius:8,border:'none',background:'#EF4444',color:'#fff',fontSize:12,cursor:'pointer',marginTop:8}}>🔄 重试</button>}
      </div>}

      {/* Results: Header + Cards + Chat */}
      {ms.result&&<div ref={ref} className="anim-slide" style={{scrollMarginTop:120}}>
        {/* Question display — only when report expanded (sticky card shows it when collapsed) */}
        {ms.q&&reportExpanded&&<div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:T.card,borderRadius:10,marginBottom:8,boxShadow:'0 1px 3px rgba(0,0,0,0.04)',border:`1px solid ${T.border}`}}>
          <div style={{fontSize:12,color:T.textThi,flexShrink:0}}>❓</div>
          <div style={{flex:1,fontSize:12,color:T.text,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>"{ms.q}"</div>
          <button onClick={()=>{const q=ms.q;setMS(mode,{result:null,error:null,chatHistory:[],q});}} style={{background:'none',border:'none',fontSize:14,cursor:'pointer',color:mc,flexShrink:0,padding:'2px 4px'}}>✏️</button>
        </div>}
        {(profile.hour===-1||hourApprox)&&['bazi','astrology','vedic','hehun','synastry','hepan'].includes(mode)&&
          <div style={{background:'#FFF8EB',border:'1px solid #FCD34D',borderRadius:10,padding:'8px 12px',marginBottom:10,fontSize:11,color:'#92400E',lineHeight:1.5}}>
            {profile.hour===-1?'⚠️ 未提供出生时辰，时柱相关内容仅供参考。':'⏰ 使用大致时段，精度可能有偏差。'}
          </div>
        }

        {(ms.result.response!==null&&ms.result.response!==undefined)&&(()=>{
          const sections=parseSections(ms.result.response,ms.result._streaming);
          const chatHistory=ms.chatHistory||[];
          const hasChat=chatHistory.length>0;
          const expanded=reportExpanded;
          return(<div>

            {/* Expanded report (full cards) */}
            {expanded&&<>
              {/* Collapse button when has chat */}
              {hasChat&&<div onClick={()=>setReportExpanded(false)} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6,padding:'6px',marginBottom:8,cursor:'pointer',color:mc,fontSize:11,fontWeight:600}}>
                ▴ 收起报告
              </div>}
              {/* Report Header with Radar */}
              <div style={{background:`linear-gradient(135deg,${mc},${mc}bb)`,borderRadius:16,padding:'16px',marginBottom:10,color:'#fff'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:10,opacity:.6}}>命理报告</div>
                    <div className="serif" style={{fontSize:17,fontWeight:700,marginTop:2}}>{modeInfo.icon} {MODE_FULL[mode]}</div>
                    {ms.result.structured?.dayMaster&&<div style={{display:'flex',gap:4,marginTop:6,flexWrap:'wrap'}}>
                      <span style={{padding:'2px 8px',borderRadius:6,background:'rgba(255,255,255,0.2)',fontSize:10}}>日主 {ms.result.structured.dayMaster}{ms.result.structured.element}</span>
                      <span style={{padding:'2px 8px',borderRadius:6,background:'rgba(255,255,255,0.2)',fontSize:10}}>{ms.result.structured.strength}</span>
                      {ms.result.structured.geju&&<span style={{padding:'2px 8px',borderRadius:6,background:'rgba(255,255,255,0.2)',fontSize:10}}>{ms.result.structured.geju}</span>}
                      {ms.result.structured.personality?.type&&<span style={{padding:'2px 8px',borderRadius:6,background:'rgba(255,255,255,0.25)',fontSize:10}}>✦ {ms.result.structured.personality.type}</span>}
                    </div>}
                    <div style={{fontSize:11,opacity:.75,marginTop:6}}>{profile.name||'缘友'} · {profile.year}.{profile.month}.{profile.day}</div>
                  </div>
                  {ms.result.structured?.wuxing?
                    <WuxingRadar data={ms.result.structured.wuxing} size={110}/>
                    :<div style={{background:'rgba(255,255,255,0.2)',borderRadius:10,padding:'6px 10px',textAlign:'center'}}><div style={{fontSize:18,fontWeight:700}}>{sections.length}</div><div style={{fontSize:9,opacity:.7}}>维度</div></div>
                  }
                </div>
              </div>
              {/* Four Pillars */}
              {ms.result.structured?.fourPillars&&<FourPillarsCard structured={ms.result.structured} mc={mc}/>}
              {/* All report cards — progressive animation for new results */}
              {sections.map((sec,i)=>{const content=sec.lines.join('\n').trim();if(!content)return null;return <ReportCard key={i} title={sec.title} icon={sec.icon} color={SECTION_COLORS[i%SECTION_COLORS.length]} content={content} index={i} md={md} isLong={content.length>300}/>})}
              {/* Streaming indicator */}
              {ms.result._streaming&&<div style={{display:'flex',alignItems:'center',gap:8,padding:'12px 16px',color:mc}}>
                <div style={{width:14,height:14,borderRadius:7,border:'2px solid transparent',borderTopColor:mc,animation:'spin .8s linear infinite'}}/>
                <span style={{fontSize:12}}>AI正在生成分析…</span>
              </div>}
              {/* Actions - only after streaming complete */}
              {!ms.result._streaming&&<div style={{display:'flex',gap:6,marginTop:10,marginBottom:4}}>
                <button onClick={()=>{navigator.clipboard?.writeText(ms.result.response);window.yuanheToast?.('已复制到剪贴板 ✓')}} style={{flex:1,padding:'8px',borderRadius:8,border:`1px solid ${P.accentLight}`,background:T.card,fontSize:11,color:T.textSec,cursor:'pointer'}}>📋 复制</button>
                <button onClick={()=>setShowShare(true)} style={{flex:1,padding:'8px',borderRadius:8,border:`1px solid ${mc}30`,background:`${mc}06`,fontSize:11,color:mc,cursor:'pointer'}}>📤 分享</button>
                {(()=>{const favKey='yuanhe_fav_'+mode;const isFav=localStorage.getItem(favKey);return<button onClick={()=>{if(isFav){localStorage.removeItem(favKey);window.yuanheToast?.('已取消收藏')}else{localStorage.setItem(favKey,JSON.stringify({mode,response:ms.result.response?.substring(0,200),time:new Date().toLocaleString()}));window.yuanheToast?.('已收藏 ⭐')}setMS(mode,{...getMS(mode)})}} style={{padding:'8px 12px',borderRadius:8,border:`1px solid ${T.border}`,background:isFav?'#FEF3C7':T.card,fontSize:11,color:isFav?'#D97706':T.textThi,cursor:'pointer'}}>{isFav?'⭐':'☆'}</button>})()}
                <button onClick={()=>divine(mode,false)} style={{padding:'8px 12px',borderRadius:8,border:`1px solid ${T.border}`,background:T.card,fontSize:11,color:T.textThi,cursor:'pointer'}}>🔄</button>
              </div>}
              {/* Feedback */}
              {!ms.result._streaming&&(()=>{
                const fbKey='yuanhe_fb_'+mode+'_'+Date.now().toString(36).slice(0,6);
                const existingFb=localStorage.getItem('yuanhe_fb_'+mode);
                if(existingFb)return <div style={{fontSize:11,color:T.textThi,textAlign:'center',padding:'4px 0',marginBottom:8}}>感谢你的反馈 {existingFb==='up'?'👍':'👎'}</div>;
                return <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:12,padding:'6px 0',marginBottom:8}}>
                  <span style={{fontSize:11,color:T.textThi}}>这个分析准吗？</span>
                  <button onClick={()=>{localStorage.setItem('yuanhe_fb_'+mode,'up');setMS(mode,{...getMS(mode)})}} style={{padding:'4px 12px',borderRadius:8,border:`1px solid ${T.border}`,background:T.card,fontSize:12,cursor:'pointer'}}>👍 准</button>
                  <button onClick={()=>{localStorage.setItem('yuanhe_fb_'+mode,'down');setMS(mode,{...getMS(mode)})}} style={{padding:'4px 12px',borderRadius:8,border:`1px solid ${T.border}`,background:T.card,fontSize:12,cursor:'pointer'}}>👎 不准</button>
                </div>;
              })()}
            </>}

            {/* Chat History (follow-up bubbles) */}
            {chatHistory.length>0&&<div style={{marginBottom:10}}>
              {expanded&&<div style={{borderTop:`1px solid ${T.border}`,marginTop:4,marginBottom:12}}/>}
              <div style={{fontSize:12,fontWeight:600,color:mc,marginBottom:8,paddingLeft:2}}>💬 追问会话</div>
              {chatHistory.map((msg,i)=>(
                <div key={i} style={{display:'flex',justifyContent:msg.role==='user'?'flex-end':'flex-start',marginBottom:8}}>
                  <div style={{maxWidth:'85%',padding:'10px 14px',borderRadius:msg.role==='user'?'16px 16px 4px 16px':'16px 16px 16px 4px',
                    background:msg.role==='user'?`linear-gradient(135deg,${mc},${mc}dd)`:'#fff',
                    color:msg.role==='user'?'#fff':T.text,fontSize:13,lineHeight:1.7,
                    boxShadow:msg.role==='user'?'none':'0 1px 4px rgba(0,0,0,0.06)'}}>
                    {msg.role==='user'?msg.text:<div className="markdown" dangerouslySetInnerHTML={md(msg.text)}/>}
                    {msg.time&&<div style={{fontSize:9,opacity:.4,marginTop:4,textAlign:msg.role==='user'?'right':'left'}}>{msg.time}</div>}
                  </div>
                </div>
              ))}
              {chatLoading&&<div style={{display:'flex',justifyContent:'flex-start',marginBottom:8}}>
                <div style={{padding:'10px 14px',borderRadius:'16px 16px 16px 4px',background:T.card,boxShadow:T.shadow}}>
                  <div style={{display:'flex',gap:4,alignItems:'center'}}>
                    <div style={{width:6,height:6,borderRadius:3,background:mc,animation:'pulse 1s infinite'}}/>
                    <div style={{width:6,height:6,borderRadius:3,background:mc,animation:'pulse 1s infinite 0.2s'}}/>
                    <div style={{width:6,height:6,borderRadius:3,background:mc,animation:'pulse 1s infinite 0.4s'}}/>
                  </div>
                </div>
              </div>}
              <div ref={chatEndRef}/>
            </div>}
          </div>);
        })()}

        {!ms.result.response&&!ms.result._streaming&&ms.result.engineData&&<div style={{background:T.card,borderRadius:14,padding:16,boxShadow:T.shadow}}>
          <div style={{fontSize:13,fontWeight:600,color:mc,marginBottom:8}}>📦 引擎结果</div>
          <pre style={{fontSize:12,lineHeight:1.7,color:T.textSec,whiteSpace:'pre-wrap',wordBreak:'break-all',fontFamily:'inherit'}}>{ms.result.engineData}</pre>
        </div>}
      </div>}
    </div>

    {/* === FIXED BOTTOM BAR === */}
    <div style={{position:'fixed',bottom:64,left:0,right:0,maxWidth:480,margin:'0 auto',background:'rgba(255,255,255,0.97)',borderTop:`1px solid ${T.border}`,padding:'8px 16px',zIndex:50,minHeight:66}}>
      {(ms.loading||ms.result?._streaming)?<>
        {/* Loading / Streaming: button itself is progress bar */}
        <button disabled style={{width:'100%',height:50,borderRadius:14,border:'none',fontSize:14,fontWeight:700,color:'#fff',position:'relative',overflow:'hidden',cursor:'default',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{position:'absolute',inset:0,background:`${mc}40`}}/>
          <div style={{position:'absolute',left:0,top:0,bottom:0,background:`linear-gradient(135deg,${mc},${mc}cc)`,width:ms.result?._streaming?'95%':Math.min(ms.elapsed/90*100,95)+'%',transition:'width 1s linear',borderRadius:14}}/>
          <span style={{position:'relative',zIndex:1}}>{ms.result?._streaming?'🔮 AI正在生成分析…':'🔮 '+(ms.loadMsg||'加载中')+' · '+ms.elapsed+'s'}</span>
        </button>
      </>:!ms.result?<>
        {/* Initial: big AI button only */}
        <button onClick={()=>divine(mode,false)} disabled={!!loadingMode||(mode==='meihua'&&!ms.q.trim())} style={{
          width:'100%',height:50,borderRadius:14,border:'none',fontSize:15,fontWeight:700,color:'#fff',
          cursor:(mode==='meihua'&&!ms.q.trim())?'default':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,
          background:(mode==='meihua'&&!ms.q.trim())?T.textThi:`linear-gradient(135deg,${mc},${mc}cc)`,
          boxShadow:(mode==='meihua'&&!ms.q.trim())?'none':`0 4px 16px ${mc}40`,transition:'all .3s',
        }}>
          {mode==='meihua'&&!ms.q.trim()?'❀ 请先输入要占的问题':`🔮 ${modeInfo.icon} ${MODE_FULL[mode]} · AI预测`}
        </button>
        <div style={{textAlign:'center',marginTop:3}}>
          <button onClick={()=>divine(mode,true)} style={{background:'none',border:'none',fontSize:11,color:T.textThi,cursor:'pointer'}}>⚡ 仅引擎（秒出）</button>
        </div>
      </>:<>
        {/* Has result: chips + input + send */}
        <div style={{display:'flex',gap:4,marginBottom:6,overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
          {(()=>{
            const ch=ms.chatHistory||[];
            const asked=ch.filter(m=>m.role==='user').map(m=>m.text);
            const base=(QUICK_QS[mode]||[]).filter(q=>!asked.includes(q));
            // Dynamic chips based on report content
            const resp=ms.result?.response||'';
            const dynamic=[];
            if(resp.includes('桃花')&&!asked.some(a=>a.includes('桃花')))dynamic.push('桃花运详解');
            if(resp.includes('大运')&&!asked.some(a=>a.includes('大运')))dynamic.push('当前大运分析');
            if(resp.includes('创业')&&!asked.some(a=>a.includes('创业')))dynamic.push('适合创业吗');
            if(resp.includes('贵人')&&!asked.some(a=>a.includes('贵人')))dynamic.push('贵人方位');
            const chips=[...dynamic,...base].slice(0,5);
            return chips.map(qq=>(
              <button key={qq} onClick={()=>followUp(qq)} disabled={chatLoading} style={{padding:'4px 10px',borderRadius:8,border:`1px solid ${mc}25`,background:`${mc}06`,color:mc,fontSize:10,fontWeight:500,cursor:'pointer',flexShrink:0,whiteSpace:'nowrap'}}>{qq}</button>
            ));
          })()}
        </div>
        <div style={{display:'flex',gap:8}}>
          <input
            value={followUpQ}
            onChange={e=>setFollowUpQ(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&followUpQ.trim())followUp(followUpQ)}}
            placeholder="输入追问…"
            style={{flex:1,padding:'10px 14px',borderRadius:20,border:`1.5px solid ${T.border}`,background:T.bg,fontSize:13,outline:'none'}}
          />
          <button onClick={()=>followUp(followUpQ)}
            disabled={!followUpQ.trim()||chatLoading}
            style={{width:40,height:40,borderRadius:20,border:'none',
              background:(!followUpQ.trim()||chatLoading)?T.border:`linear-gradient(135deg,${mc},${mc}dd)`,
              color:'#fff',fontSize:16,cursor:(!followUpQ.trim()||chatLoading)?'default':'pointer',
              flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',
              boxShadow:(!followUpQ.trim()||chatLoading)?'none':`0 2px 8px ${mc}40`}}>{chatLoading?'…':'↑'}</button>
        </div>
      </>}
    </div>

    {/* === LOADING TOAST (shows when bg mode is loading) === */}
    {loadingMode&&loadingMode!==mode&&<div style={{position:'fixed',top:100,left:'50%',transform:'translateX(-50%)',background:'rgba(0,0,0,0.8)',color:'#fff',borderRadius:16,padding:'10px 20px',zIndex:200,display:'flex',alignItems:'center',gap:8,fontSize:13,boxShadow:'0 4px 20px rgba(0,0,0,0.3)',animation:'fadeIn .3s ease'}}>
      <div style={{animation:'pulse 1.5s infinite'}}>🔮</div>
      <span>{loadingModeInfo?.label||loadingMode} 解读中… {getMS(loadingMode).elapsed}s</span>

    {/* Tarot Modal */}
    {showTarotModal&&<TarotModal spread={tarotSpread} setSpread={setTarotSpread} cards={tarotCards} setCards={setTarotCards} pool={tarotPool} onDone={(autoDivine)=>{setShowTarotModal(false);if(autoDivine)setTimeout(()=>divine(mode,false),100)}} onClose={()=>setShowTarotModal(false)}/>}

    {/* Hour Correction Assistant */}

// ===== DISCOVER =====
function FortuneWheel({profile,goTo,addConv,setOpenConvId,autoGreet,onClose}){
  const tg=profile.gender==='male'?'female':'male';
  const [pool,setPool]=useState([]);
  const [spinning,setSpinning]=useState(false);
  const [result,setResult]=useState(null);
  const [showDetail,setShowDetail]=useState(false);
  const [angle,setAngle]=useState(0);
  const todayKey='yuanhe_wheel_'+new Date().toDateString();
  const [spinsLeft,setSpinsLeft]=useState(()=>{const used=parseInt(localStorage.getItem(todayKey)||'0');return Math.max(0,2-used)});
  const [loading,setLoading]=useState(true);

  // Fetch scores and sort by match score descending, take top 8
  useEffect(()=>{
    const cands=[...USERS,...BOTS].filter(u=>u.gender===tg);
    apiPost('/api/batch-match',{profile,candidates:cands}).then(results=>{
      const scored=results.map(r=>({...r,score:r.matchResult?.score||r.score})).sort((a,b)=>b.score-a.score).slice(0,8);
      setPool(scored);setLoading(false);
    }).catch(()=>{
      const fallback=cands.sort(()=>Math.random()-0.5).slice(0,8);
      setPool(fallback);setLoading(false);
    });
  },[]);

  const spin=()=>{
    if(spinning||spinsLeft<=0||pool.length===0)return;
    setSpinning(true);setResult(null);
    // Weighted random: higher score = higher probability
    const weights=pool.map(u=>{const s=u.score||60;return s*s}); // square for stronger bias
    const totalW=weights.reduce((a,b)=>a+b,0);
    let rand=Math.random()*totalW,target=0;
    for(let i=0;i<weights.length;i++){rand-=weights[i];if(rand<=0){target=i;break}}
    const n=pool.length;
    const extra=5*360+target*(360/n)+(360/n/2);
    setAngle(prev=>prev+extra);
    setTimeout(()=>{
      setResult(pool[target]);
      setSpinning(false);
      const used=parseInt(localStorage.getItem(todayKey)||'0')+1;
      localStorage.setItem(todayKey,String(used));
      setSpinsLeft(Math.max(0,2-used));
    },4000);
  };

  const n=pool.length||8;
  const sz=320,cx=sz/2,cy=sz/2,r=sz/2-14;
  const revealed=!!result; // show names/avatars only after spin result
  return(
    <div className="anim-in" style={{background:'linear-gradient(135deg,#1E1146,#2D1B69,#1E1146)',borderRadius:20,padding:16,boxShadow:'0 8px 32px rgba(30,17,70,0.4)',position:'relative',overflow:'hidden'}}>
      {/* Stars */}
      {[...Array(12)].map((_,i)=><div key={i} style={{position:'absolute',width:2,height:2,borderRadius:1,background:'rgba(255,255,255,'+(0.1+Math.random()*0.3)+')',top:Math.random()*100+'%',left:Math.random()*100+'%'}}/>)}
      <div style={{textAlign:'center',marginBottom:10}}>
        <div style={{fontSize:16,fontWeight:800,color:'#E9D5FF',letterSpacing:2}}>✦ 命运转盘 ✦</div>
        <div style={{fontSize:11,color:'rgba(196,181,253,0.6)',marginTop:4}}>转动命运之轮，寻找你的命中注定</div>
      </div>
      {loading?<div style={{textAlign:'center',padding:'40px 0',color:'rgba(196,181,253,0.5)',fontSize:12}}>✦ 感应缘分中… ✦</div>:<>
      <div style={{position:'relative',width:'100%',maxWidth:sz,margin:'0 auto',aspectRatio:'1'}}>
        {/* Glow */}
        <div style={{position:'absolute',inset:-6,borderRadius:'50%',background:'radial-gradient(circle,rgba(139,92,246,0.15) 60%,transparent 70%)',animation:spinning?'pulse 1s infinite':'none'}}/>
        {/* Decorative rings */}
        <svg viewBox={`0 0 ${sz} ${sz}`} style={{width:'100%',height:'100%',position:'absolute',top:0,left:0}}>
          <circle cx={cx} cy={cy} r={r+8} fill="none" stroke="rgba(196,181,253,0.12)" strokeWidth={1}/>
          <circle cx={cx} cy={cy} r={r+4} fill="none" stroke="rgba(196,181,253,0.08)" strokeWidth={1} strokeDasharray="4,6"/>
        </svg>
        {/* Pointer */}
        <div style={{position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',zIndex:5}}>
          <svg width={22} height={28}><polygon points="11,0 3,24 19,24" fill="#F59E0B"/><polygon points="11,3 6,21 16,21" fill="#FBBF24"/></svg>
        </div>
        {/* Wheel SVG */}
        <svg viewBox={`0 0 ${sz} ${sz}`} style={{width:'100%',height:'100%',transition:spinning?'transform 4s cubic-bezier(0.17,0.67,0.12,0.99)':'none',transform:`rotate(${angle}deg)`}}>
          {pool.map((u,i)=>{
            const a1=(i*360/n-90)*Math.PI/180;
            const a2=((i+1)*360/n-90)*Math.PI/180;
            const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
            const x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
            const mid=((i+0.5)*360/n-90)*Math.PI/180;
            const tx=cx+(r*0.62)*Math.cos(mid),ty=cy+(r*0.62)*Math.sin(mid);
            const textAngle=(i+0.5)*360/n;
            const emoji=u.gender==='female'?'👩':'👨';
            const sectorColors=['#4C1D95','#6D28D9','#5B21B6','#7C3AED','#4C1D95','#6D28D9','#5B21B6','#7C3AED'];
            return(<g key={i}>
              <path d={`M${cx},${cy} L${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2} Z`} fill={sectorColors[i%sectorColors.length]} stroke="rgba(196,181,253,0.2)" strokeWidth={1}/>
              {revealed?<>
                <text x={tx} y={ty-6} fill="#fff" fontSize={18} textAnchor="middle" dominantBaseline="central" transform={`rotate(${textAngle},${tx},${ty-6})`}>{emoji}</text>
                <text x={tx} y={ty+14} fill="rgba(233,213,255,0.9)" fontSize={9} fontWeight={700} textAnchor="middle" dominantBaseline="central" transform={`rotate(${textAngle},${tx},${ty+14})`}>{u.name.substring(0,3)}</text>
              </>:<>
                <text x={tx} y={ty} fill="rgba(196,181,253,0.3)" fontSize={14} textAnchor="middle" dominantBaseline="central" transform={`rotate(${textAngle},${tx},${ty})`}>?</text>
              </>}
            </g>);
          })}
          {/* Center */}
          <circle cx={cx} cy={cy} r={34} fill="url(#centerGrad)"/>
          <circle cx={cx} cy={cy} r={32} fill="none" stroke="rgba(251,191,36,0.3)" strokeWidth={1}/>
          <defs><radialGradient id="centerGrad"><stop offset="0%" stopColor="#2D1B69"/><stop offset="100%" stopColor="#1E1146"/></radialGradient></defs>
          <text x={cx} y={cy-6} fill="#FBBF24" fontSize={10} fontWeight={700} textAnchor="middle" dominantBaseline="central">命中</text>
          <text x={cx} y={cy+8} fill="#FBBF24" fontSize={10} fontWeight={700} textAnchor="middle" dominantBaseline="central">注定</text>
        </svg>
      </div>
      <button onClick={spin} disabled={spinning||spinsLeft<=0} style={{width:'100%',padding:'14px',borderRadius:28,border:'none',marginTop:14,fontSize:15,fontWeight:700,cursor:spinning||spinsLeft<=0?'default':'pointer',letterSpacing:1,
        background:spinning?'rgba(255,255,255,0.08)':spinsLeft<=0?'rgba(255,255,255,0.05)':'linear-gradient(135deg,#F59E0B,#D97706)',
        color:spinning||spinsLeft<=0?'rgba(196,181,253,0.4)':'#fff',boxShadow:spinning||spinsLeft<=0?'none':'0 4px 20px rgba(245,158,11,0.3)'}}>
        {spinning?'✦ 命运之轮转动中 ✦':spinsLeft<=0?'今日感应已用完（每天2次）':`✦ 感应命运（${spinsLeft}次）`}
      </button>
      {result&&<div className="anim-in" style={{marginTop:14,background:'rgba(255,255,255,0.06)',border:'1px solid rgba(196,181,253,0.15)',borderRadius:16,padding:16,backdropFilter:'blur(4px)'}}>
        <div style={{textAlign:'center',marginBottom:10}}>
          <div style={{fontSize:11,color:'rgba(196,181,253,0.6)'}}>✦ 命运之轮指向了 ✦</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div style={{width:56,height:56,borderRadius:28,background:'linear-gradient(135deg,#4C1D95,#6D28D9)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,flexShrink:0,border:'2px solid rgba(251,191,36,0.3)'}}>{result.gender==='female'?'👩':'👨'}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:16,fontWeight:700,color:'#E9D5FF'}}>{result.name}，{result.age}岁</div>
            <div style={{fontSize:12,color:'rgba(196,181,253,0.7)',marginTop:2}}>{result.sign} · {result.bio}</div>
            <div style={{display:'flex',gap:4,marginTop:6}}>{(result.tags||[]).map(t=><span key={t} style={{padding:'2px 8px',borderRadius:6,background:'rgba(139,92,246,0.15)',fontSize:10,color:'#C4B5FD'}}>{t}</span>)}</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10,marginTop:12,padding:'10px 14px',background:'rgba(251,191,36,0.08)',border:'1px solid rgba(251,191,36,0.15)',borderRadius:12}}>
          <div style={{fontSize:24,fontWeight:800,color:'#FBBF24'}}>{result.score}%</div>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:600,color:'#FBBF24'}}>{result.score>=80?'天作之合 💕':result.score>=65?'有缘有份 ✨':'潜力之缘 🌱'}</div>
            <div style={{fontSize:10,color:'rgba(196,181,253,0.5)'}}>{result.score>=80?'命中注定的缘分':result.score>=65?'值得深入了解':'用心经营会绽放'}</div>
          </div>
        </div>
        {/* Action buttons */}
        <div style={{display:'flex',gap:8,marginTop:12}}>
          <button onClick={()=>setShowDetail(true)} style={{flex:1,padding:'12px',borderRadius:12,border:'1px solid rgba(196,181,253,0.2)',background:'rgba(255,255,255,0.05)',color:'#E9D5FF',fontSize:13,fontWeight:600,cursor:'pointer'}}>查看详情</button>
          <button onClick={()=>{if(addConv&&autoGreet){const c=addConv(result);autoGreet(c);if(setOpenConvId)setOpenConvId(c.id);if(onClose)onClose();goTo(S.MSGS)}}} style={{flex:1,padding:'12px',borderRadius:12,border:'none',background:'linear-gradient(135deg,#F59E0B,#D97706)',color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',boxShadow:'0 3px 12px rgba(245,158,11,0.3)'}}>💬 发起聊天</button>
        </div>
      </div>}
      {/* Detail modal */}
      {showDetail&&result&&<CardDetailModal user={result} profile={profile} onClose={()=>setShowDetail(false)} goTo={goTo}/>}
      </>}
    </div>
  );
}

      const aiChoice=data.opts?data.opts[Math.floor(Math.random()*data.opts.length)]:null;

      if(onAction)onAction(opt,aiChoice);

// Get icebreaker for conversation based on state
function getIcebreaker(conv){
  const msgs=conv.messages||[];
  const msgCount=msgs.length;
  const seed=(conv.user.id*7+new Date().getDate()*13)%100;
  // Already shown icebreakers in this session?
  const shownKey='yuanhe_ice_'+conv.id;
  const shown=parseInt(localStorage.getItem(shownKey)||'0');

  // First interaction (0-1 messages): topic card
  if(msgCount<=1&&shown<1){
    return{type:'topic',data:ICE_TOPICS[seed%ICE_TOPICS.length],shown:1};
  }
  // After 4+ messages: compatibility test
  if(msgCount>=4&&msgCount<8&&shown<2){
    return{type:'compat',data:ICE_COMPAT[seed%ICE_COMPAT.length],shown:2};
  }
  // After 8+ messages: this-or-that
  if(msgCount>=8&&msgCount<14&&shown<3){
    return{type:'choose',data:ICE_CHOOSE[seed%ICE_CHOOSE.length],shown:3};
  }
  // After 14+ messages: daily task
  if(msgCount>=14&&shown<4){
    return{type:'daily',data:ICE_DAILY[seed%ICE_DAILY.length],shown:4};
  }
  return null;
}

  const EMOJI_GROUPS=[
    {label:'常用',emojis:['😊','😂','🥰','😍','🤣','😘','😭','😅','😎','🥺','😏','😌','🤗','😇','🙃','😋']},
    {label:'爱心',emojis:['❤️','💕','💗','💖','💘','💝','💓','🥰','😘','😍','💑','💏','🫶','💌','🌹','✨']},
    {label:'手势',emojis:['👋','👍','👎','✌️','🤞','👌','🤟','🙏','💪','👏','🫰','🤝','✋','🤚','🫶','☝️']},
    {label:'自然',emojis:['🌸','🌺','🌻','🌹','🍀','🌙','⭐','🌈','☀️','🌊','🔥','❄️','🌿','🍃','🦋','🐱']},
  ];

  // Blacklist
  const getBlacklist=()=>{try{return JSON.parse(localStorage.getItem('yuanhe_blacklist')||'[]')}catch(e){return[]}};
  const blockUser=(userId)=>{const bl=getBlacklist();if(!bl.includes(userId)){bl.push(userId);localStorage.setItem('yuanhe_blacklist',JSON.stringify(bl))}};
  const unblockUser=(userId)=>{const bl=getBlacklist().filter(id=>id!==userId);localStorage.setItem('yuanhe_blacklist',JSON.stringify(bl))};
  const isBlocked=(userId)=>getBlacklist().includes(userId);

  // Toast helper
  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(''),2000)};

  // Image handler
  const sendImage=()=>{
    const input=document.createElement('input');
    input.type='file';input.accept='image/*';
    input.onchange=(e)=>{
      const file=e.target.files[0];if(!file)return;
      if(file.size>2*1024*1024){showToast('图片不能超过2MB');return}
      const reader=new FileReader();
      reader.onload=(ev)=>{
        const img=ev.target.result;
        ChatStore.addMessage(activeConv.id,{role:'user',text:'[图片]',image:img});
        refreshConvs();scrollBottom();
        // Bot reacts to image
        if(activeConv.user.isBot){
          setTimeout(async()=>{
            setTyping(true);
            await new Promise(r=>setTimeout(r,2000+Math.random()*3000));
            try{
              const r=await apiPost('/api/chat',{partner:activeConv.user,message:'[用户发了一张图片给你，请自然地回应，比如夸赞或好奇地问是什么]',history:(ChatStore.getById(activeConv.id)?.messages||[]).slice(-6)});
              ChatStore.addMessage(activeConv.id,{role:'ai',text:r.reply||'好好看！📸'});
            }catch(e){ChatStore.addMessage(activeConv.id,{role:'ai',text:'好好看！📸'})}
            setTyping(false);refreshConvs();scrollBottom();
          },1000);
        }
      };
      reader.readAsDataURL(file);
    };
    input.click();
  };

  // Bot online status
  const getBotOnline=(bot)=>{
    if(!bot?.isBot)return true;
    const h=new Date().getHours();
    const seed=(bot.id*7+h*13)%100;
    if(h>=8&&h<=23)return seed<70;
    return seed<20;
  };
  // Fuzzy last online time
  const getLastOnlineText=(user)=>{
    if(!user?.isBot)return '在线';
    if(getBotOnline(user))return '在线';
    const seed=(user.id*11+new Date().getHours()*3)%100;
    if(seed<30)return '刚刚在线';
    if(seed<55)return '1小时内';
    if(seed<80)return '今天在线过';
    return '昨天在线';
  };
  const isOnline=activeConv?getBotOnline(activeConv.user):false;

  // Notify App when entering/leaving chat detail
  useEffect(()=>{setChatActive(!!activeId);return()=>setChatActive(false)},[activeId]);
  useEffect(()=>{if(openConvId){setActiveId(openConvId);setOpenConvId(null)}},[openConvId]);

  const sendMsg=async()=>{
    if(!chatInput.trim()||sending||!activeConv)return;
    const text=chatInput.trim();
    setChatInput('');
    setSending(true);
    ChatStore.addMessage(activeConv.id,{role:'user',text});
    refreshConvs();
    scrollBottom();

    // Bot behavior simulation
    const isBot=activeConv.user.isBot;
    if(isBot){
      // Phase 1: "已发送" → delay → "已读"
      setReadStatus('已发送');
      const readDelay=2000+Math.random()*5000; // 2-7s before "read"
      await new Promise(r=>setTimeout(r,readDelay));
      setReadStatus('已读');
      // Phase 2: delay before typing (thinking time)
      const thinkDelay=1000+Math.random()*3000; // 1-4s think
      await new Promise(r=>setTimeout(r,thinkDelay));
      // Phase 3: typing animation
      setTyping(true);
      const typeDelay=2000+Math.random()*4000; // 2-6s typing
      await new Promise(r=>setTimeout(r,typeDelay));
    }else{
      // Non-bot: quick reply
      setTyping(true);
      await new Promise(r=>setTimeout(r,1000+Math.random()*1500));
    }

    try{
      const freshConv=ChatStore.getById(activeConv.id);
      const r=await apiPost('/api/chat',{partner:activeConv.user,message:text,history:(freshConv?.messages||[]).slice(-10)});
      ChatStore.addMessage(activeConv.id,{role:'ai',text:r.reply||'😊'});
    }catch(e){ChatStore.addMessage(activeConv.id,{role:'ai',text:'[网络不稳定，请重试]'})}
    setTyping(false);setSending(false);setReadStatus('');
    refreshConvs();scrollBottom();
  };

  if(activeConv){
    const freshConv=ChatStore.getById(activeConv.id)||activeConv;
    const msgs=freshConv.messages||[];
    const ice=getIcebreaker(freshConv);
    const iceShownKey='yuanhe_ice_'+activeConv.id;
    const handleIceAction=(type,userChoice,aiChoice)=>{
      if(type==='topic'){
        // User clicked "聊这个话题" → set as chat input hint
        setChatInput(userChoice);
        localStorage.setItem(iceShownKey,String(ice.shown));
      }else if(type==='daily'){
        localStorage.setItem(iceShownKey,String(ice.shown));
      }else{
        // compat/choose → mark as shown after interaction
        localStorage.setItem(iceShownKey,String(ice.shown));
      }
    };
    return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:T.bg}}>
      <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',background:T.card,borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
        <button onClick={()=>{ChatStore.markRead(activeConv.id);refreshConvs();setActiveId(null);setSearchMode(false)}} style={{width:36,height:36,borderRadius:18,border:`1px solid ${T.border}`,background:T.card,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>←</button>
        <div onClick={()=>setShowProfile(true)} style={{display:'flex',alignItems:'center',gap:10,flex:1,cursor:'pointer'}}>
          <div style={{width:40,height:40,borderRadius:20,background:'linear-gradient(135deg,#DDD6FE,#C4B5FD)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,position:'relative',flexShrink:0}}>
            {activeConv.user.gender==='female'?'👩':'👨'}
            <div style={{position:'absolute',bottom:0,right:0,width:10,height:10,borderRadius:5,background:isOnline?'#34D399':'#D1D5DB',border:`2px solid ${T.card}`}}/>
          </div>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:T.text}}>{activeConv.user.name}</div>
            <div style={{fontSize:11,color:typing?T.accent2:isOnline?'#34D399':T.textThi}}>{typing?'正在输入…':getLastOnlineText(activeConv.user)} · {activeConv.user.sign}</div>
          </div>
        </div>
        <button onClick={()=>{setSearchMode(!searchMode);setSearchQuery('')}} style={{width:32,height:32,borderRadius:16,border:`1px solid ${T.border}`,background:searchMode?'#F5F3FF':T.card,fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:searchMode?T.accent2:T.textThi}}>🔍</button>
        <button onClick={()=>setShowReport(true)} style={{width:32,height:32,borderRadius:16,border:`1px solid ${T.border}`,background:T.card,fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:T.textThi}}>⋯</button>
      </div>
      {/* Search bar */}
      {searchMode&&<div style={{padding:'8px 16px',background:T.bg,borderBottom:`1px solid ${T.border}`,display:'flex',gap:8,alignItems:'center'}}>
        <input value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="搜索聊天记录…" autoFocus style={{flex:1,padding:'8px 12px',borderRadius:20,border:`1.5px solid ${T.accent2}40`,background:T.card,fontSize:13,outline:'none'}}/>
        {searchQuery&&<button onClick={()=>setSearchQuery('')} style={{fontSize:12,color:T.textThi,background:'none',border:'none',cursor:'pointer'}}>清空</button>}
      </div>}
      <div style={{flex:1,overflow:'auto',padding:'12px 16px'}}>
        <div style={{textAlign:'center',marginBottom:16}}>
          <div style={{display:'inline-block',padding:'6px 16px',borderRadius:12,background:`${T.accent2}08`,fontSize:11,color:T.textSec}}>你们已匹配成功 💕 开始聊天吧</div>
        </div>
        {msgs.length===0&&!typing&&<div style={{textAlign:'center',padding:'40px 20px',color:T.textThi}}>
          <div style={{fontSize:36,marginBottom:12}}>👋</div>
          <div style={{fontSize:14,fontWeight:500,color:T.text}}>打个招呼吧</div>
          <div style={{fontSize:12,marginTop:6}}>发送第一条消息开始聊天</div>
        </div>}
        {searchMode&&searchQuery&&<div style={{fontSize:11,color:T.textThi,marginBottom:8}}>🔍 搜索"{searchQuery}" — {msgs.filter(m=>!m.recalled&&m.text&&m.text.toLowerCase().includes(searchQuery.toLowerCase())).length}条结果</div>}
        {(searchMode&&searchQuery?msgs.filter(m=>!m.recalled&&m.text&&m.text.toLowerCase().includes(searchQuery.toLowerCase())):msgs).map((msg,idx)=>(
          <div key={msg.id} className="anim-in" style={{display:'flex',justifyContent:msg.role==='user'?'flex-end':'flex-start',marginBottom:10,position:'relative',group:'msg'}}>
            <div style={{maxWidth:'75%'}}>
              <div onClick={()=>{if(msg.role==='user'&&!msg.recalled){const now=Date.now();const msgTime=msg.ts||0;if(now-msgTime<120000){if(confirm('撤回这条消息？')){ChatStore.recallMessage(activeConv.id,msg.id);refreshConvs()}}else{navigator.clipboard?.writeText(msg.text);showToast('已复制')}}}}
                style={{padding:msg.recalled?'6px 14px':msg.image?'4px':'10px 14px',borderRadius:msg.role==='user'?'18px 18px 4px 18px':'18px 18px 18px 4px',
                background:msg.recalled?'transparent':msg.role==='user'?`linear-gradient(135deg,${T.accent2},${T.accent2}CC)`:T.card,
                color:msg.recalled?T.textThi:msg.role==='user'?'#fff':T.text,fontSize:msg.recalled?11:13,lineHeight:1.7,fontStyle:msg.recalled?'italic':'normal',
                boxShadow:msg.recalled?'none':msg.role==='user'?`0 2px 8px ${T.accent2}20`:`0 1px 4px rgba(0,0,0,0.04)`,overflow:'hidden',cursor:msg.role==='user'?'pointer':'default'}}>
                {msg.recalled?'消息已撤回':msg.image?<img src={msg.image} style={{maxWidth:'100%',borderRadius:14,display:'block'}}/>:msg.text}
                {!msg.recalled&&msg.time&&<div style={{fontSize:9,opacity:.4,marginTop:4,textAlign:msg.role==='user'?'right':'left'}}>{msg.time}</div>}
              </div>
              {msg.role==='user'&&idx===msgs.length-1&&readStatus&&!msg.recalled&&<div style={{fontSize:9,color:readStatus==='已读'?T.accent2:T.textThi,textAlign:'right',marginTop:2,paddingRight:4}}>{readStatus}</div>}
            </div>
          </div>
        ))}
        {/* Icebreaker card */}
        {ice&&!typing&&!sending&&<div className="anim-in">
          <IcebreakerCard type={ice.type} data={ice.data} onAction={(c,ac)=>handleIceAction(ice.type,c,ac)}/>
        </div>}
        {typing&&<div className="anim-in" style={{display:'flex',justifyContent:'flex-start',marginBottom:8}}>
          <div style={{padding:'12px 16px',borderRadius:'16px 16px 16px 4px',background:T.card,boxShadow:T.shadow}}>
            <div style={{display:'flex',gap:4,alignItems:'center'}}>
              <div style={{width:6,height:6,borderRadius:3,background:T.accent2,animation:'pulse 1s infinite'}}/>
              <div style={{width:6,height:6,borderRadius:3,background:T.accent2,animation:'pulse 1s infinite 0.2s'}}/>
              <div style={{width:6,height:6,borderRadius:3,background:T.accent2,animation:'pulse 1s infinite 0.4s'}}/>
            </div>
          </div>
        </div>}
        <div ref={chatEndRef}/>
      </div>
      {/* Quick phrases panel */}
      {showQuick&&!showEmoji&&<div style={{padding:'8px 16px',background:T.bg,borderTop:`1px solid ${T.border}`,display:'flex',gap:6,flexWrap:'wrap'}}>
        {quickPhrases.map(p=><button key={p} onClick={()=>{setChatInput(p);setShowQuick(false)}} style={{padding:'6px 12px',borderRadius:16,border:`1px solid ${T.border}`,background:T.card,fontSize:12,color:T.text,cursor:'pointer'}}>{p}</button>)}
      </div>}
      {/* Emoji panel */}
      {showEmoji&&<div style={{padding:'8px 16px 4px',background:T.bg,borderTop:`1px solid ${T.border}`,maxHeight:180,overflow:'auto'}}>
        {EMOJI_GROUPS.map(g=><div key={g.label}>
          <div style={{fontSize:10,color:T.textThi,fontWeight:600,marginBottom:4,marginTop:4}}>{g.label}</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:2}}>
            {g.emojis.map(e=><button key={e} onClick={()=>setChatInput(prev=>prev+e)} style={{width:36,height:36,borderRadius:8,border:'none',background:'transparent',fontSize:20,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>{e}</button>)}
          </div>
        </div>)}
      </div>}
      {/* Input bar */}
      <div style={{padding:'8px 12px 24px',background:T.card,borderTop:(showQuick||showEmoji)?'none':`1px solid ${T.border}`,display:'flex',gap:4,alignItems:'center'}}>
        <button onClick={()=>{setShowQuick(!showQuick);setShowEmoji(false)}} style={{width:30,height:30,borderRadius:15,border:`1px solid ${T.border}`,background:showQuick?`${T.accent2}10`:T.card,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:showQuick?T.accent2:T.textThi}}>{showQuick?'✕':'+'}</button>
        <button onClick={()=>{setShowEmoji(!showEmoji);setShowQuick(false)}} style={{width:30,height:30,borderRadius:15,border:`1px solid ${T.border}`,background:showEmoji?'#FEF3C7':T.card,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>😊</button>
        <button onClick={sendImage} disabled={sending} style={{width:30,height:30,borderRadius:15,border:`1px solid ${T.border}`,background:T.card,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>📷</button>
        <input value={chatInput} onChange={e=>setChatInput(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'&&chatInput.trim())sendMsg()}}
          onFocus={()=>{setShowQuick(false);setShowEmoji(false)}}
          placeholder="发送消息…" disabled={sending}
          style={{flex:1,padding:'8px 12px',borderRadius:20,border:`1.5px solid ${T.border}`,background:T.bg,fontSize:13,outline:'none'}}/>
        <button onClick={sendMsg} disabled={!chatInput.trim()||sending}
          style={{width:34,height:34,borderRadius:17,border:'none',
            background:(!chatInput.trim()||sending)?T.border:`linear-gradient(135deg,${T.accent2},${T.accent2}CC)`,
            color:'#fff',fontSize:14,cursor:(!chatInput.trim()||sending)?'default':'pointer',
            flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',
            boxShadow:(!chatInput.trim()||sending)?'none':`0 2px 8px ${T.accent2}30`}}>↑</button>
      </div>
      {/* Toast */}
      {toast&&<div style={{position:'fixed',top:'40%',left:'50%',transform:'translateX(-50%)',background:'rgba(0,0,0,0.75)',color:'#fff',padding:'10px 24px',borderRadius:20,fontSize:13,zIndex:600,animation:'fadeIn .2s ease'}}>{toast}</div>}
      {/* Profile modal */}
      {showProfile&&profile&&<CardDetailModal user={activeConv.user} profile={profile} onClose={()=>setShowProfile(false)} goTo={()=>{}}/>}
      {showReport&&<div style={{position:'fixed',inset:0,zIndex:500,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
        <div style={{background:T.card,borderRadius:'20px 20px 0 0',width:'100%',maxWidth:480,padding:'16px 16px 30px',animation:'slideUp .3s ease'}}>
          <div style={{width:32,height:4,borderRadius:2,background:T.border,margin:'0 auto 16px'}}/>
          {[{l:'🔍 搜索聊天记录',a:()=>{setShowReport(false);setSearchMode(true)}},
            {l:'👤 查看个人资料',a:()=>{setShowReport(false);setShowProfile(true)}},
            {l:'🚫 拉黑此人',a:()=>{if(confirm('确定拉黑'+activeConv.user.name+'？')){blockUser(activeConv.user.id);setShowReport(false);setActiveId(null);refreshConvs()}}},
            {l:'⚠️ 举报',a:()=>{setShowReport(false);setTimeout(()=>setShowReport('report'),100)}}
          ].map(it=><button key={it.l} onClick={it.a} style={{display:'block',width:'100%',padding:'14px 16px',border:'none',borderBottom:`1px solid ${T.border}`,background:'none',fontSize:14,color:it.l.includes('拉黑')||it.l.includes('举报')?T.primary:T.text,cursor:'pointer',textAlign:'left'}}>{it.l}</button>)}
          <button onClick={()=>setShowReport(false)} style={{display:'block',width:'100%',padding:'14px',border:'none',background:'none',fontSize:14,color:T.textThi,cursor:'pointer',marginTop:4}}>取消</button>
        </div>
      </div>}
      {showReport==='report'&&<ReportModal target={activeConv.user.name} onClose={()=>setShowReport(false)}/>}
    </div>);
  }

  // Conversation list
  const blacklist=getBlacklist();
  const filteredConvs=convs.filter(c=>!blacklist.includes(c.user.id)&&(!msgSearch||c.user.name.includes(msgSearch)||c.lastMessage?.includes(msgSearch)));
  return(<div style={{height:'100%',overflow:'auto',paddingBottom:80,background:T.bg}}>
    <div style={{padding:'14px 16px 0'}}>
      <div style={{fontSize:24,fontWeight:800,color:T.text,marginBottom:14}}>消息</div>
      {/* Search */}
      <div style={{position:'relative'}}>
        <input value={msgSearch||''} onChange={e=>setMsgSearch(e.target.value)} placeholder="搜索聊天记录…"
          style={{width:'100%',padding:'10px 14px 10px 36px',borderRadius:12,border:`1.5px solid ${T.accent2}40`,background:T.card,color:T.text,fontSize:13,outline:'none',boxSizing:'border-box'}}/>
        <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',fontSize:14,color:T.textThi}}>🔍</span>
      </div>
      {/* Tabs */}
      <div style={{display:'flex',gap:4,marginTop:10,marginBottom:14}}>
        {[{k:'chat',l:'聊天'},{k:'friends',l:'好友'},{k:'blocked',l:'黑名单'}].map(t=>(
          <button key={t.k} onClick={()=>setMsgTab(t.k)} style={{padding:'6px 16px',borderRadius:20,border:'none',fontSize:12,fontWeight:600,cursor:'pointer',
            background:msgTab===t.k?T.accent2:'#F3F4F6',color:msgTab===t.k?'#fff':T.textSec}}>{t.l}{t.k==='chat'&&filteredConvs.length>0?` ${filteredConvs.length}`:''}</button>
        ))}
      </div>
    </div>

    {/* Chat tab */}
    {msgTab==='chat'&&(filteredConvs.length===0?
      <div style={{padding:'60px 20px',textAlign:'center',color:T.textThi}}>
        <div style={{width:72,height:72,borderRadius:36,background:`${T.accent2}08`,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}><Icons.msgCircle s={32} c={`${T.accent2}40`}/></div>
        <div style={{fontSize:16,fontWeight:600,color:T.text}}>暂无匹配消息</div>
        <div style={{fontSize:13,marginTop:8,lineHeight:1.7,color:T.textThi}}>在首页右滑喜欢的人<br/>匹配成功后可以开始聊天</div>
      </div>
      :
      <div style={{padding:'0 16px'}}>{filteredConvs.map(conv=>{
        const convOnline=getBotOnline(conv.user);
        const timeAgo=conv.lastTime?(()=>{const ms=Date.now()-new Date(conv.lastTime).getTime();const min=Math.floor(ms/60000);if(min<1)return'刚刚';if(min<60)return min+'分钟前';const hr=Math.floor(min/60);if(hr<24)return hr+'小时前';return Math.floor(hr/24)+'天前'})():'';
        return(
        <div key={conv.id} onClick={()=>setActiveId(conv.id)} style={{background:T.card,borderRadius:14,padding:'12px 14px',boxShadow:T.shadow,marginBottom:8,display:'flex',alignItems:'center',gap:12,cursor:'pointer'}}>
          <div style={{width:48,height:48,borderRadius:24,background:'linear-gradient(135deg,#DDD6FE,#C4B5FD)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0,position:'relative'}}>
            {conv.user.gender==='female'?'👩':'👨'}
            <div style={{position:'absolute',bottom:0,right:0,width:10,height:10,borderRadius:5,background:convOnline?'#22C55E':'#D1D5DB',border:`2px solid ${T.card}`}}/>
            {conv.unread>0&&<div style={{position:'absolute',top:-2,right:-2,minWidth:16,height:16,borderRadius:8,background:'#EF4444',color:'#fff',fontSize:9,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 4px',border:`2px solid ${T.card}`}}>{conv.unread}</div>}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontSize:14,fontWeight:600,color:T.text}}>{conv.user.name}</span>
                {conv.user.score&&<span style={{fontSize:9,color:T.primary,fontWeight:600}}>{conv.user.score}%</span>}
              </div>
              <span style={{fontSize:10,color:T.textThi}}>{timeAgo}</span>
            </div>
            <div style={{fontSize:12,color:conv.unread>0?T.text:T.textThi,fontWeight:conv.unread>0?500:400,marginTop:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{conv.lastMessage||'匹配成功！打个招呼吧 👋'}</div>
          </div>
        </div>);
      })}</div>
    )}

    {/* Friends tab */}

function ReportModal({target,onClose}){
  const [reason,setReason]=useState('');const [done,setDone]=useState(false);

function DataManagementModal({profile,onClose,onLogout}){
  const dataItems=[
    {key:'yuanhe_profile',label:'出生信息',desc:'年月日时+性别+昵称',icon:'📋'},
    {key:'yuanhe_mode_results',label:'占卜报告',desc:Object.keys(JSON.parse(localStorage.getItem('yuanhe_mode_results')||'{}')).length+'条',icon:'🔮'},
    {key:'yuanhe_history',label:'占卜历史',desc:(JSON.parse(localStorage.getItem('yuanhe_history')||'[]')).length+'条记录',icon:'📜'},
    {key:'yuanhe_convs',label:'聊天记录',desc:'所有匹配会话+消息',icon:'💬'},
    {key:'yuanhe_blacklist',label:'黑名单',desc:(JSON.parse(localStorage.getItem('yuanhe_blacklist')||'[]')).length+'人',icon:'🚫'},
    {key:'yuanhe_privacy',label:'隐私设置',desc:localStorage.getItem('yuanhe_privacy')||'standard',icon:'🔐'},
  ];
  const exportData=()=>{
    const data={};
    dataItems.forEach(d=>{try{data[d.key]=JSON.parse(localStorage.getItem(d.key)||'null')}catch(e){data[d.key]=localStorage.getItem(d.key)}});
    data._exportTime=new Date().toISOString();
    data._version='缘合 v0.7.0';
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const link=document.createElement('a');
    link.download=`yuanhe_data_${Date.now()}.json`;
    link.href=URL.createObjectURL(blob);
    link.click();
  };
  const deleteItem=(key,label)=>{
    if(!confirm(`确定删除${label}？此操作不可恢复。`))return;
    localStorage.removeItem(key);
    if(key==='yuanhe_profile'){onLogout();onClose();return}
    onClose();setTimeout(()=>location.reload(),100);
  };
  const deleteAll=()=>{
    if(!confirm('⚠️ 确定删除所有数据并注销账号？\n\n这将清除:\n• 出生信息\n• 所有占卜报告\n• 聊天记录\n• 所有设置\n\n此操作不可恢复。'))return;
    const keys=Object.keys(localStorage).filter(k=>k.startsWith('yuanhe_'));
    keys.forEach(k=>localStorage.removeItem(k));
    onLogout();onClose();
  };
  return(
    <div style={{position:'fixed',inset:0,zIndex:400,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div style={{background:T.card,borderRadius:'24px 24px 0 0',width:'100%',maxWidth:480,maxHeight:'85vh',overflow:'auto',animation:'slideUp .3s ease',padding:'20px 16px 30px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{fontSize:18,fontWeight:700}}>📊 我的数据</div>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:16,border:'none',background:'#f0f0f0',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>
        <div style={{fontSize:11,color:T.textThi,marginBottom:14,padding:'8px 12px',background:'#F8FAFC',borderRadius:10}}>以下是缘合存储在你设备上的所有数据。数据仅保存在本地，不上传到服务器。</div>
        {dataItems.map(d=><div key={d.key} style={{display:'flex',alignItems:'center',gap:10,padding:'12px',borderRadius:12,border:`1px solid ${T.border}`,marginBottom:8}}>
          <span style={{fontSize:18}}>{d.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600}}>{d.label}</div>
            <div style={{fontSize:11,color:T.textThi,marginTop:2}}>{d.desc}</div>
          </div>
          <button onClick={()=>deleteItem(d.key,d.label)} style={{padding:'4px 10px',borderRadius:8,border:`1px solid #FECACA`,background:'#FEF2F2',fontSize:10,color:'#EF4444',cursor:'pointer'}}>删除</button>
        </div>)}
        <div style={{display:'flex',gap:8,marginTop:16}}>
          <button onClick={exportData} style={{flex:1,padding:'12px',borderRadius:12,border:'none',background:`linear-gradient(135deg,${T.accent2},${T.accent2}CC)`,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer'}}>📥 导出全部数据 (JSON)</button>
        </div>
        <button onClick={deleteAll} style={{width:'100%',padding:'12px',borderRadius:12,border:'1.5px solid #EF4444',background:T.card,color:'#EF4444',fontSize:13,fontWeight:600,cursor:'pointer',marginTop:8}}>⚠️ 删除所有数据并注销</button>
      </div>
    </div>
  );
}
