// ============ WUXING ENERGY RING ============
const WuxingRing = ({ size = 120, spin = false, highlight = null, glow = false }) => {
  const els = [
    { n: "金", c: "#F4C542", a: 0 }, { n: "水", c: "#45B7D1", a: 72 },
    { n: "木", c: "#34D399", a: 144 }, { n: "火", c: "#FF6B6B", a: 216 }, { n: "土", c: "#A0896B", a: 288 },
  ];
  const r = size / 2, ir = r * 0.58;
  return (
    <div style={{ width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ animation: spin ? "wuxingSpin 8s linear infinite" : "none" }}>
        {els.map(e => {
          const a1 = (e.a - 36) * Math.PI / 180, a2 = (e.a + 36) * Math.PI / 180;
          const ox = r * 0.92;
          const x1 = r + ox * Math.cos(a1), y1 = r + ox * Math.sin(a1);
          const x2 = r + ox * Math.cos(a2), y2 = r + ox * Math.sin(a2);
          const x3 = r + ir * Math.cos(a2), y3 = r + ir * Math.sin(a2);
          const x4 = r + ir * Math.cos(a1), y4 = r + ir * Math.sin(a1);
          const hi = highlight === e.n;
          return (
            <g key={e.n}>
              <path d={`M${x1},${y1} A${ox},${ox} 0 0,1 ${x2},${y2} L${x3},${y3} A${ir},${ir} 0 0,0 ${x4},${y4} Z`}
                fill={hi ? e.c : `${e.c}18`} stroke={hi ? e.c : `${e.c}40`} strokeWidth={hi ? 2.5 : 0.5}
                style={{ transition: "all 0.5s", filter: hi && glow ? `drop-shadow(0 0 ${size/8}px ${e.c})` : "none" }} />
              <text x={r + (r * 0.76) * Math.cos(e.a * Math.PI / 180)} y={r + (r * 0.76) * Math.sin(e.a * Math.PI / 180)}
                textAnchor="middle" dominantBaseline="central" fontSize={size > 60 ? 13 : 10} fontWeight={hi ? 800 : 400}
                fill={hi ? "#fff" : `${e.c}60`} style={{ transition: "all 0.5s" }}>{e.n}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
};

// ============ CASINO DESTINY WHEEL (12 slots, hidden→reveal, full overlay) ============
const CasinoWheel = ({ profiles, onResult, onClose, spinNum = 1, maxSpins = 2 }) => {
  const [phase, setPhase] = useState("ready"); // ready → spinning → result
  const [rotation, setRotation] = useState(0);
  const [resultIdx, setResultIdx] = useState(-1);
  const [tick, setTick] = useState(0);
  const [revealed, setRevealed] = useState(false);
  const count = profiles.length;
  const sliceAngle = 360 / count;
  const SEG = ["#C62828","#FF6B6B","#AD1457","#FFB347","#6A1B9A","#7C5CFC","#00695C","#34D399","#E65100","#45B7D1","#BF360C","#F4C542"];

  useEffect(() => {
    if (phase === "spinning" || phase === "result") {
      const ms = phase === "spinning" ? 100 : 450;
      const iv = setInterval(() => setTick(t => t + 1), ms);
      return () => clearInterval(iv);
    }
  }, [phase]);

  const spin = () => {
    if (phase !== "ready") return;
    setPhase("spinning");
    // Reveal faces after 0.8s of spinning
    setTimeout(() => setRevealed(true), 800);
    const ti = Math.floor(Math.random() * count);
    const sp = 2160 + Math.random() * 720;
    setRotation(r => r - sp - ti * sliceAngle + sliceAngle / 2);
    setTimeout(() => { setPhase("result"); setResultIdx(ti); }, 5000);
  };

  const res = resultIdx >= 0 ? profiles[resultIdx] : null;
  const W = 296, cx = W / 2;

  return (
    <div style={{ position: "absolute", inset: 0, zIndex: 100, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "radial-gradient(ellipse at center, #1a1030 0%, #0a0410 100%)", animation: "fadeInUp 0.25s ease-out" }}>
      <button onClick={onClose} style={{ position: "absolute", top: 48, right: 16, background: "none", border: "none", color: "rgba(255,255,255,0.35)", fontSize: 22, cursor: "pointer", zIndex: 10 }}>✕</button>

      <div style={{ marginBottom: 14, textAlign: "center" }}>
        <div style={{ fontSize: 10, letterSpacing: 6, color: "#F4C54290", fontWeight: 700 }}>WHEEL OF DESTINY</div>
        <div style={{ fontSize: 24, fontWeight: 800, color: "#fff", marginTop: 4, textShadow: "0 0 20px rgba(244,197,66,0.3)" }}>天命转轮</div>
        <div style={{ fontSize: 11, color: "rgba(255,255,255,0.35)", marginTop: 4 }}>第 {spinNum} / {maxSpins} 次</div>
      </div>

      <div style={{ position: "relative", width: W + 52, height: W + 52 }}>
        {/* Outer light bulbs — 24 */}
        {Array.from({ length: 24 }).map((_, i) => {
          const a = (i * 15) * Math.PI / 180, dr = (W + 44) / 2;
          const on = tick % 3 === (i % 3);
          return <div key={i} style={{ position: "absolute", left: 26 + cx + dr * Math.cos(a) - 5, top: 26 + cx + dr * Math.sin(a) - 5, width: 10, height: 10, borderRadius: "50%", background: on ? "#F4C542" : "#F4C54215", boxShadow: on ? "0 0 8px 3px #F4C54280" : "none", transition: "all 0.08s" }} />;
        })}
        {/* Inner light ring — 16 */}
        {Array.from({ length: 16 }).map((_, i) => {
          const a = (i * 22.5 + 11) * Math.PI / 180, dr = (W + 18) / 2;
          const on = tick % 2 === (i % 2);
          return <div key={`in${i}`} style={{ position: "absolute", left: 26 + cx + dr * Math.cos(a) - 3, top: 26 + cx + dr * Math.sin(a) - 3, width: 6, height: 6, borderRadius: "50%", background: on ? "#FF6B6B" : "#FF6B6B15", boxShadow: on ? "0 0 5px 1px #FF6B6B60" : "none", transition: "all 0.08s" }} />;
        })}

        {/* Gold ring */}
        <div style={{ position: "absolute", inset: 18, borderRadius: "50%", border: "3px solid #F4C54250", boxShadow: phase !== "ready" ? "0 0 60px #F4C54220, inset 0 0 40px #F4C54210" : "none", transition: "box-shadow 0.5s" }} />

        {/* Pointer */}
        <div style={{ position: "absolute", top: 2, left: "50%", transform: "translateX(-50%)", zIndex: 20 }}>
          <div style={{ width: 0, height: 0, borderLeft: "16px solid transparent", borderRight: "16px solid transparent", borderTop: "30px solid #F4C542", filter: "drop-shadow(0 4px 8px rgba(244,197,66,0.6))" }} />
          <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#F4C542", margin: "-6px auto 0", boxShadow: "0 0 10px #F4C542" }} />
        </div>

        {/* Wheel SVG — 12 segments */}
        <svg width={W} height={W} viewBox={`0 0 ${W} ${W}`} style={{ position: "absolute", top: 26, left: 26, transform: `rotate(${rotation}deg)`, transition: phase === "spinning" ? "transform 5s cubic-bezier(0.10,0.75,0.15,1)" : "none" }}>
          {profiles.map((p, i) => {
            const a1r = (i * sliceAngle - 90) * Math.PI / 180;
            const a2r = ((i + 1) * sliceAngle - 90) * Math.PI / 180;
            const R = cx - 2;
            const x1 = cx + R * Math.cos(a1r), y1 = cx + R * Math.sin(a1r);
            const x2 = cx + R * Math.cos(a2r), y2 = cx + R * Math.sin(a2r);
            const midA = i * sliceAngle + sliceAngle / 2 - 90;
            const mx = cx + R * 0.62 * Math.cos(midA * Math.PI / 180);
            const my = cx + R * 0.62 * Math.sin(midA * Math.PI / 180);
            return (
              <g key={p.id}>
                <path d={`M${cx},${cx} L${x1},${y1} A${R},${R} 0 0,1 ${x2},${y2} Z`} fill={i % 2 === 0 ? SEG[i % SEG.length] : `${SEG[i % SEG.length]}CC`} stroke="rgba(255,255,255,0.12)" strokeWidth="1.5" />
                {revealed ? (
                  <><text x={mx} y={my - 6} textAnchor="middle" dominantBaseline="central" fontSize="20" transform={`rotate(${midA + 90},${mx},${my - 4})`}>{p.photos[0]}</text>
                  <text x={mx} y={my + 12} textAnchor="middle" dominantBaseline="central" fontSize="8" fontWeight="700" fill="rgba(255,255,255,0.9)" transform={`rotate(${midA + 90},${mx},${my + 12})`}>{p.name}</text></>
                ) : (
                  <text x={mx} y={my} textAnchor="middle" dominantBaseline="central" fontSize="22" fontWeight="800" fill="rgba(255,255,255,0.2)" transform={`rotate(${midA + 90},${mx},${my})`}>?</text>
                )}
              </g>
            );
          })}
          <circle cx={cx} cy={cx} r={cx * 0.32} fill="none" stroke="rgba(244,197,66,0.3)" strokeWidth="2" />
        </svg>

        {/* Center hub */}
        <div onClick={spin} style={{ position: "absolute", top: 26 + cx - 42, left: 26 + cx - 42, width: 84, height: 84, borderRadius: "50%", zIndex: 10, background: phase === "spinning" ? "conic-gradient(from 0deg, #F4C542, #FF6B6B, #7C5CFC, #34D399, #F4C542)" : phase === "result" ? "linear-gradient(135deg, #F4C542, #FFB347)" : "linear-gradient(135deg, #1a0e28, #2d1a42)", border: "5px solid #F4C542", boxShadow: phase !== "ready" ? "0 0 30px rgba(244,197,66,0.6), inset 0 2px 12px rgba(0,0,0,0.3)" : "0 0 16px rgba(244,197,66,0.3), inset 0 2px 12px rgba(0,0,0,0.4)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", cursor: phase === "ready" ? "pointer" : "default", animation: phase === "spinning" ? "wuxingSpin 1s linear infinite" : "none" }}>
          {phase === "ready" && <><div style={{ fontSize: 22, color: "#F4C542", fontWeight: 800 }}>缘</div><div style={{ fontSize: 9, color: "#F4C54280", fontWeight: 700, letterSpacing: 2 }}>SPIN</div></>}
          {phase === "spinning" && <div style={{ fontSize: 28, color: "#fff" }}>✦</div>}
          {phase === "result" && <div style={{ fontSize: 28, color: "#1a0e28" }}>★</div>}
        </div>
      </div>

      {/* Bottom */}
      {phase === "ready" && (
        <div style={{ marginTop: 18, textAlign: "center" }}>
          <button onClick={spin} style={{ padding: "15px 48px", borderRadius: 30, border: "2px solid #F4C542", background: "linear-gradient(135deg, #F4C54220, #FF6B6B10)", color: "#F4C542", fontSize: 18, fontWeight: 800, cursor: "pointer", letterSpacing: 4, animation: "pulse 2s infinite", boxShadow: "0 0 30px #F4C54220, inset 0 0 20px #F4C54210" }}>转 动 命 运</button>
          <div style={{ fontSize: 11, color: "rgba(255,255,255,0.3)", marginTop: 10 }}>每日 {maxSpins} 次 · 第 {spinNum} 次天命揭晓</div>
        </div>
      )}
      {phase === "spinning" && (
        <div style={{ marginTop: 16, textAlign: "center" }}>
          <div style={{ fontSize: 16, color: "#F4C542", fontWeight: 700, letterSpacing: 4, animation: "pulse 0.8s infinite" }}>命运齿轮转动中...</div>
          <div style={{ fontSize: 11, color: "rgba(255,255,255,0.3)", marginTop: 6 }}>有缘人即将揭晓</div>
        </div>
      )}
      {phase === "result" && res && (
        <div style={{ marginTop: 18, width: 310, padding: 20, borderRadius: 22, textAlign: "center", background: "linear-gradient(160deg, rgba(244,197,66,0.12), rgba(255,107,107,0.08))", border: "1.5px solid rgba(244,197,66,0.35)", animation: "fadeInUp 0.5s ease-out", boxShadow: "0 12px 48px rgba(244,197,66,0.15)" }}>
          <div style={{ fontSize: 10, letterSpacing: 4, color: "#F4C542", fontWeight: 700, marginBottom: 12 }}>★ TODAY'S FATED MATCH ★</div>
          <div style={{ display: "flex", alignItems: "center", gap: 14, justifyContent: "center", marginBottom: 14 }}>
            <div style={{ width: 62, height: 62, borderRadius: "50%", background: `${ELEMENTS[res.element]}25`, border: `3px solid ${ELEMENTS[res.element]}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 32, boxShadow: `0 0 20px ${ELEMENTS[res.element]}40`, animation: "pulse 2s infinite" }}>{res.photos[0]}</div>
            <div style={{ textAlign: "left" }}>
              <div style={{ fontSize: 20, fontWeight: 800, color: "#fff" }}>{res.name}，{res.age}</div>
              <div style={{ display: "flex", gap: 5, marginTop: 5 }}>
                <span style={{ padding: "3px 10px", borderRadius: 10, fontSize: 11, fontWeight: 600, background: `${ELEMENTS[res.element]}30`, color: ELEMENTS[res.element] }}>{res.element}象</span>
                <span style={{ padding: "3px 10px", borderRadius: 10, fontSize: 11, fontWeight: 700, background: "#FF6B6B20", color: "#FF8A9B" }}>缘分 {res.score}%</span>
              </div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={onClose} style={{ flex: 1, padding: "12px 0", borderRadius: 16, border: "1px solid rgba(255,255,255,0.12)", background: "transparent", color: "rgba(255,255,255,0.45)", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>返回</button>
            <button onClick={() => onResult(res)} style={{ flex: 1, padding: "12px 0", borderRadius: 16, border: "none", background: "linear-gradient(135deg, #F4C542, #FFB347)", color: "#1a0e28", fontSize: 14, fontWeight: 800, cursor: "pointer", boxShadow: "0 4px 20px rgba(244,197,66,0.4)" }}>查看 TA ★</button>
          </div>
        </div>
      )}
    </div>
  );
};

// ============ WUXING MINI BAR (inline energy visualization) ============
const WuxingBar = ({ data, size = "sm" }) => {
  const wx = data || { 金: 2, 木: 2, 水: 2, 火: 2, 土: 2 };
  const max = Math.max(...Object.values(wx), 1);
  const h = size === "sm" ? 18 : 28;
  return (
    <div style={{ display: "flex", gap: 3, alignItems: "flex-end", height: h }}>
      {Object.entries(wx).map(([k, v]) => (
        <div key={k} style={{ display: "flex", flexDirection: "column", alignItems: "center", width: size === "sm" ? 16 : 22 }}>
          <div style={{ width: "100%", borderRadius: "3px 3px 0 0", background: ELEMENTS[k], height: `${(v / max) * (h - 8)}px`, minHeight: 3, transition: "height 0.5s ease" }} />
          <div style={{ fontSize: size === "sm" ? 8 : 10, color: ELEMENTS[k], fontWeight: 600, marginTop: 1 }}>{k}</div>
        </div>
      ))}
    </div>
  );
};

// ============ HOME — AUTO WHEEL (2x/day) + FORTUNE CARDS ============
const HomeScreen = ({ onNavigate }) => {
  const [ci, setCi] = useState(0);
  const [offset, setOffset] = useState(0);
  const [dragging, setDragging] = useState(false);
  const [exiting, setExiting] = useState(null);
  const [matched, setMatched] = useState(false);
  const [showWheel, setShowWheel] = useState(true); // auto-show on mount
  const [wheelCount, setWheelCount] = useState(0); // 0, 1, 2 = used times today
  const startX = useRef(0);
  const profile = MATCH_PROFILES[ci];
  const maxWheelPerDay = 2;

  // Auto-popup second wheel after browsing 3 cards
  const triggerRef = useRef(false);
  useEffect(() => {
    if (ci >= 3 && wheelCount === 1 && !triggerRef.current) {
      triggerRef.current = true;
      setTimeout(() => setShowWheel(true), 600);
    }
  }, [ci, wheelCount]);

  const onWheelComplete = (p) => {
    setShowWheel(false);
    setWheelCount(c => c + 1);
    onNavigate(S.PROFILE_DETAIL, { profile: p });
  };
  const onWheelClose = () => {
    setShowWheel(false);
    setWheelCount(c => c + 1);
  };

  const onStart = (x) => { startX.current = x; setDragging(true); };
  const onMove = (x) => { if (dragging) setOffset(x - startX.current); };
  const onEnd = () => {
    setDragging(false);
    if (Math.abs(offset) > 80) {
      const dir = offset > 0 ? "right" : "left";
      setExiting(dir);
      if (dir === "right" && ci === 0) { setTimeout(() => setMatched(true), 400); }
      else { setTimeout(() => { setCi(i => Math.min(i + 1, MATCH_PROFILES.length - 1)); setExiting(null); setOffset(0); }, 400); }
    } else { setOffset(0); }
  };

  if (matched) return <MatchSuccessScreen profile={MATCH_PROFILES[ci] || MATCH_PROFILES[0]}
    onChat={() => { setMatched(false); const mp = MATCH_PROFILES[ci] || MATCH_PROFILES[0]; onNavigate(S.CHAT, { friend: { ...mp, avatar: mp.photos[0], lastMsg: "", unread: 0 } }); }}
    onContinue={() => { setMatched(false); setCi(i => Math.min(i + 1, MATCH_PROFILES.length - 1)); setExiting(null); setOffset(0); }} />;

  if (!profile) return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: T.bg, padding: 32, paddingBottom: 68 }}>
      <WuxingRing size={120} spin />
      <div style={{ fontSize: 20, fontWeight: 700, color: T.text, marginTop: 20, marginBottom: 8 }}>今日推荐已看完</div>

    </div>

  const ec = ELEMENTS[profile.element];
  const wxData = profile.detail?.wuxing || { 金: 2, 木: 2, 水: 2, 火: 2, 土: 2 };
  const wheelLeft = maxWheelPerDay - wheelCount;

  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", background: T.bg, paddingBottom: 68, position: "relative" }}>
      {/* Header */}
      <div style={{ padding: "44px 16px 6px", display: "flex", alignItems: "center", gap: 10 }}>
        <WuxingRing size={44} highlight={profile.element} glow />
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 18, fontWeight: 800, color: T.primary }}>缘合</div>
          <div style={{ fontSize: 11, color: T.textThi }}>今日<span style={{ color: ec, fontWeight: 700 }}>{profile.element}</span>象能量活跃</div>
        </div>
        {/* Wheel remaining indicator */}
        {wheelLeft > 0 && (
          <div onClick={() => setShowWheel(true)} style={{ padding: "5px 10px", borderRadius: 12, background: "linear-gradient(135deg, #1a1028, #2a1a40)", display: "flex", alignItems: "center", gap: 4, cursor: "pointer", boxShadow: "0 2px 8px rgba(244,197,66,0.15)" }}>
            <span style={{ fontSize: 12, color: "#F4C542", fontWeight: 700 }}>★</span>
            <span style={{ fontSize: 10, color: "#F4C54280", fontWeight: 600 }}>{wheelLeft}</span>
          </div>
        )}
        <button onClick={() => onNavigate(S.CARDS)} style={{ width: 34, height: 34, borderRadius: "50%", border: `1.5px solid ${T.border}`, background: "#fff", fontSize: 15, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>✦</button>
        <button onClick={() => onNavigate(S.DAILY)} style={{ width: 34, height: 34, borderRadius: "50%", border: `1.5px solid ${T.border}`, background: "#fff", fontSize: 15, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>📅</button>
      </div>

      {/* Card stack */}
      <div style={{ flex: 1, position: "relative", margin: "6px 16px 0", perspective: 800, minHeight: 0 }}>
        {ci + 1 < MATCH_PROFILES.length && <div style={{ position: "absolute", inset: 6, borderRadius: 20, background: "#fff", boxShadow: T.shadow, transform: "scale(0.96)", opacity: 0.5 }} />}
        <div
          onMouseDown={e => onStart(e.clientX)} onMouseMove={e => dragging && onMove(e.clientX)}
          onMouseUp={onEnd} onMouseLeave={() => dragging && onEnd()}
          onTouchStart={e => onStart(e.touches[0].clientX)} onTouchMove={e => onMove(e.touches[0].clientX)} onTouchEnd={onEnd}
          style={{
            position: "absolute", inset: 0, borderRadius: 20, background: "#fff", boxShadow: T.shadowLg,
            transform: exiting ? `translateX(${exiting === "right" ? 400 : -400}px) rotate(${exiting === "right" ? 20 : -20}deg)` : `translateX(${offset}px) rotate(${rot}deg)`,
            transition: dragging ? "none" : "transform 0.4s cubic-bezier(0.4,0,0.2,1)",

          {offset < -20 && <div style={{ position: "absolute", top: 16, right: 16, padding: "8px 18px", borderRadius: 12, background: "rgba(255,107,107,0.12)", border: "2px solid #FF6B6B", color: "#FF6B6B", fontSize: 16, fontWeight: 800, transform: "rotate(12deg)", opacity: opa, zIndex: 10 }}>无缘</div>}

          {/* Photo area */}
          <div style={{ flex: 1, background: `linear-gradient(160deg, ${ec}22, ${ec}08)`, display: "flex", alignItems: "center", justifyContent: "center", position: "relative", minHeight: 0 }}>
            <div style={{ fontSize: 88 }}>{profile.photos[0]}</div>
            {/* Score + wuxing mini */}
            <div style={{ position: "absolute", top: 10, right: 10, padding: "6px 10px", borderRadius: 14, background: "rgba(255,255,255,0.95)", boxShadow: "0 2px 8px rgba(0,0,0,0.06)", display: "flex", alignItems: "center", gap: 6 }}>
              <WuxingBar data={wxData} />
              <div style={{ borderLeft: `1px solid ${T.border}`, paddingLeft: 6 }}>
                <div style={{ color: T.primary, fontWeight: 800, fontSize: 16, lineHeight: 1 }}>{profile.score}%</div>
                <div style={{ color: T.textThi, fontSize: 8 }}>缘分值</div>
              </div>
            </div>
            {profile.online && <div style={{ position: "absolute", top: 10, left: 10, padding: "3px 10px", borderRadius: 10, background: "rgba(52,211,153,0.15)", color: "#34D399", fontSize: 10, fontWeight: 600, display: "flex", alignItems: "center", gap: 4 }}><div style={{ width: 5, height: 5, borderRadius: "50%", background: "#34D399" }} />在线</div>}
          </div>

          {/* Info area — fortune-themed */}
          <div onClick={() => { if (Math.abs(offset) < 5) onNavigate(S.PROFILE_DETAIL, { profile }); }} style={{ padding: "10px 16px 14px", cursor: "pointer" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
              <span style={{ fontSize: 20, fontWeight: 700, color: T.text }}>{profile.name}，{profile.age}</span>

            <div style={{ padding: "8px 12px", borderRadius: 10, background: `${ec}08`, border: `1px solid ${ec}12`, marginBottom: 6 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 4, marginBottom: 3 }}>
                <span style={{ fontSize: 11, color: ec, fontWeight: 700 }}>☯ 缘分解读</span>
              </div>

            <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
              {profile.tags.map(t => <Badge key={t} color={ec}>{t}</Badge>)}

          </div>
        </div>
      </div>

      {/* Action buttons */}
      <div style={{ display: "flex", gap: 14, justifyContent: "center", padding: "8px 0 2px" }}>
        <button onClick={() => { setExiting("left"); setTimeout(() => { setCi(i => i + 1); setExiting(null); setOffset(0); }, 400); }}
          style={{ width: 52, height: 52, borderRadius: "50%", border: `2px solid ${T.border}`, background: "#fff", fontSize: 18, cursor: "pointer", boxShadow: T.shadow, display: "flex", alignItems: "center", justifyContent: "center", color: "#FF6B6B" }}>✕</button>
        {wheelLeft > 0 && (
          <button onClick={() => setShowWheel(true)}
            style={{ width: 46, height: 46, borderRadius: "50%", border: "none", background: "linear-gradient(135deg, #1a1028, #2d1a42)", fontSize: 16, cursor: "pointer", boxShadow: "0 2px 12px rgba(244,197,66,0.3)", display: "flex", alignItems: "center", justifyContent: "center", color: "#F4C542", alignSelf: "center" }}>★</button>
        )}
        <button onClick={() => onNavigate(S.CARDS)}
          style={{ width: 40, height: 40, borderRadius: "50%", border: `2px solid ${T.border}`, background: "#fff", fontSize: 14, cursor: "pointer", boxShadow: T.shadow, display: "flex", alignItems: "center", justifyContent: "center", color: "#7C5CFC", alignSelf: "center" }}>✦</button>
        <button onClick={() => { setExiting("right"); if (ci === 0) { setTimeout(() => setMatched(true), 400); } else { setTimeout(() => { setCi(i => i + 1); setExiting(null); setOffset(0); }, 400); } }}
          style={{ width: 52, height: 52, borderRadius: "50%", border: "none", background: "linear-gradient(135deg, #34D399, #6EE7B7)", fontSize: 22, cursor: "pointer", boxShadow: "0 4px 14px rgba(52,211,153,0.3)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff" }}>♥</button>
      </div>

      {/* Casino wheel overlay — auto-popup */}
      {showWheel && wheelCount < maxWheelPerDay && <CasinoWheel profiles={WHEEL_POOL}
        spinNum={wheelCount + 1} maxSpins={maxWheelPerDay}
        onResult={onWheelComplete}
        onClose={onWheelClose} />}
    </div>
  );
};

    </div>

const ChatScreen = ({ friend, onBack }) => {
  const f = friend || FRIENDS[0];
  const [msgs, setMsgs] = useState([
    { from: "sys", text: `匹配类型：互补型 · 缘分值 92%` },
    { from: "other", text: "嗨～看到匹配通知就过来了！你今天的每日状态是什么呀？" },

  ]);
  const [input, setInput] = useState("");
  const scrollRef = useRef(null);
  useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [msgs]);

  const send = () => {

  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", background: T.bg }}>

        <button style={{ background: "none", border: "none", fontSize: 18, color: T.textSec, cursor: "pointer" }}>⋯</button>
      </div>
      <div ref={scrollRef} style={{ flex: 1, overflow: "auto", padding: 16, display: "flex", flexDirection: "column", gap: 10 }}>
        {msgs.map((m, i) => {
          if (m.from === "sys") return <div key={i} style={{ alignSelf: "center", padding: "6px 16px", borderRadius: 14, background: `${T.primary}10`, fontSize: 12, color: T.primary, fontWeight: 600 }}>{m.text}</div>;
          if (m.from === "ai") return <div key={i} style={{ alignSelf: "center", padding: "10px 16px", borderRadius: 14, background: `${T.accent2}10`, border: `1px solid ${T.accent2}20`, fontSize: 12, color: T.accent2, fontWeight: 500, maxWidth: "90%", textAlign: "center", lineHeight: 1.6 }}>{m.text}</div>;
          const isMe = m.from === "me";
          return (
            <div key={i} style={{ display: "flex", justifyContent: isMe ? "flex-end" : "flex-start", gap: 8, alignItems: "flex-end" }}>
              {!isMe && <Avatar emoji={f.avatar} size={28} element={f.element} />}
              <div style={{ maxWidth: "70%", padding: "11px 16px", borderRadius: isMe ? "18px 18px 4px 18px" : "18px 18px 18px 4px", background: isMe ? "linear-gradient(135deg, #FF6B6B, #FF8A9B)" : "#fff", boxShadow: isMe ? "none" : T.shadow, color: isMe ? "#fff" : T.text, fontSize: 14, lineHeight: 1.6 }}>{m.text}</div>
            </div>
          );
        })}
      </div>
      <div style={{ padding: "10px 16px 28px", display: "flex", gap: 8, background: "#fff", borderTop: `1px solid ${T.border}` }}>
        <button style={{ background: "none", border: "none", color: T.textThi, fontSize: 22, cursor: "pointer" }}>+</button>
        <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === "Enter" && send()} placeholder="发消息..." style={{ flex: 1, padding: "11px 18px", borderRadius: 24, border: `2px solid ${T.border}`, background: T.bg, color: T.text, fontSize: 14, outline: "none" }} />

      </div>
    </div>
  );
};

const DailyScreen = ({ onBack }) => {
  const now = new Date();
  const weekDays = ["日","一","二","三","四","五","六"];
  const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 · 星期${weekDays[now.getDay()]}`;
  const TG = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  const DZ = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  const base = new Date(2000, 0, 7);
  const diff = Math.round((now - base) / 864e5);
  const idx = ((diff % 60) + 60) % 60;
  const dayGZ = TG[idx%10] + DZ[idx%12];
  const dayWx = {甲:'木',乙:'木',丙:'火',丁:'火',戊:'土',己:'土',庚:'金',辛:'金',壬:'水',癸:'水'}[TG[idx%10]];
  const themes = {木:'生长·进取',火:'表达·行动',土:'稳定·积累',金:'决断·整理',水:'思考·沉淀'};
  return (
    <div style={{ height: "100%", overflow: "auto", background: T.bg }}>
      <TopBar title="" onBack={onBack} />
      <div style={{ padding: "0 20px 32px" }}>
        <div style={{ fontSize: 13, color: T.textThi, fontWeight: 600, marginBottom: 8 }}>{dateStr}</div>
        <div style={{ fontSize: 24, fontWeight: 700, color: T.text, marginBottom: 16 }}>今日状态</div>
        <div style={{ padding: 24, borderRadius: 20, background: `linear-gradient(135deg, ${ELEMENTS[dayWx]}15, ${ELEMENTS[dayWx]}05)`, border: `1px solid ${ELEMENTS[dayWx]}20`, marginBottom: 16, textAlign: "center" }}>
          <div style={{ fontSize: 36, fontWeight: 700, color: ELEMENTS[dayWx], marginBottom: 6 }}>{themes[dayWx]}</div>
          <div style={{ fontSize: 14, color: T.textSec }}>{dayGZ}日 · {dayWx}旺</div>
        </div>
      {[
        { title: "今日关键词", items: ["独处", "反思", "整理", "沉淀"], color: T.primary },
        { title: "关系建议", items: ["避免情绪波动时做承诺", "适合与老朋友深度对话", "给自己和伴侣一些空间"], color: T.accent4 },

// ============ MAIN ============
export default function YuanHe() {
  const [scr, setScr] = useState(S.SPLASH);
  const [data, setData] = useState({});
  const [hist, setHist] = useState([]);
  const [follows, setFollows] = useState(new Set([1, 3]));
  const [blocked, setBlocked] = useState(new Set());
  const [myPosts, setMyPosts] = useState([
    { id: 'p1', content: '今天八字分析让我对自己有了新的认识，原来我是辛金日主～', time: '2天前', likes: 12, comments: 3 },
  ]);
  const [allPosts, setAllPosts] = useState([...DISCOVER_POSTS]);
  const TABS = [S.HOME, S.DISCOVER, S.AI, S.MSGS, S.ME];

  const nav = useCallback((s, d = {}) => { setHist(h => [...h, { scr, data }]); setScr(s); setData(d); }, [scr, data]);
  const back = useCallback(() => { if (hist.length) { const p = hist[hist.length - 1]; setHist(h => h.slice(0, -1)); setScr(p.scr); setData(p.data); } else setScr(S.HOME); }, [hist]);
  const tabNav = useCallback((s) => { setHist([]); setScr(s); setData({}); }, []);
  const toggleFollow = useCallback((id) => setFollows(f => { const n = new Set(f); n.has(id) ? n.delete(id) : n.add(id); return n; }), []);
  const blockUser = useCallback((id) => { setBlocked(b => { const n = new Set(b); n.add(id); return n; }); setFollows(f => { const n = new Set(f); n.delete(id); return n; }); }, []);
  const unblockUser = useCallback((id) => setBlocked(b => { const n = new Set(b); n.delete(id); return n; }), []);
  const addPost = useCallback((text) => {
    const p = { id: `p${Date.now()}`, user: "金象·洞察者", avatar: "✦", element: "金", content: text, likes: 0, comments: 0, time: "刚刚", img: null };
    setAllPosts(prev => [p, ...prev]);
    setMyPosts(prev => [{ id: p.id, content: text, time: "刚刚", likes: 0, comments: 0 }, ...prev]);
  }, []);
  const likePost = useCallback((idx) => setAllPosts(p => p.map((x,i) => i===idx ? {...x, likes: x.likes+1} : x)), []);
  const logout = useCallback(() => { setHist([]); setScr(S.LOGIN); }, []);

  const render = () => {
    switch (scr) {
      // Auth flow
      case S.SPLASH: return <SplashScreen onNext={() => setScr(S.LOGIN)} />;
      case S.LOGIN: return <LoginScreen onLogin={() => setScr(S.HOME)} onRegister={() => setScr(S.REGISTER)} />;
      case S.REGISTER: return <RegisterScreen onRegister={() => setScr(S.ONBOARD1)} onBack={() => setScr(S.LOGIN)} />;
      // Onboarding (only for new users)
      case S.ONBOARD1: return <OnboardScreen step={1} onNext={() => setScr(S.ONBOARD2)} onSkip={() => setScr(S.BIRTH)} />;
      case S.ONBOARD2: return <OnboardScreen step={2} onNext={() => setScr(S.ONBOARD3)} onSkip={() => setScr(S.BIRTH)} />;
      case S.ONBOARD3: return <OnboardScreen step={3} onNext={() => setScr(S.BIRTH)} onSkip={() => setScr(S.BIRTH)} />;
      case S.BIRTH: return <BirthScreen onSubmit={() => setScr(S.LOADING)} />;
      case S.LOADING: return <LoadingScreen onDone={() => setScr(S.HOME)} />;
      // Main tabs
      case S.HOME: return <HomeScreen onNavigate={nav} />;
      case S.DISCOVER: return <DiscoverScreen onNavigate={nav} posts={allPosts} onLike={likePost} />;
      case S.AI: return <AIScreen isTab />;
      case S.MSGS: return <MsgsScreen onNavigate={nav} follows={follows} onToggleFollow={toggleFollow} />;
      case S.ME: return <MeScreen onNavigate={nav} myPosts={myPosts} follows={follows} />;
      // Detail screens
      case S.CHAT: return <ChatScreen friend={data.friend} onBack={back} />;
      case S.CARDS: return <CardsListScreen onNavigate={nav} onBack={back} />;
      case S.CARD_DETAIL: return <CardDetailScreen ci={data.ci} onBack={back} onNavigate={nav} />;
      case S.DAILY: return <DailyScreen onBack={back} />;
      case S.TASKS: return <TasksScreen onBack={back} />;
      case S.PROFILE_DETAIL: return <ProfileDetailScreen profile={data.profile} onBack={back} onNavigate={nav} follows={follows} onToggleFollow={toggleFollow} onBlock={blockUser} />;
      // Publish & posts
      case S.PUBLISH: return <PublishScreen onBack={back} onPublish={addPost} />;
      case S.POST_DETAIL: return <PostDetailScreen post={data.post} onBack={back} />;
      // Settings & sub-pages
      case S.SETTINGS: return <SettingsScreen onBack={back} onNavigate={nav} onLogout={logout} />;
      case S.ACCOUNT_SECURITY: return <AccountSecurityScreen onBack={back} />;
      case S.EDIT_PROFILE: return <EditProfileScreen onBack={back} />;
      case S.ABOUT: return <AboutScreen onBack={back} />;
      case S.BLACKLIST: return <BlacklistScreen onBack={back} blocked={blocked} onUnblock={unblockUser} />;
      // Membership & reports
      case S.MEMBERSHIP: return <MembershipScreen onBack={back} />;
      case S.REPORTS: return <ReportsScreen onBack={back} />;
      // My content
      case S.MY_POSTS: return <MyPostsScreen onBack={back} posts={myPosts} onDelete={(id) => setMyPosts(p => p.filter(x => x.id !== id))} />;
      case S.MY_PROFILE: return <MyProfileScreen onBack={back} onNavigate={nav} />;
      case S.FOLLOWING: return <FollowingScreen onBack={back} onNavigate={nav} follows={follows} onToggleFollow={toggleFollow} />;
      case S.SHARE_CARD: return <ShareCardScreen ci={data.ci} onBack={back} />;
      default: return <HomeScreen onNavigate={nav} />;
    }
  };

  return (
    <div style={{ display: "flex", justifyContent: "center", alignItems: "center", minHeight: "100vh", background: "#E8E6E0", fontFamily: "-apple-system, 'SF Pro Display', 'PingFang SC', sans-serif" }}>
      <style>{`
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%,100% { transform: translateY(0); opacity: 0.4; } 50% { transform: translateY(-5px); opacity: 1; } }
        @keyframes wuxingSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 0; }
        input::placeholder { color: #9CA3AF; }
        select { color: #1A1A2E; }
        select option { background: #fff; }
      `}</style>
      <div style={{ width: 375, height: 740, borderRadius: 36, overflow: "hidden", background: T.bg, position: "relative", boxShadow: "0 20px 60px rgba(0,0,0,0.15)", border: "8px solid #1a1a1a" }}>
        {render()}
        {TABS.includes(scr) && <TabBar active={scr} onTap={tabNav} />}
      </div>
    </div>
  );
}
