<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>缘合 · 占术引擎测试</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'PingFang SC', sans-serif; background: #f5f5f0; color: #1a1a2e; min-height: 100vh; }
  .container { max-width: 800px; margin: 0 auto; padding: 20px; }
  h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: #6b7280; font-size: 14px; margin-bottom: 20px; }
  .status { padding: 10px 16px; border-radius: 10px; background: #fff; border: 1px solid #e5e5e0; margin-bottom: 16px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .status .dot { width: 8px; height: 8px; border-radius: 50%; }
  .status .dot.ok { background: #34d399; }
  .status .dot.err { background: #f87171; }
  .card { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .card h2 { font-size: 16px; margin-bottom: 12px; }
  .input-row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .input-row label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: #6b7280; font-weight: 600; }
  .input-row input, .input-row select { padding: 10px 12px; border-radius: 10px; border: 1px solid #e5e5e0; font-size: 14px; width: 100px; }
  .input-row input:focus, .input-row select:focus { outline: none; border-color: #7c5cfc; }
  .mode-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .mode-tab { padding: 10px 16px; border-radius: 12px; border: 2px solid #e5e5e0; background: #fff; cursor: pointer; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
  .mode-tab:hover { border-color: #c4c4be; }
  .mode-tab.active { border-color: var(--c); background: var(--bg); color: var(--c); }
  .question-input { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #e5e5e0; font-size: 14px; margin-bottom: 12px; }
  .question-input:focus { outline: none; border-color: #7c5cfc; }
  .btn-row { display: flex; gap: 10px; }
  .btn { padding: 12px 24px; border-radius: 12px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: linear-gradient(135deg, #7c5cfc, #a78bfa); color: #fff; box-shadow: 0 2px 8px rgba(124,92,252,0.3); }
  .btn-primary:hover { transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-secondary { background: #f5f5f0; color: #1a1a2e; border: 1px solid #e5e5e0; }
  .result-box { margin-top: 16px; }
  .result-section { padding: 16px; border-radius: 12px; margin-bottom: 10px; }
  .result-section h3 { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .result-section pre { font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; font-family: 'SF Mono', monospace; }
  .engine-result { background: #f0f9ff; border: 1px solid #bae6fd; }
  .engine-result h3 { color: #0369a1; }
  .ai-result { background: #fdf4ff; border: 1px solid #e9d5ff; }
  .ai-result h3 { color: #7c3aed; }
  .ai-result .text { font-size: 15px; line-height: 1.8; font-family: -apple-system, sans-serif; }
  .error-result { background: #fef2f2; border: 1px solid #fecaca; }
  .error-result h3 { color: #dc2626; }
  .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid #e5e5e0; border-top-color: #7c5cfc; border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .info { font-size: 12px; color: #9ca3af; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <h1>缘合 · 占术引擎测试</h1>
  <p class="subtitle">5种占术引擎 + Cherry Studio LLM 本地测试</p>

  <!-- 状态 -->
  <div class="status" id="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">检测连接中...</span>
  </div>

  <!-- 出生信息 -->
  <div class="card">
    <h2>📅 出生信息</h2>
    <div class="input-row">
      <label>年 <input type="number" id="year" value="1996" min="1940" max="2020"></label>
      <label>月 <input type="number" id="month" value="8" min="1" max="12"></label>
      <label>日 <input type="number" id="day" value="15" min="1" max="31"></label>
      <label>时(24h) <input type="number" id="hour" value="14" min="0" max="23"></label>
      <label>性别
        <select id="gender"><option value="female">女</option><option value="male">男</option></select>
      </label>
    </div>
    <div class="input-row" style="margin-top:4px">
      <label>当前城市 <input type="text" id="city" value="北京" style="width:140px" placeholder="如：上海"></label>
    </div>
  </div>

  <!-- 模式选择 -->
  <div class="card">
    <h2>🔮 选择占术模式</h2>
    <div class="mode-tabs">
      <div class="mode-tab active" data-mode="bazi" style="--c:#FF6B6B;--bg:#FF6B6B15" onclick="selectMode('bazi')">
        ☰ 八字命理
      </div>
      <div class="mode-tab" data-mode="astrology" style="--c:#7C5CFC;--bg:#7C5CFC15" onclick="selectMode('astrology')">
        ★ 星座运势
      </div>
      <div class="mode-tab" data-mode="tarot" style="--c:#4ECDC4;--bg:#4ECDC415" onclick="selectMode('tarot')">
        ✦ 塔罗牌
      </div>
      <div class="mode-tab" data-mode="meihua" style="--c:#FFB347;--bg:#FFB34715" onclick="selectMode('meihua')">
        ❀ 梅花易数
      </div>
      <div class="mode-tab" data-mode="vedic" style="--c:#45B7D1;--bg:#45B7D115" onclick="selectMode('vedic')">
        ◎ 印度占星
      </div>
    </div>

    <!-- 塔罗牌选牌面板（仅tarot模式显示） -->
    <div id="tarotPanel" style="display:none;margin-bottom:12px">
      <div style="font-size:13px;font-weight:600;color:#4ECDC4;margin-bottom:8px">✦ 选择3张牌（点击翻牌）</div>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <div class="tarot-slot" id="slot0" onclick="openCardPicker(0)" style="flex:1;height:100px;border-radius:12px;border:2px dashed #4ECDC450;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:#4ECDC408;transition:all 0.2s">
          <div style="font-size:20px;margin-bottom:4px">🂠</div>
          <div style="font-size:11px;color:#4ECDC4;font-weight:600">过去</div>
        </div>
        <div class="tarot-slot" id="slot1" onclick="openCardPicker(1)" style="flex:1;height:100px;border-radius:12px;border:2px dashed #4ECDC450;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:#4ECDC408;transition:all 0.2s">
          <div style="font-size:20px;margin-bottom:4px">🂠</div>
          <div style="font-size:11px;color:#4ECDC4;font-weight:600">现在</div>
        </div>
        <div class="tarot-slot" id="slot2" onclick="openCardPicker(2)" style="flex:1;height:100px;border-radius:12px;border:2px dashed #4ECDC450;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:#4ECDC408;transition:all 0.2s">
          <div style="font-size:20px;margin-bottom:4px">🂠</div>
          <div style="font-size:11px;color:#4ECDC4;font-weight:600">未来</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <button onclick="randomTarot()" style="padding:8px 14px;border-radius:8px;border:1px solid #4ECDC4;background:#fff;color:#4ECDC4;font-size:12px;font-weight:600;cursor:pointer">🎲 随机抽牌</button>
        <button onclick="clearTarot()" style="padding:8px 14px;border-radius:8px;border:1px solid #e5e5e0;background:#fff;color:#9ca3af;font-size:12px;cursor:pointer">清空重选</button>
        <span id="tarotStatus" style="font-size:11px;color:#9ca3af;margin-left:auto">已选 0/3</span>
      </div>
      <!-- 牌库弹出层 -->
      <div id="cardPicker" style="display:none;margin-top:10px;max-height:200px;overflow-y:auto;border:1px solid #e5e5e0;border-radius:12px;padding:8px;background:#fff">
        <div style="font-size:11px;color:#9ca3af;margin-bottom:6px" id="pickerTitle">选择一张牌：</div>
        <div id="pickerGrid" style="display:flex;flex-wrap:wrap;gap:4px"></div>
      </div>
    </div>

    <!-- 梅花易数起卦面板（仅meihua模式显示） -->
    <div id="meihuaPanel" style="display:none;margin-bottom:12px">
      <div style="font-size:13px;font-weight:600;color:#FFB347;margin-bottom:8px">❀ 起卦方式</div>
      <div style="display:flex;gap:6px;margin-bottom:10px">
        <button id="mhTimeBtn" onclick="setMeihuaMode('time')" style="flex:1;padding:10px;border-radius:10px;border:2px solid #FFB347;background:#FFB347;color:#fff;font-size:12px;font-weight:600;cursor:pointer">⏰ 时间起卦<br><span style="font-weight:400;font-size:10px;opacity:0.8">自动·当前时辰</span></button>
        <button id="mhNumBtn" onclick="setMeihuaMode('number')" style="flex:1;padding:10px;border-radius:10px;border:2px solid #e5e5e0;background:#fff;color:#6b7280;font-size:12px;font-weight:600;cursor:pointer">🔢 数字起卦<br><span style="font-weight:400;font-size:10px;opacity:0.8">手动/随机报数</span></button>
      </div>
      <div id="mhNumberInputs" style="display:none">
        <div style="display:flex;gap:8px;align-items:end">
          <label style="flex:1;font-size:12px;color:#6b7280;font-weight:600">
            第一个数（上卦）
            <input type="number" id="mhNum1" min="1" max="999" style="width:100%;padding:10px;border-radius:10px;border:1px solid #e5e5e0;font-size:16px;font-weight:700;text-align:center;margin-top:4px" placeholder="1-999">
          </label>
          <label style="flex:1;font-size:12px;color:#6b7280;font-weight:600">
            第二个数（下卦，可选）
            <input type="number" id="mhNum2" min="1" max="999" style="width:100%;padding:10px;border-radius:10px;border:1px solid #e5e5e0;font-size:16px;font-weight:700;text-align:center;margin-top:4px" placeholder="可不填">
          </label>
        </div>
        <div style="display:flex;gap:6px;margin-top:8px">
          <button onclick="randomMeihua()" style="padding:8px 14px;border-radius:8px;border:1px solid #FFB347;background:#fff;color:#FFB347;font-size:12px;font-weight:600;cursor:pointer">🎲 随机报数</button>
          <span style="font-size:11px;color:#9ca3af;align-self:center">心中想着问题，然后随意报一个数</span>
        </div>
      </div>
    </div>

    <!-- 提问 -->
    <input class="question-input" id="question" placeholder="留空=全面分析 | 输入具体问题=深度聚焦" value="">

    <!-- 显示模式 -->
    <div style="display:flex;gap:6px;margin-bottom:12px">
      <button class="mode-toggle active" id="btnSimple" onclick="setDisplayMode('simple')" style="flex:1;padding:10px;border-radius:10px;border:2px solid #7C5CFC;background:#7C5CFC;color:#fff;font-size:13px;font-weight:600;cursor:pointer">🌟 大众模式<br><span style="font-weight:400;font-size:11px;opacity:0.8">通俗易懂·像朋友聊天</span></button>
      <button class="mode-toggle" id="btnExpert" onclick="setDisplayMode('expert')" style="flex:1;padding:10px;border-radius:10px;border:2px solid #e5e5e0;background:#fff;color:#6b7280;font-size:13px;font-weight:600;cursor:pointer">📋 专家模式<br><span style="font-weight:400;font-size:11px;opacity:0.8">完整排盘·神煞详解</span></button>
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="runCalculateOnly()">仅计算引擎</button>
      <button class="btn btn-primary" id="btnDivine" onclick="runDivine()">🔮 引擎 + AI 解读</button>
    </div>
  </div>

  <!-- 结果 -->
  <div id="results"></div>
</div>

<script>
let currentMode = 'bazi';
let displayMode = 'simple';

function setDisplayMode(m) {
  displayMode = m;
  document.getElementById('btnSimple').style.background = m === 'simple' ? '#7C5CFC' : '#fff';
  document.getElementById('btnSimple').style.color = m === 'simple' ? '#fff' : '#6b7280';
  document.getElementById('btnSimple').style.borderColor = m === 'simple' ? '#7C5CFC' : '#e5e5e0';
  document.getElementById('btnExpert').style.background = m === 'expert' ? '#7C5CFC' : '#fff';
  document.getElementById('btnExpert').style.color = m === 'expert' ? '#fff' : '#6b7280';
  document.getElementById('btnExpert').style.borderColor = m === 'expert' ? '#7C5CFC' : '#e5e5e0';
}

function selectMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
  // Show/hide mode-specific panels
  document.getElementById('tarotPanel').style.display = mode === 'tarot' ? 'block' : 'none';
  document.getElementById('meihuaPanel').style.display = mode === 'meihua' ? 'block' : 'none';
}

// ========== 塔罗牌选牌 ==========
let tarotDeck = [];
let selectedCards = [null, null, null]; // 3 slots
let activeSlot = -1;

async function loadTarotDeck() {
  try {
    const res = await fetch('/api/tarot/deck');
    tarotDeck = await res.json();
  } catch(e) { console.log('Failed to load tarot deck'); }
}

function openCardPicker(slotIdx) {
  activeSlot = slotIdx;
  const picker = document.getElementById('cardPicker');
  const grid = document.getElementById('pickerGrid');
  const title = document.getElementById('pickerTitle');
  const posNames = ['过去', '现在', '未来'];
  title.textContent = `为「${posNames[slotIdx]}」位选择一张牌：`;
  // Build grid
  const usedIds = selectedCards.filter(c => c).map(c => c.cardId);
  grid.innerHTML = tarotDeck.map(c => {
    const used = usedIds.includes(c.id);
    return `<button onclick="pickCard(${c.id})" ${used?'disabled':''} style="padding:6px 8px;border-radius:6px;border:1px solid ${used?'#e5e5e0':'#4ECDC4'};background:${used?'#f5f5f0':'#fff'};color:${used?'#ccc':'#333'};font-size:11px;cursor:${used?'not-allowed':'pointer'};white-space:nowrap;transition:all 0.15s" ${used?'':'onmouseover="this.style.background=\'#4ECDC420\'" onmouseout="this.style.background=\'#fff\'"'}>${c.zh}</button>`;
  }).join('');
  picker.style.display = 'block';
}

function pickCard(cardId) {
  if (activeSlot < 0) return;
  const card = tarotDeck.find(c => c.id === cardId);
  const reversed = Math.random() > 0.7; // 30% chance reversed
  selectedCards[activeSlot] = { cardId: card.id, zh: card.zh, reversed };
  // Update slot display
  const slot = document.getElementById('slot' + activeSlot);
  slot.innerHTML = `<div style="font-size:14px;font-weight:700;color:#4ECDC4">${card.zh}</div><div style="font-size:10px;color:${reversed?'#FF6B6B':'#34D399'}">${reversed?'逆位':'正位'}</div>`;
  slot.style.border = '2px solid #4ECDC4';
  slot.style.background = '#4ECDC415';
  document.getElementById('cardPicker').style.display = 'none';
  activeSlot = -1;
  updateTarotStatus();
}

function randomTarot() {
  // Pick 3 random cards
  const shuffled = [...tarotDeck].sort(() => Math.random() - 0.5);
  for (let i = 0; i < 3; i++) {
    const c = shuffled[i];
    const reversed = Math.random() > 0.7;
    selectedCards[i] = { cardId: c.id, zh: c.zh, reversed };
    const slot = document.getElementById('slot' + i);
    slot.innerHTML = `<div style="font-size:14px;font-weight:700;color:#4ECDC4">${c.zh}</div><div style="font-size:10px;color:${reversed?'#FF6B6B':'#34D399'}">${reversed?'逆位':'正位'}</div>`;
    slot.style.border = '2px solid #4ECDC4';
    slot.style.background = '#4ECDC415';
  }
  document.getElementById('cardPicker').style.display = 'none';
  updateTarotStatus();
}

function clearTarot() {
  selectedCards = [null, null, null];
  const posNames = ['过去', '现在', '未来'];
  for (let i = 0; i < 3; i++) {
    const slot = document.getElementById('slot' + i);
    slot.innerHTML = `<div style="font-size:20px;margin-bottom:4px">🂠</div><div style="font-size:11px;color:#4ECDC4;font-weight:600">${posNames[i]}</div>`;
    slot.style.border = '2px dashed #4ECDC450';
    slot.style.background = '#4ECDC408';
  }
  document.getElementById('cardPicker').style.display = 'none';
  updateTarotStatus();
}

function updateTarotStatus() {
  const count = selectedCards.filter(c => c).length;
  document.getElementById('tarotStatus').textContent = `已选 ${count}/3`;
}

// ========== 梅花易数报数 ==========
let meihuaMode = 'time';

function setMeihuaMode(mode) {
  meihuaMode = mode;
  document.getElementById('mhTimeBtn').style.background = mode === 'time' ? '#FFB347' : '#fff';
  document.getElementById('mhTimeBtn').style.color = mode === 'time' ? '#fff' : '#6b7280';
  document.getElementById('mhTimeBtn').style.borderColor = mode === 'time' ? '#FFB347' : '#e5e5e0';
  document.getElementById('mhNumBtn').style.background = mode === 'number' ? '#FFB347' : '#fff';
  document.getElementById('mhNumBtn').style.color = mode === 'number' ? '#fff' : '#6b7280';
  document.getElementById('mhNumBtn').style.borderColor = mode === 'number' ? '#FFB347' : '#e5e5e0';
  document.getElementById('mhNumberInputs').style.display = mode === 'number' ? 'block' : 'none';
}

function randomMeihua() {
  document.getElementById('mhNum1').value = Math.floor(Math.random() * 999) + 1;
  if (Math.random() > 0.5) {
    document.getElementById('mhNum2').value = Math.floor(Math.random() * 999) + 1;
  } else {
    document.getElementById('mhNum2').value = '';
  }
}

function getProfile() {
  return {
    year: document.getElementById('year').value,
    month: document.getElementById('month').value,
    day: document.getElementById('day').value,
    hour: document.getElementById('hour').value,
    city: document.getElementById('city').value || '北京',
  };
}

function showResult(html) {
  document.getElementById('results').innerHTML = html;
}

// 获取模式特定参数
function getModeExtra() {
  const extra = {};
  if (currentMode === 'tarot') {
    const filled = selectedCards.filter(c => c);
    if (filled.length === 3) extra.selectedCards = filled;
  }
  if (currentMode === 'meihua' && meihuaMode === 'number') {
    const n1 = document.getElementById('mhNum1').value;
    if (n1) extra.meihuaNum1 = n1;
    const n2 = document.getElementById('mhNum2').value;
    if (n2) extra.meihuaNum2 = n2;
  }
  return extra;
}

// 健康检查 + 加载塔罗牌组
async function checkHealth() {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  try {
    const res = await fetch('/api/health');
    const data = await res.json();
    dot.className = 'dot ok';
    text.textContent = `已连接 · 模型: ${data.llm.model} · LLM: ${data.llm.baseUrl}`;
    loadTarotDeck();
  } catch (e) {
    dot.className = 'dot err';
    text.textContent = '无法连接测试服务器，请确认 node test-server.js 正在运行';
  }
}

// 仅引擎计算
async function runCalculateOnly() {
  const profile = getProfile();
  const extra = getModeExtra();
  showResult('<div class="result-section engine-result"><h3>⏳ 计算中...</h3><div class="loading"></div></div>');

  try {
    const res = await fetch('/api/calculate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode: currentMode, ...profile, displayMode, ...extra }),
    });
    const data = await res.json();
    const modeNames = { bazi: '八字命理', astrology: '星座运势', tarot: '塔罗牌', meihua: '梅花易数', vedic: '印度占星' };
    showResult(`
      <div class="result-section engine-result">
        <h3>📊 ${modeNames[currentMode]} — 引擎计算结果</h3>
        <pre>${typeof data.engineData === 'string' ? data.engineData : JSON.stringify(data.engineData, null, 2)}</pre>
      </div>
      <p class="info">✅ 引擎计算成功（本地计算，未调用 LLM）</p>
    `);
  } catch (e) {
    showResult(`<div class="result-section error-result"><h3>❌ 错误</h3><pre>${e.message}</pre></div>`);
  }
}

// 引擎 + AI 解读
async function runDivine() {
  const profile = getProfile();
  const question = document.getElementById('question').value;
  const extra = getModeExtra();
  const btn = document.getElementById('btnDivine');
  btn.disabled = true;
  btn.textContent = '🔮 AI 解读中...';

  const analysisType = question ? '聚焦分析' : '全面分析';
  showResult(`<div class="result-section ai-result"><h3>⏳ ${analysisType}中（${question ? '围绕你的问题' : '性格/事业/感情/财运/健康/运势'}）...</h3><div class="loading"></div></div>`);

  try {
    const res = await fetch('/api/divine', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode: currentMode, ...profile, question, displayMode, city: profile.city, ...extra }),
    });
    const data = await res.json();

    if (data.error) throw new Error(data.error);

    const modeNames = { bazi: '八字命理', astrology: '星座运势', tarot: '塔罗牌', meihua: '梅花易数', vedic: '印度占星' };
    const modeLabel = displayMode === 'expert' ? '专家' : '大众';
    showResult(`
      <div class="result-section engine-result">
        <h3>📊 ${modeNames[currentMode]} — 引擎数据（${modeLabel}模式）</h3>
        <pre>${data.engineData}</pre>
      </div>
      ${data.context ? `<p class="info" style="margin-bottom:8px">🕐 ${data.context}</p>` : ''}
      <div class="result-section ai-result">
        <h3>🤖 AI ${analysisType}（${modeNames[currentMode]}·${modeLabel}）</h3>
        <div class="text">${data.response.replace(/\n/g, '<br>')}</div>
      </div>
      <p class="info">✅ ${question ? '问题: "' + question + '"' : '全面分析（无特定问题）'} · ${modeNames[currentMode]} · ${modeLabel}模式</p>
    `);
  } catch (e) {
    showResult(`
      <div class="result-section error-result">
        <h3>❌ AI 调用失败</h3>
        <pre>${e.message}</pre>
        <p style="margin-top:8px;font-size:13px">常见原因：<br>
        1. Cherry Studio 未启动或 API 服务未开启<br>
        2. .env 中的 LLM_BASE_URL 地址不对<br>
        3. 模型名称 LLM_MODEL 写错了<br>
        4. 模型正在加载中，请稍后重试</p>
      </div>
    `);
  } finally {
    btn.disabled = false;
    btn.textContent = '🔮 引擎 + AI 解读';
  }
}

// 页面加载时检查
checkHealth();
</script>
</body>
</html>
