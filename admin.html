<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>缘合 · 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Noto Sans SC',sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh}
a{color:#A78BFA;text-decoration:none}
input,select{font-family:inherit;font-size:14px}
button{font-family:inherit;cursor:pointer}
.container{max-width:1200px;margin:0 auto;padding:20px}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#1a1a2e;border-radius:16px;padding:40px;width:360px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.login-box h1{font-size:24px;margin-bottom:8px;color:#A78BFA}
.login-box p{font-size:13px;color:#6B7280;margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;border-radius:10px;border:1.5px solid #2D2D3F;background:#0f0f1a;color:#e0e0e0;margin-bottom:12px;outline:none}
.login-box input:focus{border-color:#A78BFA}
.login-box .btn{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#8B5CF6,#A78BFA);color:#fff;font-size:15px;font-weight:600}
.login-box .btn:disabled{opacity:0.5}
.login-box .err{color:#EF4444;font-size:12px;margin-bottom:12px}

/* Layout */
.admin-layout{display:flex;min-height:100vh}
/* Sidebar */
.sidebar{width:200px;background:#1a1a2e;border-right:1px solid #2D2D3F;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.sidebar .brand{font-size:18px;font-weight:700;color:#A78BFA;padding:20px 16px 16px;border-bottom:1px solid #2D2D3F;display:flex;align-items:center;gap:8px}
.sidebar .menu{flex:1;padding:8px 0}
.sidebar button{width:100%;padding:10px 16px;background:none;border:none;color:#9CA3AF;font-size:13px;font-weight:500;text-align:left;display:flex;align-items:center;gap:8px;cursor:pointer;border-left:3px solid transparent}
.sidebar button.active{color:#A78BFA;background:#A78BFA10;border-left-color:#A78BFA}
.sidebar button:hover{color:#e0e0e0;background:#ffffff08}
.sidebar .bottom{padding:12px 16px;border-top:1px solid #2D2D3F}
.sidebar .bottom .info{font-size:11px;color:#6B7280;margin-bottom:8px}
.sidebar .bottom .logout{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #2D2D3F;background:none;color:#9CA3AF;font-size:12px;cursor:pointer;text-align:center}
.sidebar .bottom .logout:hover{background:#2D2D3F}
/* Main content */
.main-content{margin-left:200px;flex:1;min-height:100vh}
@media(max-width:768px){
  .sidebar{width:60px}.sidebar .brand span,.sidebar button span,.sidebar .bottom .info{display:none}
  .sidebar button{justify-content:center;padding:12px 0}.main-content{margin-left:60px}
  .sidebar .bottom .logout{font-size:0;padding:8px}
}

/* Cards */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin:20px 0}
.stat-card{background:#1a1a2e;border:1px solid #2D2D3F;border-radius:12px;padding:16px}
.stat-card .label{font-size:11px;color:#6B7280;text-transform:uppercase;letter-spacing:0.5px}
.stat-card .value{font-size:28px;font-weight:700;color:#A78BFA;margin-top:4px}
.stat-card .sub{font-size:11px;color:#4ECDC4;margin-top:4px}

/* Table */
.panel{background:#1a1a2e;border:1px solid #2D2D3F;border-radius:12px;padding:16px;margin:12px 0}
.panel h3{font-size:14px;font-weight:600;color:#A78BFA;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;color:#6B7280;font-size:11px;border-bottom:1px solid #2D2D3F}
td{padding:8px 10px;border-bottom:1px solid #1f1f30}
tr:hover{background:#1f1f30}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600}
.badge-ok{background:#34D39920;color:#34D399}
.badge-warn{background:#F59E0B20;color:#F59E0B}
.badge-err{background:#EF444420;color:#EF4444}
.badge-purple{background:#8B5CF620;color:#A78BFA}

/* Toolbar */
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.toolbar input{padding:8px 14px;border-radius:8px;border:1.5px solid #2D2D3F;background:#0f0f1a;color:#e0e0e0;font-size:13px;min-width:200px}
.toolbar .btn-sm{padding:6px 14px;border-radius:8px;border:none;font-size:12px;font-weight:500}
.btn-primary{background:#8B5CF6;color:#fff}
.btn-danger{background:#EF4444;color:#fff}
.btn-ghost{background:none;border:1px solid #2D2D3F;color:#9CA3AF}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#1a1a2e;border-radius:16px;padding:24px;width:420px;max-width:90vw;max-height:85vh;overflow-y:auto;word-wrap:break-word}
.modal h3{font-size:16px;font-weight:600;color:#A78BFA;margin-bottom:16px}
.modal label{display:block;font-size:12px;color:#9CA3AF;margin:10px 0 4px}
.modal input,.modal select{width:100%;padding:10px 14px;border-radius:8px;border:1.5px solid #2D2D3F;background:#0f0f1a;color:#e0e0e0}
.modal .actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:10px;background:#1a1a2e;border:1px solid #2D2D3F;color:#e0e0e0;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.toast-err{border-color:#EF4444;color:#EF4444}
.toast.toast-ok{border-color:#34D399;color:#34D399}
/* Loading spinner */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(167,139,250,0.3);border-top-color:#A78BFA;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="admin-toast" class="toast"></div>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef}=React;

// API helpers
const getToken=()=>localStorage.getItem('yuanhe_admin_token');
// Toast system
let _toastTimer=null;
function showToast(msg,type='info'){
  const el=document.getElementById('admin-toast');
  if(!el)return;
  el.textContent=msg;
  el.className='toast show '+(type==='error'?'toast-err':type==='success'?'toast-ok':'');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{el.className='toast'},3000);
}
// Debounce
function useDebounce(value,delay=400){
  const [deb,setDeb]=useState(value);
  useEffect(()=>{const t=setTimeout(()=>setDeb(value),delay);return()=>clearTimeout(t)},[value,delay]);
  return deb;
}
const api=async(path,opts={})=>{
  const headers={'Content-Type':'application/json'};
  const t=getToken();if(t)headers.Authorization='Bearer '+t;
  try{
    const r=await fetch(path,{...opts,headers:{...headers,...(opts.headers||{})}});
    if(r.status===401){localStorage.removeItem('yuanhe_admin_token');window.location.reload();return{}}
    if(r.status===429){showToast('请求太频繁，请稍后','error');return{error:'rate_limited'}}
    const data=await r.json();
    if(data.error)showToast(data.error,'error');
    return data;
  }catch(e){showToast('网络错误: '+e.message,'error');return{error:e.message}}
};
const apiGet=(p)=>api(p);
const apiPost=(p,b)=>api(p,{method:'POST',body:JSON.stringify(b)});

// 全局确认弹窗(替代原生confirm)
let _confirmResolve=null;
function AdminConfirm({msg,detail,danger,onResult}){
  return(<div className="modal-bg" onClick={()=>onResult(false)}><div className="modal" style={{width:340,textAlign:'center'}} onClick={e=>e.stopPropagation()}>
    <div style={{fontSize:32,marginBottom:12}}>{danger?'⚠️':'❓'}</div>
    <div style={{fontSize:15,fontWeight:600,color:'#e0e0e0',marginBottom:detail?6:16}}>{msg}</div>
    {detail&&<div style={{fontSize:12,color:'#6B7280',marginBottom:16}}>{detail}</div>}
    <div className="actions" style={{justifyContent:'center'}}>
      <button className="btn-sm btn-ghost" onClick={()=>onResult(false)}>取消</button>
      <button className={`btn-sm ${danger?'btn-danger':'btn-primary'}`} onClick={()=>onResult(true)}>确认</button>
    </div>
  </div></div>);
}

// 全局Esc关闭弹窗
function useEscClose(onClose){
  useEffect(()=>{
    const h=e=>{if(e.key==='Escape'&&onClose)onClose()};
    document.addEventListener('keydown',h);
    return()=>document.removeEventListener('keydown',h);
  },[onClose]);
}

// 防双击hook
function useAsyncAction(){
  const [loading,setLoading]=useState(false);
  const run=useCallback(async(fn)=>{
    if(loading)return;
    setLoading(true);
    try{await fn()}finally{setLoading(false)}
  },[loading]);
  return [loading,run];
}

// 复制到剪贴板
function copyText(text){
  navigator.clipboard?.writeText(text).then(()=>showToast('已复制','success')).catch(()=>{});
}

// ===== LOGIN =====
function LoginPage({onLogin}){
  const [u,setU]=useState('');const [p,setP]=useState('');const [err,setErr]=useState('');const [loading,setLoading]=useState(false);
  const submit=async()=>{
    setErr('');setLoading(true);
    const r=await apiPost('/api/admin/login',{username:u,password:p});
    setLoading(false);
    if(r.error){setErr(r.error);return}
    localStorage.setItem('yuanhe_admin_token',r.token);
    onLogin(r.admin);
  };
  return(<div className="login-wrap"><div className="login-box">
    <div style={{fontSize:36,marginBottom:8}}>🔮</div>
    <h1>缘合管理后台</h1>
    <p>请使用管理员账号登录</p>
    {err&&<div className="err">{err}</div>}
    <input value={u} onChange={e=>setU(e.target.value)} placeholder="用户名" onKeyDown={e=>e.key==='Enter'&&submit()}/>
    <input type="password" value={p} onChange={e=>setP(e.target.value)} placeholder="密码" onKeyDown={e=>e.key==='Enter'&&submit()}/>
    <button className="btn" onClick={submit} disabled={loading||!u||!p}>{loading?'登录中…':'登录'}</button>
  </div></div>);
}

// ===== CHANGE PASSWORD =====
function ChangePasswordModal({forced,onDone,onClose}){
  const [old,setOld]=useState('');const [pw,setPw]=useState('');const [pw2,setPw2]=useState('');const [err,setErr]=useState('');
  const submit=async()=>{
    if(pw!==pw2){setErr('两次密码不一致');return}
    const r=await apiPost('/api/admin/change-password',{oldPassword:old,newPassword:pw});
    if(r.error){setErr(r.error);return}
    onDone();
  };
  return(<div className="modal-bg" onClick={forced?null:onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
    <h3>{forced?'⚠️ 首次登录请修改密码':'修改密码'}</h3>
    {err&&<div style={{color:'#EF4444',fontSize:12,marginBottom:8}}>{err}</div>}
    {!forced&&<><label>旧密码</label><input type="password" value={old} onChange={e=>setOld(e.target.value)}/></>}
    <label>新密码</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="至少6位"/>
    <label>确认新密码</label><input type="password" value={pw2} onChange={e=>setPw2(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
    <div className="actions">
      {!forced&&<button className="btn-sm btn-ghost" onClick={onClose}>取消</button>}
      <button className="btn-sm btn-primary" onClick={submit}>确认修改</button>
    </div>
  </div></div>);
}

// ===== DASHBOARD (placeholder for Step B) =====
// Trend Chart Component
function TrendChart({data}){
  const canvasRef=useRef(null);const chartRef=useRef(null);
  useEffect(()=>{
    if(!data||!Array.isArray(data)||!canvasRef.current||typeof Chart==='undefined')return;
    if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new Chart(canvasRef.current,{
      type:'line',
      data:{
        labels:data.map(d=>d.date),
        datasets:[
          {label:'活跃用户',data:data.map(d=>d.activeUsers),borderColor:'#A78BFA',backgroundColor:'#A78BFA20',fill:true,tension:0.4,pointRadius:2},
          {label:'新增用户',data:data.map(d=>d.newUsers),borderColor:'#34D399',backgroundColor:'#34D39920',fill:true,tension:0.4,pointRadius:2},
          {label:'占卜次数',data:data.map(d=>d.divinations),borderColor:'#F59E0B',backgroundColor:'#F59E0B20',fill:true,tension:0.4,pointRadius:2},
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#9CA3AF',font:{size:10}}}},scales:{x:{ticks:{color:'#6B7280',font:{size:9},maxTicksLimit:10},grid:{color:'#2D2D3F'}},y:{ticks:{color:'#6B7280',font:{size:10}},grid:{color:'#2D2D3F'},beginAtZero:true}}}
    });
    return()=>{if(chartRef.current)chartRef.current.destroy()};
  },[data]);
  return (<canvas ref={canvasRef}/>);
}

function DashboardPage(){
  const [stats,setStats]=useState(null);const [uStats,setUStats]=useState(null);
  const [trends,setTrends]=useState(null);const [funnel,setFunnel]=useState(null);
  const [announcement,setAnnouncement]=useState({text:'',enabled:false,type:'info'});
  const [trendDays,setTrendDays]=useState(7);
  const loadStats=()=>{apiGet('/api/stats').then(d=>{if(d&&!d.error)setStats(d)}).catch(()=>{});apiGet('/api/admin/stats').then(d=>{if(d&&!d.error)setUStats(d)}).catch(()=>{})};
  const loadTrends=(d)=>{apiGet('/api/admin/trends?days='+d).then(d=>{if(Array.isArray(d))setTrends(d)}).catch(()=>{})};
  useEffect(()=>{loadStats();loadTrends(trendDays);apiGet('/api/admin/funnel').then(d=>{if(Array.isArray(d))setFunnel(d)}).catch(()=>{});apiGet('/api/admin/announcement').then(a=>{if(a&&!a.error)setAnnouncement(a)}).catch(()=>{});const t=setInterval(loadStats,30000);return()=>clearInterval(t)},[]);
  const saveAnnouncement=()=>{apiPost('/api/admin/announcement',announcement).then(()=>showToast('公告已保存','success'))};
  if(!stats)return <div className="container"><div className="panel"><span className="spinner"/> 加载中…</div></div>;
  return(<div className="container">
    <h2 style={{fontSize:18,fontWeight:700,margin:'8px 0 16px'}}>📊 系统概览</h2>
    <div className="stats-grid">
      {uStats&&<><div className="stat-card"><div className="label">总用户</div><div className="value">{uStats.totalUsers}</div><div className="sub">今日活跃 {uStats.activeToday} · 新增 {uStats.newToday}</div></div>
      <div className="stat-card"><div className="label">占卜总数</div><div className="value">{uStats.totalDivinations}</div></div>
      <div className="stat-card"><div className="label">帖子总数</div><div className="value">{uStats.totalPosts}</div></div></>}
      <div className="stat-card"><div className="label">运行时间</div><div className="value" style={{fontSize:18}}>{stats.uptime}</div></div>
      <div className="stat-card"><div className="label">总请求</div><div className="value">{stats.requests?.total||0}</div><div className="sub">成功率 {stats.requests?.successRate||'—'}</div></div>
      <div className="stat-card"><div className="label">LLM调用</div><div className="value">{stats.llm?.calls||0}</div><div className="sub">失败 {stats.llm?.error||0} · 超时 {stats.llm?.timeout||0}</div></div>
      <div className="stat-card"><div className="label">LLM平均耗时</div><div className="value" style={{fontSize:18}}>{stats.llm?.avgTimeSeconds||'—'}</div></div>
      <div className="stat-card"><div className="label">引擎调用</div><div className="value">{stats.engine?.calls||0}</div><div className="sub">错误 {stats.engine?.errors||0}</div></div>
      <div className="stat-card"><div className="label">内存</div><div className="value" style={{fontSize:16}}>{stats.memory?.heap||'—'} / {stats.memory?.rss||'—'}</div></div>
    </div>
    {/* 趋势图 */}
    <div className="panel">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <h3 style={{margin:0}}>📈 用户趋势</h3>
        <div style={{display:'flex',gap:4}}>
          {[7,14,30].map(d=><button key={d} onClick={()=>{setTrendDays(d);loadTrends(d)}} className={`btn-sm ${trendDays===d?'btn-primary':'btn-ghost'}`}>{d}天</button>)}
        </div>
      </div>
      {trends?<div style={{height:200}}><TrendChart data={trends}/></div>:<div style={{textAlign:'center',padding:40,color:'#6B7280'}}><span className="spinner"/></div>}
    </div>

    {/* 漏斗 */}
    {funnel&&funnel.length>0&&<div className="panel">
      <h3>🔽 用户转化漏斗</h3>
      {funnel.map((f,i)=>(
        <div key={f.step} style={{marginBottom:8}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>
            <span>{f.step}</span>
            <span style={{color:'#A78BFA',fontWeight:600}}>{f.count}人 ({f.rate}%)</span>
          </div>
          <div style={{height:8,background:'#1f1f30',borderRadius:4,overflow:'hidden'}}>
            <div style={{height:'100%',background:i===0?'#A78BFA':i===1?'#34D399':i===2?'#F59E0B':'#EC4899',borderRadius:4,width:f.rate+'%',transition:'width .6s'}}/>
          </div>
        </div>
      ))}
    </div>}

    {/* 系统公告 */}
    <div className="panel">
      <h3>📢 系统公告</h3>
      <div style={{display:'flex',gap:8,marginBottom:8}}>
        <input value={announcement.text} onChange={e=>setAnnouncement({...announcement,text:e.target.value})} placeholder="输入公告内容…" style={{flex:1,padding:'8px 12px',borderRadius:8,border:'1.5px solid #2D2D3F',background:'#0f0f1a',color:'#e0e0e0',fontSize:13}}/>
        <select value={announcement.type||'info'} onChange={e=>setAnnouncement({...announcement,type:e.target.value})} style={{padding:'8px',borderRadius:8,border:'1.5px solid #2D2D3F',background:'#0f0f1a',color:'#e0e0e0',fontSize:12}}>
          <option value="info">通知</option><option value="warn">警告</option><option value="promo">活动</option>
        </select>
      </div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>{setAnnouncement({...announcement,enabled:!announcement.enabled});setTimeout(saveAnnouncement,100)}} className={`btn-sm ${announcement.enabled?'btn-danger':'btn-primary'}`}>{announcement.enabled?'关闭公告':'发布公告'}</button>
        <button onClick={saveAnnouncement} className="btn-sm btn-ghost">保存</button>
        {announcement.enabled&&<span style={{fontSize:11,color:'#34D399',alignSelf:'center'}}>✅ 公告已发布</span>}
      </div>
    </div>

    <div className="panel">
      <h3>📡 API端点统计</h3>
      <table><thead><tr><th>端点</th><th>请求数</th><th>成功</th><th>失败</th><th>平均耗时</th></tr></thead>
      <tbody>{Object.entries(stats.api||{}).map(([ep,s])=>{
        const avg=s.count?Math.round(s.totalTime/s.count):0;
        return (<tr key={ep}><td>{ep}</td><td>{s.count}</td><td><span className="badge badge-ok">{s.success}</span></td><td>{s.error?<span className="badge badge-err">{s.error}</span>:'—'}</td><td>{avg}ms</td></tr>);
      })}</tbody></table>
    </div>
    <div className="panel">
      <h3>📝 最近日志</h3>
      <div style={{maxHeight:300,overflow:'auto',fontSize:11,lineHeight:1.8,fontFamily:'monospace'}}>
        {(stats.recentLogs||[]).map((l,i)=><div key={i} style={{color:l.level==='ERROR'?'#EF4444':l.level==='WARN'?'#F59E0B':'#4ECDC4'}}>
          <b>[{l.time?.substring(11,19)}]</b> [{l.level}] [{l.category}] {l.message}
        </div>)}
      </div>
    </div>
  </div>);
}

// ===== ADMIN LOGS =====
function LogsPage(){
  const [data,setData]=useState({items:[],total:0});
  const [actionTypes,setActionTypes]=useState([]);
  const [search,setSearch]=useState('');
  const [actionFilter,setActionFilter]=useState('');
  const [page,setPage]=useState(1);
  const [loading,setLoading]=useState(false);
  const limit=30;
  const debouncedSearch=useDebounce(search);

  const load=useCallback(()=>{
    setLoading(true);
    apiGet(`/api/admin/logs?limit=${limit}&page=${page}&action=${actionFilter}&search=${encodeURIComponent(debouncedSearch)}`).then(d=>{
      if(d?.items)setData(d);else if(Array.isArray(d))setData({items:d,total:d.length});
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[debouncedSearch,actionFilter,page]);

  useEffect(()=>{load()},[load]);
  useEffect(()=>{apiGet('/api/admin/log-types').then(d=>{if(Array.isArray(d))setActionTypes(d)}).catch(()=>{})},[]);

  const totalPages=Math.ceil((data.total||0)/limit);
  const selStyle={padding:'8px 12px',borderRadius:8,border:'1.5px solid #2D2D3F',background:'#0f0f1a',color:'#e0e0e0',fontSize:12};
  const actionColors={login:'#34D399',ban_user:'#EF4444',unban_user:'#34D399',delete_user:'#EF4444',update_user:'#F59E0B',set_tags:'#A78BFA',batch_ban:'#EF4444',batch_unban:'#34D399',add_llm_provider:'#3B82F6',switch_llm:'#3B82F6',create_admin:'#A78BFA',change_password:'#6B7280',delete_post:'#EF4444'};

  return(<div className="container">
    <h2 style={{fontSize:18,fontWeight:700,margin:'8px 0 16px'}}>📋 操作日志</h2>
    <div className="panel">
      <div className="toolbar">
        <input value={search} onChange={e=>{setSearch(e.target.value);setPage(1)}} placeholder="搜索日志内容/管理员/目标…"/>
        <select value={actionFilter} onChange={e=>{setActionFilter(e.target.value);setPage(1)}} style={selStyle}>
          <option value="">全部操作</option>
          {actionTypes.map(a=><option key={a} value={a}>{a}</option>)}
        </select>
        <button className="btn-sm btn-ghost" onClick={load}>🔄 刷新</button>
        <span style={{fontSize:12,color:'#6B7280',marginLeft:'auto'}}>{loading&&<span className="spinner" style={{marginRight:6}}/>}共 {data.total} 条</span>
      </div>

      <table><thead><tr><th style={{width:140}}>时间</th><th style={{width:80}}>管理员</th><th style={{width:120}}>操作</th><th>目标</th><th>详情</th></tr></thead>
      <tbody>{data.items?.map(l=>{
        const ac=actionColors[l.action]||'#A78BFA';
        return(<tr key={l.id}>
          <td style={{fontSize:11,color:'#6B7280',whiteSpace:'nowrap'}}>{l.createdAt?.substring(0,19).replace('T',' ')}</td>
          <td style={{fontWeight:600,fontSize:12}}>{l.adminName}</td>
          <td><span className="badge" style={{background:ac+'20',color:ac}}>{l.action}</span></td>
          <td style={{fontSize:11,color:'#9CA3AF',fontFamily:'monospace'}}>{l.target?l.target.substring(0,12)+'…':'—'}</td>
          <td style={{fontSize:12,maxWidth:300,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.detail}</td>
        </tr>);
      })}</tbody></table>

      {data.items?.length===0&&<div style={{textAlign:'center',padding:30,color:'#6B7280'}}>暂无日志记录</div>}

      {totalPages>1&&<div style={{display:'flex',justifyContent:'center',gap:6,marginTop:12}}>
        {page>1&&<button className="btn-sm btn-ghost" onClick={()=>setPage(page-1)}>← 上一页</button>}
        <span style={{fontSize:12,color:'#6B7280',padding:'6px 8px'}}>第{page}/{totalPages}页</span>
        {page<totalPages&&<button className="btn-sm btn-ghost" onClick={()=>setPage(page+1)}>下一页 →</button>}
      </div>}
    </div>
  </div>);
}

function BanModal({user,onClose,onDone}){
  const [reason,setReason]=useState('');const [days,setDays]=useState('');const [saving,setSaving]=useState(false);
  useEscClose(onClose);
  const doBan=async()=>{
    setSaving(true);
    const r=await apiPost('/api/admin/users/'+user.id+'/ban',{ban:true,reason:reason||'违规',days:days?parseInt(days):0});
    setSaving(false);
    if(!r.error)onDone();
  };
  return (<div className="modal-bg" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
    <h3>⛔ 封禁 {user.name}</h3>
    <label>封禁理由</label><input value={reason} onChange={e=>setReason(e.target.value)} placeholder="违规内容/行为描述" onKeyDown={e=>e.key==='Enter'&&doBan()}/>
    <label>封禁天数 (0=永久)</label><input type="number" value={days} onChange={e=>setDays(e.target.value)} placeholder="0" min="0" max="3650" onKeyDown={e=>e.key==='Enter'&&doBan()}/>
    <div className="actions">
      <button className="btn-sm btn-ghost" onClick={onClose}>取消</button>
      <button className="btn-sm btn-danger" onClick={doBan} disabled={saving}>{saving?'封禁中…':'确认封禁'}</button>
    </div>
  </div></div>);
}
function EditModal({user,onClose,onDone}){
  const [name,setName]=useState(user.name||'');
  const [city,setCity]=useState(user.city||'');
  const [bio,setBio]=useState(user.bio||'');
  const [gender,setGender]=useState(user.gender||'male');
  const [year,setYear]=useState(user.year||'');
  const [month,setMonth]=useState(user.month||'');
  const [day,setDay]=useState(user.day||'');
  const [hour,setHour]=useState(user.hour||'');
  const [adminNote,setAdminNote]=useState(user.adminNote||'');
  const [tagInput,setTagInput]=useState('');
  const [tags,setTags]=useState(user.adminTags||[]);
  const [saving,setSaving]=useState(false);
  useEscClose(onClose);
  const addTag=()=>{if(tagInput.trim()&&!tags.includes(tagInput.trim())){setTags([...tags,tagInput.trim()]);setTagInput('')}};
  const removeTag=(i)=>setTags(tags.filter((_,j)=>j!==i));
  const doEdit=async()=>{
    if(!name.trim()){showToast('昵称不能为空','error');return}
    if(year&&(parseInt(year)<1900||parseInt(year)>2030)){showToast('年份超出范围','error');return}
    if(hour&&(parseInt(hour)<0||parseInt(hour)>23)){showToast('时辰应为0-23','error');return}
    setSaving(true);
    const payload={name,city,bio,gender,adminNote,adminTags:tags};
    if(year)payload.year=year;if(month)payload.month=month;if(day)payload.day=day;if(hour)payload.hour=hour;
    const r=await apiPost('/api/admin/users/'+user.id+'/update',payload);
    setSaving(false);
    if(!r.error)onDone();
  };
  return (<div className="modal-bg" onClick={onClose}><div className="modal" style={{width:480}} onClick={e=>e.stopPropagation()}>
    <h3>✏️ 编辑 {user.name}</h3>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 12px'}}>
      <div><label>昵称</label><input value={name} onChange={e=>setName(e.target.value)}/></div>
      <div><label>城市</label><input value={city} onChange={e=>setCity(e.target.value)}/></div>
      <div><label>性别</label><select value={gender} onChange={e=>setGender(e.target.value)}><option value="male">男</option><option value="female">女</option></select></div>
      <div style={{gridColumn:'1/-1'}}><label>个性签名</label><input value={bio} onChange={e=>setBio(e.target.value)} placeholder="用户简介…"/></div>
    </div>
    <div style={{fontSize:12,fontWeight:600,color:'#6B7280',margin:'12px 0 4px'}}>生辰信息</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8}}>
      <div><label style={{fontSize:10}}>年</label><input type="number" value={year} onChange={e=>setYear(e.target.value)} placeholder="1990"/></div>
      <div><label style={{fontSize:10}}>月</label><input type="number" value={month} onChange={e=>setMonth(e.target.value)} placeholder="1" min="1" max="12"/></div>
      <div><label style={{fontSize:10}}>日</label><input type="number" value={day} onChange={e=>setDay(e.target.value)} placeholder="1" min="1" max="31"/></div>
      <div><label style={{fontSize:10}}>时辰</label><input type="number" value={hour} onChange={e=>setHour(e.target.value)} placeholder="12" min="0" max="23"/></div>
    </div>
    <div style={{fontSize:12,fontWeight:600,color:'#6B7280',margin:'12px 0 4px'}}>管理标签</div>
    <div style={{display:'flex',gap:6,marginBottom:6}}>
      <input value={tagInput} onChange={e=>setTagInput(e.target.value)} placeholder="输入标签…" style={{flex:1}} onKeyDown={e=>e.key==='Enter'&&addTag()}/>
      <button className="btn-sm btn-primary" onClick={addTag}>+</button>
    </div>
    <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:8}}>
      {tags.map((t,i)=><span key={i} style={{padding:'2px 8px',borderRadius:6,background:'#A78BFA20',color:'#A78BFA',fontSize:11,display:'flex',alignItems:'center',gap:4}}>
        {t} <button onClick={()=>removeTag(i)} style={{background:'none',border:'none',color:'#A78BFA',cursor:'pointer',fontSize:13,padding:0}}>×</button>
      </span>)}
    </div>
    <label>管理备注</label><input value={adminNote} onChange={e=>setAdminNote(e.target.value)} placeholder="仅管理员可见…"/>
    <div className="actions">
      <button className="btn-sm btn-ghost" onClick={onClose}>取消</button>
      <button className="btn-sm btn-primary" onClick={doEdit} disabled={saving}>{saving?'保存中…':'保存'}</button>
    </div>
  </div></div>);
}

function CreateAdminModal({onClose,onDone}){
  const [u,setU]=useState('');const [n,setN]=useState('');const [r,setR]=useState('operator');const [pw,setPw]=useState('');const [saving,setSaving]=useState(false);
  useEscClose(onClose);
  const create=async()=>{
    if(!u.trim()){showToast('用户名不能为空','error');return}

    <label>初始密码</label><input value={pw} onChange={e=>setPw(e.target.value)} placeholder="留空则为changeme"/>

function GrantVipModal({data,onClose,onDone}){
  const [tier,setTier]=useState(data.tier||'basic');const [days,setDays]=useState(data.days||'30');const [uid,setUid]=useState(data.userId||'');const [saving,setSaving]=useState(false);
  useEscClose(onClose);
  const doGrant=async()=>{
    if(!uid.trim()){showToast('请输入用户ID','error');return}
    const d=parseInt(days)||0;
    if(d<0||d>3650){showToast('天数范围0-3650','error');return}
    setSaving(true);
    const r=await apiPost('/api/admin/vip/grant',{userId:uid,tier,days:d||30});
    setSaving(false);
    if(r.success){showToast(`已赠送${r.order?.tierName}`,'success');onDone()}
  };
  return (<div className="modal-bg" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
    <h3>💎 赠送VIP</h3>

    {!data.userId&&<><label>用户ID</label><input value={uid} onChange={e=>setUid(e.target.value)} placeholder="输入用户ID"/></>}
    <label>VIP等级</label>
    <select value={tier} onChange={e=>setTier(e.target.value)}><option value="basic">缘合会员 (Lv.1)</option><option value="premium">缘合至尊 (Lv.2)</option></select>
    <label>天数 (0=永久，最大3650)</label>
    <input type="number" value={days} onChange={e=>setDays(e.target.value)} placeholder="30" min="0" max="3650"/>
    <div className="actions">
      <button className="btn-sm btn-ghost" onClick={onClose}>取消</button>
      <button className="btn-sm btn-primary" onClick={doGrant} disabled={saving}>{saving?'赠送中…':'确认赠送'}</button>
    </div>
  </div></div>);
}

// ===== USERS PAGE =====
function UsersPage(){
  const [data,setData]=useState({items:[],total:0});
  const [search,setSearch]=useState('');
  const [gender,setGender]=useState('all');
  const [status,setStatus]=useState('all');
  const [vipFilter,setVipFilter]=useState('all');
  const [sortBy,setSortBy]=useState('newest');
  const [page,setPage]=useState(1);
  const [stats,setStats]=useState(null);
  const [detail,setDetail]=useState(null);
  const [banModal,setBanModal]=useState(null);
  const [editModal,setEditModal]=useState(null);
  const [vipModal,setVipModal]=useState(null);
  const [loading,setLoading]=useState(false);
  const [selected,setSelected]=useState([]);
  const [showFilters,setShowFilters]=useState(false);
  const limit=15;
  const debouncedSearch=useDebounce(search);
  const selStyle={padding:'8px 12px',borderRadius:8,border:'1.5px solid #2D2D3F',background:'#0f0f1a',color:'#e0e0e0',fontSize:12};

  const load=useCallback(()=>{
    setLoading(true);
    apiGet(`/api/admin/users?search=${encodeURIComponent(debouncedSearch)}&gender=${gender}&status=${status}&vip=${vipFilter}&sort=${sortBy}&page=${page}&limit=${limit}`).then(d=>{setData(d.items?d:{items:[],total:0});setLoading(false)}).catch(()=>setLoading(false));
  },[debouncedSearch,gender,status,vipFilter,sortBy,page]);

  useEffect(()=>{load()},[load]);
  useEffect(()=>{apiGet('/api/admin/stats').then(setStats).catch(()=>{})},[]);

  const totalPages=Math.ceil((data.total||0)/limit);
  const allSelected=data.items?.length>0&&data.items.every(u=>selected.includes(u.id));
  const toggleAll=()=>{if(allSelected)setSelected([]);else setSelected(data.items.map(u=>u.id))};
  const toggleOne=(id)=>setSelected(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);

  const [batchLoading,setBatchLoading]=useState(false);
  const batchBan=async(ban)=>{
    if(selected.length===0){showToast('请先选择用户','error');return}
    if(batchLoading)return;
    if(!confirm(`确定${ban?'封禁':'解封'} ${selected.length} 个用户？`))return;
    setBatchLoading(true);
    const r=await apiPost('/api/admin/users/batch/ban',{userIds:selected,ban,reason:'批量操作'});
    setBatchLoading(false);
    if(r.success){showToast(`已${ban?'封禁':'解封'} ${r.count} 个用户`,'success');setSelected([]);load()}
  };

  const exportCSV=()=>{
    const params=new URLSearchParams({search:debouncedSearch,gender,status,vip:vipFilter});
    const url='/api/admin/users/export?'+params.toString();
    const a=document.createElement('a');a.href=url;a.download='users_export.csv';
    // Need auth header, so fetch manually
    fetch(url,{headers:{Authorization:'Bearer '+getToken()}}).then(r=>r.blob()).then(b=>{
      const u=URL.createObjectURL(b);a.href=u;a.click();URL.revokeObjectURL(u);
      showToast('导出成功','success');
    }).catch(()=>showToast('导出失败','error'));
  };

  const openDetail=(id)=>{apiGet('/api/admin/users/'+id).then(d=>{if(d&&!d.error)setDetail(d)})};

  const vipLabel=(tier)=>tier==='premium'?'至尊':tier==='basic'?'会员':'';

  return(<div className="container">
    <h2 style={{fontSize:18,fontWeight:700,margin:'8px 0 16px'}}>👥 用户管理</h2>

    {stats&&<div className="stats-grid">
      <div className="stat-card"><div className="label">总用户</div><div className="value">{stats.totalUsers}</div></div>
      <div className="stat-card"><div className="label">今日活跃</div><div className="value">{stats.activeToday}</div></div>
      <div className="stat-card"><div className="label">今日新增</div><div className="value">{stats.newToday}</div></div>
      <div className="stat-card"><div className="label">已封禁</div><div className="value" style={{color:'#EF4444'}}>{stats.banned}</div></div>
      <div className="stat-card"><div className="label">男/女</div><div className="value" style={{fontSize:16}}>{stats.genderSplit?.male||0} / {stats.genderSplit?.female||0}</div></div>
      <div className="stat-card"><div className="label">占卜总数</div><div className="value">{stats.totalDivinations}</div></div>
    </div>}

    <div className="panel">
      <div className="toolbar">
        <input value={search} onChange={e=>{setSearch(e.target.value);setPage(1)}} placeholder="搜索手机号/昵称/ID…"/>
        <select value={gender} onChange={e=>{setGender(e.target.value);setPage(1)}} style={selStyle}>
          <option value="all">全部性别</option><option value="male">男</option><option value="female">女</option>
        </select>
        <button className="btn-sm btn-ghost" onClick={()=>setShowFilters(!showFilters)}>{showFilters?'收起':'更多'}筛选</button>
        <button className="btn-sm btn-ghost" onClick={exportCSV} title="导出CSV">📥 导出</button>
        <span style={{fontSize:12,color:'#6B7280',marginLeft:'auto'}}>{loading&&<span className="spinner" style={{marginRight:6}}/>}共 {data.total} 条</span>
      </div>

      {showFilters&&<div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',padding:'8px 0',borderBottom:'1px solid #2D2D3F'}}>
        <select value={status} onChange={e=>{setStatus(e.target.value);setPage(1)}} style={selStyle}>
          <option value="all">全部状态</option><option value="normal">正常</option><option value="banned">已封禁</option><option value="deleted">已删除</option><option value="incomplete">资料未完善</option>
        </select>
        <select value={vipFilter} onChange={e=>{setVipFilter(e.target.value);setPage(1)}} style={selStyle}>
          <option value="all">全部VIP</option><option value="free">免费用户</option><option value="basic">缘合会员</option><option value="premium">缘合至尊</option><option value="paying">付费用户</option>
        </select>
        <select value={sortBy} onChange={e=>{setSortBy(e.target.value);setPage(1)}} style={selStyle}>
          <option value="newest">最新注册</option><option value="oldest">最早注册</option><option value="active">最近活跃</option><option value="divinations">占卜最多</option>
        </select>
      </div>}

      {selected.length>0&&<div style={{display:'flex',gap:8,alignItems:'center',padding:'8px 0',marginBottom:8,borderBottom:'1px solid #2D2D3F'}}>
        <span style={{fontSize:12,color:'#A78BFA',fontWeight:600}}>已选 {selected.length} 人</span>
        <button className="btn-sm btn-danger" onClick={()=>batchBan(true)} disabled={batchLoading}>{batchLoading?'处理中…':'批量封禁'}</button>
        <button className="btn-sm btn-primary" onClick={()=>batchBan(false)} disabled={batchLoading}>{batchLoading?'处理中…':'批量解封'}</button>
        <button className="btn-sm btn-ghost" onClick={()=>setSelected([])} disabled={batchLoading}>取消选择</button>
      </div>}

      <table><thead><tr>
        <th><input type="checkbox" checked={allSelected} onChange={toggleAll}/></th>
        <th></th><th>昵称</th><th>手机号</th><th>性别</th><th>城市</th><th>VIP</th><th>占卜</th><th>匹配</th><th>状态</th><th>最后活跃</th><th>操作</th>
      </tr></thead>
      <tbody>{data.items?.map(u=>(
        <tr key={u.id} style={selected.includes(u.id)?{background:'#A78BFA10'}:undefined}>
          <td><input type="checkbox" checked={selected.includes(u.id)} onChange={()=>toggleOne(u.id)}/></td>
          <td style={{fontSize:20}}>{u.avatar||(u.gender==='female'?'👩':'👨')}</td>
          <td>
            <div style={{fontWeight:600,cursor:'pointer',color:'#A78BFA'}} onClick={()=>openDetail(u.id)}>{u.name}</div>
            {u.adminTags?.length>0&&<div style={{display:'flex',gap:3,marginTop:2,flexWrap:'wrap'}}>{u.adminTags.map(t=><span key={t} style={{padding:'0 4px',borderRadius:4,background:'#A78BFA15',color:'#A78BFA',fontSize:9}}>{t}</span>)}</div>}
          </td>
          <td style={{fontSize:12,color:'#6B7280'}}>{u.phone||'—'}</td>
          <td>{u.gender==='female'?<span style={{color:'#EC4899'}}>♀</span>:<span style={{color:'#3B82F6'}}>♂</span>}</td>
          <td style={{fontSize:12}}>{u.city||'—'}</td>
          <td>{u.vipTier!=='free'&&<span className="badge badge-purple">{vipLabel(u.vipTier)}</span>}</td>
          <td>{u.divinationCount}</td>
          <td style={{fontSize:12,color:'#9CA3AF'}}>{u.matchCount||0}</td>
          <td>{u.deleted?<span className="badge badge-warn">已删除</span>:u.banned?<span className="badge badge-err">封禁</span>:!u.profileComplete?<span className="badge badge-warn">未完善</span>:<span className="badge badge-ok">正常</span>}</td>
          <td style={{fontSize:11,color:'#6B7280'}}>{u.lastActiveAt?u.lastActiveAt.substring(5,16).replace('T',' '):'从未'}</td>
          <td style={{whiteSpace:'nowrap'}}>
            <button className="btn-sm btn-ghost" style={{marginRight:4,padding:'4px 8px',fontSize:11}} onClick={()=>setEditModal(u)}>编辑</button>
            {u.banned
              ?<button className="btn-sm btn-primary" style={{padding:'4px 8px',fontSize:11}} onClick={()=>{apiPost('/api/admin/users/'+u.id+'/ban',{ban:false}).then(()=>{showToast('已解封','success');load()})}}>解封</button>
              :<button className="btn-sm btn-danger" style={{padding:'4px 8px',fontSize:11}} onClick={()=>setBanModal(u)}>封禁</button>
            }
          </td>
        </tr>
      ))}</tbody></table>

      {totalPages>1&&<div style={{display:'flex',justifyContent:'center',gap:6,marginTop:12}}>
        {page>1&&<button className="btn-sm btn-ghost" onClick={()=>setPage(page-1)}>← 上一页</button>}
        <span style={{fontSize:12,color:'#6B7280',padding:'6px 8px'}}>第{page}/{totalPages}页</span>
        {page<totalPages&&<button className="btn-sm btn-ghost" onClick={()=>setPage(page+1)}>下一页 →</button>}
      </div>}
    </div>

    {/* 用户详情弹窗 - 大幅增强 */}

// ===== CHAT PAGE =====
function ChatPage(){
  const [data,setData]=useState({items:[],total:0});
  const [search,setSearch]=useState('');
  const [page,setPage]=useState(1);
  const [activeConv,setActiveConv]=useState(null);
  const [showSensitive,setShowSensitive]=useState(false);
  const [loading,setLoading]=useState(false);
  const limit=20;
  const debouncedSearch=useDebounce(search);

  const load=useCallback(()=>{
    setLoading(true);
    apiGet(`/api/admin/conversations?search=${encodeURIComponent(debouncedSearch)}&page=${page}&limit=${limit}`).then(d=>{setData(d.items?d:{items:[],total:0});setLoading(false)}).catch(()=>setLoading(false));
  },[debouncedSearch,page]);
  useEffect(()=>{load()},[load]);

  const openConv=(key)=>{
    apiGet('/api/admin/conversations/'+encodeURIComponent(key)).then(setActiveConv).catch(()=>{});
  };
  const deleteMsg=(key,msgId)=>{
    if(!confirm('确定删除这条消息？'))return;
    apiPost('/api/admin/conversations/'+encodeURIComponent(key)+'/delete-message',{messageId:msgId}).then(()=>{
      openConv(key); // 刷新
    });
  };

  const totalPages=Math.ceil((data.total||0)/limit);

  return(<div className="container">
    <h2 style={{fontSize:18,fontWeight:700,margin:'8px 0 16px'}}>💬 聊天管理
      <button className="btn-sm btn-ghost" style={{marginLeft:12,fontSize:12}} onClick={()=>setShowSensitive(true)}>🛡️ 敏感词管理</button>
    </h2>

    <div className="panel">
      <div className="toolbar">
        <input value={search} onChange={e=>{setSearch(e.target.value);setPage(1)}} placeholder="搜索用户名…"/>
        <span style={{fontSize:12,color:'#6B7280',marginLeft:'auto'}}>共 {data.total} 个会话</span>
      </div>
      <table><thead><tr><th>用户A</th><th>用户B</th><th>消息数</th><th>最后消息</th><th>时间</th><th>操作</th></tr></thead>
      <tbody>{data.items?.map(c=>(
        <tr key={c.key}>
          <td style={{fontWeight:600}}>{c.nameA}</td>
          <td style={{fontWeight:600}}>{c.nameB}</td>
          <td>{c.messageCount}</td>
          <td style={{fontSize:12,color:'#9CA3AF',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.lastMessage}</td>
          <td style={{fontSize:11,color:'#6B7280'}}>{c.lastTime?.substring(0,16).replace('T',' ')}</td>
          <td><button className="btn-sm btn-ghost" onClick={()=>openConv(c.key)}>查看</button></td>
        </tr>
      ))}</tbody></table>
      {totalPages>1&&<div style={{display:'flex',justifyContent:'center',gap:6,marginTop:12}}>
        {page>1&&<button className="btn-sm btn-ghost" onClick={()=>setPage(page-1)}>←</button>}
        <span style={{fontSize:12,color:'#6B7280',padding:'6px 8px'}}>{page}/{totalPages}</span>
        {page<totalPages&&<button className="btn-sm btn-ghost" onClick={()=>setPage(page+1)}>→</button>}
      </div>}
    </div>

    {/* 聊天记录弹窗 */}
    {activeConv&&<div className="modal-bg" onClick={()=>setActiveConv(null)}><div className="modal" style={{width:520,maxHeight:'85vh'}} onClick={e=>e.stopPropagation()}>
      <h3>💬 {activeConv.nameA} ↔ {activeConv.nameB} ({activeConv.messages?.length||0}条)</h3>
      <div style={{maxHeight:'60vh',overflow:'auto',padding:'8px 0'}}>
        {activeConv.messages?.map(m=>(
          <div key={m.id} style={{display:'flex',gap:8,marginBottom:8,alignItems:'flex-start'}}>
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontSize:12,fontWeight:600,color:'#A78BFA'}}>{m.fromName}</span>
                <span style={{fontSize:10,color:'#4a4a5a'}}>{m.createdAt?.substring(11,16)}</span>
                <span style={{fontSize:10,color:'#4a4a5a'}}>{m.createdAt?.substring(0,10)}</span>
              </div>
              <div style={{fontSize:13,color:'#e0e0e0',marginTop:2,lineHeight:1.6,wordBreak:'break-word'}}>{m.text}</div>
              {m.msgType==='image'&&<div style={{fontSize:11,color:'#6B7280'}}>[图片消息]</div>}
              {m.msgType==='voice'&&<div style={{fontSize:11,color:'#6B7280'}}>[语音 {m.voiceDuration}″]</div>}
            </div>
            <button className="btn-sm btn-danger" style={{fontSize:10,padding:'2px 8px',flexShrink:0}} onClick={()=>deleteMsg(activeConv.key,m.id)}>删除</button>
          </div>
        ))}
        {(!activeConv.messages||activeConv.messages.length===0)&&<div style={{textAlign:'center',color:'#6B7280',padding:20}}>暂无消息</div>}
      </div>
      <div className="actions"><button className="btn-sm btn-ghost" onClick={()=>setActiveConv(null)}>关闭</button></div>
    </div></div>}

    {/* 敏感词管理弹窗 */}
    {showSensitive&&<SensitiveWordsModal onClose={()=>setShowSensitive(false)}/>}
  </div>);
}

function SensitiveWordsModal({onClose}){
  const [words,setWords]=useState([]);const [newWord,setNew]=useState('');const [loading,setLoading]=useState(true);const [saving,setSaving]=useState(false);
  useEscClose(onClose);
  useEffect(()=>{apiGet('/api/admin/sensitive-words').then(w=>{if(Array.isArray(w))setWords(w);setLoading(false)}).catch(()=>setLoading(false))},[]);
  const save=()=>{setSaving(true);apiPost('/api/admin/sensitive-words',{words}).then(()=>{setSaving(false);showToast('已保存','success');onClose()}).catch(()=>setSaving(false))};
  const add=()=>{if(!newWord.trim()){showToast('请输入敏感词','error');return}if(words.includes(newWord.trim().toLowerCase())){showToast('该词已存在','error');return}setWords([...words,newWord.trim().toLowerCase()]);setNew('')};
  const remove=(i)=>setWords(words.filter((_,j)=>j!==i));
  return(<div className="modal-bg" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
    <h3>🛡️ 敏感词管理 ({words.length}个)</h3>
    {loading?<div>加载中…</div>:<>
    <div style={{display:'flex',gap:6,marginBottom:12}}>
      <input value={newWord} onChange={e=>setNew(e.target.value)} placeholder="输入敏感词…" onKeyDown={e=>e.key==='Enter'&&add()} style={{flex:1}}/>
      <button className="btn-sm btn-primary" onClick={add}>添加</button>
    </div>
    <div style={{maxHeight:300,overflow:'auto',display:'flex',flexWrap:'wrap',gap:6}}>
      {words.map((w,i)=><span key={i} style={{padding:'4px 10px',borderRadius:8,background:'#EF444420',color:'#EF4444',fontSize:12,display:'flex',alignItems:'center',gap:4}}>
        {w} <button onClick={()=>remove(i)} style={{background:'none',border:'none',color:'#EF4444',cursor:'pointer',fontSize:14,padding:0}}>×</button>
      </span>)}
      {words.length===0&&<span style={{color:'#6B7280',fontSize:12}}>暂无敏感词</span>}
    </div>
    </>}
    <div className="actions">
      <button className="btn-sm btn-ghost" onClick={onClose}>取消</button>
      <button className="btn-sm btn-primary" onClick={save}>保存</button>
    </div>
  </div></div>);
}

          <td><span className="badge badge-warn">{r.targetType}</span></td>
          <td style={{fontSize:12,maxWidth:250,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.reason}</td>
          <td>{r.status==='pending'?<span className="badge badge-err">待处理</span>:r.status==='resolved'?<span className="badge badge-ok">已处理</span>:<span className="badge" style={{background:'#6B728020',color:'#6B7280'}}>已忽略</span>}</td>
          <td style={{fontSize:11,color:'#6B7280'}}>{r.createdAt?.substring(0,10)}</td>
          <td style={{whiteSpace:'nowrap'}}>
            {r.status==='pending'&&<>
              <button className="btn-sm btn-primary" style={{marginRight:4}} onClick={()=>resolveReport(r.id,'resolved')}>处理</button>
              <button className="btn-sm btn-ghost" onClick={()=>resolveReport(r.id,'dismissed')}>忽略</button>
            </>}
          </td>
        </tr>
      ))}</tbody></table>
    </div>}
  </div>);
}

function QualityTab(){
  const [samples,setSamples]=useState(null);
  const [total,setTotal]=useState(0);
  const [page,setPage]=useState(1);
  const [mode,setMode]=useState('');
  const [expanded,setExpanded]=useState(null); // id of expanded sample
  const [fullContent,setFullContent]=useState(null); // full response loaded from API
  const [loadingFull,setLoadingFull]=useState(false);
  const limit=10;
  const selStyle={padding:'6px 10px',borderRadius:8,border:'1.5px solid #2D2D3F',background:'#0f0f1a',color:'#e0e0e0',fontSize:12};

  const load=()=>{
    apiGet(`/api/admin/ai-samples?page=${page}&limit=${limit}&mode=${mode}`).then(d=>{
      if(d?.items){setSamples(d.items);setTotal(d.total)}
      else{setSamples([]);setTotal(0)}
    });
  };
  useEffect(()=>{load()},[page,mode]);

  const toggleExpand=(s)=>{
    if(expanded===s.id){setExpanded(null);setFullContent(null);return}
    setExpanded(s.id);
    // 如果preview很短，加载完整内容
    setLoadingFull(true);setFullContent(null);
    apiGet(`/api/admin/ai-samples/${s.userId}/${s.id}`).then(d=>{
      if(d&&!d.error)setFullContent(d);
      setLoadingFull(false);
    }).catch(()=>setLoadingFull(false));
  };

  const totalPages=Math.ceil(total/limit);
  const modes=[['','全部'],['bazi','八字'],['astrology','星座'],['tarot','塔罗'],['meihua','梅花'],['vedic','印度'],['hehun','合婚'],['synastry','配对'],['hepan','合盘']];

  // 简单markdown渲染: **粗体**, *斜体*, ##标题, 换行
  const renderMD=(text)=>{
    if(!text)return null;
    return text.split('\n').map((line,i)=>{
      if(line.startsWith('###'))return <div key={i} style={{fontWeight:700,fontSize:13,color:'#A78BFA',margin:'8px 0 4px'}}>{line.replace(/^###\s*/,'')}</div>;
      if(line.startsWith('##'))return <div key={i} style={{fontWeight:700,fontSize:14,color:'#A78BFA',margin:'10px 0 4px'}}>{line.replace(/^##\s*/,'')}</div>;
      if(line.startsWith('#'))return <div key={i} style={{fontWeight:700,fontSize:15,color:'#A78BFA',margin:'12px 0 4px'}}>{line.replace(/^#\s*/,'')}</div>;
      if(line.startsWith('---'))return <hr key={i} style={{border:'none',borderTop:'1px solid #2D2D3F',margin:'8px 0'}}/>;
      if(line.trim()==='')return <div key={i} style={{height:6}}/>;
      // bold + italic inline
      let html=line.replace(/\*\*(.+?)\*\*/g,'<strong style="color:#e0e0e0">$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');
      return <div key={i} style={{lineHeight:1.7}} dangerouslySetInnerHTML={{__html:html}}/>;
    });
  };

  return(<>
    <div className="panel">
      <h3 style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        🔍 AI输出质量抽查
        <span style={{fontSize:12,color:'#6B7280',fontWeight:400}}>共 {total} 条记录</span>
      </h3>

      {/* 筛选栏 */}
      <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center',flexWrap:'wrap'}}>
        {modes.map(([v,l])=><button key={v} className={`btn-sm ${mode===v?'btn-primary':'btn-ghost'}`} style={{fontSize:11,padding:'4px 10px'}} onClick={()=>{setMode(v);setPage(1)}}>{l}</button>)}
      </div>

      {/* 列表 */}
      {samples===null?<div style={{textAlign:'center',padding:30}}><span className="spinner"/> 加载中…</div>:
      samples.length===0?<div style={{textAlign:'center',color:'#6B7280',padding:30,fontSize:13}}>暂无占卜记录</div>:
      <div>
        {samples.map(s=>{

          return(<div key={s.id} style={{borderBottom:'1px solid #1f1f30'}}>

                  <span style={{fontSize:10,color:'#4a4a5a',marginLeft:'auto',flexShrink:0}}>{s.createdAt?.substring(0,16).replace('T',' ')}</span>
                </div>
                {s.question&&<div style={{fontSize:12,color:'#9CA3AF',marginBottom:2}}>❓ {s.question}</div>}
                {!isOpen&&<div style={{fontSize:12,color:'#6B7280',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.preview||'（无预览）'}</div>}
              </div>
            </div>

            {/* 展开的完整内容 */}
            {isOpen&&<div style={{padding:'0 8px 16px 38px'}}>
              {loadingFull?<div><span className="spinner" style={{marginRight:6}}/>加载完整内容…</div>:
              fullContent?<>
                {/* 元信息 */}
                <div style={{display:'flex',gap:12,marginBottom:10,fontSize:11,color:'#6B7280',flexWrap:'wrap'}}>
                  <span>模式: <span style={{color:'#A78BFA'}}>{fullContent.mode}</span></span>
                  <span>深度: <span style={{color:'#A78BFA'}}>{fullContent.depth}</span></span>
                  <span>字数: <span style={{color:'#A78BFA'}}>{fullContent.response?.length||0}</span></span>
                  <span>时间: {fullContent.createdAt?.substring(0,16).replace('T',' ')}</span>
                </div>

                {/* 问题 */}
                {fullContent.question&&<div style={{padding:'8px 12px',background:'#A78BFA10',borderRadius:8,marginBottom:10,fontSize:12,color:'#A78BFA'}}>
                  ❓ 用户提问: {fullContent.question}
                </div>}

                {/* AI完整回复 */}

                  {renderMD(fullContent.response)}
                </div>

                {/* 追问对话记录 */}
                {fullContent.chatHistory?.length>0&&<div style={{marginTop:12}}>
                  <div style={{fontSize:12,fontWeight:600,color:'#A78BFA',marginBottom:8}}>💬 追问对话 ({fullContent.chatHistory.length}条)</div>
                  <div style={{border:'1px solid #2D2D3F',borderRadius:10,overflow:'hidden'}}>
                    {fullContent.chatHistory.map((msg,i)=>(
                      <div key={i} style={{padding:'10px 14px',background:msg.role==='user'?'#1a1a2e':'#0f0f1a',borderBottom:i<fullContent.chatHistory.length-1?'1px solid #1f1f30':'none'}}>
                        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                          <span style={{fontSize:10,fontWeight:600,color:msg.role==='user'?'#3B82F6':'#A78BFA'}}>{msg.role==='user'?'👤 用户':'🤖 AI'}</span>
                          {msg.time&&<span style={{fontSize:9,color:'#4a4a5a'}}>{msg.time}</span>}
                        </div>
                        <div style={{fontSize:12,color:'#e0e0e0',lineHeight:1.6,whiteSpace:'pre-wrap'}}>{msg.text}</div>
                      </div>
                    ))}
                  </div>
                </div>}

                {/* 引擎数据 */}
                {fullContent.engineData&&<details style={{marginTop:8}}>
                  <summary style={{fontSize:11,color:'#6B7280',cursor:'pointer'}}>查看引擎原始数据</summary>
                  <pre style={{padding:10,background:'#0f0f1a',borderRadius:8,fontSize:10,color:'#6B7280',overflow:'auto',maxHeight:200,marginTop:4,whiteSpace:'pre-wrap'}}>{fullContent.engineData}</pre>
                </details>}
              </>:<div style={{color:'#6B7280',fontSize:12}}>内容加载失败</div>}
            </div>}
          </div>);
        })}
      </div>}

      {/* 分页 */}
      {totalPages>1&&<div style={{display:'flex',justifyContent:'center',gap:6,marginTop:12}}>
        {page>1&&<button className="btn-sm btn-ghost" onClick={()=>{setPage(page-1);setExpanded(null)}}>← 上一页</button>}
        <span style={{fontSize:12,color:'#6B7280',padding:'6px 8px'}}>第{page}/{totalPages}页</span>
        {page<totalPages&&<button className="btn-sm btn-ghost" onClick={()=>{setPage(page+1);setExpanded(null)}}>下一页 →</button>}
      </div>}
    </div>
  </>);
}

function ProviderModal({provider,onClose,onDone,testFn,testResult,testing}){
  const isEdit=!!provider;

  const [url,setUrl]=useState(provider?.url||'');

      const r=await apiPost('/api/admin/llm/providers/'+provider.id,{name,url,key,model});

      if(r.success){showToast('已更新','success');onDone()}

    </div>
    <label>个人简介</label><input value={d.bio||''} onChange={e=>setD({...d,bio:e.target.value})} placeholder="如: 插画师·猫咪收容志愿者 🐱"/>
    <label>兴趣标签 (用顿号分隔)</label><input value={tagStr} onChange={e=>setTagStr(e.target.value)} placeholder="如: 插画、猫咪、手账"/>
    <label>聊天风格 (AI会参考此描述模拟回复)</label><input value={d.chatStyle||''} onChange={e=>setD({...d,chatStyle:e.target.value})} placeholder="如: 温柔文艺，喜欢用比喻"/>
    <div className="actions">
      <button className="btn-sm btn-ghost" onClick={onClose}>取消</button>
      <button className="btn-sm btn-primary" onClick={doSave} disabled={saving}>{saving?(isNew?'创建中…':'保存中…'):(isNew?'创建':'保存')}</button>
    </div>
  </div></div>);
}

// ===== VIP & REVENUE PAGE =====
function VipPage(){

  const [revenue,setRevenue]=useState(null);
  const [orders,setOrders]=useState({items:[],total:0});
  const [inactive,setInactive]=useState([]);

  const [grantModal,setGrantModal]=useState(null);

  useEffect(()=>{
    apiGet('/api/admin/revenue').then(setRevenue);

  const loadInactive=(days)=>{setInactiveDays(days);apiGet('/api/admin/inactive-users?days='+days).then(d=>{if(Array.isArray(d))setInactive(d)})};

    <div style={{display:'flex',gap:8,marginBottom:12}}>
      {[{k:'overview',l:'概览'},{k:'orders',l:'订单'},{k:'inactive',l:'流失用户'}].map(t=>
        <button key={t.k} className={`btn-sm ${tab===t.k?'btn-primary':'btn-ghost'}`} onClick={()=>setTab(t.k)}>{t.l}</button>

    </div>

    {tab==='overview'&&<>
      {revenue&&<div className="stats-grid">
        <div className="stat-card"><div className="label">总订单</div><div className="value">{revenue.totalOrders}</div></div>

        <div className="stat-card"><div className="label">7日收入</div><div className="value" style={{fontSize:18}}>¥{revenue.weekRevenue}</div></div>
        <div className="stat-card"><div className="label">30日收入</div><div className="value" style={{fontSize:18}}>¥{revenue.monthRevenue}</div></div>

      </div>}

      <div className="panel">
        <h3>💎 VIP等级体系</h3>
        <table><thead><tr><th>等级</th><th>名称</th><th>每日占卜</th><th>追问/报告</th><th>看谁喜欢</th><th>无限滑卡</th><th>价格</th></tr></thead>

          <tr style={{color:'#F59E0B'}}><td>Lv.2</td><td>缘合至尊</td><td>无限</td><td>无限</td><td>✅</td><td>✅</td><td>¥68/月</td></tr>
        </tbody></table>
      </div>
    </>}

    {tab==='orders'&&<div className="panel">
      <h3 style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>📋 订单列表
        <button className="btn-sm btn-primary" onClick={()=>setGrantModal({userId:'',tier:'basic',days:'30'})}>+ 手动赠送VIP</button>
      </h3>
      {orders.items?.length===0?<div style={{textAlign:'center',padding:30,color:'#6B7280'}}>暂无订单</div>:
      <table><thead><tr><th>订单号</th><th>用户</th><th>等级</th><th>天数</th><th>金额</th><th>类型</th><th>时间</th></tr></thead>
      <tbody>{orders.items?.map(o=>(
        <tr key={o.id}>
          <td style={{fontSize:11,fontFamily:'monospace'}}>{o.id}</td>
          <td>{o.userName}</td>
          <td><span className="badge badge-purple">{o.tierName}</span></td>
          <td>{o.days}</td>
          <td style={{color:'#F59E0B'}}>¥{o.amount}</td>
          <td><span className={`badge ${o.type==='admin_grant'?'badge-warn':'badge-ok'}`}>{o.type==='admin_grant'?'赠送':'购买'}</span></td>
          <td style={{fontSize:11,color:'#6B7280'}}>{o.createdAt?.substring(0,10)}</td>

  </div>);
}

// ===== APP =====
function App(){
  const [adminUser,setAdminUser]=useState(null);
  const [page,setPage]=useState('dashboard');
  const [showChangePw,setShowChangePw]=useState(false);

  // 自动验证token并获取完整信息
  useEffect(()=>{
    const t=getToken();if(!t)return;
    try{
      const payload=JSON.parse(atob(t.split('.')[1]));
      if(payload.type==='admin'&&payload.aid){
        setAdminUser({id:payload.aid,role:payload.role,name:'管理员',username:'admin'});
        // 从服务器获取完整信息
        apiGet('/api/admin/list').then(list=>{
          if(Array.isArray(list)){const me=list.find(a=>a.id===payload.aid);if(me)setAdminUser(prev=>({...prev,...me}))}
        });
      }
    }catch(e){localStorage.removeItem('yuanhe_admin_token')}
  },[]);

  const logout=()=>{localStorage.removeItem('yuanhe_admin_token');setAdminUser(null)};

  const handleLogin=(adm)=>{
    setAdminUser(adm);
    if(adm.mustChangePassword)setShowChangePw(true);
  };

  if(!adminUser)return<LoginPage onLogin={handleLogin}/>;

  const pages={
    dashboard:<DashboardPage/>,
    users:<UsersPage/>,
    chat:<ChatPage/>,
    content:<ContentPage/>,
    llm:<LLMPage/>,
    logs:<LogsPage/>,
    bots:<BotPage/>,
    vip:<VipPage/>,
    admins:<AdminsPage role={adminUser.role}/>,
  };

  return(<div className="admin-layout">
    <div className="sidebar">
      <div className="brand">🔮 <span>缘合管理</span></div>
      <div className="menu">
        <button className={page==='dashboard'?'active':''} onClick={()=>setPage('dashboard')}>📊 <span>概览</span></button>
        {adminUser.role!=='support'&&<button className={page==='users'?'active':''} onClick={()=>setPage('users')}>👥 <span>用户</span></button>}
        <button className={page==='chat'?'active':''} onClick={()=>setPage('chat')}>💬 <span>聊天</span></button>
        <button className={page==='content'?'active':''} onClick={()=>setPage('content')}>📋 <span>内容</span></button>
        <button className={page==='bots'?'active':''} onClick={()=>setPage('bots')}>🤖 <span>Bot</span></button>
        {adminUser.role==='superadmin'&&<button className={page==='llm'?'active':''} onClick={()=>setPage('llm')}>⚙️ <span>系统</span></button>}
        <button className={page==='logs'?'active':''} onClick={()=>setPage('logs')}>📝 <span>日志</span></button>
        <button className={page==='vip'?'active':''} onClick={()=>setPage('vip')}>💎 <span>营收</span></button>
        {adminUser.role==='superadmin'&&<button className={page==='admins'?'active':''} onClick={()=>setPage('admins')}>👤 <span>管理员</span></button>}
      </div>
      <div className="bottom">
        <div className="info">{adminUser.name||adminUser.username||'管理员'}<br/>{adminUser.role}</div>
        <button className="btn-sm btn-ghost" style={{width:'100%',marginBottom:6,fontSize:11}} onClick={()=>setShowChangePw(true)}>改密码</button>
        <button className="logout" onClick={logout}>退出</button>
      </div>
    </div>
    <div className="main-content">
    {pages[page]||pages.dashboard}
    </div>
    {showChangePw&&<ChangePasswordModal forced={adminUser.mustChangePassword} onDone={()=>{setShowChangePw(false);if(adminUser.mustChangePassword)setAdminUser({...adminUser,mustChangePassword:false})}} onClose={()=>setShowChangePw(false)}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
