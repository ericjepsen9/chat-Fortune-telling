function BotEditModal({bot,onClose,onDone}){
  const [d,setD]=useState({...bot});
  const [tagStr,setTagStr]=useState((bot.tags||[]).join('、'));
  const [saving,setSaving]=useState(false);
  const isNew=!bot.id||bot.id===0;
  useEscClose(onClose);
  const doSave=async()=>{
    const data={...d,tags:tagStr.split(/[、,，]/).map(t=>t.trim()).filter(Boolean)};
    if(!data.name?.trim()){showToast('名称不能为空','error');return}
    if(data.age&&(parseInt(data.age)<18||parseInt(data.age)>60)){showToast('年龄应为18-60','error');return}
    if(!data.chatStyle?.trim()){showToast('聊天风格不能为空(AI依赖此字段)','error');return}
    setSaving(true);
    const r=isNew?await apiPost('/api/admin/bots',data):await apiPost('/api/admin/bots/'+bot.id+'/update',data);
    setSaving(false);
    if(!r.error){showToast(isNew?'创建成功':'已保存','success');onDone()}
  };
  return (<div className="modal-bg" onClick={onClose}><div className="modal" style={{width:500}} onClick={e=>e.stopPropagation()}>
    <h3>{isNew?'新建Bot':'编辑Bot'} — {d.name||'未命名'}</h3>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
      <div><label>名称 *</label><input value={d.name||''} onChange={e=>setD({...d,name:e.target.value})}/></div>
      <div><label>性别</label><select value={d.gender||'female'} onChange={e=>setD({...d,gender:e.target.value})}><option value="female">女</option><option value="male">男</option></select></div>
      <div><label>年龄</label><input type="number" value={d.age||25} onChange={e=>setD({...d,age:e.target.value})}/></div>
      <div><label>星座</label><input value={d.sign||''} onChange={e=>setD({...d,sign:e.target.value})} placeholder="如: 双鱼座"/></div>
      <div><label>出生年</label><input type="number" value={d.year||2000} onChange={e=>setD({...d,year:e.target.value})}/></div>
      <div><label>出生月</label><input type="number" value={d.month||1} onChange={e=>setD({...d,month:e.target.value})}/></div>
      <div><label>出生日</label><input type="number" value={d.day||1} onChange={e=>setD({...d,day:e.target.value})}/></div>
      <div><label>出生时</label><input type="number" value={d.hour||12} onChange={e=>setD({...d,hour:e.target.value})}/></div>
      <div><label>距离</label><input value={d.dist||'3km'} onChange={e=>setD({...d,dist:e.target.value})}/></div>
      <div><label>状态</label><select value={d.enabled!==false?'true':'false'} onChange={e=>setD({...d,enabled:e.target.value==='true'})}><option value="true">启用</option><option value="false">停用</option></select></div>
    </div>
    <label>个人简介</label><input value={d.bio||''} onChange={e=>setD({...d,bio:e.target.value})} placeholder="如: 插画师·猫咪收容志愿者 🐱"/>
    <label>兴趣标签 (用顿号分隔)</label><input value={tagStr} onChange={e=>setTagStr(e.target.value)} placeholder="如: 插画、猫咪、手账"/>
    <label>聊天风格 (AI会参考此描述模拟回复)</label><input value={d.chatStyle||''} onChange={e=>setD({...d,chatStyle:e.target.value})} placeholder="如: 温柔文艺，喜欢用比喻"/>
    <div className="actions">
      <button className="btn-sm btn-ghost" onClick={onClose}>取消</button>
      <button className="btn-sm btn-primary" onClick={doSave} disabled={saving}>{saving?(isNew?'创建中…':'保存中…'):(isNew?'创建':'保存')}</button>
    </div>
  </div></div>);
}

// ===== APP =====
function App(){
  const [adminUser,setAdminUser]=useState(null);
  const [confirmData,setConfirmData]=useState(null);
  const [adminTheme,setAdminTheme]=useState(()=>localStorage.getItem('yuanhe_admin_theme')||'dark');
  _confirmShow=(data)=>setConfirmData(data);
  // Apply theme
  useEffect(()=>{
    if(adminTheme==='light')document.body.classList.add('light');
    else document.body.classList.remove('light');
    localStorage.setItem('yuanhe_admin_theme',adminTheme);
  },[adminTheme]);
  const toggleAdminTheme=()=>setAdminTheme(t=>t==='dark'?'light':'dark');
  const [page,setPage]=useState('dashboard');
  const [showChangePw,setShowChangePw]=useState(false);

  // 自动验证token并获取完整信息
  useEffect(()=>{
    const t=getToken();if(!t)return;
    try{
      const payload=JSON.parse(atob(t.split('.')[1]));
      if(payload.type==='admin'&&payload.aid){
        setAdminUser({id:payload.aid,role:payload.role,name:'管理员',username:'admin'});
        // 从服务器获取完整信息
        apiGet('/api/admin/list').then(list=>{
          if(Array.isArray(list)){const me=list.find(a=>a.id===payload.aid);if(me)setAdminUser(prev=>({...prev,...me}))}
        });
      }
    }catch(e){localStorage.removeItem('yuanhe_admin_token')}
  },[]);

  const logout=()=>{localStorage.removeItem('yuanhe_admin_token');setAdminUser(null)};

  const handleLogin=(adm)=>{
    setAdminUser(adm);
    if(adm.mustChangePassword)setShowChangePw(true);
  };

  if(!adminUser)return<LoginPage onLogin={handleLogin}/>;

  // 角色权限强制(防止通过修改state绕过UI)
  const role=adminUser.role;
  const NoAccess=()=><div className="container"><div className="panel" style={{textAlign:'center',padding:40}}><div style={{fontSize:36,marginBottom:12}}>🔒</div><div style={{fontSize:15,fontWeight:600,color:'var(--err)'}}>无权访问</div><div style={{fontSize:12,color:'var(--textThi)',marginTop:6}}>当前角色({role})无此页面权限</div></div></div>;
  const pages={
    dashboard:<DashboardPage/>,
    users:role==='support'?<NoAccess/>:<UsersPage/>,
    chat:<ChatPage/>,
    content:<ContentPage/>,
    llm:role==='superadmin'?<LLMPage/>:<NoAccess/>,
    logs:<LogsPage/>,
    bots:<BotPage/>,
    vip:<VipPage/>,
    admins:role==='superadmin'?<AdminsPage role={role}/>:<NoAccess/>,
  };

  return(<div className="admin-layout">
    <div className="sidebar">
      <div className="brand">🔮 <span>缘合管理</span></div>
      <div className="menu">
        <div className="menu-group">
          <div className="menu-label"><span>核心</span></div>
          <button className={page==='dashboard'?'active':''} onClick={()=>setPage('dashboard')}>📊 <span>概览</span></button>
          {role!=='support'&&<button className={page==='users'?'active':''} onClick={()=>setPage('users')}>👥 <span>用户</span></button>}
          <button className={page==='chat'?'active':''} onClick={()=>setPage('chat')}>💬 <span>聊天</span></button>
          <button className={page==='content'?'active':''} onClick={()=>setPage('content')}>📋 <span>内容</span></button>
          <button className={page==='bots'?'active':''} onClick={()=>setPage('bots')}>🤖 <span>Bot</span></button>
        </div>
        <div className="menu-group">
          <div className="menu-label"><span>运营</span></div>
          <button className={page==='vip'?'active':''} onClick={()=>setPage('vip')}>💎 <span>营收</span></button>
          <button className={page==='logs'?'active':''} onClick={()=>setPage('logs')}>📝 <span>日志</span></button>
        </div>
        {role==='superadmin'&&<div className="menu-group">
          <div className="menu-label"><span>系统</span></div>
          <button className={page==='llm'?'active':''} onClick={()=>setPage('llm')}>⚙️ <span>配置</span></button>
          <button className={page==='admins'?'active':''} onClick={()=>setPage('admins')}>👤 <span>管理员</span></button>
        </div>}
      </div>
      <div className="bottom">
        <div className="info">{adminUser.name||adminUser.username||'管理员'}<br/><span style={{color:'var(--accent)',fontSize:10}}>{role==='superadmin'?'超级管理员':role==='operator'?'运营':'客服'}</span></div>
        <div style={{display:'flex',gap:6,marginBottom:6}}>
          <button className="btn-sm btn-ghost" style={{flex:1,fontSize:11}} onClick={()=>setShowChangePw(true)}>🔑 <span>改密</span></button>
          <button className="btn-sm btn-ghost" style={{flex:1,fontSize:11}} onClick={toggleAdminTheme}>{adminTheme==='dark'?'☀️':'🌙'} <span>{adminTheme==='dark'?'浅色':'深色'}</span></button>
        </div>
        <button className="logout" onClick={logout}>退出</button>
      </div>
    </div>
    <div className="main-content">
    {pages[page]||pages.dashboard}
    </div>
    {showChangePw&&<ChangePasswordModal forced={adminUser.mustChangePassword} onDone={()=>{setShowChangePw(false);if(adminUser.mustChangePassword)setAdminUser({...adminUser,mustChangePassword:false})}} onClose={()=>setShowChangePw(false)}/>}
    {confirmData&&<AdminConfirmDialog data={confirmData} onDone={ok=>{confirmData.resolve(ok);setConfirmData(null)}}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
