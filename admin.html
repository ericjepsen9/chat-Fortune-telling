<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>缘合 · 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Noto Sans SC',sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh}
a{color:#A78BFA;text-decoration:none}
input,select{font-family:inherit;font-size:14px}
button{font-family:inherit;cursor:pointer}
.container{max-width:1200px;margin:0 auto;padding:20px}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#1a1a2e;border-radius:16px;padding:40px;width:360px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.login-box h1{font-size:24px;margin-bottom:8px;color:#A78BFA}
.login-box p{font-size:13px;color:#6B7280;margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;border-radius:10px;border:1.5px solid #2D2D3F;background:#0f0f1a;color:#e0e0e0;margin-bottom:12px;outline:none}
.login-box input:focus{border-color:#A78BFA}
.login-box .btn{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#8B5CF6,#A78BFA);color:#fff;font-size:15px;font-weight:600}
.login-box .btn:disabled{opacity:0.5}
.login-box .err{color:#EF4444;font-size:12px;margin-bottom:12px}

/* Nav */
.nav{background:#1a1a2e;border-bottom:1px solid #2D2D3F;padding:0 20px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100}
.nav .brand{font-size:16px;font-weight:700;color:#A78BFA;padding:14px 12px 14px 0;border-right:1px solid #2D2D3F;margin-right:8px}
.nav button{padding:10px 16px;background:none;border:none;color:#9CA3AF;font-size:13px;font-weight:500;border-bottom:2px solid transparent}
.nav button.active{color:#A78BFA;border-bottom-color:#A78BFA}
.nav button:hover{color:#e0e0e0}
.nav .right{margin-left:auto;display:flex;align-items:center;gap:12px}
.nav .right .info{font-size:11px;color:#6B7280}
.nav .right .logout{padding:6px 14px;border-radius:8px;border:1px solid #2D2D3F;background:none;color:#9CA3AF;font-size:12px}

/* Cards */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin:20px 0}
.stat-card{background:#1a1a2e;border:1px solid #2D2D3F;border-radius:12px;padding:16px}
.stat-card .label{font-size:11px;color:#6B7280;text-transform:uppercase;letter-spacing:0.5px}
.stat-card .value{font-size:28px;font-weight:700;color:#A78BFA;margin-top:4px}
.stat-card .sub{font-size:11px;color:#4ECDC4;margin-top:4px}

/* Table */
.panel{background:#1a1a2e;border:1px solid #2D2D3F;border-radius:12px;padding:16px;margin:12px 0}
.panel h3{font-size:14px;font-weight:600;color:#A78BFA;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;color:#6B7280;font-size:11px;border-bottom:1px solid #2D2D3F}
td{padding:8px 10px;border-bottom:1px solid #1f1f30}
tr:hover{background:#1f1f30}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600}
.badge-ok{background:#34D39920;color:#34D399}
.badge-warn{background:#F59E0B20;color:#F59E0B}
.badge-err{background:#EF444420;color:#EF4444}
.badge-purple{background:#8B5CF620;color:#A78BFA}

/* Toolbar */
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.toolbar input{padding:8px 14px;border-radius:8px;border:1.5px solid #2D2D3F;background:#0f0f1a;color:#e0e0e0;font-size:13px;min-width:200px}
.toolbar .btn-sm{padding:6px 14px;border-radius:8px;border:none;font-size:12px;font-weight:500}
.btn-primary{background:#8B5CF6;color:#fff}
.btn-danger{background:#EF4444;color:#fff}
.btn-ghost{background:none;border:1px solid #2D2D3F;color:#9CA3AF}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#1a1a2e;border-radius:16px;padding:24px;width:420px;max-width:90vw;max-height:80vh;overflow:auto}
.modal h3{font-size:16px;font-weight:600;color:#A78BFA;margin-bottom:16px}
.modal label{display:block;font-size:12px;color:#9CA3AF;margin:10px 0 4px}
.modal input,.modal select{width:100%;padding:10px 14px;border-radius:8px;border:1.5px solid #2D2D3F;background:#0f0f1a;color:#e0e0e0}
.modal .actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;

// API helpers
const getToken=()=>localStorage.getItem('yuanhe_admin_token');
const api=async(path,opts={})=>{
  const headers={'Content-Type':'application/json'};
  const t=getToken();if(t)headers.Authorization='Bearer '+t;
  const r=await fetch(path,{...opts,headers:{...headers,...(opts.headers||{})}});
  const data=await r.json();
  if(r.status===401){localStorage.removeItem('yuanhe_admin_token');window.location.reload()}
  return data;
};
const apiGet=(p)=>api(p);
const apiPost=(p,b)=>api(p,{method:'POST',body:JSON.stringify(b)});

// ===== LOGIN =====
function LoginPage({onLogin}){
  const [u,setU]=useState('');const [p,setP]=useState('');const [err,setErr]=useState('');const [loading,setLoading]=useState(false);
  const submit=async()=>{
    setErr('');setLoading(true);
    const r=await apiPost('/api/admin/login',{username:u,password:p});
    setLoading(false);
    if(r.error){setErr(r.error);return}
    localStorage.setItem('yuanhe_admin_token',r.token);
    onLogin(r.admin);
  };
  return(<div className="login-wrap"><div className="login-box">
    <div style={{fontSize:36,marginBottom:8}}>🔮</div>
    <h1>缘合管理后台</h1>
    <p>请使用管理员账号登录</p>
    {err&&<div className="err">{err}</div>}
    <input value={u} onChange={e=>setU(e.target.value)} placeholder="用户名" onKeyDown={e=>e.key==='Enter'&&submit()}/>
    <input type="password" value={p} onChange={e=>setP(e.target.value)} placeholder="密码" onKeyDown={e=>e.key==='Enter'&&submit()}/>
    <button className="btn" onClick={submit} disabled={loading||!u||!p}>{loading?'登录中…':'登录'}</button>
  </div></div>);
}

// ===== CHANGE PASSWORD =====
function ChangePasswordModal({forced,onDone,onClose}){
  const [old,setOld]=useState('');const [pw,setPw]=useState('');const [pw2,setPw2]=useState('');const [err,setErr]=useState('');
  const submit=async()=>{
    if(pw!==pw2){setErr('两次密码不一致');return}
    const r=await apiPost('/api/admin/change-password',{oldPassword:old,newPassword:pw});
    if(r.error){setErr(r.error);return}
    onDone();
  };
  return(<div className="modal-bg" onClick={forced?null:onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
    <h3>{forced?'⚠️ 首次登录请修改密码':'修改密码'}</h3>
    {err&&<div style={{color:'#EF4444',fontSize:12,marginBottom:8}}>{err}</div>}
    {!forced&&<><label>旧密码</label><input type="password" value={old} onChange={e=>setOld(e.target.value)}/></>}
    <label>新密码</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="至少6位"/>
    <label>确认新密码</label><input type="password" value={pw2} onChange={e=>setPw2(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
    <div className="actions">
      {!forced&&<button className="btn-sm btn-ghost" onClick={onClose}>取消</button>}
      <button className="btn-sm btn-primary" onClick={submit}>确认修改</button>
    </div>
  </div></div>);
}

// ===== DASHBOARD (placeholder for Step B) =====
function DashboardPage(){
  const [stats,setStats]=useState(null);const [uStats,setUStats]=useState(null);
  useEffect(()=>{apiGet('/api/stats').then(setStats).catch(()=>{});apiGet('/api/admin/stats').then(setUStats).catch(()=>{})},[]);
  if(!stats)return <div className="container"><div className="panel">加载中…</div></div>;
  return(<div className="container">
    <h2 style={{fontSize:18,fontWeight:700,margin:'8px 0 16px'}}>📊 系统概览</h2>
    <div className="stats-grid">
      {uStats&&<><div className="stat-card"><div className="label">总用户</div><div className="value">{uStats.totalUsers}</div><div className="sub">今日活跃 {uStats.activeToday} · 新增 {uStats.newToday}</div></div>
      <div className="stat-card"><div className="label">占卜总数</div><div className="value">{uStats.totalDivinations}</div></div>
      <div className="stat-card"><div className="label">帖子总数</div><div className="value">{uStats.totalPosts}</div></div></>}
      <div className="stat-card"><div className="label">运行时间</div><div className="value" style={{fontSize:18}}>{stats.uptime}</div></div>
      <div className="stat-card"><div className="label">总请求</div><div className="value">{stats.requests?.total||0}</div><div className="sub">成功率 {stats.requests?.successRate||'—'}</div></div>
      <div className="stat-card"><div className="label">LLM调用</div><div className="value">{stats.llm?.calls||0}</div><div className="sub">失败 {stats.llm?.error||0} · 超时 {stats.llm?.timeout||0}</div></div>
      <div className="stat-card"><div className="label">LLM平均耗时</div><div className="value" style={{fontSize:18}}>{stats.llm?.avgTimeSeconds||'—'}</div></div>
      <div className="stat-card"><div className="label">引擎调用</div><div className="value">{stats.engine?.calls||0}</div><div className="sub">错误 {stats.engine?.errors||0}</div></div>
      <div className="stat-card"><div className="label">内存</div><div className="value" style={{fontSize:16}}>{stats.memory?.heap||'—'} / {stats.memory?.rss||'—'}</div></div>
    </div>
    <div className="panel">
      <h3>📡 API端点统计</h3>
      <table><thead><tr><th>端点</th><th>请求数</th><th>成功</th><th>失败</th><th>平均耗时</th></tr></thead>
      <tbody>{Object.entries(stats.api||{}).map(([ep,s])=>{
        const avg=s.count?Math.round(s.totalTime/s.count):0;
        return<tr key={ep}><td>{ep}</td><td>{s.count}</td><td><span className="badge badge-ok">{s.success}</span></td><td>{s.error?<span className="badge badge-err">{s.error}</span>:'—'}</td><td>{avg}ms</td></tr>;
      })}</tbody></table>
    </div>
    <div className="panel">
      <h3>📝 最近日志</h3>
      <div style={{maxHeight:300,overflow:'auto',fontSize:11,lineHeight:1.8,fontFamily:'monospace'}}>
        {(stats.recentLogs||[]).map((l,i)=><div key={i} style={{color:l.level==='ERROR'?'#EF4444':l.level==='WARN'?'#F59E0B':'#4ECDC4'}}>
          <b>[{l.time?.substring(11,19)}]</b> [{l.level}] [{l.category}] {l.message}
        </div>)}
      </div>
    </div>
  </div>);
}

// ===== ADMIN LOGS =====
function LogsPage(){
  const [logs,setLogs]=useState([]);
  useEffect(()=>{apiGet('/api/admin/logs?limit=100').then(setLogs).catch(()=>{})},[]);
  return(<div className="container">
    <h2 style={{fontSize:18,fontWeight:700,margin:'8px 0 16px'}}>📋 操作日志</h2>
    <div className="panel"><table><thead><tr><th>时间</th><th>管理员</th><th>操作</th><th>详情</th></tr></thead>
    <tbody>{logs.map(l=><tr key={l.id}>
      <td style={{fontSize:11,color:'#6B7280'}}>{l.createdAt?.substring(0,19).replace('T',' ')}</td>
      <td>{l.adminName}</td>
      <td><span className="badge badge-purple">{l.action}</span></td>
      <td style={{fontSize:12}}>{l.detail}</td>
    </tr>)}</tbody></table></div>
  </div>);
}

// ===== USERS PAGE =====
function UsersPage(){
  const [data,setData]=useState({items:[],total:0});
  const [search,setSearch]=useState('');
  const [gender,setGender]=useState('all');
  const [page,setPage]=useState(1);
  const [stats,setStats]=useState(null);
  const [detail,setDetail]=useState(null);
  const [banModal,setBanModal]=useState(null);
  const [editModal,setEditModal]=useState(null);
  const limit=15;

  const load=useCallback(()=>{
    apiGet(`/api/admin/users?search=${encodeURIComponent(search)}&gender=${gender}&page=${page}&limit=${limit}`).then(setData).catch(()=>{});
  },[search,gender,page]);

  useEffect(()=>{load()},[load]);
  useEffect(()=>{apiGet('/api/admin/stats').then(setStats).catch(()=>{})},[]);

  const totalPages=Math.ceil((data.total||0)/limit);

  return(<div className="container">
    <h2 style={{fontSize:18,fontWeight:700,margin:'8px 0 16px'}}>👥 用户管理</h2>

    {stats&&<div className="stats-grid">
      <div className="stat-card"><div className="label">总用户</div><div className="value">{stats.totalUsers}</div></div>
      <div className="stat-card"><div className="label">今日活跃</div><div className="value">{stats.activeToday}</div></div>
      <div className="stat-card"><div className="label">今日新增</div><div className="value">{stats.newToday}</div></div>
      <div className="stat-card"><div className="label">已封禁</div><div className="value" style={{color:'#EF4444'}}>{stats.banned}</div></div>
      <div className="stat-card"><div className="label">男/女</div><div className="value" style={{fontSize:16}}>{stats.genderSplit?.male||0} / {stats.genderSplit?.female||0}</div></div>
      <div className="stat-card"><div className="label">占卜总数</div><div className="value">{stats.totalDivinations}</div></div>
    </div>}

    <div className="panel">
      <div className="toolbar">
        <input value={search} onChange={e=>{setSearch(e.target.value);setPage(1)}} placeholder="搜索手机号/昵称/ID…"/>
        <select value={gender} onChange={e=>{setGender(e.target.value);setPage(1)}} style={{padding:'8px 12px',borderRadius:8,border:'1.5px solid #2D2D3F',background:'#0f0f1a',color:'#e0e0e0',fontSize:13}}>
          <option value="all">全部性别</option><option value="male">男</option><option value="female">女</option>
        </select>
        <span style={{fontSize:12,color:'#6B7280',marginLeft:'auto'}}>共 {data.total} 条</span>
      </div>

      <table><thead><tr><th></th><th>昵称</th><th>手机号</th><th>性别</th><th>城市</th><th>占卜</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead>
      <tbody>{data.items?.map(u=>(
        <tr key={u.id}>
          <td style={{fontSize:20}}>{u.avatar||(u.gender==='female'?'👩':'👨')}</td>
          <td style={{fontWeight:600,cursor:'pointer',color:'#A78BFA'}} onClick={()=>apiGet('/api/admin/users/'+u.id).then(setDetail)}>{u.name}</td>
          <td style={{fontSize:12,color:'#6B7280'}}>{u.phone||'—'}</td>
          <td>{u.gender==='female'?<span style={{color:'#EC4899'}}>♀</span>:<span style={{color:'#3B82F6'}}>♂</span>}</td>
          <td style={{fontSize:12}}>{u.city||'—'}</td>
          <td>{u.divinationCount}</td>
          <td>{u.banned?<span className="badge badge-err">封禁</span>:<span className="badge badge-ok">正常</span>}</td>
          <td style={{fontSize:11,color:'#6B7280'}}>{u.createdAt?.substring(0,10)}</td>
          <td>
            <button className="btn-sm btn-ghost" style={{marginRight:4}} onClick={()=>setEditModal(u)}>编辑</button>
            {u.banned
              ?<button className="btn-sm btn-primary" onClick={()=>{apiPost('/api/admin/users/'+u.id+'/ban',{ban:false}).then(()=>load())}}>解封</button>
              :<button className="btn-sm btn-danger" onClick={()=>setBanModal(u)}>封禁</button>
            }
          </td>
        </tr>
      ))}</tbody></table>

      {totalPages>1&&<div style={{display:'flex',justifyContent:'center',gap:6,marginTop:12}}>
        {page>1&&<button className="btn-sm btn-ghost" onClick={()=>setPage(page-1)}>← 上一页</button>}
        <span style={{fontSize:12,color:'#6B7280',padding:'6px 8px'}}>第{page}/{totalPages}页</span>
        {page<totalPages&&<button className="btn-sm btn-ghost" onClick={()=>setPage(page+1)}>下一页 →</button>}
      </div>}
    </div>

    {/* 用户详情弹窗 */}
    {detail&&<div className="modal-bg" onClick={()=>setDetail(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <h3>👤 {detail.profile?.name||'用户详情'}</h3>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,fontSize:13}}>
        <div><span style={{color:'#6B7280'}}>ID:</span> <span style={{fontSize:11}}>{detail.id?.substring(0,8)}…</span></div>
        <div><span style={{color:'#6B7280'}}>手机:</span> {detail.phone||'—'}</div>
        <div><span style={{color:'#6B7280'}}>性别:</span> {detail.profile?.gender==='female'?'女':'男'}</div>
        <div><span style={{color:'#6B7280'}}>城市:</span> {detail.profile?.city||'—'}</div>
        <div><span style={{color:'#6B7280'}}>生辰:</span> {detail.profile?.year}年{detail.profile?.month}月{detail.profile?.day}日 {detail.profile?.hour}时</div>
        <div><span style={{color:'#6B7280'}}>注册:</span> {detail.createdAt?.substring(0,10)}</div>
        <div><span style={{color:'#6B7280'}}>最后活跃:</span> {detail.lastActiveAt?.substring(0,16).replace('T',' ')}</div>
        <div><span style={{color:'#6B7280'}}>占卜次数:</span> {detail.divinationCount} · 帖子 {detail.postCount}</div>
      </div>
      {detail.profile?.bio&&<div style={{marginTop:10,padding:10,background:'#0f0f1a',borderRadius:8,fontSize:12,color:'#9CA3AF'}}>{detail.profile.bio}</div>}
      {detail.banned&&<div style={{marginTop:10,padding:10,background:'#EF444420',borderRadius:8,fontSize:12,color:'#EF4444'}}>⛔ 已封禁: {detail.banReason} {detail.banUntil?`(至${detail.banUntil.substring(0,10)})`:' (永久)'}</div>}
      {detail.divinations?.length>0&&<div style={{marginTop:12}}>
        <div style={{fontSize:12,fontWeight:600,color:'#6B7280',marginBottom:6}}>最近占卜</div>
        {detail.divinations.map(d=><div key={d.id} style={{fontSize:11,color:'#9CA3AF',padding:'4px 0',borderBottom:'1px solid #1f1f30'}}>
          <span className="badge badge-purple">{d.mode}</span> {d.question||'全面分析'} <span style={{color:'#4a4a5a'}}>{d.createdAt?.substring(0,10)}</span>
        </div>)}
      </div>}
      <div className="actions"><button className="btn-sm btn-ghost" onClick={()=>setDetail(null)}>关闭</button></div>
    </div></div>}

    {/* 封禁弹窗 */}
    {banModal&&(()=>{
      const [reason,setR]=useState('');const [days,setD]=useState('');
      const doBan=async()=>{
        await apiPost('/api/admin/users/'+banModal.id+'/ban',{ban:true,reason:reason||'违规',days:days?parseInt(days):0});
        setBanModal(null);load();
      };
      return<div className="modal-bg" onClick={()=>setBanModal(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>⛔ 封禁 {banModal.name}</h3>
        <label>封禁理由</label><input value={reason} onChange={e=>setR(e.target.value)} placeholder="违规内容/行为描述"/>
        <label>封禁天数 (0=永久)</label><input type="number" value={days} onChange={e=>setD(e.target.value)} placeholder="0"/>
        <div className="actions">
          <button className="btn-sm btn-ghost" onClick={()=>setBanModal(null)}>取消</button>
          <button className="btn-sm btn-danger" onClick={doBan}>确认封禁</button>
        </div>
      </div></div>;
    })()}

    {/* 编辑弹窗 */}
    {editModal&&(()=>{
      const [name,setN]=useState(editModal.name||'');const [city,setC]=useState(editModal.city||'');
      const doEdit=async()=>{
        await apiPost('/api/admin/users/'+editModal.id+'/update',{name,city});
        setEditModal(null);load();
      };
      return<div className="modal-bg" onClick={()=>setEditModal(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>✏️ 编辑 {editModal.name}</h3>
        <label>昵称</label><input value={name} onChange={e=>setN(e.target.value)}/>
        <label>城市</label><input value={city} onChange={e=>setC(e.target.value)}/>
        <div className="actions">
          <button className="btn-sm btn-ghost" onClick={()=>setEditModal(null)}>取消</button>
          <button className="btn-sm btn-primary" onClick={doEdit}>保存</button>
        </div>
      </div></div>;
    })()}
  </div>);
}

// ===== CHAT PAGE =====
function ChatPage(){
  const [data,setData]=useState({items:[],total:0});
  const [search,setSearch]=useState('');
  const [page,setPage]=useState(1);
  const [activeConv,setActiveConv]=useState(null);
  const [showSensitive,setShowSensitive]=useState(false);
  const limit=20;

  const load=useCallback(()=>{
    apiGet(`/api/admin/conversations?search=${encodeURIComponent(search)}&page=${page}&limit=${limit}`).then(setData).catch(()=>{});
  },[search,page]);
  useEffect(()=>{load()},[load]);

  const openConv=(key)=>{
    apiGet('/api/admin/conversations/'+encodeURIComponent(key)).then(setActiveConv).catch(()=>{});
  };
  const deleteMsg=(key,msgId)=>{
    if(!confirm('确定删除这条消息？'))return;
    apiPost('/api/admin/conversations/'+encodeURIComponent(key)+'/delete-message',{messageId:msgId}).then(()=>{
      openConv(key); // 刷新
    });
  };

  const totalPages=Math.ceil((data.total||0)/limit);

  return(<div className="container">
    <h2 style={{fontSize:18,fontWeight:700,margin:'8px 0 16px'}}>💬 聊天管理
      <button className="btn-sm btn-ghost" style={{marginLeft:12,fontSize:12}} onClick={()=>setShowSensitive(true)}>🛡️ 敏感词管理</button>
    </h2>

    <div className="panel">
      <div className="toolbar">
        <input value={search} onChange={e=>{setSearch(e.target.value);setPage(1)}} placeholder="搜索用户名…"/>
        <span style={{fontSize:12,color:'#6B7280',marginLeft:'auto'}}>共 {data.total} 个会话</span>
      </div>
      <table><thead><tr><th>用户A</th><th>用户B</th><th>消息数</th><th>最后消息</th><th>时间</th><th>操作</th></tr></thead>
      <tbody>{data.items?.map(c=>(
        <tr key={c.key}>
          <td style={{fontWeight:600}}>{c.nameA}</td>
          <td style={{fontWeight:600}}>{c.nameB}</td>
          <td>{c.messageCount}</td>
          <td style={{fontSize:12,color:'#9CA3AF',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.lastMessage}</td>
          <td style={{fontSize:11,color:'#6B7280'}}>{c.lastTime?.substring(0,16).replace('T',' ')}</td>
          <td><button className="btn-sm btn-ghost" onClick={()=>openConv(c.key)}>查看</button></td>
        </tr>
      ))}</tbody></table>
      {totalPages>1&&<div style={{display:'flex',justifyContent:'center',gap:6,marginTop:12}}>
        {page>1&&<button className="btn-sm btn-ghost" onClick={()=>setPage(page-1)}>←</button>}
        <span style={{fontSize:12,color:'#6B7280',padding:'6px 8px'}}>{page}/{totalPages}</span>
        {page<totalPages&&<button className="btn-sm btn-ghost" onClick={()=>setPage(page+1)}>→</button>}
      </div>}
    </div>

    {/* 聊天记录弹窗 */}
    {activeConv&&<div className="modal-bg" onClick={()=>setActiveConv(null)}><div className="modal" style={{width:520,maxHeight:'85vh'}} onClick={e=>e.stopPropagation()}>
      <h3>💬 {activeConv.nameA} ↔ {activeConv.nameB} ({activeConv.messages?.length||0}条)</h3>
      <div style={{maxHeight:'60vh',overflow:'auto',padding:'8px 0'}}>
        {activeConv.messages?.map(m=>(
          <div key={m.id} style={{display:'flex',gap:8,marginBottom:8,alignItems:'flex-start'}}>
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontSize:12,fontWeight:600,color:'#A78BFA'}}>{m.fromName}</span>
                <span style={{fontSize:10,color:'#4a4a5a'}}>{m.createdAt?.substring(11,16)}</span>
                <span style={{fontSize:10,color:'#4a4a5a'}}>{m.createdAt?.substring(0,10)}</span>
              </div>
              <div style={{fontSize:13,color:'#e0e0e0',marginTop:2,lineHeight:1.6,wordBreak:'break-word'}}>{m.text}</div>
              {m.msgType==='image'&&<div style={{fontSize:11,color:'#6B7280'}}>[图片消息]</div>}
              {m.msgType==='voice'&&<div style={{fontSize:11,color:'#6B7280'}}>[语音 {m.voiceDuration}″]</div>}
            </div>
            <button className="btn-sm btn-danger" style={{fontSize:10,padding:'2px 8px',flexShrink:0}} onClick={()=>deleteMsg(activeConv.key,m.id)}>删除</button>
          </div>
        ))}
        {(!activeConv.messages||activeConv.messages.length===0)&&<div style={{textAlign:'center',color:'#6B7280',padding:20}}>暂无消息</div>}
      </div>
      <div className="actions"><button className="btn-sm btn-ghost" onClick={()=>setActiveConv(null)}>关闭</button></div>
    </div></div>}

    {/* 敏感词管理弹窗 */}
    {showSensitive&&<SensitiveWordsModal onClose={()=>setShowSensitive(false)}/>}
  </div>);
}

function SensitiveWordsModal({onClose}){
  const [words,setWords]=useState([]);const [newWord,setNew]=useState('');const [loading,setLoading]=useState(true);
  useEffect(()=>{apiGet('/api/admin/sensitive-words').then(w=>{setWords(w||[]);setLoading(false)}).catch(()=>setLoading(false))},[]);
  const save=()=>{apiPost('/api/admin/sensitive-words',{words}).then(()=>{onClose()})};
  const add=()=>{if(newWord.trim()&&!words.includes(newWord.trim().toLowerCase())){setWords([...words,newWord.trim().toLowerCase()]);setNew('')}};
  const remove=(i)=>setWords(words.filter((_,j)=>j!==i));
  return(<div className="modal-bg" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
    <h3>🛡️ 敏感词管理 ({words.length}个)</h3>
    {loading?<div>加载中…</div>:<>
    <div style={{display:'flex',gap:6,marginBottom:12}}>
      <input value={newWord} onChange={e=>setNew(e.target.value)} placeholder="输入敏感词…" onKeyDown={e=>e.key==='Enter'&&add()} style={{flex:1}}/>
      <button className="btn-sm btn-primary" onClick={add}>添加</button>
    </div>
    <div style={{maxHeight:300,overflow:'auto',display:'flex',flexWrap:'wrap',gap:6}}>
      {words.map((w,i)=><span key={i} style={{padding:'4px 10px',borderRadius:8,background:'#EF444420',color:'#EF4444',fontSize:12,display:'flex',alignItems:'center',gap:4}}>
        {w} <button onClick={()=>remove(i)} style={{background:'none',border:'none',color:'#EF4444',cursor:'pointer',fontSize:14,padding:0}}>×</button>
      </span>)}
      {words.length===0&&<span style={{color:'#6B7280',fontSize:12}}>暂无敏感词</span>}
    </div>
    </>}
    <div className="actions">
      <button className="btn-sm btn-ghost" onClick={onClose}>取消</button>
      <button className="btn-sm btn-primary" onClick={save}>保存</button>
    </div>
  </div></div>);
}

// ===== CONTENT PAGE =====
function ContentPage(){
  const [tab,setTab]=useState('posts');
  const [posts,setPosts]=useState({items:[],total:0});
  const [reports,setReports]=useState({items:[],total:0});
  const [search,setSearch]=useState('');
  const [reportStatus,setReportStatus]=useState('pending');
  const [page,setPage]=useState(1);

  const loadPosts=()=>apiGet(`/api/admin/posts?search=${encodeURIComponent(search)}&page=${page}&limit=20`).then(setPosts).catch(()=>{});
  const loadReports=()=>apiGet(`/api/admin/reports?status=${reportStatus}&page=${page}&limit=20`).then(setReports).catch(()=>{});
  useEffect(()=>{if(tab==='posts')loadPosts();else loadReports()},[tab,search,reportStatus,page]);

  const deletePost=(id)=>{if(!confirm('确定删除？'))return;apiPost('/api/admin/posts/'+id+'/delete',{}).then(loadPosts)};
  const pinPost=(id,pinned)=>apiPost('/api/admin/posts/'+id+'/pin',{pinned}).then(loadPosts);
  const resolveReport=(id,status)=>{
    const resolution=status==='resolved'?prompt('处理说明(可选):'):'';
    apiPost('/api/admin/reports/'+id+'/resolve',{status,resolution:resolution||''}).then(loadReports);
  };

  return(<div className="container">
    <h2 style={{fontSize:18,fontWeight:700,margin:'8px 0 16px'}}>📋 内容审核</h2>
    <div style={{display:'flex',gap:8,marginBottom:12}}>
      <button className={`btn-sm ${tab==='posts'?'btn-primary':'btn-ghost'}`} onClick={()=>{setTab('posts');setPage(1)}}>帖子管理</button>
      <button className={`btn-sm ${tab==='reports'?'btn-primary':'btn-ghost'}`} onClick={()=>{setTab('reports');setPage(1)}}>
        举报处理 {reports.items?.filter(r=>r.status==='pending').length>0&&<span className="badge badge-err" style={{marginLeft:4}}>{reports.total}</span>}
      </button>
    </div>

    {tab==='posts'&&<div className="panel">
      <div className="toolbar">
        <input value={search} onChange={e=>{setSearch(e.target.value);setPage(1)}} placeholder="搜索帖子内容/作者…"/>
        <span style={{fontSize:12,color:'#6B7280',marginLeft:'auto'}}>共 {posts.total} 条</span>
      </div>
      <table><thead><tr><th>作者</th><th>内容</th><th>赞</th><th>评论</th><th>时间</th><th>操作</th></tr></thead>
      <tbody>{posts.items?.map(p=>(
        <tr key={p.id}>
          <td style={{fontWeight:600}}>{p.author} {p.is_bot&&<span className="badge badge-warn">Bot</span>} {p.pinned&&<span className="badge badge-purple">置顶</span>}</td>
          <td style={{fontSize:12,maxWidth:300,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.content}</td>
          <td>{p.likeCount}</td>
          <td>{p.commentCount}</td>
          <td style={{fontSize:11,color:'#6B7280'}}>{p.createdAt?.substring(0,10)}</td>
          <td style={{whiteSpace:'nowrap'}}>
            <button className="btn-sm btn-ghost" style={{marginRight:4}} onClick={()=>pinPost(p.id,!p.pinned)}>{p.pinned?'取消置顶':'置顶'}</button>
            <button className="btn-sm btn-danger" onClick={()=>deletePost(p.id)}>删除</button>
          </td>
        </tr>
      ))}</tbody></table>
    </div>}

    {tab==='reports'&&<div className="panel">
      <div className="toolbar">
        <select value={reportStatus} onChange={e=>{setReportStatus(e.target.value);setPage(1)}} style={{padding:'8px 12px',borderRadius:8,border:'1.5px solid #2D2D3F',background:'#0f0f1a',color:'#e0e0e0',fontSize:13}}>
          <option value="pending">待处理</option><option value="resolved">已处理</option><option value="dismissed">已忽略</option><option value="all">全部</option>
        </select>
        <span style={{fontSize:12,color:'#6B7280',marginLeft:'auto'}}>共 {reports.total} 条</span>
      </div>
      <table><thead><tr><th>举报人</th><th>类型</th><th>理由</th><th>状态</th><th>时间</th><th>操作</th></tr></thead>
      <tbody>{reports.items?.map(r=>(
        <tr key={r.id}>
          <td>{r.reporterName}</td>
          <td><span className="badge badge-warn">{r.targetType}</span></td>
          <td style={{fontSize:12,maxWidth:250,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.reason}</td>
          <td>{r.status==='pending'?<span className="badge badge-err">待处理</span>:r.status==='resolved'?<span className="badge badge-ok">已处理</span>:<span className="badge" style={{background:'#6B728020',color:'#6B7280'}}>已忽略</span>}</td>
          <td style={{fontSize:11,color:'#6B7280'}}>{r.createdAt?.substring(0,10)}</td>
          <td style={{whiteSpace:'nowrap'}}>
            {r.status==='pending'&&<>
              <button className="btn-sm btn-primary" style={{marginRight:4}} onClick={()=>resolveReport(r.id,'resolved')}>处理</button>
              <button className="btn-sm btn-ghost" onClick={()=>resolveReport(r.id,'dismissed')}>忽略</button>
            </>}
          </td>
        </tr>
      ))}</tbody></table>
    </div>}
  </div>);
}

// ===== LLM PAGE =====
function LLMPage(){
  const [config,setConfig]=useState(null);const [stats,setStats]=useState(null);
  useEffect(()=>{
    apiGet('/api/admin/llm-config').then(setConfig).catch(()=>{});
    apiGet('/api/stats').then(setStats).catch(()=>{});
  },[]);
  return(<div className="container">
    <h2 style={{fontSize:18,fontWeight:700,margin:'8px 0 16px'}}>🤖 LLM配置</h2>

    {stats&&<div className="stats-grid">
      <div className="stat-card"><div className="label">LLM总调用</div><div className="value">{stats.llm?.calls||0}</div></div>
      <div className="stat-card"><div className="label">成功</div><div className="value" style={{color:'#34D399'}}>{stats.llm?.success||0}</div></div>
      <div className="stat-card"><div className="label">失败</div><div className="value" style={{color:'#EF4444'}}>{stats.llm?.error||0}</div></div>
      <div className="stat-card"><div className="label">超时</div><div className="value" style={{color:'#F59E0B'}}>{stats.llm?.timeout||0}</div></div>
      <div className="stat-card"><div className="label">截断</div><div className="value">{stats.llm?.truncated||0}</div></div>
      <div className="stat-card"><div className="label">平均耗时</div><div className="value" style={{fontSize:18}}>{stats.llm?.avgTimeSeconds||'—'}</div></div>
    </div>}

    <div className="panel">
      <h3>📡 Provider配置</h3>
      {config?<table><thead><tr><th>名称</th><th>URL</th><th>模型</th><th>状态</th><th>连续错误</th></tr></thead>
      <tbody>{config.providers?.map((p,i)=>(
        <tr key={p.name}>
          <td style={{fontWeight:600}}>{p.name} {i===config.activeProvider&&<span className="badge badge-ok">当前</span>}</td>
          <td style={{fontSize:12,color:'#9CA3AF'}}>{p.url}</td>
          <td><span className="badge badge-purple">{p.model}</span></td>
          <td>{(config.providerErrors?.[p.name]||0)>=3?<span className="badge badge-err">异常</span>:<span className="badge badge-ok">正常</span>}</td>
          <td>{config.providerErrors?.[p.name]||0}</td>
        </tr>
      ))}</tbody></table>:<div>加载中…</div>}
      <div style={{marginTop:12,fontSize:11,color:'#6B7280'}}>
        Provider配置在 .env 文件中修改: LLM_BASE_URL / LLM_API_KEY / LLM_MODEL<br/>
        备用Provider: LLM_BACKUP_URL / LLM_BACKUP_KEY / LLM_BACKUP_MODEL<br/>
        修改后需重启服务器生效 (pm2 restart yuanhe)
      </div>
    </div>

    {stats?.api&&<div className="panel">
      <h3>📊 占卜API调用分布</h3>
      <table><thead><tr><th>端点</th><th>调用次数</th><th>成功</th><th>失败</th><th>平均耗时</th></tr></thead>
      <tbody>{Object.entries(stats.api).filter(([ep])=>ep.includes('divine')||ep.includes('chat')||ep.includes('calculate')).map(([ep,s])=>{
        const avg=s.count?Math.round(s.totalTime/s.count):0;
        return<tr key={ep}><td>{ep}</td><td>{s.count}</td><td><span className="badge badge-ok">{s.success}</span></td><td>{s.error?<span className="badge badge-err">{s.error}</span>:'—'}</td><td>{avg}ms</td></tr>;
      })}</tbody></table>
    </div>}
  </div>);
}

// ===== PLACEHOLDER PAGES =====
function PlaceholderPage({title,icon}){
  return(<div className="container" style={{textAlign:'center',paddingTop:80}}>
    <div style={{fontSize:48,marginBottom:16}}>{icon}</div>
    <div style={{fontSize:18,fontWeight:600,color:'#A78BFA'}}>{title}</div>
    <div style={{fontSize:13,color:'#6B7280',marginTop:8}}>即将开发…</div>
  </div>);
}

// ===== APP =====
function App(){
  const [adminUser,setAdminUser]=useState(null);
  const [page,setPage]=useState('dashboard');
  const [showChangePw,setShowChangePw]=useState(false);

  // 自动验证token
  useEffect(()=>{
    const t=getToken();if(!t)return;
    // 简单解析JWT payload (不验证签名，服务端会验证)
    try{
      const payload=JSON.parse(atob(t.split('.')[1]));
      if(payload.type==='admin'&&payload.aid){
        setAdminUser({id:payload.aid,role:payload.role});
      }
    }catch(e){localStorage.removeItem('yuanhe_admin_token')}
  },[]);

  const logout=()=>{localStorage.removeItem('yuanhe_admin_token');setAdminUser(null)};

  const handleLogin=(adm)=>{
    setAdminUser(adm);
    if(adm.mustChangePassword)setShowChangePw(true);
  };

  if(!adminUser)return<LoginPage onLogin={handleLogin}/>;

  const pages={
    dashboard:<DashboardPage/>,
    users:<UsersPage/>,
    chat:<ChatPage/>,
    content:<ContentPage/>,
    llm:<LLMPage/>,
    logs:<LogsPage/>,
  };

  return(<>
    <div className="nav">
      <div className="brand">🔮 缘合</div>
      <button className={page==='dashboard'?'active':''} onClick={()=>setPage('dashboard')}>概览</button>
      <button className={page==='users'?'active':''} onClick={()=>setPage('users')}>用户</button>
      <button className={page==='chat'?'active':''} onClick={()=>setPage('chat')}>聊天</button>
      <button className={page==='content'?'active':''} onClick={()=>setPage('content')}>内容</button>
      <button className={page==='llm'?'active':''} onClick={()=>setPage('llm')}>LLM</button>
      <button className={page==='logs'?'active':''} onClick={()=>setPage('logs')}>日志</button>
      <div className="right">
        <span className="info">{adminUser.name||adminUser.username||'管理员'} · {adminUser.role}</span>
        <button className="btn-sm btn-ghost" onClick={()=>setShowChangePw(true)}>改密码</button>
        <button className="logout" onClick={logout}>退出</button>
      </div>
    </div>
    {pages[page]||pages.dashboard}
    {showChangePw&&<ChangePasswordModal forced={adminUser.mustChangePassword} onDone={()=>{setShowChangePw(false);if(adminUser.mustChangePassword)setAdminUser({...adminUser,mustChangePassword:false})}} onClose={()=>setShowChangePw(false)}/>}
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
