<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>缘合 · 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Noto Sans SC',sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh}
a{color:#A78BFA;text-decoration:none}
input,select{font-family:inherit;font-size:14px}
button{font-family:inherit;cursor:pointer}
.container{max-width:1200px;margin:0 auto;padding:20px}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#1a1a2e;border-radius:16px;padding:40px;width:360px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.login-box h1{font-size:24px;margin-bottom:8px;color:#A78BFA}
.login-box p{font-size:13px;color:#6B7280;margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;border-radius:10px;border:1.5px solid #2D2D3F;background:#0f0f1a;color:#e0e0e0;margin-bottom:12px;outline:none}
.login-box input:focus{border-color:#A78BFA}
.login-box .btn{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#8B5CF6,#A78BFA);color:#fff;font-size:15px;font-weight:600}
.login-box .btn:disabled{opacity:0.5}
.login-box .err{color:#EF4444;font-size:12px;margin-bottom:12px}

/* Nav */
.nav{background:#1a1a2e;border-bottom:1px solid #2D2D3F;padding:0 20px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100}
.nav .brand{font-size:16px;font-weight:700;color:#A78BFA;padding:14px 12px 14px 0;border-right:1px solid #2D2D3F;margin-right:8px}
.nav button{padding:10px 16px;background:none;border:none;color:#9CA3AF;font-size:13px;font-weight:500;border-bottom:2px solid transparent}
.nav button.active{color:#A78BFA;border-bottom-color:#A78BFA}
.nav button:hover{color:#e0e0e0}
.nav .right{margin-left:auto;display:flex;align-items:center;gap:12px}
.nav .right .info{font-size:11px;color:#6B7280}
.nav .right .logout{padding:6px 14px;border-radius:8px;border:1px solid #2D2D3F;background:none;color:#9CA3AF;font-size:12px}

/* Cards */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin:20px 0}
.stat-card{background:#1a1a2e;border:1px solid #2D2D3F;border-radius:12px;padding:16px}
.stat-card .label{font-size:11px;color:#6B7280;text-transform:uppercase;letter-spacing:0.5px}
.stat-card .value{font-size:28px;font-weight:700;color:#A78BFA;margin-top:4px}
.stat-card .sub{font-size:11px;color:#4ECDC4;margin-top:4px}

/* Table */
.panel{background:#1a1a2e;border:1px solid #2D2D3F;border-radius:12px;padding:16px;margin:12px 0}
.panel h3{font-size:14px;font-weight:600;color:#A78BFA;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;color:#6B7280;font-size:11px;border-bottom:1px solid #2D2D3F}
td{padding:8px 10px;border-bottom:1px solid #1f1f30}
tr:hover{background:#1f1f30}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600}
.badge-ok{background:#34D39920;color:#34D399}
.badge-warn{background:#F59E0B20;color:#F59E0B}
.badge-err{background:#EF444420;color:#EF4444}
.badge-purple{background:#8B5CF620;color:#A78BFA}

/* Toolbar */
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.toolbar input{padding:8px 14px;border-radius:8px;border:1.5px solid #2D2D3F;background:#0f0f1a;color:#e0e0e0;font-size:13px;min-width:200px}
.toolbar .btn-sm{padding:6px 14px;border-radius:8px;border:none;font-size:12px;font-weight:500}
.btn-primary{background:#8B5CF6;color:#fff}
.btn-danger{background:#EF4444;color:#fff}
.btn-ghost{background:none;border:1px solid #2D2D3F;color:#9CA3AF}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#1a1a2e;border-radius:16px;padding:24px;width:420px;max-width:90vw;max-height:80vh;overflow:auto}
.modal h3{font-size:16px;font-weight:600;color:#A78BFA;margin-bottom:16px}
.modal label{display:block;font-size:12px;color:#9CA3AF;margin:10px 0 4px}
.modal input,.modal select{width:100%;padding:10px 14px;border-radius:8px;border:1.5px solid #2D2D3F;background:#0f0f1a;color:#e0e0e0}
.modal .actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:10px;background:#1a1a2e;border:1px solid #2D2D3F;color:#e0e0e0;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.toast-err{border-color:#EF4444;color:#EF4444}
.toast.toast-ok{border-color:#34D399;color:#34D399}
/* Loading spinner */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(167,139,250,0.3);border-top-color:#A78BFA;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="admin-toast" class="toast"></div>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef}=React;

// API helpers
const getToken=()=>localStorage.getItem('yuanhe_admin_token');
// Toast system
let _toastTimer=null;
function showToast(msg,type='info'){
  const el=document.getElementById('admin-toast');
  if(!el)return;
  el.textContent=msg;
  el.className='toast show '+(type==='error'?'toast-err':type==='success'?'toast-ok':'');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{el.className='toast'},3000);
}
// Debounce
function useDebounce(value,delay=400){
  const [deb,setDeb]=useState(value);
  useEffect(()=>{const t=setTimeout(()=>setDeb(value),delay);return()=>clearTimeout(t)},[value,delay]);
  return deb;
}
const api=async(path,opts={})=>{
  const headers={'Content-Type':'application/json'};
  const t=getToken();if(t)headers.Authorization='Bearer '+t;
  try{
    const r=await fetch(path,{...opts,headers:{...headers,...(opts.headers||{})}});
    if(r.status===401){localStorage.removeItem('yuanhe_admin_token');window.location.reload();return{}}
    const data=await r.json();
    if(data.error)showToast(data.error,'error');
    return data;
  }catch(e){showToast('网络错误: '+e.message,'error');return{error:e.message}}
};
const apiGet=(p)=>api(p);
const apiPost=(p,b)=>api(p,{method:'POST',body:JSON.stringify(b)});

// ===== LOGIN =====
function LoginPage({onLogin}){
  const [u,setU]=useState('');const [p,setP]=useState('');const [err,setErr]=useState('');const [loading,setLoading]=useState(false);
  const submit=async()=>{
    setErr('');setLoading(true);
    const r=await apiPost('/api/admin/login',{username:u,password:p});
    setLoading(false);
    if(r.error){setErr(r.error);return}
    localStorage.setItem('yuanhe_admin_token',r.token);
    onLogin(r.admin);
  };
  return(<div className="login-wrap"><div className="login-box">
    <div style={{fontSize:36,marginBottom:8}}>🔮</div>
    <h1>缘合管理后台</h1>
    <p>请使用管理员账号登录</p>
    {err&&<div className="err">{err}</div>}
    <input value={u} onChange={e=>setU(e.target.value)} placeholder="用户名" onKeyDown={e=>e.key==='Enter'&&submit()}/>
    <input type="password" value={p} onChange={e=>setP(e.target.value)} placeholder="密码" onKeyDown={e=>e.key==='Enter'&&submit()}/>
    <button className="btn" onClick={submit} disabled={loading||!u||!p}>{loading?'登录中…':'登录'}</button>
  </div></div>);
}

// ===== CHANGE PASSWORD =====
function ChangePasswordModal({forced,onDone,onClose}){
  const [old,setOld]=useState('');const [pw,setPw]=useState('');const [pw2,setPw2]=useState('');const [err,setErr]=useState('');
  const submit=async()=>{
    if(pw!==pw2){setErr('两次密码不一致');return}
    const r=await apiPost('/api/admin/change-password',{oldPassword:old,newPassword:pw});
    if(r.error){setErr(r.error);return}
    onDone();
  };
  return(<div className="modal-bg" onClick={forced?null:onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
    <h3>{forced?'⚠️ 首次登录请修改密码':'修改密码'}</h3>
    {err&&<div style={{color:'#EF4444',fontSize:12,marginBottom:8}}>{err}</div>}
    {!forced&&<><label>旧密码</label><input type="password" value={old} onChange={e=>setOld(e.target.value)}/></>}
    <label>新密码</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="至少6位"/>
    <label>确认新密码</label><input type="password" value={pw2} onChange={e=>setPw2(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
    <div className="actions">
      {!forced&&<button className="btn-sm btn-ghost" onClick={onClose}>取消</button>}
      <button className="btn-sm btn-primary" onClick={submit}>确认修改</button>
    </div>
  </div></div>);
}

// ===== DASHBOARD (placeholder for Step B) =====
// Trend Chart Component
function TrendChart({data}){
  const canvasRef=useRef(null);const chartRef=useRef(null);
  useEffect(()=>{
    if(!data||!canvasRef.current||typeof Chart==='undefined')return;
    if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new Chart(canvasRef.current,{
      type:'line',
      data:{
        labels:data.map(d=>d.date),
        datasets:[
          {label:'活跃用户',data:data.map(d=>d.activeUsers),borderColor:'#A78BFA',backgroundColor:'#A78BFA20',fill:true,tension:0.4,pointRadius:2},
          {label:'新增用户',data:data.map(d=>d.newUsers),borderColor:'#34D399',backgroundColor:'#34D39920',fill:true,tension:0.4,pointRadius:2},
          {label:'占卜次数',data:data.map(d=>d.divinations),borderColor:'#F59E0B',backgroundColor:'#F59E0B20',fill:true,tension:0.4,pointRadius:2},
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#9CA3AF',font:{size:10}}}},scales:{x:{ticks:{color:'#6B7280',font:{size:9},maxTicksLimit:10},grid:{color:'#2D2D3F'}},y:{ticks:{color:'#6B7280',font:{size:10}},grid:{color:'#2D2D3F'},beginAtZero:true}}}
    });
    return()=>{if(chartRef.current)chartRef.current.destroy()};
  },[data]);
  return (<canvas ref={canvasRef}/>);
}

function DashboardPage(){
  const [stats,setStats]=useState(null);const [uStats,setUStats]=useState(null);
  const [trends,setTrends]=useState(null);const [funnel,setFunnel]=useState(null);
  const [announcement,setAnnouncement]=useState({text:'',enabled:false,type:'info'});
  const [trendDays,setTrendDays]=useState(7);
  const loadStats=()=>{apiGet('/api/stats').then(setStats);apiGet('/api/admin/stats').then(setUStats)};
  const loadTrends=(d)=>{apiGet('/api/admin/trends?days='+d).then(setTrends)};
  useEffect(()=>{loadStats();loadTrends(trendDays);apiGet('/api/admin/funnel').then(setFunnel);apiGet('/api/admin/announcement').then(a=>{if(a)setAnnouncement(a)});const t=setInterval(loadStats,30000);return()=>clearInterval(t)},[]);
  const saveAnnouncement=()=>{apiPost('/api/admin/announcement',announcement).then(()=>showToast('公告已保存','success'))};
  if(!stats)return <div className="container"><div className="panel"><span className="spinner"/> 加载中…</div></div>;
  return(<div className="container">
    <h2 style={{fontSize:18,fontWeight:700,margin:'8px 0 16px'}}>📊 系统概览</h2>
    <div className="stats-grid">
      {uStats&&<><div className="stat-card"><div className="label">总用户</div><div className="value">{uStats.totalUsers}</div><div className="sub">今日活跃 {uStats.activeToday} · 新增 {uStats.newToday}</div></div>
      <div className="stat-card"><div className="label">占卜总数</div><div className="value">{uStats.totalDivinations}</div></div>
      <div className="stat-card"><div className="label">帖子总数</div><div className="value">{uStats.totalPosts}</div></div></>}
      <div className="stat-card"><div className="label">运行时间</div><div className="value" style={{fontSize:18}}>{stats.uptime}</div></div>
      <div className="stat-card"><div className="label">总请求</div><div className="value">{stats.requests?.total||0}</div><div className="sub">成功率 {stats.requests?.successRate||'—'}</div></div>
      <div className="stat-card"><div className="label">LLM调用</div><div className="value">{stats.llm?.calls||0}</div><div className="sub">失败 {stats.llm?.error||0} · 超时 {stats.llm?.timeout||0}</div></div>
      <div className="stat-card"><div className="label">LLM平均耗时</div><div className="value" style={{fontSize:18}}>{stats.llm?.avgTimeSeconds||'—'}</div></div>
      <div className="stat-card"><div className="label">引擎调用</div><div className="value">{stats.engine?.calls||0}</div><div className="sub">错误 {stats.engine?.errors||0}</div></div>
      <div className="stat-card"><div className="label">内存</div><div className="value" style={{fontSize:16}}>{stats.memory?.heap||'—'} / {stats.memory?.rss||'—'}</div></div>
    </div>
    {/* 趋势图 */}
    <div className="panel">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <h3 style={{margin:0}}>📈 用户趋势</h3>
        <div style={{display:'flex',gap:4}}>
          {[7,14,30].map(d=><button key={d} onClick={()=>{setTrendDays(d);loadTrends(d)}} className={`btn-sm ${trendDays===d?'btn-primary':'btn-ghost'}`}>{d}天</button>)}
        </div>
      </div>
      {trends?<div style={{height:200}}><TrendChart data={trends}/></div>:<div style={{textAlign:'center',padding:40,color:'#6B7280'}}><span className="spinner"/></div>}
    </div>

    {/* 漏斗 */}
    {funnel&&funnel.length>0&&<div className="panel">
      <h3>🔽 用户转化漏斗</h3>
      {funnel.map((f,i)=>(
        <div key={f.step} style={{marginBottom:8}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>
            <span>{f.step}</span>
            <span style={{color:'#A78BFA',fontWeight:600}}>{f.count}人 ({f.rate}%)</span>
          </div>
          <div style={{height:8,background:'#1f1f30',borderRadius:4,overflow:'hidden'}}>
            <div style={{height:'100%',background:i===0?'#A78BFA':i===1?'#34D399':i===2?'#F59E0B':'#EC4899',borderRadius:4,width:f.rate+'%',transition:'width .6s'}}/>
          </div>
        </div>
      ))}
    </div>}

    {/* 系统公告 */}
    <div className="panel">
      <h3>📢 系统公告</h3>
      <div style={{display:'flex',gap:8,marginBottom:8}}>
        <input value={announcement.text} onChange={e=>setAnnouncement({...announcement,text:e.target.value})} placeholder="输入公告内容…" style={{flex:1,padding:'8px 12px',borderRadius:8,border:'1.5px solid #2D2D3F',background:'#0f0f1a',color:'#e0e0e0',fontSize:13}}/>
        <select value={announcement.type||'info'} onChange={e=>setAnnouncement({...announcement,type:e.target.value})} style={{padding:'8px',borderRadius:8,border:'1.5px solid #2D2D3F',background:'#0f0f1a',color:'#e0e0e0',fontSize:12}}>
          <option value="info">通知</option><option value="warn">警告</option><option value="promo">活动</option>
        </select>
      </div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>{setAnnouncement({...announcement,enabled:!announcement.enabled});setTimeout(saveAnnouncement,100)}} className={`btn-sm ${announcement.enabled?'btn-danger':'btn-primary'}`}>{announcement.enabled?'关闭公告':'发布公告'}</button>
        <button onClick={saveAnnouncement} className="btn-sm btn-ghost">保存</button>
        {announcement.enabled&&<span style={{fontSize:11,color:'#34D399',alignSelf:'center'}}>✅ 公告已发布</span>}
      </div>
    </div>

    <div className="panel">
      <h3>📡 API端点统计</h3>
      <table><thead><tr><th>端点</th><th>请求数</th><th>成功</th><th>失败</th><th>平均耗时</th></tr></thead>
      <tbody>{Object.entries(stats.api||{}).map(([ep,s])=>{
        const avg=s.count?Math.round(s.totalTime/s.count):0;
        return (<tr key={ep}><td>{ep}</td><td>{s.count}</td><td><span className="badge badge-ok">{s.success}</span></td><td>{s.error?<span className="badge badge-err">{s.error}</span>:'—'}</td><td>{avg}ms</td></tr>);
      })}</tbody></table>
    </div>
    <div className="panel">
      <h3>📝 最近日志</h3>
      <div style={{maxHeight:300,overflow:'auto',fontSize:11,lineHeight:1.8,fontFamily:'monospace'}}>
        {(stats.recentLogs||[]).map((l,i)=><div key={i} style={{color:l.level==='ERROR'?'#EF4444':l.level==='WARN'?'#F59E0B':'#4ECDC4'}}>
          <b>[{l.time?.substring(11,19)}]</b> [{l.level}] [{l.category}] {l.message}
        </div>)}
      </div>
    </div>
  </div>);
}

// ===== ADMIN LOGS =====
function LogsPage(){
  const [logs,setLogs]=useState([]);
  useEffect(()=>{apiGet('/api/admin/logs?limit=100').then(setLogs).catch(()=>{})},[]);
  return(<div className="container">
    <h2 style={{fontSize:18,fontWeight:700,margin:'8px 0 16px'}}>📋 操作日志</h2>
    <div className="panel"><table><thead><tr><th>时间</th><th>管理员</th><th>操作</th><th>详情</th></tr></thead>
    <tbody>{logs.map(l=><tr key={l.id}>
      <td style={{fontSize:11,color:'#6B7280'}}>{l.createdAt?.substring(0,19).replace('T',' ')}</td>
      <td>{l.adminName}</td>
      <td><span className="badge badge-purple">{l.action}</span></td>
      <td style={{fontSize:12}}>{l.detail}</td>
    </tr>)}</tbody></table></div>
  </div>);
}

// ===== MODALS =====
function BanModal({user,onClose,onDone}){
  const [reason,setReason]=useState('');const [days,setDays]=useState('');
  const doBan=async()=>{
    const r=await apiPost('/api/admin/users/'+user.id+'/ban',{ban:true,reason:reason||'违规',days:days?parseInt(days):0});
    if(!r.error)onDone();
  };
  return (<div className="modal-bg" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
    <h3>⛔ 封禁 {user.name}</h3>
    <label>封禁理由</label><input value={reason} onChange={e=>setReason(e.target.value)} placeholder="违规内容/行为描述"/>
    <label>封禁天数 (0=永久)</label><input type="number" value={days} onChange={e=>setDays(e.target.value)} placeholder="0"/>
    <div className="actions">
      <button className="btn-sm btn-ghost" onClick={onClose}>取消</button>
      <button className="btn-sm btn-danger" onClick={doBan}>确认封禁</button>
    </div>
  </div></div>);
}
function EditModal({user,onClose,onDone}){
  const [name,setName]=useState(user.name||'');const [city,setCity]=useState(user.city||'');
  const doEdit=async()=>{
    const r=await apiPost('/api/admin/users/'+user.id+'/update',{name,city});
    if(!r.error)onDone();
  };
  return (<div className="modal-bg" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
    <h3>✏️ 编辑 {user.name}</h3>
    <label>昵称</label><input value={name} onChange={e=>setName(e.target.value)}/>
    <label>城市</label><input value={city} onChange={e=>setCity(e.target.value)}/>
    <div className="actions">
      <button className="btn-sm btn-ghost" onClick={onClose}>取消</button>
      <button className="btn-sm btn-primary" onClick={doEdit}>保存</button>
    </div>
  </div></div>);
}

function CreateAdminModal({onClose,onDone}){
  const [u,setU]=useState('');const [n,setN]=useState('');const [r,setR]=useState('operator');const [pw,setPw]=useState('');
  const create=async()=>{
    if(!u.trim()){showToast('用户名不能为空','error');return}
    const res=await apiPost('/api/admin/create',{username:u,name:n||u,role:r,password:pw||undefined});
    if(res.success){showToast('创建成功','success');onDone()}
  };
  return (<div className="modal-bg" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
    <h3>新建管理员</h3>
    <label>用户名 *</label><input value={u} onChange={e=>setU(e.target.value)}/>
    <label>名称</label><input value={n} onChange={e=>setN(e.target.value)} placeholder="可选"/>
    <label>角色</label>
    <select value={r} onChange={e=>setR(e.target.value)}><option value="operator">运营</option><option value="support">客服</option><option value="superadmin">超级管理员</option></select>
    <label>初始密码</label><input value={pw} onChange={e=>setPw(e.target.value)} placeholder="留空则为changeme"/>

function SensitiveWordsModal({onClose}){
  const [words,setWords]=useState([]);const [newWord,setNew]=useState('');const [loading,setLoading]=useState(true);
  useEffect(()=>{apiGet('/api/admin/sensitive-words').then(w=>{setWords(w||[]);setLoading(false)}).catch(()=>setLoading(false))},[]);
  const save=()=>{apiPost('/api/admin/sensitive-words',{words}).then(()=>{onClose()})};
  const add=()=>{if(newWord.trim()&&!words.includes(newWord.trim().toLowerCase())){setWords([...words,newWord.trim().toLowerCase()]);setNew('')}};
  const remove=(i)=>setWords(words.filter((_,j)=>j!==i));
  return(<div className="modal-bg" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
    <h3>🛡️ 敏感词管理 ({words.length}个)</h3>
    {loading?<div>加载中…</div>:<>
    <div style={{display:'flex',gap:6,marginBottom:12}}>
      <input value={newWord} onChange={e=>setNew(e.target.value)} placeholder="输入敏感词…" onKeyDown={e=>e.key==='Enter'&&add()} style={{flex:1}}/>
      <button className="btn-sm btn-primary" onClick={add}>添加</button>
    </div>
    <div style={{maxHeight:300,overflow:'auto',display:'flex',flexWrap:'wrap',gap:6}}>
      {words.map((w,i)=><span key={i} style={{padding:'4px 10px',borderRadius:8,background:'#EF444420',color:'#EF4444',fontSize:12,display:'flex',alignItems:'center',gap:4}}>
        {w} <button onClick={()=>remove(i)} style={{background:'none',border:'none',color:'#EF4444',cursor:'pointer',fontSize:14,padding:0}}>×</button>
      </span>)}
      {words.length===0&&<span style={{color:'#6B7280',fontSize:12}}>暂无敏感词</span>}
    </div>
    </>}
    <div className="actions">
      <button className="btn-sm btn-ghost" onClick={onClose}>取消</button>
      <button className="btn-sm btn-primary" onClick={save}>保存</button>
    </div>
  </div></div>);
}

  const [reports,setReports]=useState({items:[],total:0});
  const [search,setSearch]=useState('');
  const [reportStatus,setReportStatus]=useState('pending');
  const [page,setPage]=useState(1);

  const loadPosts=()=>apiGet(`/api/admin/posts?search=${encodeURIComponent(search)}&page=${page}&limit=20`).then(setPosts).catch(()=>{});
  const loadReports=()=>apiGet(`/api/admin/reports?status=${reportStatus}&page=${page}&limit=20`).then(setReports).catch(()=>{});
  useEffect(()=>{if(tab==='posts')loadPosts();else loadReports()},[tab,search,reportStatus,page]);

  const deletePost=(id)=>{if(!confirm('确定删除？'))return;apiPost('/api/admin/posts/'+id+'/delete',{}).then(loadPosts)};
  const pinPost=(id,pinned)=>apiPost('/api/admin/posts/'+id+'/pin',{pinned}).then(loadPosts);

  };

  return(<div className="container">

      <button className={`btn-sm ${tab==='reports'?'btn-primary':'btn-ghost'}`} onClick={()=>{setTab('reports');setPage(1)}}>
        举报处理 {reports.items?.filter(r=>r.status==='pending').length>0&&<span className="badge badge-err" style={{marginLeft:4}}>{reports.total}</span>}
      </button>
    </div>

    {tab==='posts'&&<div className="panel">
      <div className="toolbar">
        <input value={search} onChange={e=>{setSearch(e.target.value);setPage(1)}} placeholder="搜索帖子内容/作者…"/>

      </div>
      <table><thead><tr><th>作者</th><th>内容</th><th>赞</th><th>评论</th><th>时间</th><th>操作</th></tr></thead>

        <tr key={p.id}>
          <td style={{fontWeight:600}}>{p.author} {p.is_bot&&<span className="badge badge-warn">Bot</span>} {p.pinned&&<span className="badge badge-purple">置顶</span>}</td>
          <td style={{fontSize:12,maxWidth:300,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.content}</td>
          <td>{p.likeCount}</td>
          <td>{p.commentCount}</td>
          <td style={{fontSize:11,color:'#6B7280'}}>{p.createdAt?.substring(0,10)}</td>
          <td style={{whiteSpace:'nowrap'}}>
            <button className="btn-sm btn-ghost" style={{marginRight:4}} onClick={()=>pinPost(p.id,!p.pinned)}>{p.pinned?'取消置顶':'置顶'}</button>
            <button className="btn-sm btn-danger" onClick={()=>deletePost(p.id)}>删除</button>
          </td>
        </tr>
      ))}</tbody></table>
    </div>}

    {tab==='reports'&&<div className="panel">
      <div className="toolbar">
        <select value={reportStatus} onChange={e=>{setReportStatus(e.target.value);setPage(1)}} style={{padding:'8px 12px',borderRadius:8,border:'1.5px solid #2D2D3F',background:'#0f0f1a',color:'#e0e0e0',fontSize:13}}>
          <option value="pending">待处理</option><option value="resolved">已处理</option><option value="dismissed">已忽略</option><option value="all">全部</option>
        </select>
        <span style={{fontSize:12,color:'#6B7280',marginLeft:'auto'}}>共 {reports.total} 条</span>
      </div>
      <table><thead><tr><th>举报人</th><th>类型</th><th>理由</th><th>状态</th><th>时间</th><th>操作</th></tr></thead>
      <tbody>{reports.items?.map(r=>(
        <tr key={r.id}>
          <td>{r.reporterName}</td>
          <td><span className="badge badge-warn">{r.targetType}</span></td>
          <td style={{fontSize:12,maxWidth:250,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.reason}</td>
          <td>{r.status==='pending'?<span className="badge badge-err">待处理</span>:r.status==='resolved'?<span className="badge badge-ok">已处理</span>:<span className="badge" style={{background:'#6B728020',color:'#6B7280'}}>已忽略</span>}</td>
          <td style={{fontSize:11,color:'#6B7280'}}>{r.createdAt?.substring(0,10)}</td>
          <td style={{whiteSpace:'nowrap'}}>
            {r.status==='pending'&&<>
              <button className="btn-sm btn-primary" style={{marginRight:4}} onClick={()=>resolveReport(r.id,'resolved')}>处理</button>
              <button className="btn-sm btn-ghost" onClick={()=>resolveReport(r.id,'dismissed')}>忽略</button>
            </>}
          </td>
        </tr>
      ))}</tbody></table>
    </div>}
  </div>);
}

function LLMPage(){
  const [cfg,setCfg]=useState(null);const [llmCfg,setLlmCfg]=useState(null);const [stats,setStats]=useState(null);
  const [samples,setSamples]=useState([]);const [showSamples,setShowSamples]=useState(false);
  useEffect(()=>{
    apiGet('/api/admin/config').then(setCfg);
    apiGet('/api/admin/llm-config').then(setLlmCfg);
    apiGet('/api/stats').then(setStats);
  },[]);

  const toggle=(key)=>{
    const val=!key.split('.').reduce((o,k)=>o?.[k],cfg);
    apiPost('/api/admin/config',{[key.split('.')[0]]:{...cfg[key.split('.')[0]],[key.split('.').slice(1).join('.')]:val}}).then(d=>{
      if(!d.error){setCfg(d);showToast(val?'已启用':'已关闭','success')}
    });
  };
  const updateCfg=(patch)=>{apiPost('/api/admin/config',patch).then(d=>{if(!d.error){setCfg(d);showToast('已保存','success')}})};
  const loadSamples=()=>{apiGet('/api/admin/ai-samples?limit=20').then(d=>{if(Array.isArray(d))setSamples(d);setShowSamples(true)})};

  if(!cfg)return <div className="container"><div className="panel"><span className="spinner"/> 加载中…</div></div>;
  return(<div className="container">
    <h2 style={{fontSize:18,fontWeight:700,margin:'8px 0 16px'}}>⚙️ 系统配置</h2>

    {/* 维护模式 */}
    <div className="panel" style={{border:cfg.maintenance?.enabled?'2px solid #EF4444':undefined}}>
      <h3>🔧 维护模式</h3>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <button onClick={()=>updateCfg({maintenance:{...cfg.maintenance,enabled:!cfg.maintenance?.enabled}})} className={`btn-sm ${cfg.maintenance?.enabled?'btn-danger':'btn-primary'}`}>
          {cfg.maintenance?.enabled?'🔴 关闭维护':'🟢 开启维护'}
        </button>
        <span style={{fontSize:12,color:'#6B7280'}}>{cfg.maintenance?.enabled?'用户端已显示维护页面':'系统正常运行'}</span>
      </div>
    </div>

    {/* 功能开关 */}
    <div className="panel">
      <h3>🎛️ 功能开关</h3>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
        {[['fortuneWheel','命运转盘'],['communityPosts','缘友圈'],['moodTracker','心情打卡'],['shareCards','分享卡片'],['voiceMessage','语音消息'],['imageMessage','图片消息']].map(([k,l])=>(
          <div key={k} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 12px',background:'#0f0f1a',borderRadius:8}}>
            <span style={{fontSize:12}}>{l}</span>
            <button onClick={()=>updateCfg({features:{...cfg.features,[k]:!cfg.features?.[k]}})} style={{padding:'2px 10px',borderRadius:6,border:'none',fontSize:10,fontWeight:600,cursor:'pointer',background:cfg.features?.[k]!==false?'#34D39930':'#EF444430',color:cfg.features?.[k]!==false?'#34D399':'#EF4444'}}>{cfg.features?.[k]!==false?'开':'关'}</button>
          </div>
        ))}
      </div>
      <div style={{fontSize:12,fontWeight:600,color:'#6B7280',margin:'12px 0 6px'}}>占卜模式</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8}}>
        {[['bazi','八字'],['astrology','星座'],['tarot','塔罗'],['meihua','梅花'],['vedic','印度'],['hehun','合婚'],['synastry','配对'],['hepan','合盘']].map(([k,l])=>(
          <div key={k} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 8px',background:'#0f0f1a',borderRadius:6}}>
            <span style={{fontSize:10}}>{l}</span>
            <button onClick={()=>updateCfg({features:{...cfg.features,modes:{...cfg.features?.modes,[k]:!cfg.features?.modes?.[k]}}})} style={{padding:'1px 8px',borderRadius:4,border:'none',fontSize:9,fontWeight:600,cursor:'pointer',background:cfg.features?.modes?.[k]!==false?'#34D39930':'#EF444430',color:cfg.features?.modes?.[k]!==false?'#34D399':'#EF4444'}}>{cfg.features?.modes?.[k]!==false?'开':'关'}</button>
          </div>
        ))}
      </div>
    </div>

    {/* Bot配置 */}
    <div className="panel">
      <h3>🤖 Bot行为</h3>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
        <button onClick={()=>updateCfg({bot:{...cfg.bot,enabled:!cfg.bot?.enabled}})} className={`btn-sm ${cfg.bot?.enabled?'btn-primary':'btn-danger'}`}>{cfg.bot?.enabled?'Bot已启用':'Bot已关闭'}</button>
        <button onClick={()=>updateCfg({bot:{...cfg.bot,autoGreet:!cfg.bot?.autoGreet}})} className="btn-sm btn-ghost">{cfg.bot?.autoGreet?'✅ 自动问候':'❌ 自动问候'}</button>
        <button onClick={()=>updateCfg({bot:{...cfg.bot,proactiveMessages:!cfg.bot?.proactiveMessages}})} className="btn-sm btn-ghost">{cfg.bot?.proactiveMessages?'✅ 主动消息':'❌ 主动消息'}</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,fontSize:12}}>
        <div>回复延迟: {cfg.bot?.replyDelayMin/1000}s - {cfg.bot?.replyDelayMax/1000}s</div>
        <div>活跃时段: {cfg.bot?.activeHourStart}:00 - {cfg.bot?.activeHourEnd}:00</div>
      </div>
    </div>

    {/* LLM限额 */}
    <div className="panel">
      <h3>📊 LLM限额</h3>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,fontSize:12}}>
        <div style={{padding:'8px',background:'#0f0f1a',borderRadius:8}}>
          <div style={{color:'#6B7280',fontSize:10}}>每天占卜次数</div>
          <div style={{fontWeight:700,color:'#A78BFA'}}>{cfg.limits?.divinationsPerDay||'不限'}</div>
        </div>
        <div style={{padding:'8px',background:'#0f0f1a',borderRadius:8}}>
          <div style={{color:'#6B7280',fontSize:10}}>每报告追问</div>
          <div style={{fontWeight:700,color:'#A78BFA'}}>{cfg.limits?.followUpsPerReport||20}</div>
        </div>
        <div style={{padding:'8px',background:'#0f0f1a',borderRadius:8}}>
          <div style={{color:'#6B7280',fontSize:10}}>每天追问</div>
          <div style={{fontWeight:700,color:'#A78BFA'}}>{cfg.limits?.followUpsPerDay||'不限'}</div>
        </div>
      </div>
    </div>

    {/* AI输出质量抽查 */}
    <div className="panel">
      <h3 style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>🔍 AI输出质量
        <button className="btn-sm btn-primary" onClick={loadSamples}>抽查最近20条</button>
      </h3>
      {showSamples&&<div style={{maxHeight:400,overflow:'auto'}}>
        {samples.length===0?<div style={{color:'#6B7280',fontSize:12,padding:20,textAlign:'center'}}>暂无占卜记录</div>:
        samples.map((s,i)=><div key={i} style={{padding:'10px',borderBottom:'1px solid #1f1f30',fontSize:12}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
            <span><span className="badge badge-purple">{s.mode}</span> {s.userName||'?'}</span>
            <span style={{color:'#6B7280',fontSize:10}}>{s.createdAt?.substring(0,16).replace('T',' ')}</span>
          </div>
          {s.question&&<div style={{color:'#9CA3AF'}}>❓ {s.question}</div>}
          <div style={{color:'#e0e0e0',marginTop:4,maxHeight:60,overflow:'hidden'}}>{s.preview||'无预览'}</div>
        </div>)}
      </div>}
    </div>

    {/* LLM Provider */}
    {llmCfg&&<div className="panel">
      <h3>📡 Provider状态</h3>
      <table><thead><tr><th>名称</th><th>URL</th><th>模型</th><th>状态</th></tr></thead>
      <tbody>{llmCfg.providers?.map((p,i)=>(
        <tr key={p.name}><td style={{fontWeight:600}}>{p.name} {i===llmCfg.activeProvider&&<span className="badge badge-ok">当前</span>}</td><td style={{fontSize:11,color:'#9CA3AF'}}>{p.url}</td><td><span className="badge badge-purple">{p.model}</span></td><td>{(llmCfg.providerErrors?.[p.name]||0)>=3?<span className="badge badge-err">异常</span>:<span className="badge badge-ok">正常</span>}</td></tr>
      ))}</tbody></table>
    </div>}

    {stats&&<div className="stats-grid">
      <div className="stat-card"><div className="label">LLM调用</div><div className="value">{stats.llm?.calls||0}</div></div>
      <div className="stat-card"><div className="label">成功率</div><div className="value" style={{fontSize:18,color:'#34D399'}}>{stats.llm?.calls?(((stats.llm?.success||0)/(stats.llm?.calls)*100)|0)+'%':'—'}</div></div>
      <div className="stat-card"><div className="label">平均耗时</div><div className="value" style={{fontSize:18}}>{stats.llm?.avgTimeSeconds||'—'}</div></div>
    </div>}
  </div>);
}

          <tr style={{color:'#F59E0B'}}><td>Lv.2</td><td>缘合至尊</td><td>无限</td><td>无限</td><td>✅</td><td>✅</td><td>¥68/月</td></tr>

    {tab==='orders'&&<div className="panel">
      <h3 style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>📋 订单列表

// ===== APP =====
function App(){
  const [adminUser,setAdminUser]=useState(null);
  const [page,setPage]=useState('dashboard');
  const [showChangePw,setShowChangePw]=useState(false);

  // 自动验证token并获取完整信息
  useEffect(()=>{
    const t=getToken();if(!t)return;
    try{
      const payload=JSON.parse(atob(t.split('.')[1]));
      if(payload.type==='admin'&&payload.aid){
        setAdminUser({id:payload.aid,role:payload.role,name:'管理员',username:'admin'});
        // 从服务器获取完整信息
        apiGet('/api/admin/list').then(list=>{
          if(Array.isArray(list)){const me=list.find(a=>a.id===payload.aid);if(me)setAdminUser(prev=>({...prev,...me}))}
        });
      }
    }catch(e){localStorage.removeItem('yuanhe_admin_token')}
  },[]);

  const logout=()=>{localStorage.removeItem('yuanhe_admin_token');setAdminUser(null)};

  const handleLogin=(adm)=>{
    setAdminUser(adm);
    if(adm.mustChangePassword)setShowChangePw(true);
  };

  if(!adminUser)return<LoginPage onLogin={handleLogin}/>;

  const pages={
    dashboard:<DashboardPage/>,
    users:<UsersPage/>,
    chat:<ChatPage/>,
    content:<ContentPage/>,
    llm:<LLMPage/>,
    logs:<LogsPage/>,
    vip:<VipPage/>,
    admins:<AdminsPage role={adminUser.role}/>,
  };

  return(<>
    <div className="nav">
      <div className="brand">🔮 缘合</div>
      <button className={page==='dashboard'?'active':''} onClick={()=>setPage('dashboard')}>概览</button>
      {adminUser.role!=='support'&&<button className={page==='users'?'active':''} onClick={()=>setPage('users')}>用户</button>}
      <button className={page==='chat'?'active':''} onClick={()=>setPage('chat')}>聊天</button>
      <button className={page==='content'?'active':''} onClick={()=>setPage('content')}>内容</button>
      {adminUser.role==='superadmin'&&<button className={page==='llm'?'active':''} onClick={()=>setPage('llm')}>LLM</button>}
      <button className={page==='logs'?'active':''} onClick={()=>setPage('logs')}>日志</button>
      <button className={page==='vip'?'active':''} onClick={()=>setPage('vip')}>营收</button>
      {adminUser.role==='superadmin'&&<button className={page==='admins'?'active':''} onClick={()=>setPage('admins')}>管理员</button>}
      <div className="right">
        <span className="info">{adminUser.name||adminUser.username||'管理员'} · {adminUser.role}</span>
        <button className="btn-sm btn-ghost" onClick={()=>setShowChangePw(true)}>改密码</button>
        <button className="logout" onClick={logout}>退出</button>
      </div>
    </div>
    {pages[page]||pages.dashboard}
    {showChangePw&&<ChangePasswordModal forced={adminUser.mustChangePassword} onDone={()=>{setShowChangePw(false);if(adminUser.mustChangePassword)setAdminUser({...adminUser,mustChangePassword:false})}} onClose={()=>setShowChangePw(false)}/>}
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
